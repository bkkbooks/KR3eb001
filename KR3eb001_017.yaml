body:
  text: 卷十七奇經八脈脈證第七十九奇經八脈其診又別直上直下浮則為督牢則為沖緊則任脈寸左右彈陽蹺可決尺左右彈陰蹺可別關左右彈帶脈當訣尺外斜上至寸陰維尺內斜上至寸陽維督脈為病脊強癲癇任脈為病七疝瘕堅衝脈為病逆氣裡急帶主帶下臍痛精失陽維寒熱目眩僵仆陰維心痛胸脅刺築陽蹺為病陰緩陽急陰蹺為病陽緩陰急癲癇瘛瘲寒熱恍惚八脈脈證各有所屬奇經八脈者在十二經脈之外無臟腑與之配偶故曰奇夫臟腑之脈寸關尺有定位左寸心小腸右寸肺大腸左關肝膽右關脾胃左尺腎膀胱右尺命門三焦浮中沉有定體難經以三菽六菽九菽十二菽按之至骨分肺心脾肝腎弦鉤毛石有定形春弦肝木夏鉤心火秋毛肺金冬石腎水此則另為一脈形狀固異而隧道亦殊病證不同而診治自別蓋督任沖三脈皆起於胞中一源而三派督行於背總督諸陽任行於腹總督諸陰沖則後行於背前行於腹上行於頭下行於足以至溪谷肌肉無處不到誠十二經內外上下之要衝也故靈樞順逆肥瘦篇曰衝脈者五臟六腑之海也五臟六腑皆稟焉二脈直行上下發源最中故見於脈亦皆直上直下也直上直下者即三部俱長透之義若直上下而浮則氣張揚陽象也故屬督若直上下而緊則勢斂束陰象也故屬任若直上下而牢則體堅實有餘之象也故屬沖陽蹺陰蹺者皆起於足跟人身之超越矯捷者亦莫過於足跟故曰蹺一則為足太陽之別循外踝上行入風池合於太陽故名陽蹺一則為足少陰之別循內踝上行至咽喉交貫衝脈故名陰蹺寸以候陽寸左右彈者言在寸左右皆有彈石搏手之勢是陽蹺脈也尺以候陰尺左右彈者言在尺左右皆有彈石搏手之勢是陰蹺脈也二經之起以踝之內外分陰陽者外踝屬太陽而內踝屬少陰也二經之脈以尺寸分陰陽者以陽蹺入風池合太陽至頭故以寸候之陰蹺合少陰而不至頭故以尺候之也帶脈者圍身一周不上不下如束帶然故彈搏之脈惟見於左右中關耳陽維陰維者維持一身陽維維陽起於諸陽之會陰維維陰起於諸陰之交夫人身經脈繁密二脈能於陰交陽會處加一紮縛舉綱齊目而陰陽斯得維持之力矣其見於脈自尺至寸皆刺斜而上陰則自外入內陽則自內出外蓋其經亦皆自下而起陽自外踝出肩至腦陰自內踝入腹至喉故也此八經之脈狀病則見不病則不見難經二十八難曰人脈隆盛入於八脈而不環周故十二經亦不能拘之不能拘之者謂十二經不能拘此八脈在環周之內然而八脈之元元已寓於十二經中矣故平和不病則不見也其脈曰浮曰牢曰緊曰左右彈曰斜上雖皆各因其陰陽道路呈象而脈狀則俱似有邪而實者本難云蓄則砭射良有以哉其病督脈脊強癲癇者蓋督脈起於少腹以下骨中央女子入系庭孔之端終陰器繞篡繞臀至少陰與太陽少陰合入股內貫脊屬腎與太陽起目內眥上額交巔上入絡腦還出別下項循肩膊內夾脊抵腰中入循膂絡腎自目內眥上額下循膂絡腎皆合太陽而並行者也其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央其脈之別名曰長強挾脊上項散上頭下當肩胛左右別走太陽入貫臀二十八難亦曰督脈者起於下極之俞並於脊裡上至風府入屬於腦由是觀之則督脈與太陽合行者十九故邪客則脊強以其貫脊也督與太陽皆主表而督為諸陽之總太陽為諸陽之長又曰巨陽風邪從類傷陽表必先受故留則為癲癇疾也癲癇時發時止或筋脈牽引或項背反張雖云風傷督脈亦太陽主筋故耳宜羌活勝濕湯生鐵落飲瀉青丸之類任脈為病七疝瘕堅者蓋任脈總諸陰之會其脈起於胞中循腹裡為經絡之海其浮而外者循腹裡上行於咽喉別而絡唇口難經亦云起於中極之下以上毛際循腹裡上關元至咽喉七疝者在巢氏則曰厥疝癥疝寒疝氣疝盤疝胕疝狼疝張子和非之另立七名曰寒疝水疝筋疝血疝氣疝狐疝㿗疝而諸經之載如素問四時刺逆從論所云狐疝風肺風疝脾風疝心風疝腎風疝肝風疝骨空論所云沖疝脈解篇所云㿗疝玉機真藏論所云疝瘕少腹冤熱而痛出白一名曰蠱靈樞邪氣臟腑病形篇所云小腸病者小腹痛腰脊控睪而痛時窘之後此亦疝類也名雖多種總不能出於七疝之外蓋七疝之發必在前陰少腹之間任脈所經之地雖屬他經未有不以任為原者瘕者假也氣聚則堅氣散則平亦似疝之時作時止發則亦在任脈界分多屬血凝經滯女子之病也宜東垣丁香楝實丸三因散聚湯化氣湯之類衝脈為病逆氣裡急者沖之與任皆起胞中上循背裡為經絡之海亦名血海其浮而外者亦循腹上行會於咽喉別而絡唇口強半與任脈同素問骨空論曰衝脈者起於氣街並足少陰之經挾臍上行至胸中而散二十八難則曰起於氣衝並足陽明之經挾臍上行至胸中而散痿論亦曰衝脈者經脈之海主滲灌溪谷與陽明合於宗筋二論所並雖有少陰陽明之不同要知自臍至胸與陽明則並於前與少陰則並於後也故與陽明皆得稱為五臟六腑之海其氣不順血不和則胸腹之氣循經壅逆而裡急矣宜蘇子降氣湯黑錫丹震靈丹之類帶脈為病帶下臍痛精失者以帶脈起於季脅回身如帶臟腑十二經絡皆過於此若飲食不節勞欲縱傷致令濕熱下流邪火內郁外或風入胞宮邪凝臍腹帶脈不任與邪俱陷或赤或白如涕如膿或青黃雜色或濁黑異形溢漏不時淋瀝不淨其兼證則腰腹痠疼足膝痿軟頭目暈眩經脈參差甚或寒熱往來容顏枯瘁然而發源於沖任脾胃者多以沖為血海任總諸陰脾胃司水穀故耳是以骨空論曰任脈為病女子帶下瘕聚又痿論曰衝脈與陽明合於宗筋之會而陽明為之長皆屬於帶脈帶脈起於季脅章門前則當臍上故又或為臍痛靈樞經別篇曰腎足少陰當十四椎出屬帶脈蓋腎主藏精帶固腰膂虛則一不能藏一不能固而精有自失者矣宜金匱桂枝龍骨牡蠣湯和劑威喜丸之類陽維為病寒熱目眩僵仆者以陽維維絡一身之陽陽主衛主氣主表病則不能維陽是陽無護持而衛氣亦因之不固故在表則生寒熱其脈氣所發別於金門在足太陽外踝下以陽交為郄足少陽外踝上與手足太陽及蹺脈會於臑俞手太陽肩後與手足少陽會於天髎手少陽缺盆上又會於肩井足少陽肩上其在頭也與足少陽會於陽白足少陽眉上上於本神及臨泣俱在足少陽眉上上至正營足少陽目窗上及腦空足少陽枕骨下下至風池足少陽顳顬後與督脈會於風府督脈後髮際啞門督脈風府後觀此則知本脈之維於頭目手足頸項肩背諸陽無一不到其脈不榮則不能維在頭目無維則眩在頸項肩背無維則僵在手足無維則僕矣宜東垣柴胡升陽湯東垣退熱湯之類陰維為病心痛胸腹刺築者以陰維維絡一身之陰陰主榮主裡不能維陰則陰無約束而榮氣因之不和故在裡則心痛又榮主血血合心故心痛也其脈氣所發陰維之郄名曰築賓足少陰內踝上與足太陰會於腹哀足太陰乳下大橫足太陰腹哀下又與足太陰會於府舍足太陰少腹下期門足厥陰乳下與任脈會於天突任脈喉下廉泉任脈舌本下觀此則知本脈之維於胸腹諸陰亦無一不到其脈不榮則不能維在胸脅失所維則動築而刺痛矣宜本事枳實散奇效拈痛丸四七湯之類陽蹺為病陰緩陽急陰蹺為病陽緩陰急及癲癇瘛瘲寒熱恍惚者蓋二蹺之脈同發一源難經二十八難曰陽蹺脈起於跟中陰蹺脈亦起於跟中不唯同起於根而又同終於目靈樞脈度篇曰蹺脈者少陰之別起於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目濡潤榮養於目又曰男子數其陽女子數其陰當數者為經不當數者為絡觀此則知二蹺之脈雖以男女分陰陽而實則迭為經絡是一本也故其為病亦不似前六脈逐經分屬本文以癲癇瘛瘲寒熱恍惚總系二經之下以二經均可病此證雖云四而病機可分為八陰陽緩急之義自是顯然夫人之身背為陽腹為陰開為陽闔為陰外為陽內為陰熱為陽寒為陰癲則目閉俯首陰急而陽緩也癇則目直僵仆陽急而陰緩也大惑論所謂衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉脈度篇亦云蹺之陰脈榮其臟陽脈榮其腑又云內溉五臟外濡腠理又陰出陽則交於足太陽陽入陰則交於足少陰雖一為太陽之別一為少陰之別而實則隨衛氣相終始者故衛氣之行留即可徵二蹺之虛盛瘈者挈也筋脈挈向里拘陰急而陽緩也瘲者縱也筋脈縱從外弛陽急而陰緩也寒則氣收斂從里從陰陰急而陽緩也熱則氣散漫從表從陽陽急而陰緩也恍者目前恍然若有所見繆刺論曰邪客於足陽蹺之脈令人目痛從內眥始且合太陽上行而並濡於目病屬目而從外陽蹺之病陽急而陰緩也惚者胸中悾惚若有所失脈度篇曰蹺脈者少陰之別起於然谷之後循陰股入陰上循胸裡入缺盆二十八難曰陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈病屬胸腹而從內陰蹺之病陰急而陽緩也二脈一為經一為絡病在經則經急絡緩病在絡則經緩絡急總之皆可言經皆可言絡但以男女分陰陽之所屬緩急證病邪之所在而正文以諸證為二經所共義良深矣宜胃風湯交加散海藏愈風湯加味逍遙散十全大補湯之類附方羌活勝濕湯見第六十五生鐵落飲治肝木有餘或大怒諸火上炎上盛下虛發為癲狂神氣不寧渴煩譫妄生鐵四十斤入火燒赤沸砧上鍛之有花出如蘭如蛾紛紛墜地者是鐵落用水二斗煮取一斗入後藥石膏三兩龍齒研白茯苓防風去蘆各一兩半玄參秦艽各一兩上為粗散入鐵汁中煮取五升去滓入竹瀝一升和勻溫服二合無時日五服瀉青丸見第四十九東垣丁香楝實丸見第六十四三因散聚湯治九氣積聚狀如癥瘕隨氣上下發作心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏湯洗七次檳榔當歸各七錢五分陳皮去白杏仁去皮尖麩炒桂心各二兩茯苓炙甘草附子炮去皮臍川芎枳殼去瓤麩炒厚朴薑製吳茱萸湯浸各一兩每服四錢水一盞姜三片煎七分食前溫服大便不利加大黃三因化氣湯治息積砂仁桂心木香各二錢五分甘草茴香炒丁香皮青皮陳皮乾薑蓬朮炮各半兩胡椒沉香各一錢上為細末每服二錢姜蘇鹽湯調下婦人醋湯下蘇子降氣湯見第七十黑錫丹見第七十震靈丹紫府元君南嶽魏夫人方出道藏一名紫金丹治男子真元衰憊五勞七傷臍腹冷疼肢體痠痛上盛下虛頭目眩暈心神恍惚血氣衰微及中風癱瘓手足不遂筋骨拘攣腰膝沉重容枯肌瘦目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜小腹淋瀝夜多盜汗久瀉久痢嘔吐不食八風五痹一切沉寒痼冷服之如神及治婦人血氣不足崩漏虛損帶下久冷胎藏無子禹餘糧火煅醋淬不計遍數手捻得碎為度紫石英赤石脂丁頭代赭石如禹餘糧炮製各四兩以上四味並作小塊入坩鍋內鹽泥固濟候乾用炭十斤煅通紅火盡為度入地埋出火毒二宿滴乳香另研五靈脂去砂石篩沒藥去砂石研各二兩硃砂水飛過一兩上八味併為細末以糯米粉煮糊為丸如雞豆大曬乾出光每一丸空心溫酒或冷水任下常服鎮心神駐顏色溫脾胃理腰臍除屍疰蠱毒闢鬼魅邪厲久服輕身漸入仙道忌豬羊血恐減藥力婦人醋湯下孕婦不可服金匱桂枝龍骨牡蠣湯金匱要略云夫失精家少腹弦急陰頭寒目眩發落脈極虛芤遲清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之小品云虛弱浮熱汗出者除桂加白薇附子各三分名二加龍骨湯桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩上七味以水七升煮取三升分溫三服和劑威喜丸治丈夫元陽虛憊精氣不固餘瀝常流小便濁夢寐頻泄及婦人血海久冷白帶白漏白淫下部常濕小便如米泔或無子息黃蠟四兩白茯苓去皮四兩作塊用豬苓二錢半同於瓷器內煮二十餘沸出日乾不用豬苓上以茯苓為末熔黃蠟搜為丸如彈子大空心細嚼滿口生津徐徐咽服以小便清為度忌米醋尤忌使性氣只吃糟醋東垣柴胡升陽湯治陽虛下陷發熱柴胡升麻葛根獨活羌活各半兩防風二錢半甘草生二錢炙二錢人參白芍藥各半兩上㕮咀每服半兩水三大盞煎一盞去滓稍熱服忌冷物冰水月餘東垣退熱湯治表中虛熱或遇夜則甚黃耆一錢柴胡七分生甘草黃連酒製黃芩芍藥地骨皮生地黃蒼朮各五分當歸身升麻各三分上㕮咀作一服水二盞煎一盞去滓食遠溫服本事枳實散治男子兩脅疼痛枳實一兩白芍藥炒雀腦芎人參各半兩上細末薑棗湯調二錢酒亦得食前日三服奇效拈痛丸治九種心痛五靈脂蓬莪朮煨木香當歸各等分上為末煉蜜和丸如桐子大每服二十丸食前用橘皮煎湯下四七湯見第十七胃風湯白芷一錢二分升麻二錢葛根蒼朮蔓荊子當歸身各一錢甘草柴胡藁本羌活黃柏草豆蔻麻黃不去節各五分水二鍾姜三片棗二枚煎八分溫服交加散治瘛瘲或顫振或產後不省人事口吐痰涎當歸荊芥上為細末每服二錢水一盞酒少許煎七分灌下神效海藏愈風丹一名舉卿古拜散治一切失血筋脈緊急產後及汗後搐搦荊芥為細末先以炒大豆黃卷以酒沃之去黃卷取清汁調前末三五錢和滓服之輕者一服重者二服三服即止氣虛者忌服童便調亦得加味逍遙散見第五十一十全大補湯見第十六反關脈第八十平人無脈移於外絡兄位弟乘陽谿列缺平人無脈者非無脈也謂寸口脈不應指而反從尺旁過肺之列缺大腸之陽谿刺斜出於外絡其三部定位九候淺深俱與平常應見於寸口者無異若兄固有之位弟竊而乘之此反常異眾之脈千百中僅一見也真臟脈第八十一病脈既明吉凶當別經脈之外又有真脈肝絕之脈循刀責責心絕之脈轉豆躁疾脾則雀啄如屋之漏如水之流如杯之覆肺絕如毛無根蕭索麻子動搖浮波之合腎脈將絕至如省客來如彈石去如解索命脈將絕蝦游魚翔至如湧泉絕在膀胱真脈既形胃氣已無參察色證斷之以臆以上正文之論脈首先源派次及流行次則左右男女定位次則五臟陰陽合時寒熱則屬之遲數內外則別之浮沉以至虛實異形正邪各狀因脈知病因病識脈病則該於瘡瘍女幼脈則窮於奇經反關可謂明且詳矣然而諸脈之外更有所謂真脈者大關生死故又審別於卷末焉夫人稟五行而生則五行原吾身之固有外與天地通內與穀神合是得以默運潛行而不顯然彰露設五臟之元真敗絕穀神不將則五行之死形各隨臟而見矣在肝如循刀責責強勁弦急按之切手所謂軟弱輕虛而滑端直以長者無有也在心如轉豆躁疾前屈後居柔滑全無所謂累累如連珠如循琅玕者無有也在脾如雀啄粒堅銳連屬如屋之漏許久一滴二脈乍疏乍數如水之流去而不返如杯之覆止而不揚所謂和柔相離如雞踐地者無有也在肺如毛無根蕭索上則微茫下則斷絕麻子動搖微散而亂浮波之合浮促無根所謂厭厭聶聶如落榆莢者無有也在腎至如省客省問之客一至即去來如彈石彈搏而來所藏盡出去如解索解散而去欲藏無入所謂喘喘累累如鉤按之而堅者無有也在命門右腎與左腎同但內涵相火故其絕也如蝦之遊如魚之翔忽爾靜中一躍火欲絕而忽焰之象也在膀胱至如湧泉氾濫不收以其藏津液而為州都之官故絕形如此蓋脈之和柔得體者胃氣與之俱耳胃氣者即生生水穀之氣也胃氣微少亦成病何況於無無則生生之根本先絕而五臟欲自持久不可得矣若能再察色證而以臆斷之理當不爽
