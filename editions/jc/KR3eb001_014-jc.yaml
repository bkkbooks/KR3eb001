body:
  text: 卷十四肺癰脈證第七十五肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀不宜浮大唾糊嘔血金匱要略問曰熱在上焦者因咳為肺痿肺痿之病何從得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰又問曰病咳逆脈之何以知此為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於衛其人則咳口乾喘滿咽燥不渴時唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死又云肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴又云肺癰喘不得臥葶藶大棗瀉肺湯主之又云咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之又云肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之以上數條金匱要略辯肺痿肺癰之所成不同也其言熱在上焦者痿癰皆有熱也其言咳者痿癰皆有咳也其言亡津液者痿癰皆亡津液也其言脈數者痿癰皆脈數也但痿屬肺氣虛虛則雖有熱而不烈熱不烈則雖亡津液不至燥涸故雖咳而口中反有濁唾涎沫熱雖客肺亦不致腐良為膿惟肺臟痿萃而已其脈雖數而必虛癰則不然乃肺臟氣壅邪實實則熱烈熱烈則津液亡而更加乾涸故口中辟辟燥烈熱迫肺肺將腐傷故氣逆而咳咳即胸中隱痛也津液既涸脈應澀滯而反滑數者蓄熱腐化挾有膿血之象即謂之數實亦可次條云寸口脈微而數者以衛疏故微邪郁故數衛疏邪郁故汗出表熱而且惡寒也此言風之初襲邪猶在表不入於裡惟隨呼出中於衛而外傷皮毛鬱而為熱其熱則不出於外惟隨吸入過於榮而內傷血脈夫衛者主表主皮毛陽也風客之則內關於肺肺氣壅逆故咳而喘滿衛主氣肺亦主氣口咽為氣之門戶氣不通調則津液不周布故口乾咽燥或有時反唾濁沫以熱不在胃故不渴衛疏邪客時為振寒此皆風中於衛激動肺氣之證驗也榮主裡主血脈陰也熱迫之則內及於脈肺朝百脈而行榮衛況邪自皮毛始皮毛者肺之合由合入肺肺受其熱血為之凝結久則腐敗為膿隨吐而出如米粥此皆熱過於榮敗傷肺體之證驗也始萌則在陽在衛屬氣分故云可救久則入陰傷血脈傷臟體故云膿成則死三條所云肺痿者虛寒之痿痿之變也肺虛而寒則液不流布故亦吐涎沫無熱迫肺則肺氣不逆故不咳無熱故不渴肺居最上為諸氣之總司而通調水道下輸膀胱遺尿小便數者肺氣虛冷有失通調之職所謂不能制下也氣虛於上故眩治以甘草乾薑湯者姜以溫冷草以補虛草補土而不補金者虛則補其母耳服此溫劑而渴者肺中必熱是知遺尿便數非痿證乃消渴也即氣厥論所謂飲一溲二肺消之屬下四條所載已成癰未成癰皆肺氣壅塞之有餘者前二條論中頗悉其義而皂角葶藶桔梗輩亦皆下氣瀉壅開結之藥以方合證理可想見故不重解也本文云肺癰已成寸數而實者即要略所謂脈數實者為肺癰肺痿之形數而無力者即要略所謂脈數虛者為肺痿必候於寸者以肺居最上也肺癰色白脈宜短澀者言其面色白為肺色短澀為肺脈色脈與證相符故宜也若脈浮大是為火象唾如米糊嘔見膿血是火剋金肺臟已傷宜乎附方金匱甘草乾薑湯甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服金匱葶藶大棗瀉肺湯治肺癰喘咳不得臥或鼻塞清涕不聞香臭酸辛上氣迫塞服此湯可先服小青龍湯一劑乃進此小青龍湯方見第十六葶藶熬令黃色搗丸如彈子大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服桔梗湯亦治血痹今人用此為咽喉諸證要藥見第三十二炙甘草湯見第三十三千金甘草湯治同桔梗湯甘草上一味以水三升煮減半分溫三服千金生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴生薑五兩人參三兩甘草四兩大棗十五枚上四味以水七升煮三升分溫再服千金桂枝去芍藥加皂莢湯治肺痿吐涎沫桂枝生薑各三兩甘草二兩大棗十枚皂莢一枚去皮子炙焦上五味以水七升微微火煮取三升分溫三服外臺桔梗白散治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗去蘆貝母去心各三分巴豆一分去皮熬上三味為散強人飲服半錢匕羸者減之病在膈上者吐膿血膈下者瀉出若下多不止飲冷水一杯則定千金葦莖湯治咳有微熱煩滿胸中甲錯是為肺癰葦莖二升薏苡仁半升桃仁五十粒瓜瓣半斤上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿瀉白散治肺癰桑白皮炒二錢地骨皮去骨甘草炙貝母去心紫菀桔梗炒當歸酒拌各一錢栝蔞仁一錢半作一劑水一鍾姜三片煎八分食遠服立齋云此方乃瀉肺邪消毒之劑也若喘咳唾痰沫肺脈浮數者用之有效四物湯治肺癰吐膿五心煩熱壅悶咳嗽貝母去心紫菀去苗土桔梗炒各一兩甘草炙半兩上搗篩每服三錢水一盞煎五七沸去滓不拘時稍冷服如咳嗽甚加去皮尖杏仁三枚同煎小兒量減肺癰神方用薏苡米為末糯米飲調下或入粥內煮吃亦可一方用水煎服當下膿血便愈濟生排膿散治肺癰得吐膿後以此排膿補肺生綿黃耆二兩細末每二錢水一碗煎五分服排膿散黃耆鹽水拌炒白芷五味子炒杵人參各等分為細末每服三錢食後蜜湯調下肺癰收口方肺癰收斂瘡口只有合歡樹皮或白蘞煎湯飲之然不可飲於未吐膿血之先也肺癰方又野毛慄根二兩水二鍾煎五分服覺肺中微有聲數次即愈治吐膿血方吐膿血如肺癰口臭他方不應宜消風散入男子發灰清米湯下兩服治肺癰方又鮮百合搗汁酒和服六七次愈試肺癰法凡人覺胸中隱隱痛咳嗽有臭痰吐在水內沉者是癰膿浮者是痰腸癰脈證第七十六腸癰實熱滑數可知數而不熱關脈芤虛微澀而緊未膿當下緊數膿成切不可下腸癰者腸內生癰也大腸小腸皆有之大抵得之不節飲食不適寒溫或積垢瘀凝或敗血留滯壅塞不行久郁化熱久熱腐膿而癰斯成矣如小腹腫痞皮急按之則痛小便數如淋或復自調時或發熱或自汗惡寒身如甲錯外無熱內無積聚而見上證者皆腸癰之候也甚者腹脹大轉側有水聲或繞臍生瘡或膿自臍出或大便出其脈數者小便膿也洪數滑數者大有膿也宜薏苡附子敗醬散遲緊或微澀而緊者未有膿也宜大黃牡丹湯萬氏桃仁承氣湯加連翹秦艽入風者加防風準繩蠟礬丸亦效鬱結成熱其熱自實熱實則脈之滑數不言可知若數而無熱則數為虛促之數非熱所鼓不惟不實而與腹中相應之關脈亦且芤虛矣雖見諸證未必成膿設的確有癰亦瘀凝之血耳蓋血瘀聚於腸腹則流行之脈道中反覺空虛故脈芤也若脈微澀而緊者氣猶滯著斂實未化膿也下之足以蕩其留結之邪若脈緊滑數熱已沸湧消熔膿已成也下之反以奪其生新之力即癰瘍未潰宜瀉實已潰宜補虛義附方薏苡附子敗醬散治腸癰為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此腸內有癰膿也此方主之薏苡仁十分附子二分敗醬五分上三味杵為末取方寸匕以水二升煎減半頓服小便當下大黃牡丹湯治腸癰少腹腫痞按之痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可過下總以此方主之大黃四兩牡丹皮一兩桃仁五十個瓜子半升芒硝三合上五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血萬氏治腸癰方桃仁承氣湯加秦艽連翹桃仁承氣湯見第二十薏苡仁湯治腸癰腹中㽲痛煩躁不安或脹滿不食小便澀婦人產後虛熱多有此病縱非癰但疑似間便可服薏苡仁栝蔞仁各三錢牡丹皮去骨桃仁各二錢上作一服水二鍾煎一鍾不拘時服按此方藥品和平其功且速常治腹痛或發熱或脹滿不食水道澀滯產後多有此證或月經欲行或行後作痛尤效四聖散一名神效栝蔞散治腸癰癰疽生於腦髭背腋及便毒服之神效生黃栝蔞一枚去皮粉草四錢研末沒藥研末三錢乳香研末一錢上用好紅酒二大碗慢火煎至一碗分作兩服兩日服盡大便順導惡物妙若干栝蔞則用兩三枚一方若病在上食後服在下食前服毒已結成即膿化為水毒未成即於小便中出疾甚再合服以退為度神仙蠟礬丸見第七十四雲母膏治一切癰疽瘡癤折傷等證蜀椒去目及閉口者微炒白芷沒藥赤芍藥肉桂當歸鹽花菖蒲麒麟竭黃耆白芨芎藭木香龍膽草白蘞防風厚朴麝香桔梗柴胡松脂人參蒼朮黃芩乳香附子茯苓良薑合歡皮各五錢硝石甘草雲母各四兩桑白皮槐枝柳枝柏葉水銀以絹另包待膏成以手細彈在上名養膏母陳皮各二兩清油四十兩黃丹二十兩上除雲母硝石麒麟竭乳香沒藥麝香鹽花黃丹八味另研外余藥並細切入油浸七日文火煎以柳枝不住手攪候匝沸乃下火沸定又上火如此者三次以藥黑色為度去滓再熬後入丹與八味末仍不住手以槐柳枝攪滴水中成珠不軟不硬為度瓷器收貯候溫將水銀彈上用時先刮去水銀或服或貼隨宜用之其功甚大也排膿散治腸癰小腹脹痛脈滑數或裡急後重或時時下血黃耆鹽水拌炒當歸酒拌金銀花白芷穿山甲蛤粉炒防風連翹栝蔞杵甘草各一錢作一劑水二鍾煎八分食前服若膿將盡去穿山甲連翹加當歸川芎或為末每服三錢食後蜜湯調下亦可
