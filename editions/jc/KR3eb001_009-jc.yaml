body:
  text: 卷九疝氣脈證第六十四疝氣弦急積聚在裡牢急者生弱急者死疝氣者氣聚而大外仍斂束故脈則見弦急而證則多腹痛也字下從山亦是聚而大之之義皆從寒濕積鬱於裡得之間有曰風曰熱者亦不過寒風濕熱耳其發也多惡寒寒熱嘔逆不食狀類傷寒但兼腹痛或小腹痛脹或只繞臍痛或上衝心胸痛或旁引脅肋痛或臍下硬急或氣走腸鳴或控引睪丸痛脹急墜或氣歸囊袋收縱不時甚或囊外或冷或濕或熱或紅亦有出水及久久成癰者此皆里有故積復感風寒水濕或加奔走焦勞以致觸動積邪氣聚而發或一二日或延多日得溫暖及出汗俱能氣散而解也其脈弦急者弦急乃厥陰肝脈疝多發於肝故也又弦斂急直氣不鼓暢主諸痛脹疝則未有不痛不脹者若弦急而牢見積聚之有根亦徵元本之壯實脈證兩宜故曰生若但急而弱急則邪盛弱則正衰更非積聚在裡者之所宜故曰死所云多發於肝者素問五藏生成篇平人氣象論長刺節論繆刺論及靈樞經脈篇之言也而素問骨空論又云有發於任脈督脈者素問陰陽別論五藏生成篇脈要精微論玉機真藏論大奇論四時刺逆從論及靈樞邪氣臟腑病形篇經筋篇又皆云有發於別臟別腑者骨空論言任脈有內結七疝之名而未有七疝之狀巢氏因敘七疝曰厥疝曰癥疝曰寒疝曰氣疝曰盤疝曰胕疝曰狼疝而張子和復立七疝之名曰寒疝曰水疝曰筋疝曰血疝曰氣疝曰狐疝曰㿗疝外復有小兒㿉疝及膀胱小腸等氣亦指稱為疝者聚訟紛紛迄無定論近惟張景岳一辯最為詳悉得理茲錄於下不敢再贅景岳曰愚按本經諸篇所言疝證不一有云狐疝者以其出入不常也有㿗疝者以其頑腫不仁也有沖疝者以其自少腹上衝心而痛也有厥疝者以積氣在腹中而氣逆為疝也有瘕疝者以少腹冤熱而痛出白一名蠱也有六經風疝者如四時刺逆從論之所云也有小腸疝者如邪氣臟腑病形篇曰小腸病者小腹痛腰脊控睪而痛時窘之後者亦疝之屬也是皆諸疝之義按骨空論曰任脈為病男子內結七疝女子帶下瘕聚蓋任脈者起於中極之下以上毛際循腹裡上關元總諸陰之會故諸疝之在小腹者無不由任脈為之原而諸經為之派耳云七疝者乃總諸疝為言如四時刺逆從論所言者六也邪氣臟腑病形篇所言者一也蓋以諸經之疝所屬有七故云七疝若狐㿗沖厥之類亦不過為七疝之別名耳後世如巢氏所敘七疝則曰厥癥寒氣盤胕狼至張子和非之曰此俗工所立謬名也蓋環陰器上抵少腹者乃屬足厥陰肝經之部分是受疝之處也又曰凡疝者非肝木受邪則肝木自甚皆屬肝經於是亦立七疝之名曰寒水筋血氣狐㿗治多用下繼自丹溪以來皆宗其說然以愚觀之亦未為得夫前陰小腹之間乃足三陰陽明任沖督脈之所聚豈得獨以厥陰經為言但如四時刺逆從論所云六疝皆兼風言者本非外入之風蓋風屬肝肝主筋故凡病各經之疝者謂其病多在筋而皆挾肝邪則可若謂必在厥陰則不可也後世議論徒多又安能出內經之範圍哉學者當以經旨為正至於治之之法大都此證寒則多痛熱則多縱濕則多腫墜虛者亦然若重在血分者不移在氣分者多動分察六者於諸經各因其多少虛實兼治之自無不效也巢氏七疝狀厥逆心痛足寒諸飲食吐不下名曰厥疝宜桂附二陳湯之類腹中氣滿心下痛氣積如臂名曰癥疝宜東垣川楝散寒飲食即脅下腹中盡痛名曰寒疝宜仲景烏頭煎和劑胡蘆巴丸之類腹中乍滿乍減而痛名曰氣疝宜蘇合香丸東垣川楝散之類腹中痛在臍旁名曰盤疝宜桂枝湯東垣丁香楝實丸之類腹中臍下有積聚名曰胕疝宜茴香散之類小腹與陰相引而痛大便難名曰狼疝宜木香散丁香楝實丸之類張子和七疝狀寒疝其狀囊冷結硬如石陰莖不舉或控睪丸而痛得於坐臥濕地或寒月涉水或冒雨雪或坐臥磚石或風冷處使內過勞宜以溫劑下之久而無子宜東垣天台烏藥散之類水疝其狀腎囊腫痛陰汗時出或囊腫而狀如水晶或囊癢而搔出黃水或少腹中按之作水聲得於飲水醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之有漏針去水者人多不得其法宜腰子散五苓散仲景牡蠣澤瀉散之類筋疝其狀陰莖腫脹或潰或膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下久而得於房室勞傷及邪術所使宜以降心之劑下之宜白芍茯苓當歸小茴香青皮黃柏蒼朮川楝之類血疝其狀如黃瓜在少腹兩旁橫骨兩端約中俗云便癰得於重感春夏大燠勞於使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之宜歸芍牛膝靈脂青皮木香丹皮沒藥玄胡索之類氣疝其狀上連腎區下及陰囊或因號哭忿怒則氣鬱而脹怒哭號罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒亦有此疾俗曰偏氣得於父已年老或年少多病陰痿精怯強力入房因而有子胎中病也此證不治惟築賓一穴灸之宜正氣天香散之類狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐則晝出穴而溺夜則入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異今人帶鉤鈐是也宜以逐氣流經之藥下之宜金匱蜘蛛散之類㿗疝其狀陰囊腫縋如升如斗不癢不痛者是也得之地氣卑濕所生故江淮之間湫溏之處多感此疾宜以去濕之藥下之女子陰戶突出雖亦此類乃熱則不禁固也不可便謂虛寒而澀之燥之補之本名曰瘕宜以苦下之以苦堅之宜荔核散三層茴香丸濟生橘核丸香附散之類女子陰突肝火居多宜龍膽瀉肝湯加味逍遙散或少加升提之類以上子和論疝七條形證可謂詳悉但七疝七名形證亦異治之當各有方而俱云下者恐出偏見今擬對證方藥於下在診之者合宜則用亦不敢概云不可下也附方桂附二陳湯即二陳加肉桂附子東垣川楝散木香川楝子銼細用巴豆十粒打破一處炒黃去巴豆茴香鹽一匙炒黃去鹽各一兩上為細末每服二錢空心食前溫酒調下金匱烏頭煎見第十七和劑胡蘆巴丸治小腸疝氣偏墜陰腫小腹有形如卵上下來去痛不可忍或絞結繞臍攻刺嘔吐悶亂胡蘆巴炒一斤茴香鹽炒十二兩吳茱萸洗炒十兩川楝子去核炒一斤二兩巴戟去心炒川烏炮去皮各六兩上為末酒糊丸如桐子大每服十五丸至二十丸空心溫酒下小兒五丸茴香湯下食前一方有黑牽牛蘇合香丸見第十八桂枝湯見第十九東垣丁香楝實丸治男子七疝痛不可忍婦人瘕聚帶下當歸去蘆附子川楝子茴香炒各一兩上四味銼碎以好酒三升同煮酒盡焙乾作細末一兩再入下項藥丁香木香各五分一作二錢全蠍十三個玄胡索五錢一作一兩上四味同為細末入前項當歸等末拌勻酒糊丸如桐子大每服三十丸至百丸空心食前溫酒送下一方無當歸木香名苦楝丸茴香散治膀胱氣痛茴香蓬朮京三稜金鈴子肉各一兩炙甘草半兩上為細末每服二錢熱酒調服每發痛甚連日只二三服立定木香散治心疝小腹痛悶不已木香陳皮良薑乾薑訶子去核枳實各一錢半草豆蔻黑牽牛川芎各一錢水二鍾煎一鍾食前服或為細末每服二錢白湯調服東垣天台烏藥散見第六十三腰子散治腎氣作痛黑牽牛炒熟白牽牛炒熟為細末每用三錢豬腰子一對薄切開縫入川椒五十粒茴香一百粒以牽牛末遍摻入腰子中線扎濕紙數重裹煨香熟出火氣燈後空心嚼吃好酒送下少頃就枕天明取下惡物即愈五苓散見第十七金匱牡蠣澤瀉散牡蠣澤瀉蜀漆洗去腥栝蔞根葶藶子商陸根熬海藻洗去咸以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服正氣天香散見第十七金匱蜘蛛散蜘蛛十四枚炒焦桂半錢要入厥陰取其肉厚者上為散每服一錢蜜丸亦可雷公云凡使勿用五色者兼大身上有刺毛者並薄小者須用屋西南有網身小尻大腹內有蒼黃膿者真也凡用去頭足了研如膏投藥中此余之法仲景炒焦用全無功矣荔核散治疝氣陰核腫大痛不可忍荔枝核十四枚燒灰存性用新者八角茴香炒沉香木香青鹽食鹽各一錢川楝肉小茴香各二錢上為細末每服三錢空心熱酒調服三層茴香丸治腎與膀胱俱虛為邪氣摶結遂成寒疝伏留不散臍腹疼痛陰核偏大膚囊腫重墜滋長有妨行步瘙癢不止時出黃水浸成瘡瘍或長怪肉屢治不痊以致腎經閉結陰陽不通外腎腫脹冷硬如石漸大皆由頻服熱藥內攻或因兜取以致如此用藥溫導陽氣漸退寒邪補虛消疝暖養腎經能使復元一應小腸氣寒疝之疾久新不過三料第一料舶上茴香用鹽半兩同炒焦黃和鹽秤川楝子炮去核沙參洗銼木香各一兩上為細末煮米糊為丸如桐子大每服二十丸空心用溫酒或鹽湯下日三服小病一料可安才盡便可用第二料第二料藥加蓽茇一兩檳榔半兩上共前藥六味重五兩半為末依前糊丸丸數湯使亦如前若病未愈服第三料第三料藥加白茯苓四兩緊實者去黑皮黑附子炮去皮臍稱半兩或加作一兩上通前八味重十兩並依前糊丸湯使丸數加至三十丸小腸氣發頻及三十年者寒疝氣如栲栳大者皆可消散神效濟生橘核丸治四種㿗病卵核腫脹偏有小大或堅硬如石痛引臍腹甚則膚囊腫脹成瘡時出黃水或成癰潰爛橘核海藻昆布海帶各洗川楝肉炒桃仁麩炒各一兩製厚朴木通枳實麩炒延胡索炒桂心木香各半兩上為細末酒糊丸如桐子大每服七十丸空心鹽酒鹽湯下虛寒甚者加炮川烏一兩堅脹久不消者加硇砂二錢醋煮旋入香附散治㿗疝脹及小腸氣上用香附不拘多少為末每用酒一盞入海藻一錢煎至半盞先撈海藻細嚼調香附末二錢服一方以海藻為末用熱酒調尤效甚者灌之一方熱酒下荊芥末龍膽瀉肝湯治肝經濕熱兩拗腫痛或腹中疼痛或小便澀滯等證龍膽草酒拌炒黃澤瀉各一錢車前子炒木通生地黃酒拌山梔炒當歸酒拌黃芩炒甘草各五分上水煎服加味逍遙散見第五十一腰痛脈證第六十五腰痛之脈多沉而弦兼浮者風兼緊者寒弦滑痰飲濡細腎著大乃腎虛沉實閃肭腰痛者足之六經病也足三陽從頭走足足三陰從足入腹各經受邪則隨各經之所過者為痛與頭心為痛之義略同而手之六經不與焉以手經不至於腰也其因有三曰外因內因曰不內外因外因者風熱寒濕也木化風火化熱水化寒土化濕風多傷厥陰火多傷少陽寒多傷太陽少陰濕多傷太陰陽明此言邪傷足三陰三陽之經也亦各從其類也厥陰腰痛腰中如張弓弩弦宜調肝散加味逍遙散之類少陽腰痛如以針刺其皮中循循然不可以俯仰不可以顧宜逍遙散倍白芍加枳殼木香之類太陽腰痛則引項脊尻背如重狀宜東垣羌活勝濕湯川芎肉桂湯九味羌活湯之類足少陰腰痛痛引脊內廉宜金匱八味丸六味丸青娥丸之類太陰散脈腰痛腰下如有橫木居其中甚則遺溲宜東垣蒼朮湯統旨清濕散之類陽明腰痛不可以顧顧如有見者善悲宜四物湯平胃散導痰湯之類內因者恐懼失志恚怒忿恨抑鬱憂思也恐懼失志則傷腎恚怒忿恨則傷肝抑鬱憂思則傷脾此言情志不得其所三陰臟氣自傷也亦各從其類也腎傷腰痛虛羸不足面目黧黑遠行久立力不能盡宜六味丸煨腎丸黑地黃丸之類肝傷腰痛腹急脅脹目視䀮䀮所祈不得意淫於外宗筋弛縱及為白淫宜六味丸加知柏之類脾傷腰痛肌肉濡漬痹而不仁飲食不化腸胃脹滿閉墜腰脅宜平胃散局方普賢正氣散之類不內外因者房室過度煩勞不節以致精力耗竭腰膂空虛發為腰痛蓋精藏於腎而腰者腎之府力出於膂而腰者膂所繫其痛轉側屈伸不得膝酸脛冷腰中冷面黑傴僂不能久立宜二至丸子和無比山藥丸六味丸之類一種腰痛因作勞多汗衣里冷濕久久得之其證身重不渴小便自利食飲如常腰以下冷重如帶五千錢者名曰腎著腎著者因勞極腎膂之氣張散汗濕乘之乘其已所勝也濕因注滲腰膂之間著而不行猶邪有著落無礙他處故但腰痛而重更無他證如上所云宜仲景腎著湯子和禹功散統旨清濕散滲濕湯之類一種因搏擊墮墜閃肭氣血凝滯或只氣滯而血未至於瘀或血瘀結而氣久方行令人傴僂腫痛而重牽引脅脊氣滯者呼吸亦痛不能轉側鼻塞身不動則痛亦定宜良方人參順氣散烏藥順氣散之類血瘀者亦轉側不能腰下重痛若錐刀之刺大便黑面目黃日輕夜重宜調榮活絡飲仲景桃核承氣湯之類一種積痰停飲阻滯於腰脅之間有礙氣道亦能作痛其痛或作或止或移易不定或不仁或麻木或痛處如冰腰脊重墜宜導痰湯王隱君滾痰丸之類以上諸證大抵外因寒濕多而風熱少內因腎多肝次之而脾臟少不內外因感亦明顯若謹慎善攝之人自不多罹並可終身不一遇也諸腰痛脈多沉弦者沉為在裡在下弦則為痛故多沉弦也兼浮者沉弦中有泛泛欲浮之勢所謂如水漂木舉之有餘是狀風邪虛浮之性非言在表之浮也兼緊者寒寒緊斂也兼滑者痰飲痰飲滑利也兼濡細者腎著腎著者濕濡細滲著也兼大者腎虛腎虛不斂藏而反空松虛大也兼實者閃肭閃肭非血瘀則氣滯皆成凝滯故沉實也附方調肝散治鬱怒傷肝發為腰痛半夏制三分辣桂宣木瓜當歸川芎牛膝細辛各二分石菖蒲酸棗仁蕩去皮微炒甘草炙各一分每三錢姜五片棗二枚煎服加味逍遙散見第五十一東垣羌活勝濕湯治脊痛項強腰似折項似拔沖頭痛乃足太陽經不行也羌活獨活藁本防風各一錢蔓荊子三分川芎二分甘草炙五分上㕮咀作一服水二盞煎一盞去滓食後溫服東垣川芎肉桂湯丁未年冬曹通甫自河東來有役人小翟宿於寒濕之地腰痛不能轉側兩脅搐急作痛月餘不愈腰痛論中所說皆為足太陽足少陰血絡中有凝血作痛間有一二證屬少陽膽經外絡脈病皆宜去血絡之凝乃愈其內經有云冬三月禁不得針只宜服藥通其經絡破其血絡中敗血此方主之羌活一錢半柴胡一錢獨活五分肉桂蒼朮各一錢防風漢防己各三分桃仁五枚去皮另研如泥歸梢甘草炙川芎各一錢炒曲五分上㕮咀水酒煎去滓食遠熱服九味羌活湯見第十六六味丸見第十六八味丸見第十六直指青娥丸治腎虛腰痛益精助陽烏須壯腳用安胎飲吞神效破故紙四兩炒香杜仲去粗皮銼四兩用生薑二兩半擦淹炒乾上為末用胡桃肉三十個研膏入少許蜜丸桐子大每服五十丸食前下東垣蒼朮湯治濕熱腳腿疼痛蒼朮五錢去濕止痛柴胡三錢行經防風一錢半去風勝濕黃柏一錢半始得之時寒也久不愈寒化為熱除熱止痛水二鍾煎至一鍾空心食前服統旨清濕散黃柏鹽水拌炒一錢五分澤瀉一錢蒼朮一錢半米泔浸炒杜仲白芍藥煨牛膝酒浸木瓜威靈仙陳皮各一錢甘草三分痛甚者加乳香沒藥末五分臨服調入四物湯見第二十一平胃散見第四十四導痰湯見第四十一保命煨腎丸治腎肝損及脾損穀不化宜益精緩中消穀牛膝萆薢杜仲炒去絲白蒺藜防風菟絲子酒浸肉蓯蓉酒浸胡蘆巴破故紙酒炒各等分官桂減半上為細末將豬腰子制如食法搗爛煉蜜和杵丸如桐子大每服五七十丸空心用溫酒送下治腰痛不起甚效黑地黃丸見第五十一知柏八味丸見第五十四和劑普賢正氣散陳皮半夏蒼朮厚朴藿香甘草生薑各等分每服五錢水二盞蔥二段黑豆百粒煎八分不拘時熱服二至丸治老人虛弱腎氣虛損腰痛不可屈伸附子炮去皮臍桂心不見火杜仲去皮銼炒去絲補骨脂炒各一兩鹿角鎊麋角鎊各二兩鹿茸酒炙青鹽另研各半兩上細末酒煮糊和丸如桐子大每服七十丸空心同胡桃肉細嚼用鹽湯或鹽酒送下如惡熱藥者去附子加肉蓯蓉一兩子和無比山藥丸治諸虛百損五勞七傷肌體消瘦目暗耳鳴赤石脂煅茯神去皮木山茱萸去核熟乾地黃酒浸巴戟去心牛膝去根酒浸澤瀉以上各一兩杜仲去皮切薑汁炒菟絲子酒浸五味子揀六兩肉蓯蓉酒浸四兩上為細末煉蜜為丸如桐子大每服三十丸空心溫酒或鹽湯送下腎著湯見第二十一子和禹功散黑牽牛四兩茴香炒一兩上為末薑汁調一二錢服良方人參順氣散治氣滯腰痛人參川芎桔梗白朮白芷陳皮枳殼麻黃去節烏藥白姜炮甘草炙各一錢水二鍾煎一鍾或為細末食前用甘草湯調服一方加五加皮一錢烏藥順氣散見第六十三調榮活絡飲治失力腰閃或跌撲瘀血及大便不通而腰痛川大黃當歸條川牛膝去蘆酒洗杏仁去皮研如泥各二錢赤芍藥紅花羌活懷生地黃酒洗各一錢川芎一錢半桂枝三分水一鍾半煎八分食前溫服桃核承氣湯見第二十滾痰丸見第十七腳氣脈證第六十六腳氣有四遲寒數熱浮滑者風濡細者濕腳氣一證經名厥漢名緩風宋齊後始名腳氣陳無擇謂風寒暑濕四邪皆能成今歷診是證成於寒濕者十常八九經曰清濕襲邪病起於下信然哉其始發也甚微發亦易解故人常忽而不覺覺亦不速治及其深久愈發愈重甚至痿痹不仁者有之入腹衝心者有之身命從此而殞可哀也足三陰三陽六經皆有此證而發於三陽者輕三陰者重以三陰屬臟經絡居里若非臟氣大虛邪不易及其證不論陰陽初發時大類傷寒頭痛發熱惡寒嘔吐但足屈伸不能或痛或紅為異耳在陽多惡寒壯熱頭痛或骨節痛或嘔吐渴煩或叫號譫語或腿腳紅紫極熱大腫大痛手不可按或頑痹麻木患多在腿外廉陽分三陽經所過之處面光澤脈多浮在陰多惡寒甚或厥逆不發熱或微熱頭不痛或骨痛筋攣或嘔逆或神昏沉默或腹痛下利或畏見光明或大小便閉或心煩動悸或小腹不仁或沖胸悶亂患處腫痛或不腫或微赤而熱或反極冷患多在腿內廉陰分三陰經所過之處面青慘脈多沉此言陰陽之大概若細別之太陽則發熱頭痛惡寒目眩項強腰脊身體及外踝後至小指外側皆痛宜仲景麻黃湯桂枝湯九味羌活湯敗毒散集驗麻黃左經湯之類陽明則翕翕發熱口鼻乾善欠腹脹自髀膝臏胻外廉以下足跗中指內俱痛宜得效芎芷香蘇散大黃左經湯之類少陽則往來寒熱口苦脅痛面垢頭目眩痛腋下馬刀腫痛髀膝外至胻及外踝諸指節皆痛宜小柴胡湯半夏左經湯之類三陽併合為病則憎寒壯熱自汗惡風或無汗惡寒眩暈重著關節掣痛手足拘攣疼痛冷痹腰腿緩縱不隨心躁氣上嘔吐下利其脈浮弦緊數宜大料神秘左經湯加味敗毒散之類太陰則腹滿胸膈痞舌系急循胻骨下股膝內前廉內踝過核骨後廉足大指之端內側皆痛宜胃苓湯六物附子湯之類少陰則腰脊痛上衝胸咽飢不能食面黑大小淋閟善恐小趾足心內踝跟中膕內廉皆痛宜麻黃附子細辛湯金匱八味丸之類厥陰則腰脅偏痛腳攣急嗌乾嘔逆洞泄足大趾連足趺上廉上膕至內廉循股環陰小腹夾臍諸處脹痛宜茱萸木瓜湯神應養真丹之類三陰併合為病則四肢拘攣上氣喘滿小便閉澀心熱煩悶遍身浮腫腳弱緩縱不能行步宜加味敗毒散追毒湯之類以上六經受病流注自汗為風勝脈多浮滑宜多羌活獨活防風桂枝無汗疼痛為寒勝脈多遲宜多桂附姜辛熱煩為暑勝脈多數宜多黃芩黃柏木瓜香薷重著腫滿為濕勝脈多濡細宜多蒼朮澤瀉薏苡防己茯苓至如防己木瓜米仁檳榔蒼朮黃柏肉桂桂枝巴戟葳蕤木通羌活枳殼澤瀉桑枝之類各隨其氣所勝者而偏調之證相宜者而倍用之又不可拘於一方也東垣謂此疾南方卑下乃寒濕之邪外襲經絡而成如北方地高外鮮水濕發此者皆內傷酒乳濕熱之邪下注也故南則宜作寒濕治北則宜作濕熱治此雖發前人之未發恐未必盡然也南方固下豈乏膏粱嗜酒之人北方固高豈無踐涉洗濯之事是在圓機者謹察證脈而分別之斯善矣附方仲景麻黃湯見第十六仲景桂枝湯見第十九九味羌活湯見第十六敗毒散見第三十七集驗麻黃左經湯治風寒暑濕流注足太陽經腰足攣痹關節重痛行履艱難憎寒發熱無汗而寒或自汗惡風頭痛眩暈並一切癱瘓麻木等證麻黃去節乾葛細辛去苗白朮去蘆茯苓去皮防己去皮桂心羌活去蘆防風去蘆甘草炙各等分上㕮咀每服七錢水二盞姜五片棗一枚煎一盞空心服自汗去麻黃加肉桂芍藥重著加朮陳皮無汗減桂加杏仁澤瀉得效芎芷香蘇散川芎七錢甘草二錢紫蘇葉乾葛白茯苓柴胡各半兩半夏六錢枳殼炒三錢桔梗生二錢半陳皮三錢半每服三錢水一盞姜三片棗一枚煎八分不拘時溫服大黃左經湯治風寒暑濕流注足陽明經腰腳痹痛行步艱難涎潮昏塞大小便秘澀腹痛嘔吐或復下利惡聞食氣喘滿肩息自汗譫妄並宜服之大黃煨細辛去苗茯苓去皮防己去皮羌活去蘆黃芩前胡去蘆枳殼去瓤麩炒厚朴薑製甘草炙杏仁去皮尖麩炒上各等分每服七錢水一盞半姜五片棗一枚煎八分空心熱服腹痛加芍藥秘結加阿膠喘急加桑白皮紫蘇小便秘加澤瀉四肢瘡瘍浸淫加升麻各等分仲景小柴胡湯見第四十三半夏左經湯治足少陽經受風寒濕暑流注發熱腰腳俱痛頭疼眩暈嘔吐酸水耳聾驚悸熱悶心煩氣促喘滿肩背麻痹腰腿不隨半夏湯洗七次切片乾葛細辛去苗白朮去蘆茯苓去皮桂心防風去蘆乾薑炮黃芩甘草炙柴胡去蘆麥門冬去心各七錢半上㕮咀每服七錢水一盞半姜五片棗一枚煎一盞去滓空腹服熱悶加竹瀝每服半合喘滿加杏仁桑白皮大料神秘左經湯治風寒暑濕流注足三陽經手足拘攣疼痛行履艱難憎寒發熱自汗惡風或無汗惡寒頭眩腰重關節攣痛或卒中昏塞大小便秘澀或腹痛嘔吐下利惡聞食臭髀腿頑痹緩縱不隨熱悶驚悸心煩氣上臍下冷痹喘滿氣粗麻黃去節乾葛細辛去苗厚朴薑製茯苓去皮防己去皮枳殼去瓤麩炒桂心羌活去蘆防風去蘆柴胡去蘆黃芩半夏酒洗七次乾薑炮麥門冬去心甘草炙各等分上㕮咀每服七錢水一盞半生薑五片棗一枚煎一盞去滓空心服自汗加牡蠣白朮去麻黃腫滿加澤瀉木通熱甚無汗減桂加橘皮前胡升麻腹痛吐利去黃芩加芍藥附子炮大便秘加大黃竹瀝喘滿加杏仁桑白皮紫蘇等分凡有此病備細詳證逐一加減無不愈者加味敗毒散治三陽經腳氣流注腳踝焮熱赤腫寒熱如瘧自汗惡風或無汗惡寒人參去蘆赤茯苓去皮甘草炙芎藭前胡去蘆羌活去蘆獨活去蘆枳殼去瓤麩炒桔梗去蘆大黃煨蒼朮米泔浸各等分上每服五七錢水一盞姜五片薄荷五葉煎一盞去滓熱服皮膚赤疹加蟬蛻胃苓湯見第十七六味附子湯治四肢流注於足太陰骨節煩疼四肢拘急自汗短氣小便不利惡風怯寒頭面手足腫痛附子炮去皮臍桂心防己去皮各四兩白朮去蘆茯苓去皮各三兩炙甘草二兩上㕮咀每服五錢水二盞生薑七片煎一盞去滓空心溫服仲景麻黃附子細辛湯麻黃去節細辛各二兩附子一枚炮上三味以水一斗先煮麻黃減二升去上沫內藥煮取三升去滓溫服一升日三服八味丸見第十六茱萸木瓜湯治腳氣衝心悶亂不識人手足脈欲絕吳茱萸半兩乾木瓜一兩檳榔一兩上㕮咀每服八錢以水一盞半生薑五片煎一盞去滓溫服不拘時候神應養真丹治厥陰肝經受邪四氣所傷肝臟或左癱右瘓涎潮昏塞半身不遂手足頑麻言語蹇澀頭旋目眩牙關緊急氣喘自汗心神恍惚肢體緩弱上攻頭目下注腳膝榮氣凝滯遍身疼痛兼治婦人產後中風角弓反張墮車落馬打撲傷損瘀血在內等證當歸酒浸去蘆天麻川芎羌活去蘆白芍藥熟地黃各等分上為細末煉蜜和丸如彈子大每服一丸木瓜菟絲子煎酒下腳痹薏苡仁煎酒下中風溫酒米湯下一方無羌活入木瓜熟阿膠等分追毒湯治肝腎脾三經為風濕寒熱毒上攻陰陽不和四肢拘攣上氣喘滿小便秘澀心熱煩悶遍身浮腫腳弱緩縱不能行步半夏湯洗七次黃耆去蘆甘草炙當歸去蘆人參去蘆厚朴薑製獨活去蘆橘皮去白各一兩熟地黃芍藥枳實去瓤麩炒麻黃去節各二兩桂心三兩上㕮咀每服八錢水一大盞半姜七片棗三枚煎一大盞去滓空心溫服日三夜一
