body:
  text: 卷二十附余醫範張仲景曰夫天布五行以運萬類人稟五常以有五臟經絡府俞陰陽會通玄冥幽微變化難極自非才高識妙豈能探其理致哉上古有神農黃帝岐伯伯高雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經旨以演其所知各承家技始終順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曾無彷彿明堂闕庭盡不見察所謂窺管而已夫欲視死別生實為難矣孔子云生而知之者上學則亞之多聞博識知之次也余宿尚方術請事斯語孫真人曰醫方卜筮藝能之難精者也既非神授何以得其幽微世有愚者讀方三年便謂天下無病可治及治病三年乃知天下無方可用故學者必須博極醫源精勤不倦至若道聽途說而言醫者豈不深自誤哉史嵩曰夫為醫者在讀書耳讀而不能為醫者有矣未有不讀而能為醫者也不讀醫書又非世業殺人豈不甚於梃刃乎金華戴叔能曰醫以活人為務與吾儒道最切近自唐書列之技藝而吾儒不屑為之世之習醫者不過誦一家之說守一定之方以幸其病之偶中不復深探遠索上求聖賢之意以明夫陰陽造化之會歸又不能博極群書採擇眾議以資論治之權變甚者至於屏棄古方附會臆見輾轉相迷而其為患不少矣是豈聖賢慈惠生民之本意哉學士商輅曰醫者意也如對敵之將操舟之工貴乎臨機應變方固難於盡用然非方則古人之心弗傳茫如望洋如捕風必有率意而失之者矣方果可以弗用乎雖然方固良矣然必熟之素問以求其本熟之本草以究其用熟之診視以察其證熟之治療以通其變始於用方而終至於無俟於方夫然後醫之道成矣昔許胤宗謂我善讀仲景書而知其意然未嘗專用其方誠名言哉續醫說云近時醫者偏執己見或好用熱藥或好用涼藥然素問有異法方宜論抑何嘗偏執耶古之良醫必量人之虛實察病之陰陽而後投以湯劑或補或瀉各隨其證若的是陽虛失血治以乾薑附子諸虛百損補以人參黃耆痰熱壅嗽清以芩連大便結熱利以硝黃其法豈盡廢乎許叔微有云形有寒邪雖嬰孩亦可服金液臟有熱毒雖老羸亦可服大黃至哉通變之說也楊仁齋曰治病如操舟操舟在手當風波震盪之沖一有轉移則舟覆矣醫衡主持在我不可遍徇病家所欲尤不可張惶使病人驚聞有病家粗識皮膚辨難反復萬勿惑焉又有瘥後觸犯再復隱諱不言須詰問其由庶得對病施藥陸宣公論云醫以活人為心故曰醫乃仁術有疾而求療不啻求救焚溺於水火也醫乃仁慈之術須披髮攖冠而往救之可也否則焦濡之禍及少有仁心者能忍乎竊有醫者乘人之急而詐取貨財是則孜孜為利蹠之徒也豈仁術而然哉比之作不善者尤甚也天地豈不報之以殃乎今見醫家後裔多獲餘慶榮擢高科此天道果報之驗奚必計一時之利而戕賊仁義之心甚與道術相反背有乖生物之天理也從事者可不鑑哉醫者當自念云人身疾苦與我無異凡來請召急去無遲或止求藥宜即發付勿問貴賤勿擇貧富專以救人為心冥冥中自有祐之者乘人之急故意求財用心不仁冥冥中自有禍之者吾鄉有張彥明善醫僧道貧士軍兵及貧者求藥皆不受錢或反以錢米與之人來請召雖至貧下亦去富者以錢求藥不問多寡必多與藥期於必愈未嘗萌再攜錢來求藥之心病若危篤亦多與好藥以慰其心終不肯受錢予與處甚久詳知其人為醫而口終不言錢可謂醫人中第一等人矣一日城中火災周迴焚盡煙焰中獨存其居一歲牛災尤甚而彥明莊上獨全此神明祐助之也其子讀書乃與魁薦孫二三人皆龐厚俊爽亦天道福善之信然也使其孜孜以錢物為心失此數者所得不足以償其所失矣同門之人可不鑑哉孫真人曰其有患瘡痍下痢臭穢不可瞻視人所惡見者但發憐憫愛恤之心不得起畏難蒂芥之意是吾志也孫真人曰夫為醫之法不得多語調笑談謔喧譁道說是非議論人物炫耀聲名訾毀諸醫自矜己德偶然治瘥一病則昂頭戴面而有自許之貌謂天下無雙此醫人之膏肓也孫真人曰醫到病家縱綺羅滿目勿左右顧盼絲竹湊耳無得自有所娛珍羞迭薦食如無味醽醁兼陳看若無有所以爾者夫一人向隅滿堂不樂而況病人苦楚不離斯須而醫者安然歡娛傲然自得真人神之所共恥至人之所不為也老君曰人行陽德人自報之行陰德鬼神善之陰陽報施豈誣也哉所以醫人不得恃己所長專心經略財物但作救苦之心於冥冥之中自膺多福矣錢乙在神宗時治皇子儀國公病瘛瘲國醫莫能治乙進黃土湯遂愈神宗問曰黃土湯何以愈斯疾乙對曰以土勝水木得其平則風自止且諸醫所治垂愈但小臣適當其愈耳神宗悅其對賞賚甚厚程篁墩云近世有儒名者立說斥東垣丹溪之書為不足觀曰二家動引素難猶儒者動引唐虞三代何益於事噫為此言者亦悖之甚矣譚景升化書云譽人者人譽之謗人者人謗之朱丹溪先生誨子十說其一云同道中切宜謙和不可傲慢於人年尊者恭敬之有學者師事之倘有醫類但當義讓不可攘奪致怨招謗經云禮之用和為貴泊宅編云王居安秀才久苦痔疾聞蕭山有善工力不能招致遂命舟自烏程走錢塘舍於靜邸中使人迎醫醫絕江至杭既見欣然為治藥餌且云請以五日為期可以除根本初以一藥放下大腸數寸又以一藥洗之徐用藥線結痔信宿痔脫其大如桃復以藥餌調養數日遂安此工初無難色但放下大腸了方議報謝之物病者知命懸其手盡許行囊所有為酬方許治療又玉山周僅調官京師舊患膀胱氣外腎偏墜有貨藥人云隻立談間可使之止約以萬錢及三縑之報相次入室中施一針所苦果平周大喜即如數酬金帛而去後半月其疾如故使人訪醫者已不見矣古之賢人或在醫卜之中今之醫者急於聲利率用詭道以劫流俗殆與穴坯挾刀之徒無異予目擊二事今書之以為世警申志載溫州醫僧法程字無枉少瞽百端治之不愈但晝夜誦觀世音菩薩名號如是十五年夢中聞菩薩呼之使前若有物縶其足不可動菩薩嘆曰汝前世為灸師誤灸損人眼今生當授此報難以免但吾憐汝誠心但使汝衣食豐足遂探懷中掬寶珠滿手與之既寤醫道大行衣缽甚富至七十猶在巳志載宜興段承務醫術精高然貪顧財賄非大勢力者不能屈致翟忠惠公居常熟欲見之不可諉平江守梁尚書邀之始來既回平江適一富人病來謁醫段曰此病不過湯藥數劑可療然非五百千為謝不可其家始許半酬拂衣去竟從其請別奉銀五十兩為藥資段求益至百兩乃出藥為治數日愈挾所獲西歸中途夜夢一朱衣曰上帝以爾為醫而厚取賄賂殊無濟物之心命杖脊二十遂敕左右捽而鞭之既寤覺脊痛呼僕視之捶痕宛然還家未幾而死宣城符里鎮人符助教治癰疽操心亡狀病者瘡不毒先以藥發之忽一黃衣卒來持片紙示之云陰司追汝以藤杖點其背符大叫痛黃衣曰汝原來也知痛隨手成大疽而死名醫錄云京師有一婦人姓白有美容京人皆稱為白牡丹貨下胎藥為生忽患腦疼日增其腫名醫治之皆不愈日久潰爛臭穢不可聞每夜聲喚遠近皆聞之一日遂與家中雲我所蓄下胎方盡為我焚之戒子弟曰誓不可傳此業其子告母云我母因此起家何棄之有其母曰我夜夜夢數百小兒咂我腦袋所以疼痛叫喚此皆是我以毒藥壞胎獲此果報言訖遂死醫說載宣城管內水陽村醫陸陽字義若以技稱建炎中朱萃老編修妻避寇驚憂致疾陸誤投以小柴胡湯殺之溧水高淳鎮李氏子病瘵召之用藥未效從出娼家飲索錢並酒饌不與投以剛劑數十粒又殺之紹興九年陸暴病呼曰朱宜人李六郎休打我我便去也旬日死黃帝曰經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不十全者精神不專志意不理外因相失故時疑殆診不知陰陽逆從之理此治之一失也受師不卒妄作雜術謬言為道更名自功妄用針藥後遺身咎此治之二失不適貧富貴賤之居生之厚薄形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也診病不問其始憂慮飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也黃帝曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不在臟腑不變軀形診之而疑不知病名身體日減氣虛無精病深無氣洒洒然時驚病深者以其外耗於衛內奪於營良工所失不知病情此亦治之一過也凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絕形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也診有三常必問貴賤封君敗傷及欲候王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋出痿躄為攣醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也凡診者必知終始有知餘緒切脈問名當合男女離絕菀結憂恐喜怒五臟空虛血氣離守工不能知何術之語嘗富大傷斬筋絕脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發惟言死日亦為粗工此治之五過也凡此五者皆受術不通人事不明也周禮醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之政謂聚毒藥以供醫事令謂使醫分而治之毒藥藥之辛苦者頭瘡曰疕身瘡曰瘍分治者醫各有能也凡藥有有毒者有無毒者無毒所以療病有毒所以發病而藥物之性隨四時而生死金石之性稟五行而厚薄其類不一其性必偏而人之身感陰陽寒暑之偏而有病病以偏而感藥以偏而用必相攻而後相濟用之不善則無毒者亦毒矣必欲醫者知用藥之為毒而不敢輕辨君臣佐使之制調溫涼燥濕之宜審表裡吐納之方達造化性命之理則雖毒不毒矣故其職以聚毒藥為主者重之也歲終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下稽計也食祿也十全謂所治十人皆愈也失謂其不效者失四為下則其祿最薄失五者黜之而無祿罰之重者重民命也豈他職之可比也疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾天有六氣謂陰陽風雨晦明皆足以傷形人有六疾謂寒熱末腹惑心皆足以傷氣運行於榮衛周流於四肢交通則為和有餘不足則為疾苟調養不得其道而與之值焉是以氣疾交攻甚者或至於病此疾醫於治病言養者精察夫六疾之本而順適夫六氣之運此醫之良者也癘疾者氣不和之疾痟酸削也首疾頭痛也嗽咳也上氣逆喘也凡人四時之間冬傷於寒陽主於內春木用事而陽發於外然後寒氣搏之為痟首之疾春木為肝而主色火勝於夏以子勝母故暑氣溢而為疥癢之疾夏傷於暑陰主於內秋金用事而陰發於外然後暑氣搏之為瘧寒之疾秋金為肺而主聲水勝於冬以子勝母故寒氣壅而為嗽上氣疾是四者皆四時不和之氣故謂之癘以五味五穀五藥養其病以五氣五聲五色眡其死生兩之以九竅之變參之以九臟之動五味醯酒飴蜜薑鹽之屬五穀麻黍稷麥豆也五藥草木蟲石谷也養猶治也病由氣勝負而生氣之羸則攻之其不足則養之也五氣者肝氣溫心氣熱脾氣和肺氣涼腎氣寒是已五聲者肝聲呼心聲嘆脾聲歌肺聲哭腎聲呻是已五色者肝色青心色赤脾色黃肺色白腎色黑是已三者劇易之徵見於外察其盈虛休王則吉凶可知矣九竅者陽竅七兩耳兩目兩鼻一口也陰竅二大小二府也竅謂其有形而見於外者兩之謂陰陽變謂陰陽之變觀其證之變而有通塞之二候九臟者正臟五謂肺心肝脾腎及六腑中胃膀胱大腸小腸四者臟謂皆有形而藏於內者參之謂陽陰與沖氣察其脈之動而有浮中沉之三部以要而言九臟皆不出於五臟而上關九竅兩之參之而得其要則五要可用而醫無過誤之失矣凡民之有疾病者分而治之死終則各書其所以而入於醫師少者曰死老者曰終所以謂治疾不愈之狀也入於醫師者醫師得以制其祿且以為後戒瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊腫瘍壅而上生創者潰瘍癰而含膿血者金瘍刃創也折瘍踠跌者祝當為注以藥附之也劀刮去膿血也殺以藥食其惡肉也凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之止病曰療五毒五藥之有毒者今醫方有五毒之藥作之合黃堥置石膽丹砂雄黃礬石磁石其中燒之三晝夜其煙上著以雞羽掃取之以注創惡肉破則骨盡出劀謂刮去敗血殺謂蝕去惡肉蓋腫者欲散潰者欲合傷者欲復斷者欲續故必先攻之以五毒而後養之以五穀療之以五藥節之以五味也凡藥以酸養骨以辛養筋以咸養脈以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉此言各以其類相養也酸木味木根立地中似骨辛金味金之纏合異物似筋咸水味水之流行地中似脈苦火味火出入無形似氣甘土味土含載四者似肉滑滑石也凡諸滑物通利往來似竅然治瘍以骨為主而筋脈氣不可以過盛用藥宜得其中焉陶弘景曰今庸醫處療皆恥看本草或倚約舊方或聞人傳說或遇其所憶便攬筆疏之俄然戴面以此表奇其惡畏相反故自寡昧而藥類違僻分量參差亦不以為疑脫或偶爾值瘥則自信方驗若旬月未瘳則言病源深結了不反求諸己詳思得失虛構聲稱多納金帛非惟在顯宜貴固將居幽貽譴矣張湛曰夫經方之難精由來尚矣今病有內同而外異亦有內異而外同故五臟六腑之盈虛血脈榮衛之通塞固非耳目之所察必先診候以審之而寸口關尺有浮沉弦緊之亂俞穴流注有高下淺深之差肌膚筋骨有厚薄剛柔之異惟用心精微者始可與言於茲矣今以至精至微之事求之於至粗至淺之思豈不殆哉若盈而益之虛而徹之塞而壅之寒而滯之是重加其疾而望其生吾見其死矣孫真人曰凡古今病名率多不同緩急尋檢常致疑阻若不判別何以示眾且如世人呼陰毒傷寒最為劇病嘗深摭其由然口稱陰毒之名意指少陰之證病實陰陽之候命一疾而涉三病以此為治豈不茫昧殊不知陰毒少陰陰陽自是三候為治全別古有方證其說甚明今而混淆害人最急又如腸風臟毒咳逆慢驚遍稽方論無此名稱深窮其狀腸風乃腸痔下血臟毒乃痢之蠱毒咳逆者噦逆之名慢驚者陰癇之病若不知古知今何以為人司命加以古之經方言多雅奧以利為滯下以蹶為腳氣以淋為癃以實為秘以天行為傷寒以白虎為歷節以膈氣為膏肓以喘嗽為咳逆以僵直為痓以不語為癔以緩縱為痱以怔忪為悸以痰為飲以黃為癉諸如此論可不討論而況病有數候相類二病同名者哉宜其視傷寒中風熱病瘟疫通曰傷寒膚脹鼓脹腸覃石瘕率為水氣療中風專用平痰藥指滯下或以為勞疾伏梁不辨乎風根中風不分乎時疾此今天下醫者之公患也是以別白而言之古云不得為賢宰相則為明醫甚者醫之難明也略舉數事一曰涼藥治損謬其說盛于丹溪謂人之一身陽常有餘陰常不足而用知母黃柏等謂之滋陰至今治虛勞者遵而用之初服胃氣尚強久之則中寒而食減陰未滋陽已竭矣或曰瀉南方補北方經語也然不知經云東方實西方虛乃不治東西而唯瀉南補北腎為肝母水旺則金不受熏而能制木故曰母能令子虛也為金木謀則然而非概治虛勞也以王節齋之高明亦因仍而不覺豈一時之誤否耶二曰炮製失宜謬今人以童便浸參曰肺熱還傷肺也本草參忌滷與溲滷鹽也溲便溺也何反用其忌也又附子者正取其勇悍之性亦用童便煮之至三五日譬如用猛將以御勁敵取其猛也而損傷其手足飢餓其體膚乃使其臨陣可乎夫用藥者宜察其當用與否如不當用曷若已之三曰認藥舛錯謬青皮則以小枳實混之其枳殼則以香丸混之石膏則以方解石混之又另立軟石膏軟柴胡之說猶未也以五倍子為文蛤以蓮花須為蓮花蕊以山蘿蔔為沙參皆舛也夫青皮入足厥陰經故陳皮治高青皮治低小枳實胸中藥也何由入厥陰經也余可類推矣又枸杞子地骨皮根之於實一樹也王節齋分屬草木二部皆舛也四率意處方謬古人處方慎重不苟所有成方如四君子四物二陳平胃等號玉笈三十六方孫思邈真人傳自龍宮而雜布於諸方書中名各皆有深意後人合宜則用稍為增減出入無不應者乃今時處方或散漫無紀或任便自用或慣作平淡庸柔之劑無大益亦無大損者將謂成則歸功敗則無所歸咎而不知緊要之疾乃作誤害矣又王氏類方最為精密而四君子易甘草以黃耆夫臨證處方自無死法而錄刻古方不宜變損或古有之則可古未有則仍舊為是愚謂用藥如用兵兵本殺人善用之則生人醫本生人不善用之則殺人旨哉言乎故孔子以戰疾並慎而醫家者言則有四診九候五科八要誠慎之也不然而平日不調習臨敵無節制鹵莽決裂其不以兵為戲乎王忠文公禕云李明之弟子多在中州獨劉守真之學傳之荊山浮圖師師至江南傳之中人羅知悌而南方之醫皆宗之矣及國朝天下之言醫者非劉氏之學弗道也劉李之法雖攻補不同會而通之隨證而用之自中其病矣近時吾吳中稱良醫師則以能持東垣者謂之王持張劉者謂之伯噫堯舜以揖讓湯武以干戈苟合道濟世何必曰同余嘗病世之專於攻伐者邪氣未退而真氣先薾然矣專於補養者或致氣道壅塞為禍不少正氣未復而邪氣愈熾古人有云藥貴合宜法當應變泥其常者人參反以殺人通其變者烏頭可以活命孫真人所謂隨時增損物無定方真知言哉震澤王文恪公云今之醫者祖述李明之朱彥修其處方不出參朮之類所謂醫之王道信知本者矣然病出於變非術參輩所能效者則藥亦不得不變可變而不知變則坐以待亡變而失之毫釐則反促其死均之為不可也故曰可與立未可與權藥而能權可謂妙矣明之彥修未嘗廢權也世醫師其常而不師其變非用權之難乎孔志約云動植形生因方舛性春秋節變感氣殊功離其本土則質同而效異乖於採摘乃物是而時非名實既爽寒溫多謬用之凡庶其欺已甚施之君父逆莫大焉陳嘉謨曰醫學貿易多在市家諺云賣藥者一眼用藥者兩眼服藥者無眼非虛語也古壙灰雲死龍骨苜蓿根為土黃耆麝香搗荔核攙藿香採茄葉雜煮半夏為玄胡索鹽松梢為肉蓯蓉草仁充草豆蔻西呆代木香熬廣膠入蕎麥作阿膠煮雞子及魚枕為琥珀枇杷蕊代款冬花驢腳脛作虎骨松脂混麒麟番硝和龍腦香巧詐百般甘受其侮甚至殺人歸咎用藥乃大關係非比尋常不可不慎也陶貞白外傳云有弟子桓闓先得道將超升弘景問曰某行教修道勤亦至矣得非有過而淹延在世乎桓闓曰君之陰功著矣所修本草以虻蟲水蛭為藥功雖及人而害於物命以此一紀之後當解形去世署蓬萊都水監耳言訖乃去弘景復以草木之藥可代物命者著別錄本草三卷以贖其過焉後陶弘景果解形仙去又為茅山上清第九代宗師也許胤宗曰醫特意耳思慮精則得之脈之候幽而難明吾意所解口莫能宣也古之上醫要在視脈病乃可識病與藥值惟用一物攻之氣純而愈速今之人不善為脈以情度病多其物以幸有功譬獵不知兔廣絡原野冀一人獲之術亦疏矣一藥偶得它味相制弗能專力此難愈之驗也脈之妙處不可傳虛著方劑終無益於世此吾所以不著書也太微仙君功過格云以符法針藥救重疾一人為十功小疾一人為五功如受病家賄賂則無功施藥一服為一功傳人保益性命符法藥術等每一事為五功如受賄而傳則一功凡有重疾告治不為拯救者一人為二過小疾一人為一過治不如法為一過不愈而受賄百錢為一過貫錢為十過修合毒藥欲害於人為十過害人性命為百過害人不死而病為五十過害一切眾生禽畜性命為十過害而不死為五過故傷殺人性命者為百過誤傷殺性命為八十過大明律凡庸醫為人用藥針刺誤不依本方因而致死者責令別醫辨驗藥餌穴道如無故害之情者以過失殺人論不許行醫若故違本方詐療疾病而取財物者計贓准竊盜論因而致死及因事故用藥殺人者斬樵談有曰殺人者死法也庸醫殺人不死猛將殺人不死酷吏殺人不死法在乎繆仲淳祝醫五則凡人疾病皆由多生不惜眾生身命竭用人力好殺鳥獸昆蟲好𥯨楚下賤甚則枉用毒刑加諸無罪種種業因感此苦報業作醫師為人司命見諸苦惱當興悲憫詳檢方書精求藥道諦察深思務期協中常自思惟藥不對病病不對機二旨或乖則下咽不返人命至重冥報難逃勿謂一時衣食自貽莫懺之罪於千百劫戒之哉宜懼不宜喜也凡為醫師當先讀書凡欲讀書當先識字字者文之始也不識字義寧解文理文理不通動成窒礙雖詩書滿目於神不染觸途成滯何由省入譬諸面牆亦同木偶望其拯生民之疾苦顧不難哉故昔稱太醫今曰儒醫太醫者通天地人者也儒醫者讀書窮理本之身心驗之事物戰戰兢兢求中於道造次之際罔敢或肆者也外此則俗工耳不可以言醫矣凡為醫師當先識藥藥之所產方隅不同則精粗頓異收採不時則力用全乖又或市肆飾偽足以混真苟非確認形質精嘗氣味鮮有不為其誤者譬如將不知兵立功何自醫之於藥亦猶是耳既識藥矣宜習修事雷公炮炙固為大法或有未盡可以意通必期躬親勿圖苟且譬諸飲食烹調失度尚不益人反能增害何況藥物關乎軀命者耶可不慎諸凡作醫師宜先虛懷靈知空洞本無一物苟執我見便與物對我見堅固勢必輕人我是人非與境角立一靈虛竅動為所塞雖日親至人終不獲益白首故吾良可悲已執而不化害加於人清夜深思宜先愧恥況人之才識自非生知必假問學問學之益廣博難量脫不虛懷何由納受不恥無學而恥下問私心自勝於道何益苟非至愚能不儆省乎醫師不患道術不精而患取金不多舍其本業專事旁求假寵貴人冀其口吻以希世重縱得多金無拔苦力於當來世豈不酬償作是思惟是苦非樂故當勤求道術以濟物命縱有功效任其自酬勿責厚報等心施治勿輕貧賤如此則德植厥躬鬼神幽贊矣以上所祝五條皆關切醫師才品道術利濟功過仰願來學俯從吾祝則進乎道而不囿於技矣詎非生人之至幸醫道之大光也哉陶弘景曰五經四部軍國禮服若講用乖越者猶可矣止於事蹟非宜爾至於湯藥一物有謬便性命及之千乘之君百夫之長何不深思戒慎耶昔許太子侍藥不嘗招弒君之惡季孫饋藥仲尼有未達之辭知其藥性之不可輕信也袁氏醫家十事一醫之志鬚髮慈悲惻隱之心誓救大地含靈之苦視眾生之病不論親疏貴賤賢愚貧富皆當恫癏乃身盡力殫力曲為拯理二醫之學須上通天道使五運六氣變化郁復之理無一不精中察人身使十四經絡內而五臟六腑之淵涵外而四肢百骸之貫串無一不徹下明物理使昆蟲草木之性情氣味無一不暢然後可以識病而用藥三醫之識醫之用藥如將之用兵縱橫合變呼吸異宜非識見之高不能神會而獨斷也然此識非可襲取非可商量全在方寸中虛明活潑須滌除嗜欲恬憺無為則虛空自然生白也四醫之慎醫為人之司命生死系之用藥之際須兢兢業業不可好奇而妄投一藥不可輕人命而擅試一方不可騁聰明而遽違古法倘或稍誤明有人非幽有鬼責可懼也五醫之善君子之遊藝與據德依仁皆為實學故古人技藝之工都從善養中得來若承蜩若養雞皆是法也醫雖小道實具甚深三昧須收攝心體涵泳性靈動中習存忙中習定外則四體常和內則元神常寂然後望色聞聲問病切脈自然得其精而施治得宜也六醫之術醫非徒仁術亦仙術也諺云古來醫道通仙道此豈無稽之言哉凡欲學醫須將玄門之旨留神講究玄牝之門生身之戶守中養氣之訣觀竅觀妙之理務求明師指示親造其藩而闖其室此處看得明白則病候之生滅身中之造化已洞悉矣以之治疾豈不易易況人之疾有草木金石所不能治者則教之依法用功無不立愈天台智者禪師謂一日一夜調息之功可以已二十餘年之痼疾蓋天之陽氣一回則萬物生色人之元氣一復則百體皆和宿疾普消特其餘事耳七醫之量書云必有忍其乃有濟有容德乃大醫者術業既高則同類不能無忌識見出眾則庸庶不能無疑疑與忌合而誹謗指摘無所不至矣須容之於不校付之於無心而但盡力於所事間有排擠毆詈形之辭色者亦須以孟子三自反之法應之彼以逆來我以順受處之超然待之有禮勿使病家動念可也八醫之言仲尼大聖屢以慎言為訓而醫者之言尤當慎者不可誇己之長不可談人之短不可浮誕而駭惑病人不可輕躁而詆誹同類病情之來歷用藥之權衡皆當據實曉告使之安心調理不可誣輕為重不可誑重為輕即有不諱亦須委曲明諭病未劇則寬以慰之使安心調理病既劇則示以全歸之道使心意泰然寧默毋譁寧慎毋躁九醫之行語曰以身教之從以言教之訟故慎吾之言不若端吾之行道高天下守之以謙智絕人群處之以晦敦孝弟重倫理而於禮義廉恥四字則秉之如蓍龜遵之如柱石久而勿失自然起敬起信而醫道易行也十醫之守醫雖為養家尤須以不貪為本凡有病人在即舉家不寧當此時而勒人酬謝家稍不足則百計營求艱難更倍即充足之家亦於滿堂懊惱之中而受其咨詛痛苦之惠亦非心之所安也故我生平於病人所饋不敢纖毫輕受有不給者或更多方周給之非以市恩吾盡吾心而已矣子孫習醫而能依此十事古之聖賢何以加此為醫八要楫著醫家存心當自重不當自輕當自謙不當自傲當計功不當計利當憐貧不當諂富自重必多道氣自輕必無恆心自謙者久必學進自傲者久必術疏計功則用心於治病而伎巧生計利則用心於肥家而詭詐出憐貧則不擇人而醫陰德無窮諂富則不待請而至卑汙莫狀採芝八則明州蔣式金著立己宜養重不宜自輕吾黨既以斯道為己任則此一人之身實千萬人之所繫命者也必當立志清華持躬敦樸以示吾道之不苟倘復徇人喪己徑竇甘趨且非懷珍待聘之心難免枉尋直尺之誚臨證宜計功不宜圖利業以治生若謂憂道不憂貧斯不近情之語也第貪得之念勝則隨在而急欲奏功未能殫厥心以從事有以人圖僥倖者矣是宜痌瘝乃身以祈必濟庶功成而利亦隨之洵不必攖情得失而已祿在其中持心宜善下不宜恃能學問之道虛己者多助自恃者罔功況岐伯之傳義精理奧豈一人之私智所能洞測者乎若彼管窺狃於一得遂有蔑視儕類之思是以安於寡陋而所業日荒古人所以有持滿之戒也良賈深藏允宜被服行道宜憐貧不宜諂富炎涼醜態涉世恆情吾黨雖無是行而或存是心每見遇貴介之子持術惟患其不精值窶寒之徒用意輒鄰於忽略抑思此術原為救人而設煢獨無告者更宜加以矜憐匪第完濟世之初心是亦陰行善之一節看書宜辨理不宜執方陳言往論雖古人己試之明驗然神而明之存乎其人況五方之風氣強弱不齊古今人之稟性厚薄亦異若必執成法而不善變是何異強方枘以就圓鑿也淵博之士宜出自心之玄解毋泥括帖之舊聞治病宜究因不宜務末標本之說昔人論之甚祥今之圖治者不審其致之之由而漫施補救如救焚者第撲其燎原之焰而不滅其火焰雖熄而火性尚存終必復燃也是在培其根塞其源殲厥渠魁而群醜自向風而遁矣處友宜從厚不宜懷讒慨自人不古處交道寖衰在同途共事者更深操戈下石之慘不知譖人者人亦譖之曷若息厥雌黃互相規勸宏其黨類各借聲援一以收同人之益一以維聲氣之窮製藥宜求精不宜就簡質本五行各宜其用製法咸宗雷公矣然考諸出處或一本而根梢異治或一味而㕮咀不同所產有地土之殊所藏有新舊之別慎毋指鹿為馬徒取充寵認魯為魚漫誇具眼致令奇方聖劑竟介於效與不效之間不惟無以起沉疴而適足以損令望吳鶴皋太素脈論醫家以岐黃為祖其所論脈不過測病情決死生而已未有所謂太素也扁鵲倉公之神仲景叔和之聖亦無所謂太素也何後世有所謂太素者不惟測人之病情而能占人之窮通不惟決人之死生而能知人之禍福豈其術反過於先聖耶是亦風鑑巫家之教耳初學之士先須格致此理免為邪說搖惑則造詣日精而倉扁張王之堂可闖矣故太素乃醫之旁門不得不辨亦惡紫亂朱距邪放淫之意又太素之說固為不經然其間亦有可採者如曰脈形圓淨至數分明謂之清脈形散澀至數模糊謂之濁質清脈清富貴而多喜質濁脈濁貧賤而多憂質清脈濁此謂清中之濁外富貴而內貧賤失意處多得意處少也質濁脈清此謂濁中之清外貧賤而內富貴得意處多失意處少也若清不甚清濁不甚濁其得失相半而無大得喪也富貴而壽脈清而長貧賤而夭脈濁而促清而促者富貴而夭濁而長者貧賤而壽此皆太素可採之句也然亦不能外乎風鑑故業太素者不必師太素但師風鑑風鑑精而太素之說自神矣至其甚者索隱行怪無所不至是又巫家之教耳孔子曰攻乎異端斯害也已正士豈為之吳鶴皋脈案式脈案者竊公案之義醫者察得病情立定方法使病邪不能逃吾之方論藥至而邪伏譬之老吏聽訟援律定刑使奸人無所逃也一書某年某月某地某人二書其人年之高下形之肥瘦長短色之黑白枯潤聲之清濁長短三書其人之苦樂病由始於何日四書初時病證服某藥次服某藥再服某藥某藥少效某藥不效五書時下晝夜孰甚寒熱孰多喜惡何物脈之三部九候如何六引經旨以定病名某證為標某證為本某證為急當先治某證為緩當後治某臟當補某臟當瀉七書當用某方加減某藥某藥補某臟某藥瀉某臟君臣佐使之理吐下汗和之意一一詳盡書年之干支月之春秋者占運氣也書某地者占方宜也書年形聲色者用之以合脈也書苦樂者佔七情也書始於何日者占久近也歷問某病證藥物而書其驗否者以之斟酌己見也書晝夜寒熱者辨氣血也書喜惡何物者察陰陽臟腑也書脈狀者以之合年形聲色病證也書經旨者如法家引律使確乎不可逃也書病名者用藥如用兵師出貴有名也書標本者識輕重也書方藥君臣之理者欲病人達而嘗也凡看王公大人貴宦儒門之病必書此一案便無一毫苟且自然奏功即不愈亦免誤投藥劑之疑也陶弘景曰晉時有一才人欲刻正周易及諸藥方先與祖訥共論祖云辯釋經典縱有異同不足以傷風教至於湯藥小小不達便至於壽夭所由則後人受弊不少何可輕以裁斷祖之此言可為仁識足為龜鏡矣曲禮曰醫不三世不服其藥宋景濂云古之醫師必通於三世之書所謂三世者一曰黃帝針灸二曰神農本草三曰素問脈經脈經所以察證本草所以辨藥針灸所以祛疾非是三者不足以言醫傳經者既明載其說復斥其非而以父子相承三世為言何其惑與夫醫之為道必志慮淵微機穎明發然後可與於斯雖父不能必其子也施笠澤曰愚按古今之稱神醫者莫若扁鵲倉公而扁鵲之術則受之長桑君倉公之術則傳之公乘陽慶初未聞以世傳也至如李東垣朱丹溪滑伯仁輩皆豪傑自振者是知醫在讀三世書而不在於祖父之三世也張顧存先生回頭歌奉勸仁術們亟回頭從寬譬不為良相為良醫願得博濟行仁義資彼青蚨半養身先要陰功積漸次念關天休計利朱秀水宰相錢山陰宰相嚴雲南塚宰廖雲南中丞齊昌嗣楫曰虛言謗人而不知悔大言譽己而不知慚惟以利亂厥心不顧醜出其口此小人之尤者也而醫黨特甚殊不知世有明眼虛言大言如見肺肝不旋踵而為人鄙笑者多矣所謂謗人譽己者適所以譽人謗己也吳因之先生曰造謗者甚忙受謗者甚閒忙者不能造閒者之命閒者則能定忙者之品亦名言哉
