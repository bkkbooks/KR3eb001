body:
  text: 卷十二脹滿脈證第七十一脹滿脈弦土製於木濕熱數洪陰寒遲弱浮為虛滿緊則中實浮大可治虛小危極脹謂脹於外滿謂滿於中排臟腑而廓胸脅急皮膚而露筋脈臍凸腰圓鼓之如鼓胸腹之疾也間亦有脹及於頭面四肢者與水腫大同小異而此則無水耳大抵飲食不節起居失宜房室過勞憂思無極久久皆足以耗其守陰衰其陽運致氣壅滯留中而脹滿之疾漸起矣故實者少虛者多熱者少寒者多成於他臟腑者少成於脾胃者多蓋虛則氣空浮故易鼓而大寒則氣凝滯故易壅而堅脾胃居中以胸腹為宮城屬土而化濕性緩氣屯故亦易脹易滿此但言其常耳至若五臟六腑盛衰之脹五運六氣勝負之脹有實者有熱者有成於他臟腑者又不能以此數端盡也在圓機者自為審別再宜參看張景岳水脹一論斯得之矣靈樞諸脹則有本神篇所云腎氣實則脹腎主藏藏已中實而更加以實其為脹也不言可知經脈篇所云胃病則大腹水腫胃屬土而主中焦土病不能制水則水氾濫而腹大矣又云胃中寒則脹滿寒則氣滯而壅塞故又云足太陰虛則鼓脹脾足太陰主運虛則不運不運則脹虛則空故如鼓也邪氣臟腑病形篇所云三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡三焦主氣為遊行之部病則氣化滯而遊行阻故病如是在太陽者三焦聯絡膀胱耳熱病篇所云男子如蠱女子如怚蠱者蠱毒也脹急如蠱蓄怚者阻也阻滯如懷孕皆形容腹之大素問諸脹則有脈解篇所云太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹亦氣藏而中實故病如是大奇論所云肝滿肺滿腎滿皆實即為腫肺之壅喘而兩胠滿肝壅兩胠滿臥則驚不得小便腎壅胠下至少腹滿脛有大小髀胻大跛易偏枯肺主氣而呼吸應兩胠肝主驚主疏泄而經兩胠腎經脛與髀胻而少腹乃其部分故肺壅實則氣喘而兩胠滿肝壅實胠滿臥驚而艱小便腎壅實則少腹滿而脛髀胻大跛偏枯調經論所云志有餘則腹脹志為腎所藏有餘則實實則脹與腎氣實則脹之義同脈要精微論所云胃氣實則脹胃脈下膈屬胃絡脾其支者起於胃口下循腹裡實則經脈瀧湧故脹陰陽應象大論所云中滿者瀉之於內中滿實則從內瀉之如攻下之類若虛滿虛脹瀉之反成其害也不可不審又云濁氣在上則生䐜脹清陽上升濁陰下降濁不降而陰滯於上䐜脹生焉生氣通天論所云因於氣為腫四維相代陽氣乃竭氣者榮衛臟腑之氣也流行如常何腫之有設或不調不順則壅滯而形腫於外四維乃人之四肢為諸陽之本更代俱病陽氣不從此衰竭乎即本篇所云失之則外壅肌肉衛氣散解之義太陰陽明論所云飲食不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞飲食起居為內傷內傷則陰受之而入臟故內則病䐜滿閉塞也平人氣象論所云盛而緊曰脹此言脹病之脈也盛則氣實緊則氣強皆中有餘邪故脹異法方宜論所云臟寒生滿病此言脹病生於方土也北土地寒乳酪為食外寒斂而內滯膩故滿病生焉五常政大論所云適寒涼者脹適往也適往寒涼之處外閉內郁故脹刺熱篇所云下牙車為腹滿此言外部之色應腹中而知脹滿也牙車即牙床轉動之處牙車之下正應腹中腹脹者牙車下當見青白色青白為寒寒則凝滯故脹也金匱要略論諸脹滿有云趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也以溫藥服之微弦之脈陽不能運腹自當滿設不滿亦當便難兩胠痛正不運不通故耳然見於胃足趺陽之脈則知虛寒自下逆上也服以溫藥則能通能運而愈矣如枳實理中湯之類又云病者脹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去正虛於內按以實其虛故不痛邪實於內按以實其實故痛又云腹滿時減復如故此為寒當與溫藥得暖必減如理中湯加丁桂之類又云病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之又云按之心下滿痛者此為實也當下之下固可下要審其滿痛者為何物宜大柴胡湯又云腹滿不減減不足言當須下之宜大承氣湯以上諸脹諸滿雖種種不同然而無一不關於脾胃者蓋脾胃者土也居中而溉四臟胸腹乃其城府胸腹脹滿猶城府崩裂未有城府崩裂而土能獨全者有諸中形諸外此必然之理也脈若見弦知木來侮土更為不吉若見數洪必濕熱之郁若見遲弱乃陰寒所凝浮則氣散外雖滿而中必虛緊則氣斂外固堅而中更實浮而大者元氣之振作與病形相宜故云可治虛而小者知元氣之衰微又與病形相反故云危極外有腸覃石瘕二種女子之病也寶鑑言之甚詳以其類乎脹滿故附錄於此腸覃者寒氣客於腸外與衛氣相搏氣不得榮因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也夫腸者大腸也覃者延也大腸以傳導為事乃肺之腑也肺主衛衛為氣得熱則泄得冷則凝今寒客於大腸故衛氣不榮有所繫止而結瘕在內貼著其延久不已是名腸覃也氣散則清氣聚則濁結為瘕聚所以惡氣發起瘜肉乃生小漸益大至期而鼓其腹如懷子之狀也此氣病而血未病故月事不斷應時而下本非妊娠可以此為辨矣晞露丸木香通氣散主之石瘕者生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下夫膀胱為津液之府氣化則能出焉今寒客於子門則氣塞而不通血壅而不流衃以留止結硬如石是名石瘕也此病先氣病而後血病故月事不來則可宣導而下出者也難經云任之為病其內若結男子為七疝女子為瘕聚此之謂也非大辛之劑不能已也可服見晛丸和血通經湯諸脹滿病腹脹身熱或腹大脹四末清脫形泄甚或腹脹便血其脈大時絕或嘔咳腹脹且飧泄其脈絕或面黑齒長而垢腹脹閉上下不通或腹脹不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦或手足掌紋不見或臍凸氣促等證皆主必死附方枳實理中湯見第十七金匱厚朴七物湯厚朴半斤甘草大黃各三兩大棗十枚枳實五枚銼桂枝三兩生薑五兩水一斗煮四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤仲景大柴胡湯柴胡半夏各半斤黃芩三兩芍藥三兩生薑五兩枳實四枚炙大棗十二枚上七味以水一斗二升煮六升去滓再煎溫服一升日三服一方用大黃二兩寶鑑晞露丸治寒傷於內氣凝不流結於腸外久為癥瘕時作疼痛腰不可伸京三稜蓬莪朮二味各一兩並酒浸入巴豆三十粒切碎同炒深黃色去巴豆不用乾漆洗去腥炒煙盡川烏炮各半兩硇砂四錢另研輕粉一錢另研茴香鹽炒青皮去白雄黃另研穿山甲炒各三錢麝香五分另研上為細末研勻生薑汁煮麵糊和丸如梧子大每服二十丸至三十丸空心生薑湯下溫酒亦得寶鑑木香通氣散治寒氣結瘕腹大堅滿痛不可忍木香戎鹽炒京三稜炮各半兩厚朴一兩薑製枳實麩炒甘草炙各三錢乾薑炮蓬莪朮炮各二錢上為末每服三錢食前淡生薑湯調下寶鑑見晛丸治寒氣客於下焦血氣閉塞而成瘕聚堅大久不消者附子炮去皮臍四錢鬼箭羽紫石英各三錢澤瀉肉桂玄胡索木香各二錢檳榔二錢半血竭一錢半另研水蛭一錢炒煙盡京三稜五錢銼桃仁三十粒湯浸去皮尖麩炒研大黃二錢銼用酒同三稜浸一宿焙上十三味除血竭桃仁外同為末入另研二味和勻用元浸藥酒打糊丸如桐子大每服三十丸食前淡醋湯下溫酒亦得寶鑑和血通經湯治婦人室女受寒月事不來惡血積結堅硬如石當歸京三稜炮各五錢廣朮炮木香熟地黃肉桂各三錢紅花貫眾蘇木各二錢血竭一錢另研上十味除血竭外同為細末和勻每服三錢熱酒一盞調下食前忌生冷及當風大小便積聚脈證第七十二五臟為積六腑為聚實強者生沉細者死難經五十五難曰積者陰氣也聚者陽氣也陰沉而伏陽浮而動又曰積者五臟所生聚者六腑所成越人以陰陽分臟腑既分臟腑自有五六之名但歷考靈素積聚癥瘕之類亦不全以臟腑分也如靈樞百病始生篇云積之初成必先身形自虛而後外邪中傷始於皮膚腠理毛髮次絡脈次經脈次輸次伏沖次腸胃次腸胃之外募原之間此言邪氣自淺入深之常道也然亦有不必傳至極處邪之所在無論淺深若有積留即積於彼故本篇岐伯又曰或著孫脈或著絡脈或著經脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論後復詳言留著成積之病狀曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜脹滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大飢則益小其著於緩筋也似陽明之積飲食則痛飢則安其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入內從上下也又云積之始生得寒乃生厥乃成積也又云厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積又云卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣又云卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊里而不散津液澀滲著而不去而積皆成矣最後黃帝始曰其生於陰者奈何岐伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此五臟之五傷也雖不詳言成積之狀謂之五臟所生可也謂之即成肥氣伏梁痞氣息賁賁豚五積之因亦可也據本篇全文及素問脈要精微論云推而外之內而不外有心腹積也又五臟生成論云赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹赤乃其色色赤而脈喘堅則知病為心痹下文仿此白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝黑脈之至也上堅而大有積氣在少腹與陰名曰腎痹又平人氣象論云寸口脈沉而橫曰脅下有積腹中有橫積痛又云盛喘數絕者則病在中結而橫有積矣又大奇論云腎脈小急心脈小急不鼓皆為瘕又云三陽急為瘕又靈樞邪氣臟腑病形篇云心脈微緩為伏梁在心下肝脈微急為肥氣在脅下若覆杯腎脈微急為沉厥奔豚又衛氣篇云積痛可移者易已也積不痛難已也又難經十八難云診在右脅有積氣得肺脈結脈結甚則積甚結微則積微診不得肺脈而右脅有積者何也然肺脈雖不見右手脈當沉伏又脈經云脈遲而澀中寒有癥結又云弦急疝瘕小腹痛又為癖病又云弦小者寒癖由是觀之則脈之小也微也小急也弦急也沉也沉伏也遲也澀也實也數絕也沉橫也結伏也長而左右彈也是皆陰寒斂實之脈則知積之成也亦多屬陰寒陰寒則不能溫散而易於凝著始則毫釐之留日以增益如堆積然久久則小者大軟者堅虛者實無形者有形越人言其始發也有常處其痛不離其部上下有所終始左右有所窮處又云積者陰氣也又云陰沉而伏皆中的之語聚則不然越人謂聚者陽氣也六腑所成又云陽浮而動病發無根痛無常處夫無根無常則氣不留止偶與氣血相搏則邪正相干氣聚而痛氣散則解非若積之留止不移不散也如腸腹攻衝疝痃瘕熱胸腹脹滿切痛雷鳴等證皆聚之類也古人論積聚分臟腑者亦不過以沉伏留止不移者屬陰陰則為臟浮動聚散不常者屬陽陽則為腑耳治之者當於留止聚散上相機不當於臟腑二字上作工夫也其脈實強者陽脈也一以徵邪正之相搏一以徵元本之壯實從腑從陽故曰生其脈沉細者陰脈也一以徵邪氣之深入一以徵元本之衰微從臟從陰故曰死以上積聚二證楫引靈素難經金匱諸書其病因病狀可謂詳且悉矣但言證處不斬然亦不全屬一證故雖有成方不能插入今歷觀積聚之由似宜溫行不宜寒斂似宜運動樞機不宜專尚攻克是選名方十九首以便擇用焉附方濟生大七氣丸治積聚癥瘕隨氣上下心腹㽲痛上氣窒塞小腹脹滿大小便不利京三稜蓬莪朮青皮陳皮各去白藿香葉桔梗去蘆肉桂不見火益智仁各一兩半甘草炙七錢半香附炒去毛一兩半上㕮咀每服五錢水二盞煎一盞食前溫服東垣肥氣丸治肝之積在左脅下如覆杯有頭足久不愈令人咳逆㾬瘧連年不已其脈弦而細柴胡二兩黃連七錢厚朴半兩甘草炙三錢椒炒去汗去目及閉口者四錢廣朮炮昆布人參各二錢半皂角去皮弦子煨白茯苓去皮共一錢半川烏炮去皮臍一錢二分乾薑巴豆霜各五分上除茯苓皂角巴豆外為極細末再另研茯苓皂角為細末和勻方旋旋入巴豆霜和勻煉蜜丸如桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從兩丸加服起周而復始積減大半勿服東垣息賁丸治肺之積在右脅下覆大如杯久不已令人灑淅寒熱喘嗽發肺癰其脈浮而毛厚朴薑製八錢黃連炒一兩三錢人參去蘆乾薑泡白茯苓去皮另末川椒炒去汗紫菀去毛各一錢半桂枝去粗皮桔梗京三稜炮天門冬去心皮陳皮川烏炮去皮臍白豆蔻各一錢青皮五分巴豆霜四分上除茯苓巴豆霜旋入外余藥共為細末煉蜜丸如桐子大每服二丸一日加一丸二日加二丸加至大便微溏再從二丸加服起煎淡薑湯食遠送下周而復始積減大半勿服秋冬加厚朴五錢通前一兩三錢黃連減七錢用六錢金匱鱉甲煎丸治瘧母鱉甲炙三兩烏扇燒黃芩鼠婦熬大黃桂枝石韋去毛厚朴紫葳阿膠各七錢半乾薑人參瞿麥桃仁各五錢柴胡蜣蜋熬各一兩五錢芍藥牡丹皮䗪蟲炒各一兩二錢半蜂窠炙各一兩葶藶炒半夏各二錢半赤硝三兩上二十三味為末取煅灶下灰一斗清酒一斛二升浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如桐子大空心服七丸日三服千金方用鱉甲十二片又以海藻三分大戟一分䗪蟲五分無鼠婦赤硝二味以鱉甲煎和諸藥和丸東垣伏梁丸治心之積起臍上大如臂上至心下久不愈令人煩心其脈沉而芤黃連去須一兩半人參去蘆厚朴去粗皮薑製各半兩黃芩三錢肉桂茯神去皮丹參炒各一錢川烏炮去皮臍乾薑炮紅豆菖蒲巴豆霜各五分上除巴豆霜外為末另研巴霜旋入和勻煉丸如桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從二丸加服淡黃連湯下食遠周而復始積減大半勿服秋冬加厚朴半兩通前共一兩減黃連半兩只用一兩黃芩全不用半夏湯治肺積息賁咳嗽半夏湯泡去滑焙乾細辛去苗葉桑白皮炙前胡去蘆各一兩半桔梗炒貝母去心柴胡去苗訶黎勒煨去核炙甘草人參去蘆白朮各一兩上㕮咀每服三錢水一盞生薑三片棗三枚擘破同煎至七分去滓溫服食後臨臥各一服東垣痞氣丸治脾之積在胃脘腹大如盤久不愈令人四肢不收發黃疸飲食不為肌膚其脈浮大而長厚朴制半兩黃連去須八錢吳茱萸泡三錢黃芩白朮各二錢茵陳酒製炒縮砂仁乾薑炮各一錢半白茯苓另為末人參澤瀉各一錢川烏炮去皮臍川椒各五分巴豆霜另研桂各四分上除茯苓巴豆霜另研為末旋入外余藥同為細末煉蜜丸桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從二丸加服淡甘草湯下食遠周而復始積減大半勿服東垣奔豚丸治腎之積發於小腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣及治男子內結七疝女子瘕聚帶下其脈沉而滑厚朴薑製七錢黃連炒五錢苦楝子酒煮五錢白茯苓另末澤瀉菖蒲各二錢玄胡索一錢半附子去皮臍全蠍獨活各一錢川烏頭炮丁香各五分巴豆霜四分肉桂二分上除巴豆霜茯苓另為末旋入外余藥為細末煉蜜丸如梧子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從二丸加服淡鹽湯下食遠積減大半勿服秋冬加厚朴二兩通前一兩二錢如積勢堅大先服前藥不減於一料中加存性牡蠣三錢疝帶下勿加如積滿腹或半腹先治其所起是何積當先服本臟積藥諸疾自愈是治其本也余積皆然如服藥人覺熱加黃連氣短加厚朴悶亂加桂三因奔豚湯甘李根皮焙乾葛川芎當歸白芍藥黃芩甘草炙各一錢半半夏湯泡七次二錢上作一服水二鍾姜五片煎至一鍾食前服萬病紫菀丸見第三十二太無神功助化散專治男子婦人腹中痞塊不拘氣血食積所成此方之妙不可盡述地萹蓄瞿麥穗大麥糵各五錢神麯二錢半沉香木香各一錢半甘草五錢大黃二兩上為細末淨依分兩和勻男以燈心淡竹葉二味等分煎及無灰酒同調服湯多於酒婦人用紅花燈心當歸等分煎湯及無灰酒同調服酒多於湯忌油膩動氣之物及房事一月藥須於黃昏服大小便見惡物為度寶鑑醋煮三稜丸治一切積聚不拘遠年近日治之神效京三稜四兩醋煮軟竹刀切片曬乾川芎二兩醋煮微軟切片大黃半兩醋浸濕紙裹煨過切上為末醋糊丸如桐子大每服三十丸溫水下無時病甚者一月效小者半月效寶鑑聖散子治遠年積塊及婦人乾血氣硇砂大黃各八錢麥糵六兩炒取淨面乾漆炒煙盡二兩萹蓄茴香炒檳榔各一兩婦人乾血氣加穿山甲二兩炮上為細末每服五錢臨臥溫酒調下仰臥此藥只在心頭至天明大便如爛魚腸小便赤為驗藥並無毒有神效小兒用一錢十五以上三錢空心服之更效此按古方校定今綱目刻本硇砂六兩大黃八兩豈不誤人三聖散消積塊進飲食橘紅一斤淨甘草四兩鹽半兩用水三四碗從早煮至夜以爛為度水乾則添水曬乾為末淡薑湯調下有塊者加薑黃半兩同前藥煮氣滯加香附二兩同前藥煮氣虛者加沉香半兩另入噤口痢加蓮肉二兩去心另入控涎丹見第二十二云岐牡丹散治婦人久虛羸瘦血塊走注心腹疼痛牡丹皮桂心當歸玄胡索各一兩莪朮牛膝赤芍藥各三兩京三稜一兩半上為粗末每服三錢水酒各半鍾煎服三因化氣丸見第三十二保和丸見第三十七沉香化氣丸專攻赤白青黃等色痢疾諸般腹痛飲食傷積酒積痰積血積跌撲損傷五積六聚胸膈氣逆痞塞胃中積熱中滿腹脹瘧痞茶癖及中諸毒惡氣傷寒大便不通下後遺積未盡感時疫氣瘴氣並諸惡腫瘡瘍腫毒及食諸般牛畜等物中毒不問婦人小兒並皆治之大黃綿紋者黃芩條實者各一兩人參官揀去蘆白朮去蘆肥者各三錢沉香上好角沉水者四錢另為末上將前四味銼碎用雷竹瀝七浸七曝候乾為極細末和沉香末再研勻用竹瀝入薑汁少許為丸如綠豆大硃砂為衣曬乾不見火每服一錢淡薑湯送下小兒六分中惡脈證第七十三中惡腹脹緊細者生脈若浮大邪氣已深不善之謂惡暗襲潛侵忽然倒僕昏不知人或手足厥寒或肌膚粟起或語言錯妄或唇齒噤關或肢體不仁或面目青黑即客忤卒厥鬼擊飛屍之類涉水登山穿塚入廟夜行露臥吊死問喪者多得之然非正氣之大虛邪亦不能一時中傷如此也初宜灌以蘇合丸候竅開氣轉再以調氣平胃散與服若服後吐下者如六君子湯香砂四君子湯皆中的之藥視與證相宜者投之自無不效也人之正氣自內達表自胸腹而達四肢者其常也卒中外邪則正氣不能達外而反退縮於中退縮於中則氣機斂實而緊細之脈象見矣腹安得不脹藥力一助正氣必張邪氣必散緊者仍舒細者仍充而本來之面目可還也故知其生若脈浮大則正先散越散越於外則里更虛里更虛則邪必深入而欲為之治不亦難乎附方蘇合香丸見第十八調氣平胃散木香烏藥白豆蔻檀香砂仁各一錢藿香一錢二分蒼朮一錢半厚朴薑汁炒陳皮各一錢甘草五分水二鍾姜三片煎八分食前服六君子湯見第十六香砂四君子湯即四君子加砂仁木香見第十六千金返魂湯見第三十五玉樞丹即紫金錠見第六十三華佗救中惡方治一應忤惡鬼氣犀角末五錢辰砂水飛過麝香研各二錢五分每服二錢井水調下如一時不能得此藥用雄黃末一錢煎桃枝葉湯調灌之又無雄黃可用著身上多時遭汗衣或貼肉襯衣男用女女用男燒存性服二錢百沸湯調下又方韭菜搗汁滴鼻中冬月用韭根又方百會穴人中穴足大拇指離甲一韭葉許名鬼眼穴及丹田氣海諸穴灸七壯愈多愈妙一二處醒即止不必俱灸也以炭火烹米醋熏鼻亦妙諸急證宜先以牙皂末搐鼻取嚏牙關緊者以烏梅肉擦之自開皆通關之法後可進藥砒毒早禾杆燒灰新汲水淋汁絹濾過冷服一碗得下利即安新汲水調白扁豆末亦好華佗用黑鉛磨濃水灌之附子天雄川烏斑蝥毒煮大小黑豆汁飲河豚毒倉卒無藥用清油多灌之得吐愈巴豆毒煮黃連汁飲諸藥毒甘草黑豆淡竹葉等分水一碗煎服刺毛蟲毒疼痛不已蚯蚓泥干搽又治胡蜂叮郁肉漏脯毒郁肉密器蓋隔宿者漏脯茅屋漏下沾著者燒犬屎酒服方寸匕生韭汁亦好馬肉毒香豉二兩杏仁三兩蒸一飯時杵之酒煎服蘆根煮汁飲亦良牛肉毒甘草煮汁飲之即解犬肉毒心下堅腹脹口乾發熱妄語或洞下杏仁一升不去皮熟研以沸湯三升和取汁分三服利下肉片良中箭死鳥獸肉毒大豆煮汁及鹽汁服之解諸魚毒橘皮煎濃汁飲之解蘆根煮汁亦食蟹毒紫蘇煮汁飲之蘇子亦好諸果毒豬骨燒過為末水服方寸匕解諸菌毒悶亂欲死人糞汁飲一升飲土漿一二升亦良大豆濃煮汁飲之或服吐利藥俱可解亦治楓樹菌毒令人哭不止哭一作笑野芋毒即前方閉口椒毒戟入咽喉氣欲絕或吐白沫身冷用肉桂煎汁飲之或多飲冷水或食蒜或飲地漿俱良水莨菪葉毒人每誤認作菜食令人狂亂吐血甘草煮汁飲之即解芹菜毒手背腹滿痛名蛟龍病以芹上帶蛟蜃精耳用硬糖二三升煮服之當吐如蜥蜴者貪食成病方食多不消心腹堅滿痛用鹽一升水三升煮鹽消化分三服當吐出食諸食物毒煮甘草薺苨汁飲之通能解
