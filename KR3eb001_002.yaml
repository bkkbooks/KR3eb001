body:
  text: 卷二浮脈主病第十六浮脈主表里必不足有力風熱無力血弱浮遲風虛浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微勞極浮濡陰虛浮散虛極浮弦痰飲浮滑痰熱皮毛曰表言在外也浮脈與皮毛相得亦有勢泛泛外浮者皆主表氣應於表其里必虛故里不足浮亦主風浮而有力風熱所為蓋風為陽邪其性輕浮動蕩加之以熱勢必壅盛故有力也宜荊防羌殼芩梔石膏之類無力則浮而虛矣血主裡氣主表血弱不能諧氣故反浮亦裡不足之義宜參耆四物湯之類脈浮而遲乃鼓動之不及也為風虛宜四君子湯或防桂參耆之類脈浮而數乃鼓動之太過也為風熱宜荊防膏薄梔芩丹皮生地之類脈浮而緊緊則緊斂寒之性也風中有寒九味羌活湯麻黃湯或蘇藭羌杏薑蔥之類脈浮而緩緩則緩漫濕之性也風中有濕宜羌防蒼白朮防己黃耆桂附之類浮虛傷暑者暑傷乎氣氣主浮外而暑性張散故傷暑者多汗經曰脈虛身熱得之傷暑者是也宜清暑益氣湯十味香薷飲之類浮芤失血者血去脈空耳蓋衛行脈外營行脈中血失則營損營損則脈中空如芤草之狀也宜黃耆歸芍或當歸補血湯瓊玉膏之類脈浮而洪充湧指下火之象也但浮則有表無里故曰虛火宜當歸補血湯四物湯六味丸八味丸之類浮微勞極陽氣欲絶也素問生氣通天論曰陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止蓋言陽氣清淨煩勞則陽精張散而竭絶積於夏長之時當振發而反退陷故變病如上是名煎厥煎厥者氣應振而反靡應出而反入如煎迫之自外及里煎熬之由多漸少即難經十四難所謂自皮毛以及於骨之五損從上下者是也今之五勞六極虛怯損瘵皆煎厥之類陽主浮以其因於耗陽故脈浮微耳宜十全大補湯生脈散大造丸四君子湯八珍湯之類脈浮而濡衰薄之甚僅有其上若無其下故主陰虛宜四物湯六味丸之類若浮而散則又陰虛之極矣陽在外陰之使陰在內陽之守陰虛極而不能為守則陽無所依浮越而散略無陰凝內斂之象故陰虛劇然而孤精於內氣耗於外謂之陰陽兩虛亦可宜十全大補湯金匱腎氣丸之類脈浮弦者痰飲痰飲何自而生乎素問經脈別論曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行又營衛生會篇曰上焦如霧中焦如漚下焦如瀆二說雖殊其理則一方飲之由胃遊溢而上輸於脾也腐熟如酒酵之噴發炊釜之沸騰即中焦之如漚由脾散精而上歸於肺也拔粹升純氤氳若噀即上焦之如霧由肺之通調而下輸膀胱也氣化開通溲便注泄即下焦之如瀆名雖有三實則一氣若氣虛寒不運則飲亦停留不行隨不運之處停留則隨停留之處見病矣大約暴則為飲久則成痰清薄則為飲濁厚則成痰寒多則為飲熱多則成痰熬汁收膏煮水結鹽之義也弦乃陰脈為陽不足仲景云弦為陽運正言陽之不能運也又云沉潛水蓄支飲急弦俱言陽氣衰弱不能運行其飲故見此弦斂不鼓之脈耳宜金匱苓桂朮甘湯小青龍湯之類水飲應沉而言浮者當在上焦若浮而滑則非弦斂不鼓之脈寒當化熱飲當成痰此必然之理也宜二陳湯或梔芩花粉玄明粉之類附方參耆四物湯治血虛氣不能與之諧反上氣喘促自汗惡寒面白脈浮按之空澀或曾經失血者人參一錢黃耆蜜炙二錢當歸二錢熟地黃二錢白芍藥酒炒一錢半芎藭八分上為粗末水二盞煎七分溫服四君子湯治真氣虛弱及短氣脈弱加陳皮名異功散加陳皮半夏名六君子湯白朮人參茯苓甘草各等分上為粗末每服五錢水一盞煎至七分食遠溫服九味羌活湯羌活防風蒼朮各一錢二分半甘草白芷川芎生地黃黃芩各一錢細辛四分加生薑三片大棗一枚水二盞煎八分熱服取汗陶節菴云春夏秋感冒頭疼發熱惡寒無汗脈浮緊見太陽表證宜服此平正方也其加減法在人自變通耳仲景麻黃湯治傷寒太陽脈浮頭項強痛腰脊疼發熱惡寒身體痛無汗而喘者麻黃一兩半桂枝一兩甘草五錢杏仁去皮尖五十粒為粗末每服五錢水二盞煎初沸去上沫再煎至七分溫服取汗汗出不必服盡劑清暑益氣湯黃耆一錢半汗少減五分蒼朮一錢半升麻一錢人參去蘆白朮陳皮神麯澤瀉各五分甘草炙黃柏酒浸葛根青皮去瓤當歸身麥門冬去心各三分五味子九粒水二大盞煎至一盞去滓食遠稍熱服劑之多少臨時斟酌此東垣所制以治長夏土令濕勝非獨暑也其論云暑濕蒸熾人感之則四肢困倦精神短少胸滿氣促肢節沉疼或氣高而喘身熱而煩小便黃數大便溏頻或痢如黃糜或如泔色或渴或不渴不思飲食自汗或汗少血先病而氣不病也其脈洪緩若血氣相搏必更加遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之內經曰陽氣者衛外而為固也炅則氣泄今暑邪干衛故身熱自汗以黃耆甘溫補之為君人參橘皮當歸甘草甘微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根甘苦平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏苦辛寒借甘味瀉熱補水虛者滋其化源以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯百一十味香薷飲消暑氣和脾胃香薷一兩人參去蘆陳皮湯泡去白白朮白茯苓白扁豆炒去殼黃耆去蘆乾木瓜厚朴薑汁製炒黑色炙甘草各半兩上為細末每服二錢不拘時熱湯或冷水調下當歸補血湯治氣血俱虛肌熱惡寒面目赤色煩渴引飲脈洪大而虛重按似無此脈虛血虛也此病多有得於飢飽勞役者黃耆一兩炙當歸二錢酒洗上㕮咀作一服水三盞煎至一盞去滓溫服食前瓊玉膏治吐血咳嗽生地新鮮者取汁四斤白茯苓十三兩人參六兩以參苓為極細末以地黃汁和蜜拌入用瓶貯紙箬包其口用桑柴火重湯煮三晝夜取出水浸三日白湯點服六味丸一名地黃丸治腎經不足發熱作渴小便淋閉氣壅痰嗽頭目眩暈眼花耳聾咽燥舌痛齒牙不固腰腿痿軟自汗盜汗便血諸血失音水泛為痰血虛發熱等證其功不能盡述熟地黃八兩酒蒸杵膏山茱萸肉乾山藥各四兩牡丹皮去骨白茯苓去皮澤瀉去毛各三兩上各另為末和地黃膏加煉蜜丸桐子大每服七八十丸空心滾湯下八味丸治命門火衰不能生土以致脾胃虛弱飲食少思大便不實臍腹疼痛夜多漩溺等證即六味丸加肉桂附子各一兩十全大補湯治氣血俱虛發熱惡寒自汗盜汗肢體倦怠或頭痛眩暈口乾作渴喉痛舌裂及久病虛損口乾食少咳而下利驚悸發熱或寒熱往來晡熱內熱遺精白濁二便見血小腹作痛小便短少大便乾澀或大便滑泄肛門下墜小便頻數陰莖癢痛或臍腹陰冷便溺遺瀝或心神不寧寤而不寐或形容不充肢體作痛或鼻吸氣冷急趨氣促等證皆是無根虛火但服此藥諸病悉除凡元氣素弱起居失宜飲食勞倦用心太甚以此為主肉桂甘草芍藥黃耆當歸川芎人參白朮茯苓熟地黃各等分上水煎服生脈散治熱傷元氣肢體倦怠氣短懶言口乾作渴汗出不止或濕熱大行金為火制絶寒水生化之源致肢體痿軟腳欹眼黑最宜服之人參五錢五味子麥門冬各三錢上水煎服大造丸治諸虛百損精血兩虧形體尪羸筋骨痿弱或七情傷感以致成勞或外感失調久成虛乏凡一切不足之疾服此漸復真元功難盡述紫河車一具用米泔水浸輕輕擺開換洗令淨白為度勿動筋膜用竹器盛於長流水中浸一刻取生氣提回以瓦瓶隔湯煮極爛如糊取出先傾汁入藥內用石臼木椎搗極均細為度入後藥乾地黃一兩五錢熟地黃二兩麥門冬去心天門冬去心各一兩半當歸一兩枸杞子七錢五味子牛膝各七錢杜仲一兩半小茴香黃柏白朮各二兩陳皮二錢乾薑二錢側柏葉採向東嫩枝隔紙焙二兩如氣虛加人參黃耆各一兩血虛倍當歸地黃腎虛加覆盆子炒巴戟去心山茱萸肉各一兩腰痛加白朮鹽水炒萆薢鎖陽酥炙續斷酒洗各一兩骨蒸加地骨皮知母丹皮各一兩如婦人去黃柏加川芎香附條芩俱酒炒一兩共末同河車為丸如桐子大每服三錢清晨白湯下八珍湯治肝脾傷損氣血虛弱惡寒發熱煩躁作渴或不時寒熱眩暈昏憒或大便不實小便淋赤或飲食少思小腹脹痛等證人參白朮白茯苓各三錢甘草炙芍藥各一錢當歸熟地黃各三錢川芎一錢五分上水煎服仲景苓桂朮甘湯傷寒論云治傷寒吐下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者服此湯又治停痰寒飲中虛冷瀉等證茯苓四兩桂枝三兩去皮白朮甘草各二兩炙上水六升煮取三升去滓分溫三服仲景小青龍湯傷寒論云傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者服此湯又治停飲久咳肺寒麻黃去節芍藥細辛乾薑甘草炙桂枝去皮各三兩五味子半升半夏半升洗上以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升若渴去半夏加栝蔞根三兩若微利去麻黃加蕘花如雞子大熬令赤色若噎者去麻黃加附子一枚炮若小便不利少腹滿者去麻黃加茯苓四兩若喘者去麻黃加杏仁半升去皮尖二陳湯治脾胃虛弱中脘停痰或嘔吐噁心或頭目不清飲食少思等證乃諸痰主藥陳皮一錢五分半夏二錢五分白茯苓去皮二錢甘草八分加姜一錢煎服沉脈主病第十七沉脈主裡主寒主積有力痰食無力氣鬱沉遲虛寒沉數熱伏沉緊冷痛沉緩水蓄沉牢痼冷沉實熱極沉弱陰虛沉細痹濕沉弦飲痛沉滑宿食沉伏吐利陰毒聚積脈按之至骨曰沉對待浮表是曰主裡寒乃水寒積乃臟積總屬陰凝故見沉脈沉而有力有物在裡非痰即食痰宜用王隱君滾痰丸食宜用仲景大承氣湯之類沉而無力里原非實但氣不伸宜和劑四七湯河間正氣天香散之類沉為在裡而復遲虛寒可必宜仲景理中丸或附子理中湯之類沉為在裡而加數伏熱何疑宜寶鑑既濟解毒湯導赤散黃連解毒湯之類沉而緊則寒為斂實故冷痛也宜金匱烏頭煎和劑來復丹之類沉而緩則陽不健行故水蓄焉宜仲景五苓散苓桂朮甘湯之類沉而牢乃陰寒之滯著應當痼冷宜和劑來復丹大七香丸沉而實是陽氣之聚搏宜乎熱深宜仲景大承氣湯子和神芎丸之類沉為陰弱為虛沉弱必主陰虛宜金匱腎氣丸六味丸之類沉為里細為濕沉細定成痹濕宜金匱桂枝附子湯和劑滲濕湯或胃苓湯之類沉為陰弦為飲沉弦則飲停腹陰而時痛宜仲景小青龍湯五苓散之類沉為里滑為食沉滑則食宿腸里而難推宜仲景大承氣湯潔古枳朮丸丹溪保和丸之類沉已氣沉於骨伏則至骨如無勢甚篤危須分久暴暴則既吐且利而暴脫溫補可回宜和劑大七香丸仲景理中湯或藿香正氣散之類久則陰毒聚積之久阻峻攻莫愈宜枳實理中丸之類附方王隱君滾痰丸養生主論痰之為病成偏頭風成雷頭風成太陽頭痛眩暈如坐舟車精神恍惚或口眼瞤動或眉稜耳輪俱癢或頷腮四肢遊風腫硬似疼非疼或渾身燥癢搔之則癮疹隨生皮毛烘熱色如錦斑或齒頰似癢似痛而疼無定所滿口牙浮痛癢不一或噯氣吞酸鼻聞焦臭喉間豆腥氣心煩鼻塞咽嗌不利咯之不出咽之不下或因噴嚏而出或因舉動而唾其痰如墨又如破絮或如桃膠或如蜆肉或心下如停冰鐵閉滯妨悶噯嚏連聲狀如膈氣或寢夢刑戳刀兵劍戟或夢入人家四壁圍繞暫得一竇百計得出則不知何所或夢在燒人地上四面煙火枯骨焦氣撲鼻無路可出或不因觸發忿怒悲啼雨淚而寤或時郊行忽見天邊兩月交輝或見金方數道回頭無有或足膝痠軟或骨節腰腎疼痛呼吸難任或四肢肌骨間痛如擊戳乍起乍止並無常所或不時手臂麻疼狀如風濕或臥如芒刺不安或如毛蟲所螫或四肢不舉或手足重滯或眼如姜蜇膠黏癢澀開闔甚難或陰晴交變之時胸痞氣結閉而不發則齒癢咽痛口糜舌爛及其奮然而發則噴嚏連聲初則涕唾稠黏次則清水如注或眼前黑暗腦後風聲耳內蟬鳴眼瞤肉惕治之者或曰腠理不密風府受邪或曰上盛下虛或曰虛或曰寒或曰熱邪惟洞虛子備此疾若乃能治療病勢之來則胸腹間如有二氣交紐噎塞煩郁有如煙火上衝頭面烘熱眼花耳鳴痰涎涕淚並從肺胃間湧起凜燃毛豎噴嚏千百然後遍身煩躁則去衣凍體稍止片時或春秋乍涼之時多加衣衾亦得暫緩或頓飲冰水而定或痛飲一醉而寧終不能逐去病根乃得神祕沉香丸方屢獲大效愈人數萬但不欲輕傳匪人故以隱語括之詩曰甑里翻身甲帶金於今頭戴草堂深相逢二八求斤正硝煅青礞倍若沉十七兩中零半兩水丸梧子意須斟除驅怪病安心志水瀉雙身卻不任大黃蒸少頃翻過再蒸少頃即取出不可過黃芩各八兩青礞石硝煅如金色沉香百藥煎此用百藥煎乃得之方外祕傳蓋此丸得此藥乃能收斂周身頑涎聚於一處然後利下甚有奇功曰倍若沉者言五倍子與沉香非礞倍於沉之謂也以上各五錢上為末水丸如梧子大白湯食後空心服一切新舊失心喪志或癲或狂等證每服一百丸氣盛能食狂甚者加二十丸臨時加減消息之一切中風癱瘓痰涎壅塞大便或通或結者每服八九十丸或加至百丸永無祕結之患一切陽證風毒腳氣遍身遊走疼痛每服八九十丸未效加至百丸一切無病之人遍身筋骨疼痛不能名者或頭痛牙疼或搖或癢風蛀等證風寒鼻塞身體或疼或不疼非傷寒證者服八九十丸痰盛氣實者加之一切吞酸噯逆膈氣及胸中疼悶腹中氣塊衝上嘔沫吐涎狀如反胃心下恍惚如畏人捕怵惕不安陰陽關格變生乖證食飢傷飽憂思過慮心下嘈雜或痛或噦或晝夜虛飽或飢不喜食急慢喉閉赤眼每用加減服一切新舊痰氣喘嗽或嘔吐頭暈目眩加減服之一切腮頷腫硬若瘰癧者及口糜舌爛咽喉生瘡者每服六七十丸加蜜少許一處嚼碎噙化睡時徐徐咽之曾有口瘡者服二三十丸依前法噙之三二夜即瘥凡一切男婦大小虛實心疼連腹身體羸瘦發時必嘔緑水黑汁冷涎乃至氣絶心下溫暖者量虛實加減服之若事屬不虞之際至於百丸即便回生未至顛危者虛弱疑似之間只服三十丸或五十丸立見生意然後續續進之以瘥為度兼服生津化痰溫中理氣之藥一切荏苒疾病凡男婦患非傷寒內外等證或酒色過度或吐血或月事愆期心煩志亂或腹脹脅痛勞倦痰眩或暴行日中因暑伏痰口眼喎斜目痛耳瞶鼻塞骨節痠疼乾嘔噁心諸般內外疼痛百藥無效衆醫不識者依前法加減服之效大抵服藥須臨臥在床用熟水一口許咽下便臥令藥在喉膈間徐徐而下如日間病出不測疼痛不可忍必欲急除者須是一依前臥法服大半日不可服湯水及不可起身行坐言語直候藥丸除逐下焦痰滯惡物遇膈入腹然後動作方能中病每夜須連進二次次日痰物既下三五次者仍服前數下五七次或直下二三次而病勢頓已者次夜減二十丸頭夜所服並不下惡物者次夜加十丸人壯病實者多加至百丸惟候虛實消息之或服過仰睡咽喉稠黏壅塞不利者痰氣泛上乃藥病相攻之故也少頃藥力既勝自然寧帖往往病久結實於肺胃之間或則暴病全無泛濫者服藥下咽即仰臥頓然百骸安靜五臟清寧次早先去大便一次其餘遍數皆是痰涕惡物看甚麼糞用水攪之盡是痰片黏涎或稍稍腹痛腰腎拘急者蓋有一種頑痰惡物閉氣滯腸裡急後重者狀如痢疾片餉即已若有痰涎易下者快利不可勝言頓然滿口生津百骸爽快間有片時倦怠者蓋因連日病苦不安一時為藥力所勝氣體暫和如醉得醒如浴方出如睡方起此藥並不洞泄刮腸大瀉但取痰積惡物自腸胃次第而下腹中糟粕並不相傷其推下腸腹之糞則藥力所到之處是故先去其糞其餘詳悉不能盡述服者當自知之仲景大承氣湯此仲景以之下邪熱入里成痞滿燥實堅者後人用下腹中一應有餘積聚食物皆效但寒飲冷積不宜大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上微火一兩沸分溫再服得下余勿服仲景小承氣湯功力稍次於大承氣不甚堅硬燥結者宜之大黃四兩厚朴二兩枳實三枚上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣勿再服大七氣湯即和劑四七湯治喜怒不節憂思兼併多生悲恐致臟氣不平心腹脹滿半夏茯苓各四兩厚朴炒三錢紫蘇二錢上銼入姜煎服河間正氣天香散治九氣烏藥二兩香附末八兩陳皮蘇葉乾薑各一兩上為細末每服一錢匕鹽湯下仲景理中丸加附子二錢炒即名附子理中丸今人用為湯更捷治傷寒霍亂下利清穀感冒吐瀉一切脾胃虛寒中冷不食等證乾薑炮白朮炒甘草炙人參各二錢半水二鍾煎八分食前溫服寶鑑既濟解毒湯治上熱頭目赤腫而痛胸膈煩悶不得安臥身半以下皆寒足胻尤甚大便微祕大黃酒煨大便利勿用黃連酒炒黃芩酒炒甘草炙桔梗各二錢柴胡升麻連翹當歸身各一錢上㕮咀作一服水二鍾煎至一鍾去滓食後溫服忌醇酒濕面及生冷硬物錢氏導赤散治小腸伏熱小便赤澀或痛或手心熱或心煩動悸白濁等證生地黃木通甘草各等分上同為末每服三錢水一盞入竹葉七片同煎至五分食後溫服一本用黃芩不用甘草黃連解毒湯治下焦一切伏熱實熱或小便赤色而痛大便熱結腹中熱或大小便見血黃連七錢半黃柏梔子各半兩黃芩一兩每服五錢水一盞半煎至一盞去滓熱服未知再服金匱烏頭煎治寒疝繞臍㽲痛欲死及沉寒痼冷一切溫暖藥不能取效者宜此主之烏頭大者五枚熬去皮不㕮咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人服五合不瘥明日更服不可日再服和劑來復丹治上盛下虛裡寒外熱伏暑泄瀉嘔吐心腹疼痛等證硝石一兩同硫黃為末入瓷罐內以微火炒用柳篦攪不可火太過恐傷藥力再研極細名二氣末太陰玄精石研飛舶上硫黃透明者各一兩五靈脂水澄去砂曬乾青皮去白陳皮去白各二錢上用五靈脂二橘皮為末次入玄精石末及前二氣末拌勻好醋打糊為丸豌豆大每服三十丸空心米飲下印作錠子磨服更佳仲景五苓散傷寒論云太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之此蓋治汗後表不盡解渴多飲水水液復停服此解未盡之表一以行停中之水今人用為行飲利小便之常藥亦多效驗豬苓十八銖去皮澤瀉一兩六銖白朮十八錢茯苓十八銖桂枝半兩去皮上五味搗為末以白飲和服方寸匕日三服多飲暖水汗出愈和劑大七香丸治脾胃虛冷心膈噎塞漸成膈氣脾泄瀉利反胃嘔吐香附子二兩麥糵一兩丁香皮三兩半縮砂仁藿香官桂甘草陳皮各二兩半甘松烏藥各六錢半上十味為末蜜丸彈子大每服一丸鹽酒鹽湯任嚼下忌生冷肥膩物和劑小七香丸溫中快膈化積和氣治中酒嘔逆氣膈食噎茶酒食積小兒疳氣甘松八兩益智仁六兩香附子炒丁香皮甘草炙各十二兩蓬朮煨縮砂各二兩上為末蒸餅為丸緑豆大每服二十丸溫酒薑湯熱水任下神芎導水丸黃芩一兩黃連川芎薄荷各半兩大黃二兩滑石黑牽牛頭末各四兩河間制治一切熱證其功不可盡述設或久病熱鬱無問瘦痿老弱並一切證可下者始自十丸以為度常服此藥除腸胃積滯不傷和氣推陳致新得利便快並無藥燥騷擾亦不困倦虛損遂病人心意或熱甚必急須下者使服四五十丸未效再服以意消息常服二三十丸不動臟腑有益無損或婦人血病下惡物加桂半兩病微者常服甚者取利因而結滯開通惡物自下也凡老弱虛人脾胃經虛風熱所郁色黑齒槁身瘦萎黃或服甘熱過度成三消等病若熱甚於外則肢體躁擾病於內則神志躁動怫鬱不開變生諸證皆令服之惟臟腑滑泄者或裡寒脈遲者或婦人經病産後血下不止及孕婦等不宜服金匱腎氣丸見第十六六味丸見第十六金匱桂枝附子湯傷寒論云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此湯主之蓋亡陽脫液故見上證是湯和營衛以復陽若風寒濕痹等證用之亦妙桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚附子三枚上㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許半身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物和劑滲濕湯治寒濕所傷身體重著如坐水中小便赤澀大便溏泄蒼朮炒白朮炒甘草炙各一兩茯苓去皮乾薑炮各二兩橘紅丁香各二錢半每服四錢水一盞棗一枚姜三片煎七分食前去滓溫服胃苓湯治濕鬱小便不利胸腹脹悶或四肢沉重或飲食停中或濕鬱發黃或傷食泄瀉並一切山嵐瘴氣侵乘而成瘧痢者皆效蒼朮炒厚朴薑汁炒陳皮白朮茯苓各一錢半澤瀉豬苓各一錢甘草六分官桂五分上水加生薑煎服仲景小青龍湯見第十六潔古枳朮丸治痞積消食強胃海藏云本仲景枳朮湯也今易老改為丸治老幼虛弱飲食不化或臟腑軟弱者枳實去瓤麩炒一兩白朮二兩上為末荷葉裹燒飯為丸如桐子大每服五十丸白朮湯下服白朮者本意不取其食速化但久服令人胃氣強實不復傷也丹溪保和丸治食積酒積山楂肉二兩半夏薑製橘紅神麯麥芽炒白茯苓各一兩連翹萊蔔子炒黃連各半兩上為末滴水為丸加白朮二兩名大安丸藿香正氣散治外感風寒內停飲食頭痛寒熱或感濕暑霍亂泄瀉腳轉筋或作瘧疾常服除山嵐瘴氣桔梗大腹皮紫蘇葉茯苓厚朴制各一錢甘草炙五分藿香一錢五分白芷白朮陳皮去白半夏各一錢半上薑棗水煎熱服加香薷扁豆黃連名藿香湯枳實理中丸治寒實結胸茯苓人參白朮乾薑甘草各一兩枳實十六片上為細末煉蜜丸如雞子黃大每服一丸熱湯化下連進二三服
