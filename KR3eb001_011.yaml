body:
  text: 卷十一水病脈證第七十脈得諸沉責其有水浮氣與風沉石或里沉數為陽沉遲為陰浮大出厄虛小可驚據正文水氣有四曰氣水曰風水曰石水曰里水金匱要略多皮水正水黃汗無氣水里水而氣水里水又各突見一條於後豈以皮水即氣水與風水之脈皆浮者皆為表水而以正水石水黃汗之脈皆沉者皆為里水者乎其脈雖諸種不一而沉則在在皆兼即氣水風水之在表而脈應浮者亦必有沉沉欲下之勢蓋沉下者水之性也以狀言浮則以位言耳若沉而數乃為陽水證必兼陽而熱多沉而遲乃為陰水證必兼陰而寒多水脈浮大水氣渙散災厄將出之象水脈虛小則正衰邪存誠可驚也金匱要略曰風水其脈自浮外證骨節疼痛惡風又云脈浮而洪浮則為風洪則為氣風氣相搏風強則為癮疹身體為癢癢為泄風久為痂癩氣強則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗又云寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目窠上微腫如蠶新臥起狀其頸脈動時時咳按其手足上陷而不起者風水又云太陽病脈浮而緊法當骨節疼痛反不疼身體反重而痠其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水分腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為脾脹其狀如厥發汗即愈然諸病此者渴而下利小便數者皆不可發汗又云風水脈浮身重汗出惡風者防己黃耆湯主之腹痛加芍藥又云風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗又云皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之又云厥而皮水者蒲灰散主之正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之甘草麻黃湯亦主之又云心水者其身重而少氣不得臥煩而躁其人陰腫宜防己茯苓湯當歸散之類肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通宜分氣補心湯當歸散之類肺水者其身腫小便難時時鴨溏宜分氣香蘇飲導水茯苓湯之類脾水者其腹大四肢苦重津液不生但苦少氣小便難宜胃苓湯調胃白朮澤瀉散之類腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦宜金匱腎氣丸濟生腎氣丸之類又云寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分宜調榮散四制香附丸之類又云寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰氣通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分宜防己茯苓湯實脾飲復元丹之類又云氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻辛附子湯主之又云心下堅大如盤邊如旋盤水飲所作枳朮湯主之旋圓也杯高於盤盤大於杯此杯盤之異總皆水飲聚結又云水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯又云病者苦水面目四肢身體皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙臠當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相搏結在關元始時尚微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝喉咽塞噎脅下急痛醫以為留飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脅苦痛象如奔㹠其水揚溢則浮咳喘逆當先攻擊沖氣令止乃治咳咳止其喘自瘥先治新病病當在後總宜金匱腎氣丸又云趺陽脈當伏今反緊本自有寒疝癥腹中痛醫反下之下之即胸滿短氣又云趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水又云寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣又云寸口脈弦而緊弦則衛氣不行緊即惡寒水不沾流走於腸間又云少陰脈緊而沉緊則為痛沉則為水小便即難脈得諸沉當責有水身體腫重水病脈出者死脈出者脈出腎少陰之部水源泛濫而散欲其歸源不可得矣又云夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之又云病下利後渴飲水小便不利腹滿因腫者何也答曰此法當病水若小便自利及汗出者自當愈又云諸有水者腰以下腫當利小便腰以上腫當發汗乃愈以上金匱論水病之寒熱虛實表裡陰陽臟腑氣血雖有多種然約而言之總不外腎脾肺三臟為之原始也蓋腎居下焦屬水統攝陰液為水之宗本右為相火火以濟寒故水得以宣揚也脾居中焦屬土合肌肉為水之堤防主化谷生津津生不窮故水得以灌溉也肺居上焦屬金主氣為水之化源行榮衛而出治節故水得以通調也人或房室勞倦憂思恐懼飲食起居各以類傷其臟而臟氣虛虛則各失其職而水液之常道紊矣在腎則不能統攝宣揚而停蓄在脾則不能堤防灌溉而濫行在肺則不能生化通調而壅閉況脾與胃合胃又倚腎為關關門不利則水聚利則必由於氣化是肺又為腎關之所倚也故素問水熱穴論曰其本在腎其末在肺皆聚水也上仲景治水方法皆以脈證為本而後量其輕重虛實治之百無一失世俗淺醫欲求急效動以破氣去水為正治不知暫寬一二腫滿續至坐視其死者比比可勝悼哉後學當不厭其繁而一惟以靈素金匱為準斯得之矣準繩云腫病不一或遍身腫或四肢腫面腫腳腫皆謂之水氣然有陽水有陰水並可先用五皮飲或除濕湯加木瓜腹皮各半錢如未效繼以四磨飲遍身腫煩渴小便赤澀大便多閉此屬陽水輕宜四磨飲添磨生枳殼兼進保和丸重則疏鑿飲子利之以通為度亦有雖煩渴而大便已利者此不可更利宜用五苓散加木通大腹皮半錢以通小便遍身腫不煩渴大便自調或溏泄小便雖少而不赤澀此屬陰水宜實脾飲小便多少如常有時赤有時不赤至晚則微赤卻無澀滯者亦屬陰也不可遽補木香流氣飲繼進復元丹若大便不溏氣息脹滿宜四磨飲下黑錫丹四肢腫謂之肢腫宜五皮飲加薑黃木瓜各一錢或四磨飲或用白朮三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎至九分去滓溫服日三無時名大棗湯面獨腫蘇子降氣湯兼氣急者尤宜或煎熟去滓後更磨沉香一呷有一身之間惟面與雙腳浮腫早則面甚晚則腳甚經云面腫為風腳腫為水乃風濕所致須問其大小腸通閉別其陰陽二證前後用藥惟除濕湯加木瓜腹皮白芷各半錢可通用或以蘇子降氣湯除濕湯各半帖煎之羅謙甫導滯通經湯治面目手足浮腫感濕而腫者其身雖腫而腰下至腳尤腫腿脹滿尤甚於身氣或急或不急大便或溏或不溏但宜通利小便為佳煎五苓散吞木瓜丸內犯牽牛亦不可輕服間進除濕湯加木瓜腹皮各半錢炒萊蔔子七分半因氣而腫者其脈沉伏或腹脹或喘急宜分氣香蘇飲飲食所傷而腫或胸滿或噯氣宜消導寬中湯不服水土而腫者胃苓湯加味五皮湯有患生瘡用干瘡藥太早致遍身腫宜消風敗毒散若大便不通升麻和氣散若大便如常或自利當導其氣自小便出宜五皮飲加生料五苓散腹若腫只在下宜除濕湯和生料五苓散加木瓜澤瀉之類以上數條為有餘之證大病後浮腫此係脾虛宜加味六君子湯白朮三錢人參黃耆各一錢半白茯苓二錢陳皮半夏曲芍藥木瓜各一錢炙甘草大腹皮木香各五分薑棗煎服小便不利間入五苓散有脾肺虛弱不能通調水道者宜用補中益氣湯補脾肺六味丸補腎有心火克肺金不能生腎水以致小便不利而成水證者宜人參平肺散若腎經陰虧虛火爍肺金而小便不生者用六味地黃丸以補腎水用補中益氣湯以培脾土脾肺腎之氣交通則水穀自然克化二經既虛漸成水脹又誤用行氣分利之藥以致小便不利喘急痰盛已成蠱證宜加減金匱腎氣丸主之以上數條為不足之證不足者正氣不足有餘者邪氣有餘凡邪之所湊必正氣虛也故以治不足之法治有餘則可以治有餘之法治不足則不可潔古法如水腫因氣為腫者加橘皮因濕為腫者煎防己黃耆湯調五苓散因熱為腫者八正散如火熱燥肺為腫者乃絶水之源也當清肺除燥水自生矣於梔子豉湯中加黃芩如熱在下焦陰消使氣不得化者當益陰而陽氣自化黃柏黃連是也如水脹之病當開鬼門潔淨府也白茯苓湯主之白茯苓湯能變水白茯苓澤瀉各二兩郁李仁五錢水一碗煎至一半生薑自然汁入藥常服無時從少至多服五七日後覺腹下再腫治以白朮散白朮澤瀉各半兩為末煎服三錢或丸亦可煎茯苓湯下三十丸以黃耆芍藥建中湯之類調養之平復後忌房室豬魚鹽面等物香茹熬膏丸如桐子大每服五丸日三漸增以小便利為度冬瓜不限多少任吃鯉魚一頭重一斤以上者煮熟取汁和冬瓜蔥白作羹食之青頭鴨或白鴨治如食法細切和米並五味煮熟作粥食之宜空腹時進昔人論水病知經義者固惟仲景一人近世何柏齊張景嶽二論亦庶幾焉故附録於下柏齊曰造化之機水火而已宜平不宜偏宜交不宜分水為濕為寒火為燥為熱火性炎上水性潤下故火宜在下水宜在上則易交也交則為既濟不交則為未濟不交之極則分離而死矣消渴證不交而火偏盛也水氣證不交而水偏勝也制其偏而使之交則治之之法也小火不能化大水故必先瀉其水後補其火開鬼門瀉在表在上之水也潔淨府瀉在裡在下之水也水勢既減然後用暖藥以補元氣使水火交則用藥之次第也又云盧氏以水腫隸肝腎胃而不及脾丹溪非之似矣然實則皆非也蓋造化生物天地水火而已矣主之者天也成之者地也故曰乾知太始坤作成物至於天地交合變化之用則水火二氣也天運水火之氣於地之中則物生矣然水火不可偏盛太旱物不生火偏盛也太潦物亦不生水偏盛也水火和平則物生矣此自然之理也人之臟腑以脾胃為主蓋飲食皆入於胃而運以脾猶地之土也然脾胃能化食與否實由於水火二氣非脾胃所能也火盛則脾胃燥水盛則脾胃濕皆不能化物乃生諸病水腫之證蓋水盛而火不能化也火衰則不能化水故水之入於脾胃者皆滲入血脈骨肉血亦化水肉發腫脹皆自然之理也導去其水使水少減復補其火使二氣平和則病去矣丹溪謂脾失運化由肝木侮脾乃欲清心經之火使肺金得令以制肝木則脾土全運化之職水自順道乃不為腫其詞迂而不切故書此辨之景嶽曰愚按腫脹一證觀靈樞脹論之義則五臟六腑無不有之再考諸篇如脈要精微論曰胃脈實氣有餘則脹邪氣臟腑病形篇曰胃病者腹䐜脹胃脘當心而痛本神篇曰脾氣實則腹脹涇溲不利陰陽應象大論曰濁氣在上則生䐜脹此皆實脹也太陰陽明論曰飲食起居失節入五臟則䐜滿閉塞經別篇曰足太陰之別公孫虛則鼓脹皆虛脹也經脈篇曰胃中寒則脹滿異法方宜論曰臟寒生滿病風論曰胃風膈塞不通腹善脹失衣則䐜脹此皆寒脹也陰陽別論曰二陰一陽發病善脹心滿診要經終論曰手少陰終者腹脹閉足太陰終者腹脹閉此心脾受傷之脹也此外如六元正紀至真要大等論有云太陰所至為身重胕腫及土鬱之發太陰之初氣太陰之勝復皆濕勝之腫脹也有曰水運之太過有曰寒勝則浮有曰太陽之司天太陽之勝復皆寒勝之腫脹也有曰少陰之司天少陰之勝復少陽之司天少陽之勝復有曰熱勝則腫皆火勝之腫脹也有曰厥陰之司天在泉厥陰之復有曰陽明之復是皆水邪侮土及金氣反勝之腫脹也觀此則不惟五臟六腑即五運六氣亦無不皆有是病然至真要大論曰諸濕腫滿皆屬於脾水熱穴論曰其本在腎其末在肺皆聚水也又曰腎者胃之關也關門不利故聚水而從其類也由此言之則諸經雖皆有脹然無不關於脾肺腎三臟蓋脾屬土主運化肺屬金主氣腎屬水主五液凡五氣所化之液悉屬於腎五液所行之氣悉屬於肺轉輸於二臟之中以制水生金者悉屬於脾所以腫脹之生無不由此三者但證有陰陽虛實如諸論之所云者不可不辨大都陽證多熱熱者多實陰證多寒寒者多虛先脹於內而後及於外者多實先腫於表而後甚於里者多虛小便黃赤大便祕結者多實小水清白大便稀溏者多虛脈滑數有力者多實弦浮微細者多虛形色紅黃氣息粗長者多實容顏憔悴音聲短促者多虛凡是實證必由六淫有餘傷其外或飲食怒氣傷其內故致氣道不行三焦壅閉此則多在氣分無處不到故不分部位而多通身浮腫又或氣實於中則為單腹脹急然陽邪急速其至必暴每成於旬日數日之間此惟少壯者多有之但破其結氣利其壅滯則病無不愈此治實之道也若是虛證必由五志積勞或酒色過度傷其脾腎日積月纍其來有漸此等病候多染於中年之外其形證脈氣必有虛寒之候顯然可察非若實證之暴至而邪熱壅結肝氣悍逆之有因也治實者本無所難最難者在治虛耳然虛有在氣者有在水者在氣者以脾氣虛寒不能運化所謂氣虛中滿者是也在水者以脾虛不能制水則寒水反侮脾土泛濫為邪其始也必從陰分漸次而升按肉如泥腫有分界所謂水鼓水脹者是也然水雖制於脾而實主於腎蓋腎本水臟而元陽生氣所由出若腎中陽虛則命門火衰既不能自制陰寒又不能溫養脾土陰陽不得其正則化而為邪夫氣即火也精即水也氣之與水本為同類但在於化與不化耳故陽旺則化而精能為氣陽衰則不化而水即為邪凡火盛水虧則病燥水盛火虧則病濕故火不能化則陰不從陽而精氣皆化為水所以水腫之證多屬陽虛故曰寒脹多熱脹少也然觀丹溪之治腫脹云清濁相混隧道壅塞而為熱熱留為濕濕熱相生遂成脹滿治宜補其脾又須養肺金以制木使脾無賊邪之患滋腎水以制火使肺得清化之令其說重在濕熱而猶以制火為言夫制火固可保金獨不慮其不生土乎若以此法施於陽實而熱者則可若以治陽虛而氣不化者豈不反助陰邪而益其病哉故豫之治此必察其果系實邪則直清陽明除之極易凡屬虛勞內損者多從溫補脾腎而愈俱得復元或臨證之際有虛實未明疑似難決者則寧先以治不足之法探治有餘若果未投而病反加甚是不宜補也不妨易轍自無大害倘藥未及病而病自甚者其輕重真假仍宜詳察若誤以治有餘之法治不足而曾經峻攻者真氣復傷雖神丹不能療矣或從清利暫見平復使不大補脾腎以培根本雖愈目前未有不危亡踵至者此治虛之道也夫腫脹之病多有標實本虛最為危候若辨之不明則禍人非淺附方仲景防己黃耆湯見第六十七仲景越婢湯加朮四兩即越婢加朮湯麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩水六升先煮麻黃去上沫內諸藥煮三升分溫三服防己茯苓湯防己黃耆桂枝各三兩茯苓六兩甘草二兩水六升煮二升分溫三服蒲灰散蒲灰一兩七錢半滑石五錢上杵為散飲服方寸匕日二服甘草麻黃湯甘草二兩麻黃四兩水五升先煮麻黃去上沫內甘草煮三升溫服一升重覆汗出不汗再服慎風寒當歸散水腫之疾多由腎氣不能攝養心火心火不能滋養脾土故土不制水水氣盈溢氣脈閉塞滲透經絡發為浮腫心腹堅脹喘滿不安當歸桂心木香赤茯苓木通檳榔赤芍藥牡丹皮陳皮白朮各一錢三分水二鍾紫蘇五葉木瓜一片煎一鍾不拘時服分氣補心湯治心氣鬱發為四肢浮腫上氣喘急木通川芎前胡去苗大腹皮泡青皮白朮枳殼麩炒甘草炙各一錢香附去毛炒白茯苓桔梗各一錢半細辛木香各五分水二鍾姜三片紅棗二枚煎一鍾食前服分氣香蘇飲桑白皮炒陳皮茯苓大腹皮香附炒各一錢紫蘇一錢半桔梗枳殼各八分草果仁七分五味子十五粒水二鍾姜三片煎八分入鹽少許食前服導水茯苓湯治水腫頭面手足遍身腫如爛瓜手按而陷手起隨高喘滿倚息不能轉側不能倒臥飲食不下小便祕澀溺出如割或如黑豆汁諸藥不效用此即愈赤茯苓麥門冬去心澤瀉白朮各三兩桑白皮紫蘇檳榔木瓜各一兩大腹皮陳皮砂仁木香各七錢半上㕮咀每服半兩水二盞燈草二十五根煎八分去滓空心服如病重者可用藥五兩再加去心門冬二兩燈草半兩水一斗於砂鍋內熬一大碗再下小銚內煎至一大盞五更空心服滓再煎服連進三服小水自利一日添如一日胃苓湯見第十七元戎調胃白朮澤瀉散治痰病化為水氣傳為水鼓不能食白朮澤瀉芍藥陳皮茯苓生薑木香檳榔各等分上為末水煎服一法加白朮治臍腹上腫如神心下痞者加枳實下盛者加牽牛金匱八味丸見第十六濟生腎氣丸治腎虛脾弱腰重腳腫小便不利或肚腹腫脹或喘急痰盛已成蠱證其效如神此證多因脾胃虛弱治失其宜元氣復傷而變者非此不救熟地黃四兩薯蕷一兩山茱萸一兩澤瀉一兩茯苓三兩牡丹皮一兩肉桂一兩附子炮五錢牛膝一兩車前子一兩上末煉蜜丸如桐子大每服七八十丸空心米飲下調榮飲治瘀血留滯化為水四肢浮腫皮肉赤紋名血分蓬朮川芎當歸延胡索白芷檳榔陳皮赤芍藥桑白皮炒大腹皮赤茯苓葶藶炒瞿麥各一錢大黃一錢半細辛官桂甘草炙各五分作一服水二鍾姜三片紅棗二枚煎一鍾食前服四制香附丸治婦人女子經候不調香附浸去皮一斤分作四分酒浸一分鹽水浸一分童便浸一分醋浸一分各三日焙乾上為細末醋糊丸如桐子大每服七十丸空心食前溫酒下香附子血中之氣藥也開鬱行氣而血自調何病不瘳婦人宜常服之濟生實脾飲治陰水發腫用此先實脾土厚朴去皮薑製白朮木瓜去瓤大腹子附子炮木香不見火草果仁白茯苓去皮乾薑炮各一兩甘草炙半兩上㕮咀每服四錢水一盞姜五片棗一枚煎七分不拘時溫服復元丹見第六十四桂枝去芍藥加麻黃附子細辛湯桂枝生薑各三兩甘草一兩大棗十二枚麻黃細辛各二兩附子一枚炮上以水七升先煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈金匱枳朮湯枳實七枚白朮二兩上㕮咀以水五升煮取三升分溫三服腹中軟即當散也麻黃附子湯麻黃三兩甘草二兩附子一枚炮水七升先煮麻黃去上沫內二味煮取二升半溫服八合日三服葶藶丸治肺氣咳嗽面目浮腫喘促不安小便赤色甜葶藶隔紙炒貝母煨黃色木通各一兩杏仁去皮尖雙仁炒防己各二兩為末棗肉丸如桐子大每服五十丸桑皮煎湯食前下和劑五皮散治風濕客於脾經氣血凝滯致面目虛浮四肢腫滿心腹膨脹上氣喘急兼治皮水妊娠胎水五加皮地骨皮生薑皮大腹皮茯苓皮各等分一方加白朮磨沉香木香入服上㕮咀每服三錢水一盞煎七分熱服無時除濕湯見第二十一濟生四磨湯治七情感傷上氣喘悶不食人參檳榔沉香天台烏藥上四味各濃磨水取七分煎三五沸放溫空心服或下養正丹尤佳濟生疏鑿飲子治水氣浮腫喘急煩躁多渴大小便不利服熱藥不得者澤瀉商陸赤小豆炒羌活去蘆大腹皮椒目木通秦艽去蘆茯苓皮檳榔各等分上㕮咀每四錢水一盞姜五片煎七分空心服五苓散見第十七和劑木香流氣飲治諸氣痞塞不通胸膈膨脹面目虛浮四肢腫滿口苦咽乾大小便祕半夏湯洗七次焙二兩青皮去白厚朴薑製去粗皮紫蘇去梗香附子去毛炒甘草炙各一斤陳皮去白二斤肉桂去粗皮不見火蓬莪朮煨丁香皮不見火草果仁各六兩木通去節八兩藿香葉白芷赤茯苓去皮白朮乾木瓜人參去蘆石菖蒲各四兩上㕮咀每服四錢水一盞半姜三片棗二枚煎七分熱服和劑黑錫丹治痰氣壅塞上盛下虛心火炎盛腎水枯竭一應下虛之證及婦人血海久冷無子赤白帶下沉香胡蘆巴酒浸炒附子炮陽起石研細水飛各一兩肉桂半兩破故紙舶茴香炒肉豆蔻麵裹煨木香金鈴子硫黃黑錫去滓稱各二兩上用黑盞或新鐵銚內如常法結黑錫硫黃砂子地上出火毒研極細余藥細末和勻自朝至暮以研至黑光色為度酒糊丸如桐子大陰乾入布袋內擦令光瑩每四十丸空心鹽薑湯或棗湯下女人艾棗湯下和劑蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛胸膈噎塞並久年肺氣至效紫蘇子炒半夏湯泡各二錢半前胡去蘆甘草炙厚朴去皮薑製炒陳皮去白各一錢川當歸去蘆一錢半沉香七分水二鍾姜三片煎一鍾不拘時服虛冷人加桂五分黃耆一錢寶鑑導滯通經湯治脾濕有餘及氣不宣通面目手足浮腫木香白朮桑白皮陳皮茯苓各等分上㕮咀每五錢水二盞煎一盞去滓溫服空心食前內經云濕淫所勝平以苦熱以苦燥之以淡泄之陳皮苦溫理肺氣去氣滯故以為主桑皮甘寒去肺中水氣水腫臚脹利水道故以為佐木香苦辛溫除肺中滯氣白朮苦甘溫能除濕和中以苦燥之白茯苓甘平能止渴除濕利小便以淡滲之故以為使也和劑木瓜丸治腎經虛弱下攻腰膝沉重少力腿腳腫癢疰破生瘡腳心癮痛筋脈拘攣或腰膝緩弱步履艱難舉動喘促面色黧黑大小便祕澀飲食減少無問久新並宜服之熟地黃洗焙陳皮去白烏藥各四兩黑牽牛炒三兩石楠藤杏仁去皮尖當歸蓯蓉酒浸焙乾木瓜續斷牛膝酒浸各二兩赤芍藥一兩上為細末酒糊為丸如桐子大空心木瓜湯吞三五十丸溫酒亦得消導寬中湯白朮一錢五分枳實麩炒厚朴薑製陳皮半夏山楂肉茯苓神麯炒麥芽炒蘿蔔子炒各一錢水二鍾姜三片煎八分小便不利加豬苓澤瀉加味五皮湯即五皮散腳腫加五加皮木瓜防己不服水土入胃苓湯消風敗毒散人參獨活柴胡桔梗枳殼麩炒羌活茯苓川芎前胡甘草荊芥防風各一錢水二鍾姜三片煎八分食遠服和劑升麻和氣散乾薑五分乾葛一兩大黃蒸半兩熟枳殼五分桔梗熟蒼朮升麻各一兩芍藥七錢半陳皮甘草各一兩半當歸熟半夏白芷茯苓各二錢每服四錢水一盞姜三片燈心十莖煎七分食前溫服補中益氣湯見第三十九六味丸見第十六東垣人參平肺散治肺受熱而喘桑白皮炒二錢知母一錢半甘草炙茯苓人參地骨皮天門冬去心各一錢青皮陳皮各六分五味子三十粒捶碎水二鍾生薑五片煎一鍾食遠溫服如熱加黃芩薄荷葉各一錢八正散見第四十九梔子豉湯梔子十四枚炒香豉四合傷寒汗吐下後虛煩不得眠心中懊憹者此方主之汗吐下之後正氣不足邪氣乘虛而結於胸中故煩熱懊憹煩熱者煩擾而熱懊憹者懊惱憹悶也梔子味苦能湧吐熱邪香豉氣腐能剋制熱勢所謂苦勝熱腐勝焦也是方也唯吐無形之虛煩則可若用之以去實則非梔子所能宣矣宣實者以瓜蒂散主之
