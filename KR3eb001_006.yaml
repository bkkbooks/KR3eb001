body:
  text: 卷六勞極脈證第五十一勞極諸虛浮軟微弱土敗雙弦火炎急數勞極者五勞六極也巢氏病源云五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞瘦當是肝勞又云肺勞者短氣而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛陰濕囊生瘡小腹滿急此五勞各見五臟氣化及經絡諸證亦甚明顯但與前五勞不甚符合姑存此俟再考也六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言宜四君子湯補中益氣湯參朮膏之類二曰血極令人無顏色眉發墮落忽忽喜忘宜四物湯六味丸八珍湯聖愈湯之類三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立宜四物湯聖愈湯濟生續斷湯木瓜散之類四曰骨極令人痠削齒苦痛手足煩疼不可以立不欲行動宜六味丸鹿角丸保命金剛丸丹溪虎潛丸之類五曰肌極令人羸瘦無潤澤飲食不生肌膚宜四君子湯保命黑地黃丸資生丸之類六曰精極令人少氣吸吸然內虛五臟氣不足發毛落悲傷喜忘宜六味丸還少丹龜鹿膠之類是即五臟所合之病虛損而至於極處者也腎則多一精極故為六極其證與五臟配合甚為有理此巢氏之三昧論也諸虛者言一切虛損不足即五勞六極更有七傷俱該在內巢氏云七傷者一曰陰寒二曰陰痿三曰裡急四曰精連連五曰精少陰下濕六曰精清七曰小便苦數臨事不卒又云七傷者一曰大飽傷脾脾傷善噫欲臥面黃宜資生丸保和丸平胃散之類二曰大怒氣逆傷肝肝傷少血目暗宜四物湯元戎逍遙散之類三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷宜黑地黃丸腎著湯八味丸寶鑑天真丹之類四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴宜小青龍湯麻黃湯之類五曰憂愁思慮傷心心傷苦驚喜忘善怒宜天王補心丸硃砂安神丸朱雀丸之類六曰風雨寒暑傷形形傷髮膚枯夭宜人參養榮湯之類七曰大恐懼不節傷志言大恐懼而不節於欲也志傷恍惚不樂宜天王補心丸安神丸之類是云七傷亦合於五臟但多一形志故云七傷較前所云七傷此為得理蓋前七傷大抵俱屬腎證人身感疾觸處可傷豈獨一腎若云腎有七傷則可正文不言七傷而注録者欲其便於查考耳夫勞極損傷氣血日耗形體漸衰所見之脈隨病呈象如空虛之浮不鼓之軟欲絶之微無力之弱雖云病脈然與病猶相宜也至若雙弦乃知土敗急數定為火炎蓋弦為肝木雙弦則木太盛久病之土何堪其侮故知其必敗也數已為熱急數則躁疾直強略無半點和柔邪火炎炎真陰自絶兩皆不治之證附方四君子湯見第十六補中益氣湯見第三十九參朮膏治中風虛弱諸藥不應或因用藥失宜耗散元氣虛證蜂起但用此藥補其中氣諸證自愈人參白朮各等分上水煎稠收膏湯化服之四物湯見第二十一六味丸見第十六八珍湯見第十六聖愈湯治一切失血或血虛煩渴躁熱睡臥不寧或瘡證膿水出多五心煩熱作渴等證熟地黃生者自制生地黃當歸酒拌各一錢人參黃耆炒川芎各二錢上水煎服濟生續斷湯治肝勞虛寒脅痛脹滿攣縮煩悶眼昏不食川續斷酒浸川芎當歸酒浸去蘆陳皮去白半夏制乾薑炮各一兩肉桂不見火炙甘草各半兩㕮咀每服四錢水一盞姜五片煎服無時木瓜散治筋虛極腳手拘攣十指甲痛數轉筋甚則舌卷卵縮唇青面黑木瓜去子虎脛骨酥炙五加皮洗當歸酒浸桑寄生酸棗仁炒人參柏子仁黃耆各一兩炙甘草一兩煎服法同前鹿角丸治骨虛極面腫垢黑脊痛不能久立血氣衰憊發落齒枯甚則喜唾鹿角二兩牛膝酒浸焙去蘆一兩半上為細末煉蜜丸如梧子大每服七十丸空心鹽湯下保命金剛丸治腎損骨痿不能起於床宜服此益精萆薢杜仲炒去絲蓯蓉酒浸菟絲子酒浸各等分上為細末酒煮豬腰子搗和丸如桐子大每服五七十丸空心用溫酒送下丹溪虎潛丸龜版黃柏各四兩知母熟地黃各二兩牛膝三兩半芍藥一兩半鎖陽虎骨酥炙當歸各一兩陳皮七錢半乾薑半兩上為末酒糊丸加附子治痿厥如神保命黑地黃丸加五味子為腎氣丸治陽盛陰衰脾胃不足房室虛損形瘦無力面多青黃而無常色此補氣益胃之劑也蒼朮一斤泔浸熟地黃一斤酒蒸搗如泥五味子半斤乾薑秋冬一兩夏半兩春五錢上為細末棗肉丸如桐子大食前米飲或酒服百丸治血虛久痔甚妙經云腎苦燥急食辛以潤之此藥開腠理生津液通氣又五味子酸以收之此雖陽盛而不燥熱乃是五臟虛損於內故可益血收氣此藥類象神品方也資生丸健脾開胃消食止瀉調和臟腑滋養榮衛王肯堂先生曰余初識繆仲淳時見袖中出彈丸咀嚼問之曰此得之祕傳飢者服之即飽飽者服之即飢因疏其方余大善之而頗不信其消食之功已於飢飽後頓服二丸徑投枕臥夙興了無停滯始信此方之神也先恭簡年高脾弱食少痰多余齡葆攝全賴此方因特附著於此與世共之白朮米泔水浸用山黃土拌蒸九次曬九次去土切片焙乾三兩人參去蘆人乳浸透飯鍋上蒸熟三兩白茯苓去粗皮水飛去筋膜人乳拌飯鍋上蒸熟曬乾一兩五錢橘紅山楂肉炒神麯炒各二兩川黃連薑汁炒白豆蔻仁微炒澤瀉去毛炒各三錢半桔梗米泔浸炒真藿香洗甘草蜜炙去皮各五錢白扁豆去殼炒蓮肉去心皮各一兩薏苡仁淘淨炒三兩乾山藥炒麥芽面炒芡實淨肉炒各一兩五錢末之煉蜜丸每丸二錢重每服一丸醉飽後二丸細嚼淡薑湯下楊氏還少丹大補心腎脾胃一切虛損神志俱耗筋力頓衰腰腳沉重肢體倦怠血氣羸乏小便渾濁乾山藥牛膝酒浸遠志去心山茱萸去核白茯苓去皮五味子巴戟酒浸去心肉蓯蓉酒浸一宿石菖蒲楮實杜仲去粗皮薑汁酒拌同炒斷絲舶茴香各一兩枸杞子熟地黃各二兩此據寶鑑所定考楊氏原方山藥牛膝各一兩半茯苓茱萸楮實杜仲五味巴戟蓯蓉遠志茴香各一兩菖蒲地黃枸杞各半兩上為細末煉蜜同棗肉為丸如桐子大每服三十丸食前溫酒或鹽湯下日三服五日覺有力十日精神爽半月氣壯二十日目明一月夜思飲食冬月手足常暖久服令人身體輕健筋骨壯盛悅澤難老更看體厚加減如熱加山梔一兩心氣不寧加麥門冬一兩少精神加五味子一兩陽弱加續斷一兩常服固齒無瘴瘧婦人服之容顏悅澤暖子宮去一切病龜膠治諸虛百損精少髓枯腎衰水道竭乏血液乾涸一切陰不足之證龜殼十斤或數十斤水浸五七日視上黑皮浮起即取刮淨純白如灼過以刀剜去焦跡再洗淨石臼中搗碎入瓷壇中包固再坐大鍋中隔水煮水乾旋以溫水添足不斷火一二晝夜視版酥爛汁稠濾去版滓將汁入錫鍋中或瓷鍋桑火緩緩熬收不住攪動至滴水不散用銅杓兜入瓷器中冷即成餅每服不拘多少滾水溫酒任化下鹿膠治陽衰形羸體瘦少氣困乏力減神疲或精冷無子及一切虛寒陽不足之證嫩鹿角不拘多少寸截浸水數日去粗皮隔水煮如龜版法服法亦同但角堅硬必煮一日方搗碎再入壇煮收如上俱宜臘月水煮庶膠經久不臭若二膠合服陰陽兩補更妙也丹溪保和丸見第十七平胃散見第四十四元戎逍遙散治血虛勞倦五心煩熱肢體疼痛頭目昏重心怔頰赤口燥咽乾發熱盜汗減食嗜臥及血熱相搏月水不調臍腹脹痛寒熱如瘧又療室女榮衛不和痰嗽潮熱肢體羸瘦漸成骨蒸加山梔牡丹皮名加味逍遙散白茯苓去皮白朮炒當歸白芍藥炒柴胡各一兩甘草半兩上㕮咀每服四錢水一鍾煨生薑一塊切片煎至六分去滓熱服無時腎著湯見第二十一金匱腎氣丸見第十六寶鑑天真丹治上焦陽虛沉香穿心巴戟酒浸茴香炒萆薢酒浸炒胡蘆巴炒香破故紙炒香杜仲麩炒去絲琥珀黑牽牛鹽炒去鹽各一兩官桂半兩上十味為末用清酒打糊為丸如桐子大每服五十九空心溫酒送下鹽湯亦可仲景小青龍湯見第十六仲景麻黃湯見第十六天王補心丸寧心保神益血固精壯力強老令人不忘除怔忡定驚悸清三焦化痰涎祛煩熱療咽乾育養心神人參去蘆五錢當歸酒浸五味子麥門冬去心天門冬去心柏子仁酸棗仁各一兩白茯苓去皮玄參丹參桔梗遠志各五錢生地黃四兩黃連酒洗炒二兩上為末煉蜜丸如桐子大硃砂為衣每服二三十丸臨臥燈草竹葉煎湯下硃砂安神丸見第十九朱雀丸百一治心腎不交心神不定事多健忘沉香半兩茯神二兩上為細末蜜丸如小豆大飛硃砂為衣每服二十丸食後用人參湯下和劑人參養榮湯治脾肺俱虛發熱惡寒肢體瘦倦食少作瀉等證若氣血虛而變見諸證勿論其病勿論其脈但服此湯其病悉退白芍藥陳皮人參黃耆蜜炙桂心當歸白朮甘草炙各一錢熟地黃五味子炒杵白茯苓去皮各七分半遠志去心五分上薑棗水煎服失血脈證第五十二諸病失血脈必見芤緩小可喜數大可憂衛行脈外榮行脈中凡失血之病脈中必空故見芤象若緩小不足與病相宜是可喜也脈數而大邪盛正衰且為火象必爍真陰誠為大可憂者瘀血脈證第五十三瘀血內蓄卻宜牢大沉小澀微反成其害血蓄於內瘀凝不行瘀凝則脈大不行則脈牢亦因病呈象也逐之使去巢穴一空而致新不難矣宜桃仁承氣湯或丹皮紅花之類設脈沉小澀微是病有餘而脈反不足病有物而脈若無物雖云瘀血亦不過著於經絡如仲景所云榮衛氣傷內有乾血之類似非瘀蓄於一處者故脈見如斯補之有礙逐之不能是反成其害也宜大黃䗪蟲丸附方仲景桃核承氣湯見第二十仲景大黃䗪蟲丸結在內者手足脈必相失宜此方然必兼大補劑瓊玉膏之類服之大黃十分古以二錢半為一分當是二兩半蒸黃芩二兩甘草三兩桃仁一升杏仁去皮尖一升地黃十兩芍藥四兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升䗪蟲半升上十二味末之煉蜜為丸小豆大酒飲服五丸日三服精濁脈證第五十四遺精白濁微澀而弱火盛陰虛芤濡洪數腎主藏精欲後方為施泄今或念動即出或無欲自遺此皆腎虛不能藏攝故耳宜知柏八味丸河間祕真丸豬肚丸之類白濁者小便色白而濁亦為腎虛胞冷不能分清所致宜清心蓮子飲萆薢分清飲之類形屬精液證屬脫亡脈安得不微澀而弱也設見芤濡洪數之脈芤濡固為陰虛而洪數實因火盛火盛則精遺火盛則便濁似與腎之虛胞之寒而不能藏不能別者大徑庭矣臨診可忽乎故宜六味丸導赤散六一散之類附方知柏八味丸即六味丸加知母黃柏河間祕真丸治白淫小便不止精氣不固或有餘瀝及夢寐陰人通泄龍骨一兩大訶子皮五枚縮砂仁半兩硃砂一兩研細留一分為衣上為末麵糊丸緑豆大每服一二十丸空心溫酒熱水任下不可多服豬肚丸治醉飽後遺精神效牡蠣煅另研極細白朮各四兩苦參三兩豬肚一具煮極爛去油膜搗如泥上前三味搗篩極細同豬肚搗數百杵令極勻燥略增肚汁丸如桐子大每服五十丸空心米飲送下不但治遺滑即勞瘦者亦能肥也清心蓮子飲見第四十九萆薢分清飲治真元不固不時白濁或小便頻數凝如膏糊等證益智仁川萆薢石菖蒲烏藥各等分上㕮咀每服四錢水一盞入鹽一捻煎七分食前溫服一方加茯苓甘草六味丸見第十六錢氏導赤散見第四十九六一散見第四十四三消脈證第五十五三消之脈浮大者生細小微澀形脫可驚三消者上中下也渴而多飲為上消素問氣厥論謂之膈消宜金匱豬苓湯人參白虎湯子和加減三黃丸涼膈散酒煮黃連丸六一散之類消穀善飢為中消素問脈要精微論謂之消中宜酒煮黃連丸大黃黃連瀉心湯山梔黃連之類渴而便數有膏為下消素問氣厥論謂之肺消飲一溲二後人又謂之腎消宜六味丸固本丸知柏八味丸之類婁全善亦云腎消者飲一溲二其溲如膏油即膈消消中之傳變總不外火爍真陰津液燥竭自古論之者多矣惟劉河間張戴人二論辭義暢達最為中綮茲録於下河間曰五臟六腑四肢皆稟氣於脾胃行其津液以濡潤養之然消渴之病本濕寒之陰氣極衰燥熱之陽氣太盛故也治當補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚濟身中津液之衰使道路散而不結津液生而不枯氣血和而不澀則病自已矣況消渴者因飲食服餌之失宜腸胃乾涸而氣不得宣平或精神過違其度而耗亂之或因大病陰氣損而血液衰虛陽慓悍而燥熱鬱甚之所成也若飲水多而小便多名曰消渴若飲食多不甚渴小便數而消瘦者名曰消中若渴而飲水不絶腿消瘦而小便有脂液者名曰腎消一皆以燥熱太甚三焦腸胃之腠理怫鬱結滯緻密壅滯復多飲於中終不能浸潤於外榮養百骸故渴不止小便多出或數溲也戴人之論則曰火能消物燔木則為炭燔金則為液燔石則為灰煎海水則為鹽鼎水則干人之心腎為君火三焦膽為相火得其平則烹煉飲食糟粕去焉不得其平則燔灼臟腑而津液耗焉夫心火甚於上為膈膜之消甚於中為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚不已則消及於脾下甚不已則消及於肝腎外甚不已則消及於筋骨四臟皆消盡則心始自焚而死矣故知消渴一證調之而不下則小潤小濡固不能殺炎上之勢下之而不調亦旋飲旋消終不能沃膈膜之干下之調之而不減滋味不戒嗜欲不節喜怒則病已而復作能從此三者消渴亦不足憂矣二公此論消渴之因證可謂既明且悉不煩再解但其脈浮大者尚屬瀰漫寬散前河間云使道路散而不結津液生而不枯氣血和而不澀則病自已矣然非瀰漫寬散之氣機不能得此不結不枯不澀之病機耳故云浮大者生若脈細小浮澀則氣血之虛衰枯槁不言可知再加身體瘦悴是謂形脫即戴人所云木為炭金為液石為灰水為鹽鼎水乾之義形氣兩敗豈直可驚已哉附方金匱豬苓湯治發熱渴欲飲水小便不利豬苓茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服仲景人參白虎湯見第四十三子和加減三黃丸治丹石毒及熱渴以意測度須大實者方用黃芩春四兩夏秋六兩冬三兩大黃春三兩夏一兩秋二兩冬四兩黃連春四兩夏七兩秋三兩冬二兩上為末煉蜜丸如桐子大每服十丸服一月病愈和劑涼膈散見第十九和劑酒煮黃連丸治伏暑發熱嘔吐噁心並治膈熱解酒毒厚腸胃黃連去須十二兩好酒五斤上將黃連以酒煮乾研為末滴水丸如桐子大每服三五十丸空心熱水送下六一散見第四十四大黃黃連瀉心湯治太陽病發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽血氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治若色微黃手足溫者易愈心下痞按之濡其脈關上浮者大黃二兩黃連一兩加黃芩為伊尹三黃湯上銼如麻豆沸湯二升漬之須臾絞去滓分溫再服六味丸見第十六固本丸葉氏加人參名人參固本丸夫心生血血生氣氣生精精盛則鬚髮不白容貌不衰今人滋補血氣多用性熱之藥殊非其治此方蓋用生地黃能生精血用天門冬引入所生之地熟地黃能補精血用麥門冬引入所補之地又以人參能通心氣使五味並歸於心生地黃洗熟地黃洗再蒸天門冬去心麥門冬去心各一兩上為末煉蜜丸如桐子大空心溫酒或鹽湯下三十丸知柏八味丸見第五十四小便淋閟脈證第五十六小便淋閟鼻頭色黃澀小無血數大何妨淋者淋瀝不淨閟者閉塞不通其證小便少而數少腹弦急痛引於臍病源論皆謂腎虛膀胱熱之所成也分有五種曰石淋勞淋血淋氣淋膏淋石淋者淋而出石也腎主水水結則化為石腎虛為熱所乘熱則成淋其病狀小便則莖里痛尿不能卒出痛引少腹膀胱裡急沙石從小便出甚者塞痛令人悶絶宜局方石韋散三因石燕丸之類氣淋者腎虛膀胱熱氣脹所為也膀胱合與腎為表裡膀胱熱熱氣流入於胞熱則生實令胞內氣脹則小腹滿腎虛不能制其小便故成淋其狀膀胱小便皆滿尿澀常有餘瀝是也亦曰氣癃宜瞿麥湯沉香散之類膏淋者淋而有肥狀似膏故謂之膏淋亦曰肉淋此腎虛不能制肥液故與小便俱出也宜鹿角霜丸菟絲子丸之類勞淋者謂勞傷腎氣而生熱成淋也腎氣通於前陰其狀尿留莖內數起不出引小腹痛小便不利勞倦即發也宜黃耆湯補中益氣湯之類血淋是熱淋之甚者則尿血謂之血淋心主血血之行身通遍經絡循環腑臟熱甚則散失其常經溢滲入胞而成血淋也宜立效散濟生小薊飲子之類五種之外復有寒熱二種寒淋者其病狀先寒戰然後尿是也由腎氣虛弱下焦受冷氣入胞與正氣交爭寒氣勝則戰寒而成淋正氣勝則戰寒解方得小便也宜肉蓯蓉丸八味丸之類熱淋者三焦有熱氣搏於腎流入於胞而成淋也其狀小便赤澀亦有宿病淋今得熱而發者其熱甚則變尿血亦有小便後如小豆羹汁狀者蓄作有時也宜六一散本事火府丹導赤散局方八正散之類巢氏之說如此恐未必盡然大抵皆三焦氣化不及熱迫膀胱令水道涸澀之所成也勞氣血膏石雖分五種其病機必因勞動火火盛搏氣甚及於血血轉為膏膏轉為石自清而濁自薄而厚自柔而堅自無形而漸有形亦熬汁成膏煮水結鹽之義豈真有砂石出水臟哉至若腎虛不能制肥液更可笑也歷考內經並運氣等篇肝心脾肺腎小腸督脈亦皆有此證三焦膀胱病此者為獨多耳夫三焦膀胱者素問靈蘭祕典雖列為二在三焦則曰決瀆之官水道出焉在膀胱則曰州都之官津液藏焉氣化則能出矣三焦之下即接膀胱一主藏一主決相為依倚故靈樞本藏篇云腎合三焦三焦膀胱者腠理毫毛其應又四時氣篇云小腹痛腫不得小便邪在三焦約取之太陽大絡又五癃津液篇云三焦閉不瀉津液不化不得滲膀胱則下焦脹又本輸篇云膀胱者津液之府也少陽屬腎腎上連肺故將兩臟三焦者中瀆之府也水道出焉屬膀胱是孤之府也觀此則知三焦膀胱名雖二而實一故古人刺灸之法多取三焦穴而不取膀胱義可想矣所謂少陽屬腎者少陽正指三焦手少陽非足少陽也即腎合三焦之變文腎上連肺者言以最下之腎而相將於最上之肺凡在兩臟之中者俱在相將之內此所以成一三焦也況肺主氣而通調水道三焦亦主氣而上下游行如是則淋祕又不獨下焦為然上中下之氣有一不化則不得如決瀆之水而出矣熱乘津液則水道不利水道不利而有熱必鬱蒸而外發黃色見於鼻者以鼻為肺竅耳脈澀小者澀滯微小而不滑利也徵其正衰而無血數大為火象火證見之又何妨乎較之無血者是為易治附方局方石韋散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出砂石芍藥白朮滑石葵子瞿麥石韋去毛木通各二兩當歸去蘆甘草王不留行各一兩上為細末每服二錢空心煎小麥湯調下日二三服三因石燕丸治石淋因憂鬱氣注下焦結如食鹽小便痛不可忍或出砂石而後小便通石燕火燒令通赤水中淬三次研極細水飛焙乾石韋去毛瞿麥穗滑石各一兩上為細末麵糊丸桐子大每服十丸用瞿麥燈心煎湯食前送下日二三服甚即以石韋去毛瞿麥穗木通各四錢陳皮茯苓各三錢為末每服三錢以水一盞煎七分去滓服瞿麥湯治心經蘊熱小便赤澀痛瞿麥穗七錢半冬瓜子茅根各半兩黃芩去黑心六錢木通二錢半竹葉一把滑石二兩研為細末分作三帖葵子二合上除滑石外粗搗篩分作三劑每劑用水三盞煎二盞去滓入滑石末一帖攪勻食前溫服沉香散治氣淋多因五內鬱結氣不舒行陰滯於陽而致壅滯小腹脹滿便尿不通大便分泄小便方利沉香石韋去毛滑石王不留行當歸各半兩葵子白芍藥各七錢半甘草橘皮各二錢半上為末每服二錢煎大麥湯下鹿角霜丸三因治膏淋鹿角霜用嫩角連頂骨者鋸作挺子長三寸洗了用水桶內浸夏三冬五晝夜用清水同入鑊內煮之覺湯少添溫湯日夜不絶候角酥糜為度輕漉出用刀刮去皮如雪白放在篩子上候自干微火焙之其汁慢火煎膏凝即角膠候角極干為細末即鹿角霜白茯苓秋石各等分上為細末糊丸如桐子大每服五十丸米飲下菟絲子丸菟絲子去塵土水淘淨酒浸控干蒸搗焙桑螵蛸炙各半兩澤瀉二錢半上為細末煉蜜丸如桐子大每服二十丸空心清米湯送下黃耆湯治腎虛變勞淋結澀不利黃耆二兩人參五味子白茯苓去皮旱蓮子磁石火煅醋淬滑石各一兩桑白皮七錢半枳殼去瓤麩炒黃芩各半兩上搗篩每服三錢匕水一盞煎七分服無時補中益氣湯見第三十九立效散治小便淋閉作痛有時尿血下焦結熱瞿麥穗山梔子炒甘草各三錢上作一服水二鍾煎一鍾食前服濟生小薊飲子治下焦結熱尿血成淋生地黃四兩小薊根滑石通草蒲黃炒藕節淡竹葉當歸去蘆酒浸山梔仁甘草各半兩上㕮咀每服四錢水一盞煎八分空心溫服肉蓯蓉丸治冷淋肉蓯蓉酒浸切焙熟地黃山藥石斛去根牛膝酒浸切焙官桂去粗皮檳榔各半兩附子炮去皮臍黃耆各一兩黃連去須七錢半細辛去苗葉甘草炙各二錢半上為末蜜丸桐子大每服二十丸鹽酒下八味丸見第十六六一散見第四十四本事火府丹治心經蘊熱小便赤少五淋澀痛黃耆一兩生乾地黃二兩木通三兩上為末煉蜜丸如桐子大每服五十丸木通煎湯下導赤散見第五十四局方八正散見第四十九
