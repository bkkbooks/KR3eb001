body:
  text: 卷五痰病脈證第四十二滑主多痰弦主留飲熱則滑數寒則弦緊浮滑兼風沉滑兼氣食傷短疾濕留濡細滑為水物兼有之象主多痰者以痰為飲結成形故也弦則弦直而斂不能抑揚鼓蕩是陽運之力薄故飲留焉宜和劑倍術丸苓桂朮甘湯之類以飲較痰尚未結聚所以弦不似滑之纍纍替替有物形也大約氣機鼓動屬熱滑數是已斂束屬寒弦緊是已鼓動浮越風之象也故浮滑者兼風宜青州白丸子法制半夏清心牛黃丸沉香墮痰丸清氣化痰丸之類動疾沉下氣之郁也故動滑者兼氣停食於中則氣為食礙不能透達脈為之短短則氣遏於內勢反成疾短疾之脈與滑近似故滑亦主食也宜丹溪保和丸之類濕為陰邪留必緩滲非若陽邪之變動迅疾故脈亦濡細耳宜仲景澤瀉湯之類附方和劑倍術丸見第二十二仲景苓桂朮甘湯見第十六和劑青州白丸子治男婦手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風婦人血風半夏生七兩水浸洗南星生三兩白附子生二兩川烏生半兩去皮臍上為末以生絹袋盛於井花水內擺出粉如未出者更以手揉出如有滓更研再入絹袋擺盡為度置瓷盆中日曬夜露至曉撇去舊水別用井水攪又曬至來日早再換新水攪如此法春五日夏三日秋七日冬十日去水曬乾後如玉片研細以糯米粉煎粥清丸緑豆大薑湯下二十丸無時如癱瘓風溫酒下小兒驚風薄荷湯下五丸法制半夏治一切痰嗽或嘔吐冷飲酸水風痰痰癖胸膈痞悶喘促等證半夏揀大者五斤明礬一斤四兩搗碎生薑一斤四兩搗碎上三味用泉水共浸七日擦去半夏皮加朴硝二斤八兩換水浸七日加豬牙皂角切片一斤四兩浸七日此後用泉水每日一換至四十九日撈起曬乾為末每用二錢煎蘿蔔湯調下小兒量減之和劑清心牛黃丸治諸風緩縱不隨語言蹇澀心怔健忘恍惚去來頭目眩冒胸中煩郁痰涎壅塞精神昏憒又治心氣不足神志不定驚恐悲憂虛煩少睡喜怒無時或發狂癲神情昏亂白芍藥麥門冬去心黃芩當歸去苗防風去苗白朮各一兩半柴胡桔梗芎藭白茯苓去皮杏仁去皮尖雙仁麩炒黃別研各一兩二錢半神麯研蒲黃炒人參去蘆各二兩半羚羊角屑麝香研龍腦研各一兩肉桂去粗皮大豆黃卷碎炒阿膠碎炒各一兩七錢半白蘞乾薑炮各七錢半牛黃研一兩二錢犀角屑二兩雄黃研飛八錢乾山藥七兩甘草銼炒五兩金箔一千二百片內四百片為衣大棗一百枚蒸熟去皮核研成膏上除棗杏仁金箔二角屑及牛黃雄黃腦麝外共為細末入余藥和勻用煉蜜與棗膏為丸每兩作十丸金箔為衣每服一丸溫水化下食後服小兒驚癇酌量多少竹葉湯化下沉香墮痰丸治宿食不消咽膈不利咳嗽痰涎頭目昏暈嘔逆噁心胸膈不快沉香木香各二錢青皮去白二錢半半夏曲二兩檳榔大者三枚用麵裹煨熟上為細末用生薑汁浸蒸餅為丸如小緑豆大每服二十丸不拘時薑湯下清氣化痰丸順氣快脾化痰消食半夏南星去皮臍皂角切白礬乾薑各四兩上先將白礬等三味用清水五碗煎取水三碗卻入半夏二味浸兩日再煮至半夏南星無白點為度曬乾青皮去穰陳皮真蘇子炒蘿蔔子炒另研杏仁去皮尖炒研葛根神麯炒麥糵炒焦山楂去核香附各二兩上為末蒸餅丸桐子大每服五七十丸臨臥食後茶湯下丹溪保和丸見第十七仲景澤瀉湯見第二十二瘧疾脈證第四十三瘧脈自弦弦數者熱弦遲者寒代散者折素問瘧論曰夫痎瘧皆生於風蓋風屬木而應春弦是其本脈生於風則象風故脈自弦又瘧之作也邪正交爭或寒而熱熱而寒寒熱往來正邪出入樞主於中經云少陽為樞少陽亦應乎春故脈亦當弦弦而兼數數為熱是知瘧之多熱也多熱多汗宜小柴胡湯或加知母石膏黃連之類甚則渴欲冷飲脈數大者宜白虎湯之類弦而兼遲遲為寒是知瘧之多寒也熱少寒多甚則厥冷嘔逆宜二陳薑桂柴胡白朮草果之類雖附子亦不妨用但宜細審其證則百發百中矣若代止而又散乃正氣虛脫不續不斂之象邪盛正衰定主凶折此屬危殆之證若欲用藥非大補氣血如參耆炙甘朮附薑桂之類不能挽回於萬一者附方仲景小柴胡湯傷寒論云傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之此半表半裡寒熱往來之藥也今用治瘧之寒熱往來者皆效柴胡半斤黃芩人參甘草炙生薑各三兩半夏半斤大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔者去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半加栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑三兩仲景白虎湯加人參名人參白虎湯傷寒論云傷寒脈浮滑此表有熱里有寒白虎湯主之又云吐下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之大抵表裡皆熱在表多汗非閉郁之熱在裡渴煩非入腑堅實之熱轉夏為秋之劑也知母六兩石膏一斤甘草炙二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三泄瀉脈證第四十四泄瀉下利沉小滑弱實大浮洪發熱則惡瀉痢見於下部時時惟出無論因之內外總屬傷陰耗里之虛證沉小滑弱乃為相宜滑乃有餘似乎相反然喜其有水液而不因瀉痢枯涸耳大約宜五苓散平胃散東垣升陽除濕湯理中湯五味子散四神丸七味白朮散痢則芍藥湯香連丸益元散敗毒散東垣芍藥黃芩湯和劑真人養臟湯金匱桃花湯白頭翁湯和劑參苓白朮散俱當審寒熱虛實選用之若實大浮洪則惡矣實大與虛反浮洪與里反邪盛正衰不言可喻再加發熱則陰氣彌傷而裡氣彌耗不至躁亡不已也附方五苓散見第十七平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噫氣吞酸面黃肌瘦體倦節痛常自利常發霍亂反胃等證蒼朮去粗皮米泔浸五斤陳皮三斤二兩去白甘草銼炒三十兩厚朴去粗皮薑製炒三斤二兩上為細末每服二錢水一盞姜三片棗二枚同煎七分去滓溫服或去薑棗帶熱服空心食前入鹽一捻沸湯點服亦得常服調氣暖胃化宿食消痰飲闢風寒冷濕不正之氣東垣升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困弱甘草大麥糵面如胃寒腹鳴者加陳皮豬苓以上各三分澤瀉益智仁半夏防風神麯升麻柴胡羌活以上各五分蒼朮一錢上㕮咀作一服水三大盞生薑三片棗二枚同煎一盞去滓空心服理中湯見第十七二神丸治脾腎虛弱侵晨五更作瀉全不思食或食而不化大便不實神效破故紙四兩炒肉豆蔻二兩生用用紅棗四十九枚生薑四兩同煮熟去姜及皮核取肉和藥丸如梧子每服五七十丸空心鹽湯下五味子散治腎泄在侵晨五更作瀉或大便不實不時去後五味子炒二兩吳茱萸炒五錢為末每服二錢白湯調服為丸更妙四神丸治脾腎虛弱大便不實飲食少思即二神丸五味子散合丸空心食前服錢氏七味白朮散治中氣虧損津液短少口舌乾渴或口舌生瘡不喜冷飲或吐瀉後口乾最宜服人參白朮木香白茯苓甘草藿香各五分乾葛一錢上水煎服芍藥湯治便血後重經曰溲而便膿血知氣行而血止也行血則便膿自愈調氣則後重自除白芍藥二兩當歸黃連黃芩各五錢檳榔木香甘草各二錢桂二錢半上㕮咀每服五錢水煎服痢不減加大黃香連丸治痢疾並水瀉暑瀉甚效黃連十二兩另用吳茱萸十兩為末二味熱水拌和入瓷器置熱湯中頓一日同炒至黃連紫色去茱用連為末每四兩配木香一兩醋打米糊為丸如梧子大每服三十丸白湯下久痢中氣下陷以補中益氣湯下中氣虛者四君子加薑桂湯下益元散一名天水散一名六一散治傷寒表裡俱熱煩渴口乾小便不通及霍亂吐瀉下利腸澼五淋及婦人産難催生下乳桂府滑石膩白者水飛六兩粉草去皮一兩研爛上為極細末每服三錢白湯調下新水亦得加薄荷末少許名雞蘇散加青黛末少許名碧玉散治療並同敗毒散見第三十七東垣芍藥黃芩湯治泄痢腹痛或後重身熱久不愈脈洪疾者及下痢膿血稠黏黃芩白芍藥各一兩甘草五錢上㕮咀每服一兩水一盞半煎一盞溫服無時如痛加桂少許和劑真人養臟湯治大人小兒冷熱不調下痢赤白或便膿血有如魚腦裡急後重臍腹㽲痛及脫肛墜下酒毒濕毒便血並宜服人參白朮當歸各六錢白芍藥木香各一兩六錢甘草肉桂各八錢肉果麵裹煨半兩御米殼蜜炙三兩六錢訶子肉一兩二錢上㕮咀每服四錢水一盞半煎八分去滓食前溫服忌酒面生冷腥膩之物滑泄夜起久不瘥者加附子四片金匱桃花湯治下痢膿血赤石脂一斤一半銼一半篩末乾薑一兩粳米一升上先以水七升煮米姜令熟去滓溫七合內石脂末方寸匕日三服若一服愈勿服金匱白頭翁湯治熱痢膿血白頭翁二兩黃連黃柏秦皮各三兩上以水七升煮二升去滓溫服一升不愈更服和劑參苓白朮散治久瀉痢或大病後調理消渴者尤宜人參乾山藥蓮肉去心白扁豆去皮薑汁浸炒各一斤半於白朮二斤桔梗炒黃色砂仁白茯苓去皮薏苡仁炙甘草各一斤上為細末每服二錢米湯調下或加薑棗煎服或棗肉和丸如桐子大每服七十丸空心米飲下或煉蜜丸如彈子大湯化下嘔吐反胃脈證第四十五嘔吐反胃浮滑者昌弦數緊澀結腸者亡嘔吐有聲有物反出於胃上焦之病也宜仲景大半夏湯生薑半夏湯二陳湯之類上焦則脈應浮有物則脈應滑浮滑為陽飲食之能納能運而不反者陽之力也故云浮滑者昌若得弦數緊澀之脈則逆矣蓋弦狀陰斂陽運衰微又弦為肝木之脈嘔吐屬胃胃者土也木來乘土土將奪矣金匱要略云脈弦者虛也胃氣無餘亦懼胃土虛而見肝木之脈也宜平肝補脾如四君子湯六君子湯加防風白芍之類數則為熱熱當消穀而反吐谷者乃知數為虛數虛則不運數則氣促嘔吐不止胃將由此而敗金匱要略云陽氣微膈氣虛脈乃數宜補中兼清虛熱如六君子湯加竹茹生薑茱萸制黃連之類緊則為寒寒則無陽以運故上出而嘔吐宜溫中散寒如理中湯藿香安胃散之類澀脈枯澀吐亡津液之所致也金匱要略所謂朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治者是也宜補氣而生津如四君子湯加黃耆五味子之類夫胃為水穀之海若再加大腸祕結是全無陰液而水穀之海枯矣水穀之海枯而能生者未之有也反胃糞如羊屎者不治附方仲景大半夏湯見第二十仲景生薑半夏湯要略云病人胸中似喘不喘似嘔不嘔似噦不噦胸中憒憒然無奈者生薑半夏湯主之半夏半升生薑汁一升上以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一服止停後服二陳湯見第十六四君子湯見第十六六君子湯見第十六仲景理中湯見第十七藿香安胃散見第二十霍亂脈證第四十六霍亂之候脈代勿訝厥逆遲微是則可怕仲景云嘔吐而復下利名曰霍亂宜仲景通脈四逆湯理中丸四逆加人參湯之類霍亂者揮霍撩亂不能自持陰陽乖離上下亟奪是時脈或代止勿驚訝也乃卒吐暴下穀神頓委暫不接續故耳若手足厥冷脈復遲微是則大為可怕蓋手足為諸陽之本遲微為純陰之脈陽衰陰盛真元漸絶之象也是故暴脫者能漸生而漸絶者又何能暴起哉暴脫者如日中風雨風雨過而日仍明漸絶者如日漸西墜墜則終此日矣九死之證也設欲用藥救治非附子理中湯四逆加人參湯之類不可附方仲景通脈四逆湯傷寒論云少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之今用治霍亂吐利脈不出者亦宜甘草炙二兩附子大者一枚生用去皮臍破八片乾薑三兩強人可四兩上以水三升煮一升二合去滓分溫再服其脈漸出者愈仲景理中丸見第十七仲景四逆加人參湯治一切虛寒亡陽下利四肢厥逆等證甘草炙二兩乾薑一兩半人參一兩附子一枚生用去皮破八片上以水三升煮一升二合去滓分溫再服強人可大附子一枚乾薑三兩附子理中湯見第十七咳嗽脈證第四十七咳嗽多浮聚胃關肺沉緊小危浮濡易治咳嗽不一強半為風寒痰飲風寒則傷於皮毛宜汗解如麻黃湯參蘇飲之類痰飲則停於胸胃宜二陳湯仲景小青龍湯拔萃半夏溫肺湯之類皮毛者肺之合也邪襲其合肺氣應之故上逆而為咳胃居肺下寒痰冷飲停滯於中上射於肺肺氣迎之故亦上逆而為咳經云形寒飲冷則傷肺痰飲寒濁之氣上熏於肺肺不清淨咳嗽從生形寒固傷於外而冷飲寒痰則皆聚於胃也肺居最上皮毛最表故脈多浮耳沉緊小危者沉則邪入里緊則寒不散小則正氣衰均主病危若浮而濡浮則在表濡受邪輕故云易治附方麻黃湯見第十六參蘇飲治痰積中脘暈眩嘈雜怔忡噦逆或痰停關節手足嚲曳口眼喎斜半身不遂嘔吐噁心頭疼發熱及感冒風邪鼻塞憎寒咳嗽等證人參紫蘇葉前胡半夏制葛根各一錢茯苓枳殼桔梗陳皮各八分木香磨四分加蔥白生薑煎服二陳湯見第十六仲景小青龍湯見第十六拔萃半夏溫肺湯治心腹中脘痰水冷氣心下汪洋嘈雜常多涎唾口中清水自出脅肋急脹痛不欲食此胃氣虛冷所致其脈沉弦細遲旋覆花人參細辛桂心甘草陳皮桔梗芍藥半夏制各半兩赤茯苓七錢半上㕮咀每服四錢生薑三片水煎食後服喘急脈證第四十八喘急息肩浮滑者順沉澀肢寒散脈逆證呼吸疾速曰喘氣息短促曰急息肩者肩隨息動吸則提氣呼則舒氣出入不利故肩亦為之聳動耳脈浮滑者浮為陽為表為風宜汗解仲景麻黃湯或香蘇散及枳桔桑杏之類滑為陽為痰為食痰宜枳桔二陳湯蔞仁蘇子及三子養親湯之類食宜丹溪保和丸平胃散和劑小七香丸或瓜蒂散吐之蓋因外邪閉遏或為內物阻撓致令機關壅滯胸膈痞塞而為喘急息肩者有矣苟能散其邪則機關可利推其物則痞塞可通故曰順脈沉澀者沉為陰為里為下部澀為陰為虛乃元氣不能接續不能舒徐以達上焦不能達上又豈能充四肢乎是以喘急息肩而四肢又寒也若更見散脈則元真將隨喘而散死亡必矣故曰逆脈澀肢寒陽退陷而不達喘息脈散陽散越而脫根附方仲景麻黃湯見第十六香蘇散寶鑑治水氣虛腫小便赤澀陳皮去白一兩防己木通紫蘇葉各半兩上為末每服二錢水二盞生薑三片煎至一盞去滓食前溫服枳桔二陳湯即二陳加枳殼桔梗三子養親湯治年高痰盛氣實並氣壅哮喘等證紫蘇子沉水者白芥子蘿蔔子各三錢上水二鍾姜二片煎七分食後服丹溪保和丸見第十七平胃散見第四十四和劑小七香丸見第十七仲景瓜蒂散瓜蒂二十個上銼以水一升煮取五合去滓頓服火病脈證第四十九病熱有火洪數可醫沉微無火無根者危病熱而有火證是火病也火則脈應洪數脈證相宜故可醫治若得沉微之陰脈是無火矣無火而仍病熱則知為無根之陽虛見熱象也故主危殆附方清心蓮子飲和劑治心虛有熱小便赤濁黃芩麥門冬去心地骨皮車前子甘草炙各一錢半石蓮肉白茯苓黃耆蜜炙人參各七分半水二盞煎一盞水中沉冷空心溫服發熱加柴胡薄荷導赤散錢氏丹溪云導赤散正小腸藥也生地黃木通甘草各等分上同為末每服三錢水一盞入竹葉七片同煎五分食後溫服錢氏瀉黃散治脾家鬱熱口甜口瘡喜飲煩躁藿香七錢山梔仁一兩石膏半斤甘草二兩防風四兩上銼同蜜酒微炒香為細末每服二錢水一盞煎清汁飲瀉青丸當歸去蘆焙稱草龍膽焙稱川芎梔子川大黃煨羌活防風去蘆上各等分為末煉蜜為丸雞頭大每服一丸煎竹葉湯同砂糖溫水化下局方八正散治大人小兒心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面赤煩躁不寧目赤睛疼唇焦鼻衄口舌生瘡咽喉腫痛又治小便赤澀或癃閉不通及熱淋血淋並宜服之亦氣分藥也瞿麥萹蓄車前子滑石甘草炙山梔子仁木通大黃上為散每服二錢水一盞入燈心草莖煎七分去滓食後臨臥溫服小兒量與之左金丸治肝火脅肋刺痛或發寒熱或頭目作痛或大便不實小便淋祕或小腹疼痛一切肝火之證以此主治黃連六兩吳茱萸湯煮片時一兩粥和丸陳皮白朮湯送服河間防風通聖散表裡氣血總清之藥防風川芎當歸芍藥大黃薄荷葉麻黃連翹芒硝盆硝是已上各半兩石膏黃芩桔梗各一兩滑石三兩甘草二兩荊芥白朮梔子各二錢半為末每服五錢水煎食遠服升陽散火湯治男婦四肢發熱肌熱筋痹熱骨髓中熱發如火燎於肌膚捫之烙手此證多因血虛而得或胃虛過食冷物抑遏陽氣於脾土火鬱發之此方是也升麻葛根獨活羌活各五錢防風二錢半柴胡八錢甘草三錢炙二錢生人參白芍藥各五錢上㕮咀每服半兩或一兩水煎稍熱服陽毒升麻湯治傷寒雜病汗吐下後變成陽毒發狂譫妄喉痛下利升麻五錢犀角射干黃芩人參甘草各二錢五分上㕮咀水煎服清胃湯治醇酒厚味唇齒作痛或齒齦潰爛或連頭面頸項作痛黃連一錢五分當歸生地黃牡丹皮各一錢升麻二錢上水煎服千金黑奴丸治大熱陽毒發狂發斑煩躁大渴黃芩釜底煤芒硝灶突墨梁上塵小麥奴麻黃大黃各一兩上為末煉蜜丸如彈大新汲水化服不定再服半丸飲水盡足當發寒寒已汗出乃瘥未汗再服半丸不大渴者不可與瀉白散治肺火咳喘面紅喉咽不清地骨皮二錢桑白皮二錢甘草五分為末水一盞煎六分服當歸龍薈丸治肝經實火大便祕結小便澀滯或胸膈作痛陰囊腫脹凡屬肝膽實熱並宜用之當歸龍膽草梔子仁黃連黃芩各一兩大黃蘆薈青黛各五錢木香二錢五分麝香另研五分為末炒神麯糊丸每服二十丸薑湯下骨蒸脈證第五十骨蒸發熱脈數而虛熱而澀小必殞其軀骨蒸發熱者熱自骨起蒸發於外內傷虛勞之熱也脈數而虛是其本然蓋以數為熱虛為勞耳若蒸熱而見澀小之脈澀則精血少小則元氣衰真陰日損邪火日增不至於殞軀不已也方參看勞極門
