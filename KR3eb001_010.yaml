body:
  text: 卷十痿病脈證第六十七痿病肺虛脈多微緩或澀或緊或細或濡痿者委也足痿不用有委靡不振之義故字從委其證五臟俱能成而此獨歸於肺者本素問也素問痿論岐伯曰肺熱焦則皮毛虛弱急薄著而生痿躄又曰肺者臟之長也為心之蓋也有所失忘所求不得則發肺鳴鳴則肺熱葉焦五臟因肺熱葉焦發為痿躄觀岐伯所言則知五臟之痿必自肺始內則先葉焦而外則先皮毛虛弱急薄也蓋肺居心上為最高外合皮毛為最表故云臟之長心之蓋主一身之氣而司呼吸朝百脈而行榮衛故平人氣象論曰臟真高於肺以行榮衛陰陽也其令收降其化清肅設有失忘求謀不得則肺氣鬱鬱則收者愈收氣遏為火而熱生焉熱則清肅之化不行炎蒸之邪自迫斯時也氣不寧靜則喘鳴臟不濡潤則焦萎然不獨一肺止也蒸熏榮衛耗竭臟陰嗣是五臟之合如筋脈肉骨之屬亦皆不得其榮潤而諸痿之證作矣故岐伯又曰心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也宜丹溪虎潛丸補陰丸之類肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿宜四物湯三因加減四斤丸之類脾氣熱則胃干而渴肌肉不仁發為肉痿宜東垣神效黃耆湯錢氏瀉黃散之類腎氣熱則腰脊不舉骨枯而髓減發為骨痿宜丹溪虎潛丸三因加減四斤丸之類此皆言肺熱葉焦皮毛急薄熱留著不去災及四臟而發為諸痿也若四臟不虛無隙可乘則熱亦不能遽襲故下文岐伯復曰悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本論曰大經空虛發為肌痹傳為脈痿宜仲景炙甘草湯黑地黃丸之類此言悲哀太甚致心系急而胞絡絶評熱論曰胞脈者屬心而絡於胞中絶則不能上交於心亢陽內迫內迫則血溢下崩隨溲而出崩則大經空虛無以榮灌脈絡故先為肌痹而漸傳為脈痿也又曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也宜知柏八味丸四物湯加味逍遙散之類此言外想邪淫而不遂及甚於入房一則肝火抑鬱一則陰精耗亡皆前陰所關前陰者宗筋也宗筋無陰以養而反為火迫故弛縱痿弱及淫念動而白物隨下故筋痿者生於肝使內也又曰有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得於濕地也宜胃苓湯仲景防己黃耆湯東垣參朮湯之類此言從事於水濕之處居處皆濕漸受其邪留著而濡漬肌肉之間久則肌肉不仁發為肉痿故肉痿者得之濕地也又曰有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也宜知柏八味丸六味丸補陰丸之類此言遠行勞倦逢熱而渴渴則內熱殊甚內熱甚則乘其虛者而迫之遠行勞倦則腎氣適虛經脈別論云持重遠行汗出於腎腎虛明矣腎虛則受其熱而不能勝漸至髓減骨枯以致足不任身發為骨痿故骨痿者生於大熱也又曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈腰脊不舉似兼督脈證故陽明虛則宗筋縱帶脈不引前白淫似帶脈不引證故足痿不用也又曰各補其滎而通其俞調其虛實和其逆順筋脈骨肉各以其時月受則病已矣前岐伯論痿之感受傳變可謂盡矣而終復歸之陽明者何哉蓋陽明為水穀之海沖為血海此不言水穀而言五臟六腑之海不言血而言經脈之海見臟腑經脈無非二者為之源一潤宗筋為陽一灌溪谷為陰總宗筋而會於氣街推陽明為之長者氣街乃陽明正脈亦有尊水穀之義督脈直行帶脈橫圍陽明衝脈皆屬帶而絡督陽明虛則不能榮養宗筋而帶脈亦無力收引故足痿不用也是知束骨利機關者必藉乎宗筋而宗筋又藉陽明之榮潤故治痿者獨取陽明也然必兼視各臟之滎俞宜補宜通受病之時月或衰或盛而後逆順可和虛實可調病良已矣此岐伯答帝治痿之針法也其脈多微緩或澀或緊或細或濡者以微應皮毛緩應肌肉澀應血脈緊應筋膜細濡應骨髓耳附方虎潛丸見第五十一補陰丸黃柏知母俱鹽酒拌炒熟地黃敗龜版酥炙各四兩白芍藥煨陳皮牛膝酒浸各二兩虎脛骨酥炙鎖陽酒浸酥炙當歸酒洗各一兩半冬月加乾薑五錢半上為末酒煮羯羊肉為丸鹽湯下四物湯見第二十一三因加減四斤丸治腎肝虛熱淫於內致筋骨痿弱不自勝持起居須人足不任地驚恐戰掉潮熱時作飲食無味不生力氣諸虛不足肉蓯蓉酒浸牛膝酒浸天麻木瓜干鹿茸燎去毛切酥炙五味子酒浸熟地黃菟絲子酒浸另研各等分上為細末煉蜜丸如桐子大每服五十丸空心溫酒米飲任下一方不用五味子有杜仲東垣神效黃耆湯黃耆二錢人參去蘆白芍藥炙甘草各一錢蔓荊子銼二分陳皮去白五分水一盞八分煎一盞去滓臨臥稍熱服如小便淋澀加澤瀉五分如有大便熱證加黃柏酒炒四次三分麻木不仁雖有熱不用黃柏再加黃耆一錢如眼縮小去芍藥忌酒醋濕面大料物蔥韭蒜及淡滲生冷硬物麻木重甚者加芍藥一錢錢氏瀉黃散見第四十九仲景炙甘草湯見第三十三黑地黃丸見第五十一知柏八味丸見第五十四加味逍遙散見第五十一胃苓湯見第十七仲景防己黃耆湯防己一兩甘草半兩炒白朮七錢半黃耆去蘆一兩一分上銼每抄五錢匕生薑四片大棗一枚水盞半煎八分去滓溫服良久再服喘者加麻黃半兩胃中不和加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰以下溫令微汗瘥東垣參朮湯治氣虛顫掉人參白朮黃耆各二錢白茯苓炙甘草陳皮各一錢附子甚者加童便制一錢水二鍾煎八分食前服六味丸見第十六痹病脈證第六十八風寒濕氣合而為痹浮澀而緊三脈乃備痹之一證無如素問痹論之精且詳矣其言邪客之多少傳變之淺深證狀之虛實腑臟之死生榮衛形體之異寒熱陰陽之分皆辭義顯明不可增損一字茲録全文於下黃帝問曰痹之安生岐伯對曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也帝曰其有五者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也故骨痹不已復感於邪內合於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也凡痹之客五臟者肺痹者煩滿喘而嘔宜當歸湯紫蘇子湯之類心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐宜茯神湯之類肝痹者夜臥則驚多飲數小便上為引如懷宜萆薢丸奇效人參散之類腎痹者善脹尻以代踵脊以代頭宜加味五痹湯奇效人參散之類脾痹者四肢懈墮發咳嘔汁上為大塞宜溫中法曲丸黃耆丸之類腸痹者數飲而出不得中氣喘爭時發飧泄宜茯苓川芎湯之類胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕宜腎瀝湯之類陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痹聚於肺淫氣憂思痹聚於心淫氣遺溺痹聚於腎淫氣乏竭痹聚於肝淫氣肌絶痹聚在脾諸痹不已亦益內也其風氣勝者其人易已也帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也岐伯曰此亦其食飲居處為其病本也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也帝曰以針治之奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各隨其過則病瘳也帝曰榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不通皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭甲乙經作乘陰故為痹熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也帝曰夫痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痹之類逢寒則蟲甲乙經作急逢熱則縱帝曰善其脈浮澀而緊者浮為風澀為濕緊為寒乃一脈中見此三種始為三邪雜合若雜閣中邪有偏勝則又當審脈之浮多澀多緊多以別之也主方十一首固與本論腑臟證對殊不知三邪之變見於形體者不可勝紀論中雖分行痛著三種而三種之證未經列出如痛痿走注麻木不仁拳攣重著等證似與前方漠不相關若概治之恐迂緩無裨故又選對證名方於後以便採用焉行痹宜仙靈脾散三因控涎丹痛痹宜烏藥順氣散丹溪二妙散著痹宜東垣神效黃耆湯溫經除濕湯史國公浸酒之類附方當歸湯當歸酒洗二錢赤芍藥煨一錢半獨活防風赤茯苓黃芩秦艽各一錢杏仁去皮尖八分甘草六分桂心三分水二鍾姜三片煎八分不拘時溫服紫蘇子湯治肺痹胸心滿塞上氣不下紫蘇子炒八兩半夏湯洗五兩陳皮去白桂心各三兩人參白朮甘草炙各二兩上㕮咀每服四錢水一盞生薑五片棗一枚煎七分去滓不拘時溫服茯神湯治心痹神思昏塞四肢不利胸中煩悶時復恐悸茯神去木羌活去蘆麻黃去根節麥門冬去心焙龍齒各一兩遠志去心犀角屑薏苡仁人參去蘆蔓荊子防風各七錢五分赤芍藥甘草炙各五錢上㕮咀每服三錢水一鍾姜五片煎七分去滓不拘時溫服萆薢丸治肝痹緩筋脈去邪毒調榮衛萆薢羌活去蘆天麻酒浸一宿切焙各一兩附子炮去皮臍半兩乳香沒藥另研各二錢半上為細末入乳香沒藥同研勻煉蜜丸彈子大每服一丸空心溫酒化下日再服奇效人參散治肝痹氣逆胸脅引痛眠臥多驚筋脈攣急此藥鎮肝去邪人參二兩杜仲去粗皮炒黃耆蜜炙酸棗仁微炒茯神去木各一兩五味子細辛去苗熟地黃秦艽去苗土羌活去蘆丹砂細研芎藭各半兩上為細末入丹砂再研令勻每服一錢不拘時溫酒調下日三服加味五痹湯治五臟痹證人參茯苓當歸酒洗白芍藥煨川芎各一錢肝心腎痹倍之五味子十五粒白朮一錢脾痹倍之細辛七分甘草五分水二鍾煎八分食遠服肝痹加酸棗仁柴胡心痹加遠志茯神麥門冬脾痹加厚朴枳實砂仁神麯肺痹加半夏紫菀杏仁麻黃腎痹加獨活官桂杜仲牛膝黃耆萆薢溫中法曲丸治脾痹發咳嘔汁法曲炒枳實麩炒白茯苓吳茱萸湯浸焙炒桂心厚朴去皮薑汁炒當歸切焙甘草炙各三兩麥糵微炒五合細辛去苗乾薑炮麥門冬去心焙附子炮去皮臍桔梗炒人參各一兩上為細末煉蜜丸桐子大每服七十丸食前熱水下日三服黃耆丸治脾痹肌肉消瘦心腹脹滿水穀不化食即欲嘔飲食無味四肢怠惰或時自利黃耆銼石斛去根附子炮去皮臍肉蓯蓉酒浸切焙益智去皮白朮人參各一兩厚朴去皮薑汁炒桂心各一兩半五味子當歸白豆蔻去殼枳實麩炒沉香銼良薑各七錢五分訶黎勒煨去核二兩吳茱萸湯洗丁香各半兩為細末煮棗肉和搗五百杵丸如梧子大每服三十丸食前溫酒送下茯苓川芎湯赤茯苓一錢半桑白皮防風蒼朮米泔浸一宿炒麻黃芍藥煨當歸酒洗各一錢官桂五分川芎一錢二分甘草四分水二鍾棗二枚煎八分食前溫服腎瀝湯麥門冬去心五加皮犀角各一錢半杜仲薑汁炒去絲桔梗赤芍藥煨木通各一錢桑螵蛸一個水二鍾入羊腎少許煎八分食前服仙靈脾散治風走注往來不定仙靈脾威靈仙芎藭蒼耳子炒桂心各一兩上為細末每服一錢溫酒調不拘時三因控涎丹見第二十二烏藥順氣散見第六十五丹溪二妙散治筋骨疼痛因濕熱者如有氣加氣藥如血虛加補血藥如痛甚加薑汁熱辣服之黃柏炒蒼朮炒制去皮上為末生薑研入湯煎沸調服此二物皆有雄壯之氣如表實氣實者少酒佐之東垣神效黃耆湯見第六十七東垣溫經除濕湯治肢節沉重疼痛無力之聖藥羌活七分獨活黃柏麻黃去節當歸各三分柴胡黃耆黃連木香草豆蔻神麯各二分人參甘草炙澤瀉豬苓白朮各一錢陳皮蒼朮各二錢白芍藥三錢升麻五分上作二服用水二大盞煎一盞去滓食遠稍熱服史國公浸酒方專治左癱右瘓四肢頑麻骨節痠疼諸般寒濕風氣當歸虎脛骨酒浸一日焙乾酥炙羌活鱉甲炙萆薢防風去蘆叉秦艽川牛膝松節晚蠶沙各二兩枸杞子五兩干茄根八兩飯上蒸熟用無灰酒一斗絹袋盛藥入酒內封十日取飲時不可面向壇口恐藥氣衝人頭面飲酒不可間斷飲盡藥滓曬乾為末米糊丸梧子大空心酒下五十丸忌食發風動氣之物五疸脈證第六十九五疸實熱脈必洪數澀微屬虛最忌發渴疸者黃疸也謂濕疸谷疸女勞疸酒疸及黃汗也名雖分五實脾胃為之總司濕熱為之原始夫脾胃屬土合肌肉而主四肢其化濕其性滯著其色黃其脈遲緩所畏者風木而復喜風之燥能制者寒水而反惡水之濕人之病也若內無脾胃之郁外無風濕之搏雖有外邪氣機自利熱不𨠭蒸黃又何自而成乎故金匱要略論濕疸曰寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行蓋言風之獨行者乃名中風中風則腠理空疏皮毛開泄汗出熱越不能發黃今則脈浮而緩浮固為風緩為土濕濕則痹著非若風之疏利必郁瘀成熱脾土所主之四肢亦苦煩悶而黃色則蒸行於表也其論谷疸則曰趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸夫人飲食入胃胃主消納脾主運輸脾胃溫和兩稱其職今胃熱而過於強則徒能消納脾寒而失之弱則不能運輸既寒且弱肝木得以乘之木者風也風與寒搏脾愈不運更加以食氣愈不消搏於寒則中為滿搏於風則上為眩氣既不消胃中自濁濁則不能清升而反下流下流則脾之緊寒乘腎胃之數熱乘膀胱尚書洪範曰土爰稼穡稼穡作甘夫萬物藉土以生人賴稼穡以養稼穡者谷也穀氣下流而必歸之腎與膀胱者亦土乘水義難經三十七難曰脾氣通於口口和則知穀味矣脾主五味食味之歸於脾者不可勝數而獨言一穀味者正稼穡作甘之義也膀胱者州都之官主藏津液腎者水臟主通二陰熱流膀胱而小便又復不利水與熱鬱未有不蒸𨠭而成黃者以膀胱太陽主表故黃遍於周身也或兼寒熱不食食即頭眩心胸不安久久發黃為谷疸宜茵陳湯加減主之其論女勞疸則曰額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治此言女勞而成疸則黃不言可知矣細察仲景文義是亦穀氣鬱蒸之變證也蓋人過勞於房室則傷精精傷則腎虛腎虛則真水不足真水不足則相火熾炎於是胃中濁熱之氣不流於膀胱而竟歸之腎一以乘不足之水虛一以就同類之火熾火熾則君火亦因而動況子午同氣心腎交通故不惟腎經之足心熱而心經之掌心亦熱也薄暮氣降而屬陰乘其已虛之陰助其下流之勢無如此際故薄暮病即發也膀胱雖虛急而熱不內蓄故小便自利也若濕熱相火鬱甚久而不愈則脾氣積而不運腎氣散而不藏致腹脹如有水狀者是脾腎兩敗故不治也金匱又云黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治宜硝礬散主之其論酒疸則曰心中懊憹而熱不能食時欲吐名曰酒疸酒疸者過飲而病黃亦穀氣鬱蒸之變證也靈樞論勇篇云酒者水穀之精熟谷之液也熟則已經醞釀拔其精微蛻其糟粕純陽氣勝之物其性慓悍多升而少降今人飲少酒即頭面先紅此多升少降之明驗也非上所云穀氣未經腐熟醞釀者比故濕熱不流於下但積於中焦郁胃熏心令人外發黃而內煩懊不能食而時欲吐也又云酒疸諸證小便不利心中熱足下熱又或無熱譫語小腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之心中熱欲嘔者吐之愈酒疸下之久久為黑疸目青面黑心中如啖蒜齏狀大便正黑皮膚抓之不仁其脈浮弱雖黑微黃故知之酒疸心中懊憹或熱痛梔子大黃湯主之黃汗一證仲景金匱要略收入水氣病中其主治與治疸亦自懸絶後人以其汗黃遂列為五疸之一實非疸也今本文既云五疸則黃汗在其中似不可移去姑從之而論治仍從要略在圓機者自為識別可也要略曰黃汗之為病身體重發熱汗出而渴狀如風水汗沾衣色正黃如柏汗脈自沉從何得之師曰以汗出入水中浴水從汗孔入得之宜黃耆芍桂酒湯主之此黃汗之病因也蓋人作勞汗出陽氣動張陰液妄泄此時玄府未閉榮衛兩虛即浴於水水寒之邪未有不乘虛而入者入則水濕內侵浮陽外拒郁搏於肌肉之間肌肉者脾土之合故身則發熱而汗則見黃色也原以榮衛虛而受邪邪入則愈虛而陽仍不固陰液仍泄即仲景所云陽浮者熱自發陰弱者汗自出之義以汗液出多故渴以水氣在表故狀如風水水性就下故脈沉治以黃耆芍桂酒湯者所以和榮固衛托裡建中則黃從汗減水從汗消與治疸之發汗利小便者固不可同日語也又云黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此榮氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之此黃汗之變證也黃汗既為陰陽兩虛陽則浮散於表陰則脫根於下兩脛逆冷者其常也今不冷而反發熱是熱為濕鬱所成乘陰之虛流注下焦以及於脛而脛以上之諸節歷遍而痛不言可知此黃汗之傳為歷節者如此衛者陽氣也勞則陽動陽動則衛氣張散卒逢食谷胃陽驟升張散之虛陽不能羈穀氣之慓悍故與之俱出而為汗也又暮為陽衰之時勞動衰耗之陽暮則愈衰衰則不能外固而汗因盜出矣此黃汗之挾勞氣者如此凡熱隨汗而解者理之常也今汗已反更發熱如是久久則津液續亡肌膚枯澀身體又安得不甲錯乎甲錯而熱仍不止不但淺災肌膚亦將禍延肉理惡瘡之生勢所必然如流注癰毒之類故云惡身重者水濕之邪也汗出輒輕似乎邪解今云久久者必輕而復重重而復輕亡散衛陽耗竭津液不知其幾而邪仍不去則必轉為身瞤而胸中痛矣靈樞本藏篇云衛氣和則分肉解利皮膚調柔腠理致密又云衛氣者所以溫分肉充皮膚肥腠理司開闔素問痹論又云衛氣循皮膚之中分肉之間熏於肓膜散於胸腹調經論亦云陽受氣於上焦以溫皮膚分肉之間觀諸篇論則知人身分肉腠理皆衛氣之所充實上焦胸腹皆衛陽之所布輸今衛氣亡散分肉腠理不能緻密而反空虛空虛故瞤而動上焦胸腹不得受其熏布亦隨瞤而為虛痛也痛必欲按榮氣既虛衛復不固況腰以上為陽陽主開故汗出腰以下為陰陰主闔榮衛虛而邪復滯著故無汗惟其無汗邪不鬆解故如有物在皮中而腰臗為之弛痛也劇則三焦皆無所御榮衛不能相將氣不將於上則不能食氣不將於中則生煩躁氣不將於下則小便不利治以桂枝加黃耆湯者與上條黃耆芍桂酒湯之義亦同但此條云食已汗出常暮盜汗汗已反熱汗出輒輕而不解汗上出而下無皆似病在汗處故加薑棗甘草蓋欲助脾胃以行津液益辛甘以別取正汗耳諸病黃家但利其小便假令脈浮宜以汗解之宜桂枝加黃耆湯主之治疸利小便固一定之法然脈浮者郁在表又宜以汗解也諸黃豬膏發煎主之黃疸病茵陳五苓散主之二皆通治之方黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯汗出為表和腹滿便實為裡實裡實者宜下之黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之小便色不變大便欲自利里無熱也則喘滿為虛象若認為熱而除之必胃寒作噦矣諸黃腹痛而嘔者宜柴胡湯腹痛而嘔半表半裡柴胡湯即小柴胡湯也男子黃小便自利當與虛勞小建中湯黃而小便自利知非濕鬱乃男子勞役傷脾所致脾傷則見土色病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裡當下之凡病肚熱者熱在腹不獨疸也手按則知脈沉渴欲飲水小便不利者皆發黃沉為在裡渴為裡熱熱則多飲而小便復不利必郁為黃腹滿舌痿黃燥不得睡屬黃家胃土鬱則水液不分布故腹滿舌燥經云胃不和則睡不安皆黃家之先驅也黃疸之病當以十八日為期治之十日以上瘥反劇為難治土旺於四時各十八日濕土之病期亦應之十日以上則旺氣漸衰邪宜漸退反劇者則正不勝邪故云難治疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔發於陽部其人振寒而發熱也濕土鬱而成疸內關脾胃發於脾陰則嘔發於胃陽則振寒發熱皆二經是動之病正文云五疸實熱以疸皆濕與熱鬱外不得通內不得泄𨠭蒸成黃虛松而有通泄處則不能成黃故曰實熱若是則脈自應洪數澀微者自應為虛黃也渴為裡熱黃為表蒸表裡熱亢陰何以堪又疸既濕鬱汗溺不通可復加之飲乎渴則多飲故最忌也丹溪云黃疸不必分五總是濕熱不分則何以處治是失之太簡巢氏廣為九疸亦先之太繁惟金匱論證處方言言中的學者宗之自無過不及之偏也附方金匱茵陳湯治寒熱不食食即頭眩心胸不安久久發黃名為谷疸茵陳蒿六兩梔子十四枚大黃二兩上以水一斗先煮茵陳減六升內二味煮三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也金匱硝石礬石散治女勞疸身黃額黑日晡發熱惡寒膀胱急小腹滿足下熱因作黑疸其腹滿如水狀大便必黑時溏此女勞之病非水也硝石礬石各燒等分上為散以大麥粥汁和服二錢日三重衣覆取汗隨大小便去小便黃大便黑是其候也金匱梔子大黃湯治酒疸心中懊憹或熱痛山梔子十四枚大黃一兩枳實五枚豆豉一升上四味以水六升煮二升分溫三服金匱黃耆芍桂酒湯黃耆五兩白芍藥桂枝各三兩上以苦酒一升水七升相和煮三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也金匱桂枝加黃耆湯治黃疸脈浮而腹中和者宜汗之若腹滿欲嘔吐懊憹而不和者宜吐之不宜此方桂枝白芍藥生薑各三兩黃耆甘草各二兩大棗十二枚上以水八升煮三升溫服一升須臾飲熱稀粥一升余以助藥力取微汗若不汗更服金匱豬膏發煎豬膏半斤亂髮如雞子大二枚上二味和膏中煎發消藥成分再服病從小便出金匱茵陳五苓散茵陳蒿末十分五苓散五分上二味和先食飲方寸匕日三服金匱大黃硝石湯大黃黃柏硝石各四兩一作滑石梔子十五枚上以水六升煮二升去滓內硝石更煮取一升頓服金匱小半夏湯半夏一升生薑半斤上以水七升煮一升半分溫服小柴胡湯見第四十三小建中湯見第二十二
