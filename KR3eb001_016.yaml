body:
  text: 卷十六小兒脈證第七十八小兒之脈七至為平更察色脈與虎口紋三歲以下小兒純陽之體形質小呼吸促脈之周行駃而應指疾大約以七至為平非若大人四至為平也其太過為數為熱不及為遲為寒則與大人無異矣雖然脈至七八難全為準必察其色與所見之證更視虎口之紋而病情始無隱匿蓋五臟之列於面各有定部如左腮屬肝右腮屬肺額上屬心鼻屬脾頦屬腎是已諸邪之見於部亦各有定色如赤為熱白為寒黃為積青黑為痛是已虎口者食指內側連大指作虎口形故曰虎口是處肌皮嫩薄紋色顯明即肺手太陰經脈之盡處諸脈大會此經察色者即所以察脈也故色赤為熱在脈則數色白為寒在脈則遲色黃為積在脈則緩色青黑為痛在脈則沉弦此皆自然之理非可牽會雖無五部之分而有三關之別指初節曰風關二節曰氣關三節曰命關紋色見風關者輕再進則上氣關為重再進則直透命關為最重甚則主死由風邪而干正氣正氣不能勝而迫及於命漸進漸深之象也至如外證肝病主諸風顫掉實則目直叫呼脅痛項急呵欠頓悶二便閉塞虛則咬牙多欠目閉羞明心病主驚實則發搐叫喊或笑發熱欲飲水頻吐舌虛則悸臥不安畏見人舌痿不能乳脾主困實則困頓身重肌熱腹脹硬唇腫而渴虛則吐瀉不食慢風四肢不收口流涎肺主喘實則胸滿喘促悶亂虛則哽氣呵欠寒栗腎主恐怖畏明不能立二便清泄足冷但有虛證而無實證以上諸證不過言其大概耳至於傾移傳變何可勝紀惟圓機之士參合色脈識本知標溯流窮源錯綜體認縱不能臻聖神之域諒亦不在工巧之下矣小兒雜述襁褓千金論云小兒宜用父故絮女用母故絮為衣勿用新綿及過厚令壯熱生瘡發癇又令筋骨緩弱宜時見風日為佳乳哺乳者奶也哺者食也乳後不得便與食哺後不得便與乳小兒脾胃弱乳食相併難以克化周歲以上必成乳癖食癖作熱作疼疳病從此始丹溪曰小兒腸胃薄窄一切酸鹹甜辣魚肉水果濕面煎炒俱是發熱難化之物皆宜禁絶只與熟菜白粥非唯無病且不縱口可以養德婦人無知唯務姑息畏其啼哭無所不與積成痼疾雖悔何及乳母尤宜謹節飲食下咽乳汁便通情欲中動乳脈便應兒得此乳疾病立至不吐則瀉不瘡則熱驚搐夜啼口糜腹痛諸疾所由來矣病之初來其溺必少便須詢問隨證治母可消患於未形也乳母亦不宜用狐臭癭瘻喘嗽疥癬頭瘡聾啞齆鼻癇證之人肘後云兒生三日宜助穀神碎米作飲如乳與兒大豆許令咽之頻與三豆許三七日可哺千金云兒哺早不勝穀氣令頭面體生瘡愈而復發尪羸難養一月後雖哺勿多不嗜食勿強與之寶鑑云兒五十日可哺如棗核百日彈丸早晚二哺莫當風解衣澡浴及帶哭而乳冒冷而哺又不可在神佛驢馬畔及各房異戶皆令兒為病錢乙云惜兒過當三兩歲猶未飲食致脾胃弱一生多病半年後宜煎陳米稀粥時與之十月後漸與稠粥助中氣自然易養少病外臺崔氏初哺兒用平定成日醜寅辰巳酉日吉男忌戊己女忌丙丁日小兒四五歲當斷乳而不肯斷者宜畫眉膏斷後肉食宜少少漸進則無疳癖之患田氏曰大凡小兒過暖生熱熱極生風提抱生癰喂飼生癖盛夏浴後勿即乳兒兒啼勿即與乳令兒成胃毒或秋成痢浴後良久身體燥兒啼後俟氣息平方可乳盛啼即乳多令氣逆成厄千金論曰乳兒勿過飽飽則溢而吐若乳來多猛取出挼後再乳或先捏去宿汁乳之乳母欲寐當以臂枕兒頭與乳平母欲睡熟即奪其乳恐其不知飽足亦成嘔吐父母交合兒臥於側或驚起勿與乳蓋氣亂未定亦能害兒顱囟經曰夏不去熱乳令兒嘔吐冬不去寒乳令兒瀉痢侵早乳兒皆須捏去宿乳乳汁勿投於地蟲蟻食之令乳無汁宜沃東壁上張渙曰乳母須每日三時摸兒項後風池若壯熱者即須尉之使微汗即愈風池在頭項筋兩轅之邊切不可妄針灸亦不可輒吐下蓋針灸傷兒經絡吐下動兒臟腑也嬰兒半歲尻骨已成乳母當教兒學坐二百日外掌骨成教令地上匍匐三百日臏骨成教令獨立周歲膝骨成教令行步此皆一定之法世人惜兒懷抱過時柔痿筋骨為害非淺初生兒在胎藉胎液以生臟腑分娩時口含血塊啼聲出即咽下此毒內伏命門外感天時多發為驚風瘡疹等病須於未啼時用綿裹指急挖去用黃連豆豉朱蜜甘草解之後出痘亦輕又或難産或冒風寒垂危者勿即斷臍帶急烘綿絮包抱懷中以胎衣置火中更用火紙捻於臍帶上下往來燎之使暖氣入腹必自蘇尤戒浴恐腠理泄而外邪乘也看舌下有膜如榴子連舌致啼不出聲不轉速以指爪斷或用葦刀割之微有血出即活若血出多燒發灰豬脂和塗之兒上下唇與齒齦連處皆有一筋牽引若上唇筋緊即生上煉下唇筋緊即生下煉上煉生瘡滿頭或眉間如癬狀瘙癢不已復流黃汁至處生瘡下煉起腰背漸至四肢患亦如上若不治或頭面相通纍年不輕令夭折或成大病惟每早拭口佳兒生三日以桑槐榆桃柳嫩枝各三寸長者二三十節煎湯適冷熱入豬膽汁一枚浴之勿久浴湯用豬膽益母草不生疥瘡用金銀花虎頭骨麝丹砂辟惡氣客忤驚癇用桃梅李楮根葉解體熱溫疫須臨浴時煮紀用經浴法用寅卯酉日吉壬午丁未癸巳凶不能上三日勿犯下三日又三日五日七日宜浴小兒浴勿先斷臍帶恐水濕侵臍有臍風臍瘡等證用清油調發灰敷臍佳千金云臍勿以刀割隔單衣咬斷以暖氣呵七遍即纏結所留帶致兒足趺上斷訖看臍帶中多有蟲急剔去不爾入臍成疾臍當長六寸長則傷肌短則傷臟不以時斷及挼汁不盡暖氣漸微即生寒令兒臍風寶鑑論斷臍若用剪刀先於懷中令剪暖又水入臍多天釣痛苦啼叫面青黑臍傷動久不幹傷外風即口噤不可救聖惠云兒生一宿抱近明無風處看臍上有赤脈直上者即於脈盡頭灸三壯赤散即無患矣裹臍必用軟練帛若十許日怒啼不止必臍燥刺腹或衣中有刺物或換衣或換裹須細察之崔氏云兒衣須清水洗勿令汙濁新瓶盛密蓋置便宜處三日後依月吉地向陽處埋之入土三尺須牢築令兒壽若不謹或為蟲畜傷食主兒不壽或橫亡宜天德月空處埋吉正月天德在辛月空在丙辰余詳官本歷日若遇反支宜挂宅外福德上向陽高燥處待過月然後依法埋藏吉甲乙日生丙丁日藏丙丁日生戊己日藏戊己日生庚辛日藏庚辛日生壬癸日藏吉集驗方云小兒初剃頭不擇日皆於滿月日剃之蓋俗所尚前産婦未得出房於滿月即與兒俱出謂胎髮穢惡有觸神灶令兒不安故於此日剃頭而出凡剃頭須避風就暖剃後以杏仁三枚去皮尖研碎入薄荷三葉再同研卻入生麻油三四滴膩粉拌和頭上擦免生瘡疥熱毒初生輒死千金云兒初生輒死視口中懸雍前上齶有泡者以指甲摘取頭決潰去血勿令入咽不能啼三因云兒初生不能啼者必難産冒寒所致急用綿絮包抱懷中勿斷臍帶將胞衣置爐炭中燒之再捻大紙條蘸油點火於臍帶下熏之令火氣入臍更以熱醋湯燙洗臍帶須臾氣回啼哭方可浴浴後斷帶又或有泡在上齶即如上救初生輒死法治之眼不開兒初生眼不開呻吟胎熱故也宜天竺黃散生地黃湯及與乳母吃亦有洗拭不淨使穢汁潰於眥中致赤爛長亦不瘥宜真金散洗之不吃乳此亦拭口不淨惡穢入腹令兒腹滿氣短不能吮乳或母取冷過度胎中受寒令兒腹痛也宜外臺方之類灸承漿七壯亦好不小便此多因母恣食熱物熱毒入胎所致如臍腹腫脹四旁青黑色及口撮即不可救如未見色宜外臺方豆豉膏之類不大便由胎中受熱熱結肛門燥澀所以如此若三日不通急令乳母以溫水漱口咂兒前後心並臍下手足心共七處凡四五次仍以輕粉半錢蜜少許溫水化開時時服少許以通為度如仍不通須透而通之金簪玉簪俱可須刺入一二寸內少蘇合丸於內糞出為快若腹膨脹呻吟不乳至一七則難救用硬蔥針紝肛門亦好鵝口初生口中舌上白屑如鵝之口由在胎受穀氣盛心脾熱氣熏發用發纏指蘸井花水揩拭之睡時煅黃丹出火氣摻舌上如屑不脫可濃煮栗荴汁綿纏指蘸拭如無栗荴栗木皮代之撮口其證舌強唇青聚口撮面面目黃赤喘急聲不出飲乳有妨若口出白沫四肢冷不治其或肚脹青筋吊腸卵疝內氣引痛皆腸胃鬱結不通所致治宜疏利過七日乃免宜辰砂殭蠶散之類臍風臍濕臍瘡氣臍凸臍此皆因斷臍不慎為風冷水濕所乘入於臍流入心脾令腹脹臍腫四肢不收多啼不乳甚者發搐久不瘥為臍瘡入於經脈多變為癇若臍凸肚緊微有青色口撮不開肝氣盛而克脾土不可施治縱使得安亦非長壽宜五苓散之類又法小兒七日內患臍風撮口百無一愈但看兒齒齦上有小泡子如粟米狀以熟帛裹指蘸溫水輕輕擦破即安又灸然谷穴在內踝前大骨下陷中灸三壯針入三分不宜見血顱囟經治臍濕用枯礬龍骨為末入麝少許拭臍乾用避風絳帛灰敷妙蓋破屋爛草為末摻之亦好氣臍大如栗虛腫而軟疼用竹瀝塗日數上消臍瘡宜龍骨散凸臍因兒有熱在胸頻頻伸引厄厄作聲努張其氣抑入根本之中所以凸起虛大可畏不必以藥敷之恐反為害宜白芍藥湯加米仁煎湯空心溫服以外消散塗貼自平天釣亦驚風之類但發時頭面仰視翻眼抬睛故名天釣宜雙金散或灸兩手大拇指兩甲內相半男先灸左女先灸右及兩足大拇指中間各三五壯又灸前後手心各五壯妙頭目不仰乃驚風之類宜辰砂抱龍丸遺尿原病式謂遺尿不禁為冷內經云不約為遺溺仁齋曰小便者乃津液之餘也腎主水膀胱為津液之府腎與膀胱俱虛而冷氣乘之不能拘制其水出不禁謂之遺尿睡里出者謂之尿床此皆腎與膀胱俱虛而挾冷所致宜雞腸散外臺方亦有熱結於腎部干於足厥陰之經庭孔鬱結氣血不能宣通則痿痹而神無用故液滲入膀胱而溺遺失宜六味丸舌齦齶諸病楫師王紹龍先生云心為一身君主神識之舍外候於舌無論外感內傷皆當察之其色紅潤而淨者吉有苔者病苔薄少色鮮明者輕厚滿色黑暗者危色枯燥不澤圓縮強硬者死至於傷寒痘疹更宜細察又脾之脈絡絡舌本心脾有熱無處疏泄而發證於舌者如弄舌重舌木舌舌白舌黃舌瘡舌血之類弄舌者時時微吐其舌如火之焰心脾積熱所致兼脾證者宜瀉黃散兼心證宜導赤散或大黃黃連瀉心湯重舌者舌下有形如舌宜刺出血及服瀉黃散敷糝清液散馬牙硝蒲黃末之類木舌者舌腫漸大塞滿口不治殺人宜瀉黃散舌白者舌上有厚白苔也宜桑白皮汁敷之薄荷汁生薑蘸擦亦妙舌黃者即舌上黃苔也宜瀉黃散舌瘡者舌上生瘡也宜白礬塗足法舌血者舌上黑有孔出血不止心火熾盛故也宜蒲黃末敷之重齦重齶者齦上齶上腫也總不外一熱俱宜刺決洗拭宜雞內金為末干糝或服五福化毒丹鼻衄小兒鼻衄者因肺胃熱盛迫血妄行出於上竅春冬衄者宜用生地黃汁加生蒲黃末少許砂糖井花水浸服之秋夏宜用車前草一握洗淨同生薑一處研取汁入白蜜一匙先拌查塞鼻次用新汲水和蜜並車前薑汁飲之又生蘿蔔搗汁仰頭滴入鼻即止次以新汲水和蜜蘿蔔汁飲之又宜服膠黃散語遲應語不語曰語遲由母受驚怖內動兒臟邪乘於心舌乃心苗心氣不和舌痿無力故也宜菖蒲丸或灸心俞三壯無辜疳巢氏云古謂天上有鳥名無辜晝伏夜遊小兒衣衲夜露失收鳥從上過小兒親體染其毒氣遂致面黃髮直壯熱能飲食而不生肌肉纍積月日而死故名無辜漢東王先生非之曰此由八邪所乘八邪者何謂飢飽勞役風驚暑積也若然是皆有因而成不得名無辜矣楫謂夜露陰沉百邪皆出狐貍梟鵬之類何所不有衣染其氣小兒氣虛體薄者理應成病以其不在八邪之內無辜而得故名無辜非獨因鳥名也宜肥兒丸布袋丸之類鶴節小兒稟賦不足血氣不榮肌肉瘦瘁骨節聳露如鶴膝之節乃腎虛不生骨髓耳宜錢氏地黃丸哺露小兒哺乳不節不消致脾胃衰弱弱則愈不能消令肌肉尪羸骨如柴露吸吸苦熱以其得之乳哺故曰哺露宜大啓脾丸肥兒丸丁奚小兒脾胃尚弱若哺食過度不消水穀之精減少不榮肌肉日漸瘦削其頸項四肢骨立零丁而腹則獨大如奚囊也故名丁奚與哺露大同小異其證吐泄不時色慘潮熱或黃瘦顱開囟陷手足如筒宜參苓白朮散大啓脾丸之類滯頤俗名口水流滯於頤下故名由脾虛冷液多不能收攝耳亦有脾虛挾熱而流者宜審證施治虛冷宜益黃散熱宜瀉黃散之類啼哭有驚啼夜啼躽啼驚啼者精神不定睡臥不安如驚而啼屬臟熱夜啼者入夜即啼陰寒相感屬臟寒躽啼者腹中痛甚張氣促眉身躽而啼屬食不消或有積滯驚啼宜安神丸涼膈散夜啼宜花火膏蟬花散茅先生抹唇膏躽啼宜白朮當歸煎丸之類龜胸龜背龜胸者母食五辛或兒食宿乳熱熏於肺肺氣不寧以致咳逆上氣壅滿胸中久則胸亦高腫如龜之胸也龜背者是強兒坐或坐風中邪乘於脊或乘於督脈不能解散漸如傴僂而背高如龜狀也龜胸者宜瀉白散外治塗龜尿法龜背者宜羌活防風及龜鹿膠等藥外亦宜塗龜尿解顱囟陷囪填解顱者小兒數歲囟不合而頭顱開也囟陷者囟門深陷也囟填者囟門腫起也皆屬腎虛髓少骨氣不實多主夭折間有臟腑有熱熱上衝而成者然腎虛固本病也宜補中益氣湯錢氏地黃丸小兒錮囟藥之類行遲腎主骨主髓虛則髓少骨柔故行遲耳宜錢氏地黃丸麝茸丹之類齒遲亦腎虛也夫齒為骨之餘藉髓榮養腎髓虛少不能充骨又安能及齒故久不生也宜六味地黃丸發遲發黃亦少陰腎臟虛耳腎主藏精其華在發少陰氣血不足即發疏薄不生亦有因頭瘡而禿落者宜千金楸葉方榆末散聖惠黑豆膏選用錢氏曰小兒長大不行行則腳弱齒久不生生則不固發久不生生則不黑皆屬氣血虛也宜大劑補之發黃宜千金冀大豆方齒牙頰車齒者骨之餘其本在腎而經則屬胃與大腸病在本者多屬虛在經者多實火宜細察形脈兼證治之宜清胃湯雄黃丸千金白鹽方靈苑生齒方耳耳者心腎之竅肝膽之經也心腎主內屬精血不足肝膽主外屬風熱有餘或聾聵或鳴響者稟賦虛也或脹痛或膿癢者邪氣客也虛者宜六味地黃丸風熱客者宜柴胡清肝散其他諸證不一宜後方對證選用宜湯氏龍黃散若諸蟲入耳宜立驗散五軟五軟者頭項軟手軟腳軟肌肉軟口軟是也頭軟頭不舉項脈軟而難收治雖暫瘥他年必再發手軟則手垂四肢無力亦懶抬肩若得聲圓還進飲食乃慢脾風候也尚堪醫治腳軟者五歲不能行虛羸腳細小不妨榮衛但服參耆等藥並錢氏地黃丸長大自然肌肉充滿肌肉軟則肉少皮寬自離飲食不長肌肉宜錢氏橘連丸若瀉利頻者難治口軟則虛舌出口唇青氣喘則難治薛氏曰頭項軟者天柱骨弱臟腑骨脈皆虛諸陽氣不足也手足軟者脾主四肢中州不足不能榮養四肢故肉少皮寬而飲食不為肌膚也口軟者口為脾竅上下齦屬手足陽明陽明主胃脾胃氣虛舌不能藏而常舒出也此五者皆因五臟氣弱不能滋養充達原其要則總歸於胃以胃為水穀之海五臟六腑之大源故治必先以脾胃為主皆宜用補中益氣湯以滋化源頭項手足三軟兼服地黃丸五硬五硬者仰頭取氣難以動搖氣壅作痛連於胸膈手足心冷而硬此陽氣不營於四末也經曰脾主四肢又曰脾主諸陰今手足冷而硬者獨陰無陽也故難治若肚筋青急者木乘土位急用六君子湯加炮薑肉桂柴胡升麻以復其真氣若系風邪當參驚風治之此證從肝脾二臟受患補脾平肝魃病魃小鬼也乳兒未能行而母復有娠其兒忽微下利寒熱往來毛髮鬇鬡為有惡鬼神導腹中之胎妒嫉而為此故名魃病也以他兒食其乳亦能相繼而病故俗又名繼病雖然妊娠乳兒不必悉致魃亦偶有此耳女子氣血上為乳汁下為經水小兒飲交乳且病況氣血既榮於胎而乳汁必自漓薄兒飲之能無病乎鬼神之咎似無稽也客忤客忤者是小兒神氣軟弱忽有非常之物或未經識見之人觸之與兒氣相忤而發病謂之客忤亦名中客又名中人其狀吐下青黃白色水穀解離腹痛反倒夭矯面變易五色狀似癇但眼不上插耳其脈弦急數者是也失時不治久則難治若乳母飲酒過度醉及房勞喘後乳者最劇能殺兒凡兒衣布綿帛鞋襪中不得有頭髮凡小兒中客急視其口中懸雍左右當有青黑腫脈核如麻豆大或赤或白或青者便宜用針速刺或爪摘決之並以綿纏叉頭拭去血能愈宜豆豉大丸摩法談氏殊聖治客忤方張渙辟邪膏灶中黃土方三物燒發散之類中惡小兒中惡者是卒中鬼邪之氣也其證先無他病卒然心腹刺痛悶亂欲死是也此必精氣衰弱而後鬼惡得以中之若腹大而滿脈緊大而浮者死緊細而微者生治之餘邪不盡留滯臟腑更發變為疰病矣宜先下蘇合香丸未醒以皂角末搐鼻取嚏次服沉香降氣湯又宜蔥刺鼻法肘後灸法管吹下部法以上救客忤中惡法及一切卒死皆可參用卒死小兒卒死者是三虛而遇賊風故無病倉卒而死三虛者乘年之衰逢月之空失時之和也詳靈樞歲露篇人因此三虛復遇賊風令陰氣偏竭於內陽氣阻隔於外榮衛壅閉陰陽不通故暴絶而死若臟腑未竭良久乃蘇亦有挾鬼神氣者皆須治令邪退乃生若有餘邪留蓄再發則成疰病矣其證眼合嚌齒遍身綿軟面青黑口鼻冷宜蘇合香丸千金牛舐方尉兩脅方治卒魘方皂角搐鼻法雞冠血方灸人中及心下之類鬼持小兒鬼持者乃神氣弱為鬼所持其狀無他疾乃萎黃啼喚口氣常臭是也宜圖經治鬼持方外臺深師五邪丸之類疰病疰者注也亦言住也謂風邪鬼氣住人身內又復注易傍人無問人之大小若血氣衰弱則陰陽失守風邪鬼氣因而客之留住肌腠連著臟腑或皮膚掣動遊易不常或心腹刺痛或體熱皮腫沉滯至死死後注人小兒襁褓居室無因觸冒風邪多緣乳母解脫之時不避溫涼暑濕或抱持出入早晚其神魂軟弱為鬼氣所傷故耳宜太乙備急散尸疰尸疰者是五尸之中一尸疰也人無問大小腹內皆有尸蟲尸蟲為性忌惡多接引外邪共為患害小兒血氣衰弱者精神亦羸故尸疰因而為病其狀沉默不的知病之所在或寒熱淋漓涉引歲月遂至於死死又疰易傍人故曰尸疰也宜聖惠木香散之類蠱疰蠱疰者人以蛇蟲諸毒聚於器中令相啖食食盡存一物最惡最毒名曰蠱能隨飲食變化入腹還生食人五臟小兒中者證與大人無異其狀心腹多刺痛懊悶急者即死緩者延涉歲月羸困下血臟爛乃死死又疰易傍人故為蠱疰也宜範汪十七物紫參丸羚羊角散雄黃散小兒五種蠱毒方敗鼓皮方附方畫眉膏山梔三個燒存性雄黃少許硃砂少許上為細末入麻油輕粉各少許調勻候兒睡著濃抹於兩眉上醒便不食乳未效再用加黃丹一錢金朱飲本名天竺黃散治驚壯熱傷寒伏熱上焦虛熱重舌口鼻生瘡赤眼川鬱金銼皂莢水煮乾細者如膽狀佳天竺黃甘草炙馬牙硝各半兩硃砂一分研蟬殼十四個水洗去土麝香少許上為末每服半錢至一錢蜜湯調下生地黃湯治初生兒眼不開乾地黃赤芍藥川芎當歸去蘆栝蔞根甘草各等分上為細末少許用燈心煎湯調抹口中真金散治兒初生洗眼不淨穢汁浸漬眼眥赤爛至長不瘥母食熱物熱藥名曰胎赤黃連去須黃柏當歸赤芍藥各一錢杏仁去皮尖半錢上銼散乳汁浸一宿曬乾為極細末用生地黃汁調一字頻頻點眼新綿裹荊芥湯浸溫時時洗浴母服洗心湯外臺方乳兩合蔥白一寸煎一兩沸去蔥吃即乳豆豉膏黑豆一勺田螺十九個蔥一大把上搗爛芭蕉汁調貼臍下蘇合香丸見第十八辰砂殭蠶散治初生撮口辰砂水飛半錢殭蠶真的去絲嘴炒一錢蛇蛻皮炒一錢麝香研半錢上為極細末少許用蜜調敷唇口五苓散見第十七龍骨散治臍中瘡龍骨煅輕粉各半錢黃連去須一錢半上為極細末少許乾摻臍白芍藥湯治冷疝腹痛及誤汗下即壞證傷寒是也並宜先服次投對證之劑白芍藥一兩半澤瀉去粗皮七錢半甘草炙二錢薄桂去粗皮一錢半上件㕮咀每服二錢水一盞煎七分空心溫服誤汗誤下加人參南木香各二錢臍下痛入生薑及鹽同煎或加鉤藤亦好外消散治兒初生臍突或痛或不痛痛則啼不已及小兒因感濕熱陰囊浮腫大黃牡蠣各半兩朴硝二錢前二味銼焙為末仍入朴硝鉢內同杵勻用一二錢先取田螺淨洗水半碗活過宿去螺用水調塗腫處即消其螺放生勿害治陰囊腫用車前子煎湯候冷調敷雙金散治天釣驚風目久不下蜈蚣一個去頭足尾用真酥塗慢火炙黃置砧子上面南立用竹刀子當脊縫中亭剖作兩半個左邊者入一帖子內寫左字右邊者亦入一帖子內寫右字不得錯誤麝香一錢細研先將左邊者同於乳鉢內研作細末卻入在左字帖內收起別用乳鉢將右邊字者入麝香同研極細卻入右字帖內收不得相犯每有病者眼睛釣上止見白睛兼角弓反張更不能出聲者用此藥法治之上用細葦筒子取左字帖內藥少許吹在左邊鼻里右亦如之用藥不可多若眼未全下更添些小以意量度其眼即下神砂抱龍丸治小兒驚風痰喘風寒膽星四兩硃砂水飛五錢麝香五分雄黃二錢五分天竺黃一兩上為極細末甘草膏和丸硃砂為衣一方加金箔十張雞腸散治因膀胱有熱服冷藥過多小便不能禁止或遺尿病雞腸一具男用雌雞女用雄雞燒存性牡蠣茯苓去皮桑螵蛸炒各五錢桂去粗皮龍骨各二錢半上為極細末仍以雞䏶胵一具雞腸一具燒存性研極細末每用和前藥末一錢用溫酒調化食前服外臺方療小兒睡中遺尿不自覺桂末雄雞肝等分搗丸一豆大溫水下日三服六味地黃丸見第十六瀉黃散見第四十九導赤散見第十七大黃黃連瀉心湯見第五十五清液散治小兒重舌及口瘡青黛朴硝各一錢龍腦一字上為細末用蜜調鵝翎蘸少許敷之五福化毒丹治積熱驚惕狂譫煩渴頰赤咽乾唇口生瘡夜臥不寧頭面遍身瘡癤及小兒驚風痰熱潮搐等證如大人口臭及小兒瘡疹上攻口齒涎血臭氣用生地自然汁化一丸以雞翎刷口內熱疳黃瘦雀目者陳粟米泔下食後臨臥服玄參桔梗各二兩人參牙硝青黛各一兩甘草七錢五分麝香一分蜜丸芡實大金銀箔各四十片為衣每一丸作四服薄荷湯下膠黃散治小兒大衄口鼻耳出血不止十五六歲兒陽盛多此病阿膠一兩蒲黃半兩上為末三歲半錢生地黃汁微煎調服食前菖蒲丸治小兒心氣不足五六歲不能言石菖蒲二錢人參切去蘆焙半兩丹參二錢天門冬去心皮麥門冬去心焙各一兩赤石脂三錢直指有當歸川芎硃砂上為細末煉蜜丸如緑豆大或麻子大溫水下五七丸至一二十丸不拘時日三服久服取效又有病後腎虛不語者宜兼服錢氏地黃丸肥兒丸治小兒腦後項邊有物如彈子按之轉動軟而不痛名無辜疳久服神效胡黃連神麯炒麥糵各五錢檳榔三錢木香二錢肉豆蔻麵裹煨使君子肉各二錢半上為細末蒸餅丸如黍米大用米飲食遠服布袋丸治諸疳疾面黃腹大飲食不調肌肉枯瘁夜明砂揀淨淘澄淨蕪荑炒去皮各二兩白茯苓去皮白朮無油者去蘆人參去蘆甘草蘆薈細末各半兩使君子肥白者微炒去皮二兩上為末湯浸蒸餅和丸如彈子大每服一丸以生絹袋盛之次用精豬肉二兩同藥一處煮候肉熟爛提取藥於當風處懸挂將所煮肉並汁令小兒食所懸之藥第二日仍依前法煮食只待藥盡為度錢氏地黃丸治頭囟不合體瘦骨露如鶴膝皆腎虛也並治腎疳天柱傾倒腎主骨故熟地黃洗焙八錢澤瀉洗去毛牡丹皮去心白茯苓各三錢山茱萸肉牛膝鹿茸酥炙山藥各四錢上為末煉蜜丸如梧子大三歲以下三二丸溫水空心化下大啓脾丸即資生丸見第五十一參苓白朮散見第四十四益黃散又名補脾散治脾胃虛寒泄瀉嘔吐腹痛口鼻氣冷有熱證不可服陳橘皮一兩青橘皮訶子肉甘草各半兩銼炒丁香二錢白茯苓一兩上為細末每服二錢水一盞煎至六分食前溫服瀉黃散見第四十九安神丸見第十九涼膈散治小兒臟腑積熱煩躁多渴頭昏唇焦咽燥舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡痰實不利涕唾稠黏睡臥不寧譫語狂妄腸胃燥結便溺赤澀一切風腫並宜服之方見第十九花火膏取燈火一顆塗乳上令兒吮之蟬花散治小兒夜啼不止狀若鬼祟用蟬蛻下半截為末一字薄荷湯入酒少許調下或者不信將上半截為末煎湯調下即復啼也古人立方莫知其妙茅先生抹唇膏主小兒夜啼內有驚熱蟬殼一個去足燈花兩朵硃砂少許上為末如小兒夜啼遇夜用雞冠血調藥抹兒上下兩唇即止夾硃砂膏與服白朮當歸煎丸治胎寒腹痛遇夜啼叫身體躽張有如癇狀吐哯不止大便酸臭乳食雖多不生肌膚白朮當歸木香上等分為細末煉蜜為丸如桐子大每服一丸煎木香湯化下瀉白散見第四十九塗龜尿法取龜置荷葉上鏡照之則自尿一法以鬃搐其鼻亦自出補中益氣湯見第三十九小兒錮囟藥白芍藥粉上取黃雄雞臨兒囟上刺其冠以血滴囟上血止以芍藥末敷上掩血令不見一日立瘥不愈再如法敷之麝茸丹治數歲不能行麝香別研鹿茸酥炙黃生乾地黃虎脛骨酥塗炙黃當歸洗焙乾黃耆銼上件各一兩為細末用羊髓四兩煮爛和成膏如黍米大每服十粒磨沉香湯下乳食前日三服千金楸葉方治少小頭不生髮以楸葉搗取汁敷頭上立生榆末散治小兒白禿發不生搗榆皮末苦酒調塗聖惠神效黑豆膏治兒腦疳發連根作穗脫落不生或白禿瘡發不生者兼能黑鬚黑豆苣蕂各三合訶黎勒皮一兩上件藥搗羅末水拌令勻內於竹筒中以亂髮塞口煻灰內煨取油貯瓷器中先以米泔皂莢湯洗頭拭乾塗之日再用十日發生千金翼大豆方治發黃以醋煮大豆爛去豆煎令稠塗發清胃湯治胃火牙痛或連頭面方見第四十九雄黃丸治小兒牙齒黑蛀氣臭疼痛雄黃二錢麝香半錢上為細末軟飯和為梃子安在牙內千金白鹽方常以白鹽末封齒齦上日三夜二靈苑生齒方上用雄雌雞糞各十四顆焙乾同研如粉入麝香少許仍先以針挑破損齒腳下血出將散子敷之年高者不過二十日生年少者十日不計傷損及少自退落並再生柴胡清肝散治肝膽三焦風熱怒火或乍寒乍熱往來寒熱發熱或頭髮瘡毒等證柴胡一錢半黃芩炒人參川芎各一錢山梔炒一錢半連翹甘草各五分桔梗八分上水煎服湯氏龍黃散治小兒聤耳汁出不止枯白礬龍骨末黃丹炒各半兩麝香一錢上同研細先以綿杖子搌膿水盡用散一字半分為兩處入耳內日二次立驗散治蚰蜒及諸蟲入耳川芎白芷夜明砂炒豬牙皂角炙南星炮各七錢五分百部白丁香藜蘆各四錢草烏半兩砒霜另研蓽茇各二錢海金沙二錢半上為細末研勻臨時更用鉛丹調色勻瓷器收如蚰蜒入耳取少許以醋一滴調化以細翎蘸藥入耳竅微吹令藥氣行立出藥不得多多則蚰蜒成水不出如蠍螫先點少醋在螫處摻藥半字許擦令熱即效錢氏橘連丸治疳瘦久服消食和氣長肌肉橘皮一兩黃連米泔浸一宿一兩半上為細末另研入麝香五分用豬膽七個分藥入膽內漿水煮候臨熟以針微刺破以熟為度煮粟米粥和丸如緑豆大每服十丸至二三十丸米飲下量兒加減無時豆豉大丸摩法用豉數合水拌濕搗熟丸如雞子大摩兒囟上足心各五六遍又遍摩兒心及臍上下食頃破視其中當有細毛即擲丸道中談氏殊聖治客忤方驚啼哭不休壯熱脈如鉤莫識為何病傷心不自由犀角雄黃搗桃符煎水稠參苓芣苡子三粒化無憂張渙辟邪膏兒血氣未實神氣軟弱除父母及乳養人外勿令見生人及抱往別房異戶及見牛馬畜獸等其父母家人之類自外夜行歸家亦勿令見恐經履鬼神惡氣犯兒令吐下五色水穀解離狀似發癇但眼不上戴脈不弦急名曰客忤真降香銼白膠香沉香虎頭骨微炒鬼臼去毛草龍膽人參白茯苓上各半兩搗羅細末次入水磨雄黃半兩細研水飛次研麝香一錢拌勻煉蜜和丸雞頭大每一粒煎乳香湯化下及別丸如彈子大用緑絹袋盛佩兒衣上仍臥內常燒神妙灶中黃土方客忤因而驚忤者治法用灶中黃土研二兩雞子一枚去殼二件相和入少許水調先以桃柳枝湯浴兒後將此藥塗五心及頂門上陳無擇法用灶中黃土蚯蚓屎等分如此法塗之三物燒發散治小兒見生人驚忤啼不止即用來人囟上發十莖斷兒衣帶少許合燒灰細末和乳飲兒愈皂莢搐鼻法見第七十三沉香降氣湯即前辟邪膏蔥刺鼻法上取蔥黃心刺其鼻男左女右入七八寸小兒量度之若使目中血出佳扁鵲法同是葛氏肘後灸法以繩圍其死人肘腕男左女右畢伸繩從背上大椎度以下又從此灸橫行各半繩此法三灸各三即起又令爪其病人人中取醒不起者卷其手灸下文頭隨年壯又灸鼻中三壯也又灸頤下宛宛中名承漿穴十壯大效又灸兩足大指爪甲聚毛中七壯此華他法一云三七壯又灸臍中百壯也管吹下部法以管吹下部須數人互吹氣通則活千金牛舐方治卒死無脈無他形候陰陽俱竭故也用牽牛臨兒鼻上二百息牛舐必瘥牛不肯舐著鹽汁塗面上即牛肯舐尉兩脅法右炙尉斗尉兩脅下備急方云又治尸厥治鬼魘死方搗韭汁灌鼻孔中劇者灌兩耳張仲景云灌口中雞冠血方治小兒不知所病便死絶方上取雄雞冠臨兒口上割血滴入口下即活灸法卒死而四肢不收屎便者灸心下一寸臍上三寸臍下四寸各一百壯兒小者隨年圖經治鬼持方用虎睛爪並指骨毛系兒臂上辟惡鬼外臺深師五邪方療鬼魅妄言狂走恍惚不識人此為鬼忤丹砂雄黃各別研龍骨馬目毒公鬼箭各五兩鬼臼二兩赤小豆三兩芫青一枚桃仁百枚去皮尖熬別研上搗末細絹篩合諸藥拌令勻後內蠟和如彈丸絳囊盛係臂男左女右小兒繫頸合時勿令婦人雞犬見服者蜜和丸如桐子大一服三丸日三服忌五辛生血物太乙備急散主卒中惡客忤五尸入腹鬼刺鬼痱及中蠱疰吐血下血及心腹卒痛腹滿傷寒陰毒病六七日雄黃芫花桂心各二兩丹砂蜀椒各一兩藜蘆巴豆各一分附子炮裂去皮臍五分野葛三分上九味巴豆別治如脂余合治下篩以巴豆合和更搗令勻以銅器密貯之勿泄有急疾水服一字匕可加至半錢匕老小半之病在頭當鼻衄在膈上吐在膈下利在四肢當汗出神效聖惠木香散治小兒尸疰心腹脹痛不可忍木香鬼箭羽桔梗去蘆頭當歸銼微炒紫蘇莖葉各半兩檳榔三分上搗為粗散每一錢以水一小盞入生薑少許煎五分去滓不計時溫服更量兒大小加減範汪方十七物紫參丸療大人小兒蠱疰癥瘕積聚瘦削大小便不利卒忤惡風臚脹腹滿淋水轉注殫門盡戶延及子孫醫不能療者紫參人參半夏湯洗藜蘆代赭石桔梗白薇肉蓯蓉各一分石膏大黃牡蠣熬丹參各一分蝦蟆燒灰烏頭炮各四分狼毒七分附子炮五分巴豆七十枚去心皮熬上藥搗篩蜜和為丸以飲下如小豆一丸日三服老小以意減之蜂蠆所螫塗上神良忌豬羊肉冷水一方無蝦蟆有乾薑四分羚羊角散治小兒中蠱腹內堅如石面目青黃小便淋瀝變易無常羚羊角屑蘘荷各一兩梔子仁七枚赤芍藥牡丹皮黃連去須各一分犀角屑半兩上搗粗末羅為散每服一錢以水一小盞煎至五分去滓溫服日三四服更量兒大小加減與之雄黃散治小兒飛蠱狀如鬼氣者宜服雄黃麝香各細研犀角末各半兩上藥都研令勻每服以溫水調下半錢匕日四五服量兒大小加減小兒五種蠱毒方上搗馬兜鈴根羅為散每服一錢水一盞煎五分去滓空腹頓服當隨吐蠱出未吐再服敗鼓皮方上用敗鼓皮一片燒灰細研為粉空心粥飲調服一錢病人須臾呼蠱主姓名便愈
