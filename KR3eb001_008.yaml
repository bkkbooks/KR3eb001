body:
  text: 卷八眩暈脈證第六十一諸風眩暈有火有痰左澀死血右大虛看眩者目乍黑乍明䀮䀮不定也暈者頭昏目旋轉岑岑欲倒也高巔而見動象風性為然故眩暈者多屬諸風或兼見惡風項強等證脈應浮宜芎藭散東垣羌活湯之類又不獨一風也有因於火者有因於痰者有因於死血者有因於虛者夫火性上炎衝於巔頂動搖旋轉不言可知或兼見心煩口燥面赤耳鳴嘈雜吞酸等證脈應數宜涼膈散防風通聖散之類胸中痰濁隨氣上升頭目位高而空明清陽所注淆濁之氣擾亂其間欲其不眩不暈不可得矣或兼見吐痰嘔飲胸痞腸鳴等證脈應滑宜東垣半夏白朮天麻湯滾痰丸玉液湯之類諸陽上行於頭諸脈上注於目血死則脈凝泣脈凝泣則上注之力薄矣薄則上虛而眩暈生焉其脈左手必澀澀為滯澀徵死血之不流利也或兼見脅痛喜忘目黃便黑等證宜四物湯丹皮紅花桃仁之類又為枯澀徵血液之不充足也謂之血虛眩暈亦可宜四物湯脈必徵於左者以左心主血肝藏血腎主液為血之源耳頭以法天諸陽之首又云清陽出上竅而目在其中清陽者氣也氣不足則不能上達以致頭目空虛而眩暈時時作矣其脈右手必大而無力散漫空松之象也謂之氣虛眩暈亦可脈必徵於右者以右肺主氣脾生氣命門火為氣之根耳宜補中益氣湯芎歸菊花之類附方芎藭散治風頭眩眼目昏痛眩暈倦怠心忪芎藭前胡白殭蠶炒人參各一兩蔓荊子天麻酒浸焙防風去叉各半兩上為末每服二錢食後溫酒調下東垣羌活湯治風熱壅盛上攻頭目昏眩羌活防風黃芩酒洗各一兩柴胡七錢黃連酒煮一兩黃柏酒炒栝蔞酒洗各半兩甘草炙七錢白茯苓五錢澤瀉三錢上為粗末每服五錢水煎取清食後或先臥通口熱服之日二服涼膈散見第十九防風通聖散見第四十九上散賈同知崔宣武劉庭瑞及河間者共四方其中藥品增減分量多寡俱不相同但河間適中選用當從之也半夏白朮天麻湯見第二十二滾痰丸見第十七玉液湯治七情所傷氣鬱生涎隨氣上逆頭目眩暈心嘈忪悸眉稜骨痛半夏肥大者六錢湯泡七次切作片上作一服水一鍾半生薑十片煎至八分去滓入沉香末少許不拘時溫服四物湯見第二十一補中益氣湯見第三十九頭痛脈證第六十二頭痛多弦浮風緊寒熱洪濕細緩滑厥痰氣虛弦軟血虛微澀腎厥弦堅真痛短澀弦為陰脈斂直而無抑揚之勢乃陽虛不能張大或致外邪所乘況頭乃六陽所乘邪束於外陽鬱於中安得不痛故頭痛者多弦多弦者不皆弦也亦有脈浮而痛者屬風風性飄蕩虛浮也兼見惡寒發熱自汗等證宜仲景桂枝湯玄珠茶調散之類脈緊而痛者屬寒寒性收斂緊實也兼見惡寒發熱無汗體痛等證宜仲景麻黃湯九味羌活湯之類脈洪而痛者屬熱熱性充盛洪大也兼見惡熱面赤口乾等證其痛刺動不定宜瀉青丸二仙散對金散神芎丸涼膈散之類脈細而痛者屬濕濕性滲衍濡細也兼見體痛頭重冒鼻塞目黃等證宜奇效芎術湯半夏白朮天麻湯或瓜蒂散或紅豆散搐鼻脈緩滑而痛者屬痰痰乃凝水結液停蓄不流故替替然緩滑也兼見嘔逆痞悶腸鳴等證宜局方玉壺丸半夏白朮天麻湯之類脈弦軟而痛者屬氣虛氣虛則弦斂軟弱而無鼓動之力兼見惡寒痛而空暈四肢多寒喜暖氣虛微體倦等證宜補中益氣湯六君子湯之類脈微澀而痛者屬血虛血虛則微弱澀滯而有乾燥之象兼見面白口乾頭兩側痛甚而兼暈痛加於夜或夜熱等證宜四物湯逍遙散之類脈弦堅而痛者屬腎腎氣厥逆不能接引膀胱膀胱經氣壅遏上實下虛巔為之痛脈亦弦直而堅實也即靈樞經脈篇所云膀胱是動則病沖頭痛難經六十難所云厥頭痛者是也兼見頭重暈腰痛少腹裡急上熱下寒等證宜六味丸八味丸羌活川芎之類難經單言手三陽而不及足三陽恐未盡善素問五藏生成篇云頭痛巔疾下虛上實過在足少陰巨陽甚則入腎此正指膀胱厥痛不已甚則入腎而為真頭痛也其痛連腦盡痛齒亦痛蓋腎主骨主髓髓以腦為海而齒則骨之餘也其脈短澀者短則陽脫於上澀則陰衰於下若手足厥寒至節者必死不治此等證若欲治之非猛進烏附之藥不可或灸百會穴以望生於萬一雖然頭痛又不止此數種六腑之清陽固上升而五臟之精華亦上注外有六淫之侵內有經絡之逆使隧道壅遏清陽混淆而痛作於頭巔者多矣故五臟六腑皆能病此但宜細察其脈與兼見之證以別其臟腑陰陽寒熱虛實而施治焉則萬舉萬當矣附方桂枝湯見第十九玄珠茶調散見第二十二麻黃湯見第十六九味羌活湯見第十六瀉青丸見第四十九二仙散即茶調散大黃黃芩各二兩牽牛滑石各四兩上為細末滴水為丸如小豆大溫水下十五丸每服加十丸以利為度日三服對金散治偏正頭風大黃黃芩各等分上二味為極細末每服四分臨睡用好酒調下仍飲酒儘量一醉散發露頂臥令人扇頭數百扇蓋暖睡至明日病失矣不愈再一服如前法須大醉扇透百發百中神芎丸見第十七涼膈散見第十九奇效芎術湯治濕頭痛眩暈痛極川芎附子生去皮臍白朮以上各三錢桂心去皮上作一服水二鍾生薑七片棗二枚煎至一鍾食遠服半夏白朮天麻湯見第二十二瓜蒂散見第四十八紅豆散麻黃根炒半錢苦丁香半錢紅豆十粒羌活連翹各三錢上五味為細末鼻內搐之和劑玉壺丸治風痰吐逆頭痛目眩胸膈煩滿飲食不下及咳嗽痰盛嘔吐涎沫天南星生半夏生各一兩天麻半兩頭白麵三兩上為細末滴水為丸如梧桐子大每服三十丸用水一大盞先煎令沸下藥煮五七沸候藥浮即熟漉出放溫別用生薑湯下不計時候服補中益氣湯見第三十九六君子湯見第十六四物湯見第二十一逍遙散見第五十一六味丸見第十六八味丸見第十六心腹痛脈證第六十三心腹之痛其類有九細遲從吉浮大延久心腹之痛其類甚多此僅言有九者亦舉其要耳曰飲曰食曰風曰寒曰熱曰悸曰蟲曰忤曰疰飲者痰飲也痰飲留中清陽淆濁故痛兼見氣喘痞悶等證其脈滑宜二陳湯丹溪海蛤丸前胡半夏湯之類食者食物也食物停積氣礙不行故痛或勉食寒涼餒敗之物擾亂中和亦痛兼見脹滿嘔噯食臭惡食等證其脈緊滑宜加味枳朮丸香砂平胃散之類風者風邪也乘虛內干邪正相搏故痛兼見自汗惡風等證其脈緩宜香蘇散參蘇飲之類寒者寒邪也乘虛內襲榮脈凝泣故痛兼見惡寒嘔逆喜溫等證其脈緊宜五積散蘇合香丸之類熱者火也火鬱不發熏蒸於中故痛兼見惡熱熱中嘈雜吞酸等證其脈數宜統旨清中湯越鞠丸左金丸之類悸者心中動悸也中氣空虛乍有所觸不能持定故痛兼見心慌心悸恍惚等證其脈虛微痛而欲按宜黃耆建中湯補中益氣湯六君子湯之類蟲者蟲積也飲食不節寒熱不時以致蟲動蟲動則攻衝上下故痛兼見面黃白斑駁嘔吐清水沃沫或作或止或痛處動欲痛等證其脈大小不勻宜九痛丸剪紅丸蕪荑散仲景烏梅丸萬應丸集效丸之類忤者客忤也不正之邪一時干忤亂其清道撓其運機故痛兼見吐逆頭目不清或妄見妄言或不知人等證其脈數動宜蘇合丸備急丸紫金錠九痛丸之類疰者尸疰也如蠱如蛀不識何因或去或來痛無定所此得之亡人所傳即傳尸氣也兼見骨蒸吐血咳嗽勞損諸證其脈微弱而數宜於勞病門選方對證用之外有瘀血痛厥心痛真心痛三種瘀血痛者痛在胃脘或熱飲食或極嘔吐致傷胃脘絡血迸溢瘀留於中氣為所礙或作或止或食下痛甚或飲湯水作厄其脈澀宜二陳湯桃仁紅花五靈脂玄胡香附韭汁藕汁紅曲之類厥心痛者因諸臟腑經絡有循胃口上膈者手太陰肺有絡肺下膈者手陽明大腸有下膈屬胃絡脾者足陽明胃有從胃別上膈注心中者足太陰脾有絡心下膈抵胃者手太陽小腸有夾脊者足太陽膀胱有絡心注胸中者足少陰腎有起於胸中出屬心包絡下膈者手厥陰心包絡有布膻中散絡心包下膈者手少陽三焦有下胸中貫膈者足少陽膽有夾胃上貫膈布脅肋者足厥陰肝有循腹裡上關元者奇經任脈有並於脊裡者奇經督脈有夾臍上行至胸中而散者奇經衝脈有入里維絡諸陰者奇經陰維脈是諸臟腑經絡及任督沖維之脈氣有厥逆則經有偏盛而當脈所過如胃口胸膈心包膻中脊脅臍腹等處隨經相引而痛乃諸經之痛豈心痛哉諸經之痛則隨經有兼見之證如肺經痛惡寒氣急脹滿痛引缺盆宜參蘇飲香蘇散蘇合丸之類大腸痛上引膈腸鳴口乾宜四七湯枳桔二陳湯之類胃痛引脾及膺乳嘔吐宜二陳湯平胃散東垣溫胃湯來復丹之類脾痛引胃脘心下腹脹善噫善嘔食不下宜二陳湯香砂平胃散理中湯來復丹之類小腸痛引膈胃腸鳴宜二陳湯四七湯蘇合丸之類膀胱痛引腰脊惡寒宜參蘇飲東垣天台烏藥散腎痛引胸中腰脊心如飢上氣喝喝而喘善恐宜半硫丸烏藥順氣散之類心包痛引包絡胸脅胸脅支滿心動心煩喜笑宜二陳湯鐵甕先生交感丹之類三焦痛引心包膻中耳鳴宜二陳湯越鞠丸之類膽痛引胸膈脅肋口苦善太息振寒宜二陳湯溫膽湯小柴胡湯之類肝痛引膈胃脅肋嗌乾嘔逆胸滿宜二陳湯四七湯來復丹之類真心痛者真臟痛也蓋心為一身君主神明所居邪不易侵病不易及必也真臟自虛神明失守致心包厥痛之邪乘虛而入難經言其痛甚但在心但在心則毫不控引他處必兼見神昏舌短手足青冷斯為旦發夕死夕發旦死之真心痛耳以上諸痛若脈見細遲是氣減舒徐厥邪衰退之象理應從吉設或大浮知邪方盛況心腹裡證而得表脈更非所宜雖不至於殞軀亦難愈也附方二陳湯見第十六丹溪海蛤丸治痰飲心痛海蛤燒為灰研極細過數日火毒散用之栝蔞仁帶瓤同研上以海蛤入栝蔞內乾溼得所為丸每服五十丸前胡半夏湯治痰盛前胡半夏薑製茯苓各二錢陳皮木香紫蘇枳殼甘草各一錢上作一服水二鍾生薑三片烏梅一個煎一鍾食遠服正傳加味枳朮丸治痰積食積酒積果積肉積在胃脘當心而痛及痞滿噁心嘈雜噯氣吞酸吐嘔脾疼等證白朮三兩枳實麩炒黃色蒼朮米泔浸三宿焙豬苓去黑皮麥糵曲炒微黃半夏湯泡透各一兩澤瀉去毛赤茯苓去皮川芎黃連陳壁土炒去土白螺殼煅各七錢縮砂仁草豆蔻黃芩陳壁土同炒青皮去白萊蔔子炒乾生薑各七錢陳皮去白香附米童便浸神麯炒微黃栝蔞仁厚朴薑製炒檳榔各三錢木香甘草各二錢吞酸加吳茱萸湯泡寒月五錢熱月二錢半久病挾虛加人參白扁豆石蓮肉各五錢時常口吐清水加炒滑石一兩牡蠣五錢上為細末用青荷葉泡湯浸晚粳米研粉作糊為丸如桐子大每服七十丸多至百丸清米飲送下香砂平胃散見第四十四香蘇散見第四十八參蘇散見第四十七五積散見第三十七蘇合香丸見第十八統旨清中湯治火痛黃連山梔炒各二錢陳皮茯苓各一錢半半夏一錢薑湯泡七次草豆蔻仁捶碎甘草炙各七分水二鍾薑三片煎八分食前服越鞠丸見第四十一左金丸見第四十九黃耆建中湯見第二十一補中益氣湯見第三十九六君子湯見第十六金匱九痛丸治九種心痛附子炮二兩生狼牙炙香巴豆去皮心炒研如脂各半兩人參乾薑吳茱萸各一兩上為末煉蜜丸如桐子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹口不能言又治連年積冷流注心胸痛並冷腫上氣落馬墜車血疾等證皆主之忌口如常法神效剪紅丸專取一切蟲積神效無比凡人百病皆人飲酒過度食傷生冷致使脾胃不和心膈脹滿嘔惡咽酸常吐清水面色萎黃不進飲食山嵐瘴氣水腫蠱脹齁䶎咳嗽痰涎壅滯酒積食積氣積氣塊翻胃噎膈嘔逆噁心腸風痔漏臟毒酒痢纍蘊積熱上攻頭目下生瘡癬婦人血氣寒熱往來肌體羸弱月經不調赤白帶下鬼氣鬼胎産後諸疾小兒五疳蟲積誤吞銅鐵惡食惡毒等物並宜服之每服五更雞鳴時用冷茶清吞下更用馬桶盛糞於野地看之庶見藥易辨或蟲或積或如魚凍或作五色等積若一次未見蟲積更看第二三次下來此即是病根有積消積有氣消氣有蟲取蟲有塊消塊若病根去其病自消若病淺即一服見效若源深更須再一服能宣導四時蘊積春宣積滯不生瘡毒夏宣暑濕不生熱痢秋宣痰飲不生瘴瘧冬宣風寒不生瘟疫此藥溫和不動元陽真氣亦無反惡小兒半服孕婦休服其效如神一上末檳榔生研細取淨末一斤以二兩為母餘十四兩上第一次以一等羅篩過取齊曬乾二上末商陸即樟柳根白者可用赤者殺人金毛狗脊貫衆各四兩以上三味和一處研極細末上第二次以二等羅篩過取齊曬乾又方不用貫衆則蟲出來猶未死也三上末三稜醋煮莪朮醋煮各八兩青木香西木香各四兩雷丸醋煮二兩半南木香二兩以上六味和一處研極細末上第三次以三等羅篩過取齊曬乾四上末大黃鍘碎酒浸曬乾研細取淨末一斤上第四次以四等羅篩取齊曬乾五上末黑牽牛半生半炒研細取頭末淨一斤上第五次以五等羅篩過取齊曬乾又方有枳殼一斤為母有藿香四兩和入諸藥上作五處另研極細末要作五次上末卻用茵陳半斤大皂角一斤煎汁濾淨法水為丸如緑豆大曬乾後用丁香末一兩或加蘆薈末一兩亦妙以前淨汁煎一滾灑入丸藥旋搖令光瑩為度再以阿膠二兩以前汁熬溶灑入丸藥旋搖光瑩曬乾壯人每服五錢弱人每服四錢更以茶清吞下小兒減半蕪荑散治大人小兒蛔咬心痛經云蟲貫心則殺人欲驗之大痛不可忍或吐青黃緑水涎沫或吐蟲出發有休止此是蛔心痛也宜速療之蕪荑雷丸各半兩乾漆捶碎炒火煙盡一兩上為細末每服三錢溫水七分盞調和服不拘時甚者不過三服小兒每服半錢仲景烏梅丸烏梅三百枚細辛六兩乾薑十兩當歸四兩黃連一斤附子六兩炮去皮臍蜀椒四兩去汗桂枝六兩去皮人參六兩黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等萬應丸取蟲積神效黑牽牛取頭末大黃檳榔各八兩雷丸醋煮南木香各一兩沉香五錢上將黑牽牛大黃檳榔和一處為末以大皂角苦楝皮各四兩煎汁法水為丸如緑豆大後以雷丸木香沉香和一處研末為衣每服三四十丸五更用砂糖水送下或作末服亦可集效丸治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則種聚往來上下痛有休止腹中煩熱口吐涎沫是蛔蟲宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔癢痛木香鶴蝨炒訶子麵裹煨去核檳榔蕪荑炒附子煨去皮臍乾薑各七錢半大黃一兩半烏梅十四個去核上為末煉蜜丸如桐子大每服三四十丸食前用陳皮湯下婦人淡醋湯送下備急丸見第三十五紫金錠一名玉樞丹一名神仙解毒萬病丹治一切藥毒菰子毒鼠莽毒惡菌菌金石毒吃疫死牛馬肉毒河豚毒時行瘟疫山嵐瘴瘧忽喉閉纏喉風脾病黃腫赤眼瘡癤沖冒寒暑熱毒上攻或自縊溺水打撲損傷癰疽發背未破魚臍瘡腫湯火所傷百蟲鼠犬蛇傷癲邪狂走鬼胎鬼氣並宜服之凡人居家或出入不可無此藥真濟世衛家之寶如毒藥嶺南最多若遊宦嶺表才覺意思不快便服之即安二廣山谷間有草曰胡蔓草又名斷腸草若人以急水吞之急死緩水吞之緩死又取毒蛇殺之以草覆之以水灑之數日菌生其上取為末酒調以毒人始亦無患再飲酒即毒發立死其俗淫婦人多自配合北人與人情分相好多不肯逐北人回陰以藥置食中北人還即戒之曰子某年來若從其言即復以藥解之若過期不往必死矣名曰定年藥北人屆彼亦宜志之若覺中毒四大不調即便服之或於雞豚魚羊鵝鴨等肉下藥復食此物即觸發其毒急服此藥一粒或吐或利隨服便瘥昔一女子久患勞瘵為尸蟲所噬磨一粒服之一時久吐下小蟲千餘條一大者正為兩段後只服蘇合香丸半月遂服如常至牛馬六畜中毒亦以此救之無不效山茨菰南北處處有之俗名金燈籠葉似韭花似燈籠色白上有黑點結子三稜二月開花結子四月初苗枯即挖地得之遲則苗腐爛難尋矣與有毒老鴉蒜極相類但蒜無毛茨菰上有毛包裹宜辨去皮洗極淨焙二兩川文蛤一名五倍子捶破洗刮內淨焙乾二兩千金子一名續隨子去殼揀色極白者用紙包裹換紙研數十次去盡油以色白再研紙無油成霜為度一兩麝香揀盡血毛皮殼細研淨三錢紅芽大戟杭州紫大戟為上江南土大戟次之去蘆根洗極淨焙乾一兩半北方綿大戟色白者大峻利反能傷人弱人服之有吐血者慎之上各研為細末和勻以糯米粥為劑每料分作四十粒於端午重陽七夕合如欲急用辰日亦可於木臼中杵數百下不得令孝婦人孝子不具足人雞犬之類見之切宜祕惜不可廣傳輕之無效如癰疽發背未破之時用冷水磨塗痛處並磨服良久覺癢立消陰陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發及瘟疫山嵐瘴氣纏喉風冷水入薄荷一葉同研下急中癲邪喝叫亂走鬼胎鬼氣並用暖無灰酒下自縊並落水死心頭暖者及驚死鬼迷死未隔宿者並冷水磨灌下蛇犬蜈蚣傷並用冷水磨塗傷處諸般瘧疾不問新久臨發時煎桃柳枝湯磨下小兒急慢驚風五疳八痢蜜水薄荷一葉同磨下牙關緊急磨塗一丸分作三服量大小與之牙痛酒磨塗及含藥少許吞下湯火傷東流水磨塗傷處打撲損傷炒松節無灰酒下年深日久頭疼太陽疼用酒入薄荷葉磨紙花貼太陽穴上諸般癇疾口眼喎斜眼目掣眨言語蹇澀卒中風口噤牙關緊急筋脈攣縮骨節風腫手足疼痛行步艱辛一應風氣疼痛並用酒磨下有孕婦人不可服一方加山豆根全蠍硃砂雄黃各一兩四七湯見第十七枳桔二陳湯見第四十八平胃散見第四十四東垣溫胃湯治服寒藥多致脾胃虛弱胃脘痛白豆蔻二分益智砂仁厚朴甘草乾薑薑黃各二分黃耆陳皮各七分人參澤瀉各三分上為細末每服三錢水一盞煎半盞食前溫服來復丹見第十七理中湯見第十七東垣天台烏藥散治一切沉寒痼冷心腹攪痛並積年寒疝天台烏藥木香茴香炒青皮去白良薑炒各五錢檳榔銼二枚川楝子十個巴豆十四枚上十味先以巴豆打碎同楝子用麩炒黑色去巴豆麩俱不用外為細末每服一錢溫酒調下痛甚者炒生薑熱酒下和劑半硫丸見第五十七烏藥順氣散治風氣攻注四肢骨節疼痛遍身頑麻及癱瘓步履艱難腳腰痿軟或心腹疼痛麻黃去根節陳皮烏藥各二錢白殭蠶去絲嘴炒乾薑炮五分川芎枳殼桔梗白芷甘草炒各一錢水二鍾薑三片棗一枚煎八分食遠服鐵甕先生交感丹見第五十八溫膽湯見第二十小柴胡湯見第四十三
