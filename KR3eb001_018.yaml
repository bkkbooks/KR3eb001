body:
  text: 卷十八補遺正文病類多矣考之方書尚缺多種皆屬常見之疾何可竟無方治今補入嘈雜嘈雜一證有火有痰有飲有蟲雖云多種而源則不離乎脾胃膏粱之人每多患此其發也如飢之欲食甚則煩沸雜亂與吞酸吐酸乾嘔胃痛等疾皆為噎膈反胃之漸宜三聖丸越鞠丸之類挾痰者二陳加梔連挾飲者丹溪導飲丸挾蟲者烏梅丸酒煮黃連丸之類附方三聖丸治嘈雜神效白朮四兩橘紅一兩黃連炒五錢上為細末神麯糊丸如緑豆大每服七八十丸食遠津唾下薑湯亦得越鞠丸見第四十一二陳湯見第十六丹溪導飲丸治水飲嘈雜吳茱萸三錢白茯苓一兩黃連五錢蒼朮炒一兩獨活七錢上為細末神麯糊丸服烏梅丸見第六十三酒煮黃連丸見第五十五吞酸吐酸吞酸與吐酸大同小異吞酸酸在胸胃忽作忽止蜇胃刺心吐酸酸水酸物隨吐而出味如釅醋蜇喉軟齒是皆形寒胃冷食鬱飲停穀氣不分中焦郁𨠭正猶釀酒不發過時而成酸味也吞吐之所以異者吞則胃中飲少吐則胃中飲多耳間有屬火者乃熱不得散屬木者乃氣不得伸火不散者發之木不伸者達之故統宜溫中散寒令鬱滯開而病自愈矣宜發明藿香安胃散加減二陳湯三因曲術丸二陳加茱連神麯蒼朮方酒煮黃連丸附方藿香安胃散見第二十加減二陳湯治痰飲為患嘔吐頭眩心悸或因食生冷脾胃不和吞酸吐酸等證丁香一兩半夏陳皮各五兩茯苓三兩甘草一兩半上㕮咀每服四錢水煎入生薑三片煎服三因曲術丸治中脘宿食留飲酸蜇心痛口吐清水神麯炒三兩蒼朮泔浸三宿洗淨日乾炒一兩半上為末生薑汁別煮神麯糊為丸薑湯送下二陳加茱連神麯蒼朮方陳皮一錢白茯苓一錢蒼朮炒一錢二分黃連吳茱萸汁煮炒一錢神麯炒一錢水二鍾生薑一片煎八分服酒煮黃連丸見第五十五噎膈噎者食入不利或捱塞而下或負痛而納其病在喉膈者食雖入膈或氣逆或滿悶或隱痛或得噯少寬或得吐反快其病在膈二疾多並見噎者必膈膈者必噎也即翻胃之先驅積鬱沉憂氣結不散久久成此張雞峰方論曰此病不在外不在內不屬冷不屬熱不是實不是虛所以藥難取效多緣憂思恚怒動氣傷神氣積於內動則諸證見氣靜疾平手捫之而不得疾之所在目視之而不知色之所因耳聽之而不知音之所發故針灸藥石皆不獲效乃神意間病也旨哉言乎宜生薑半夏湯香砂寬中湯五膈寬中散穀神嘉禾散統旨補氣運脾湯代抵當丸之類選用附方生薑半夏湯止嘔吐開胃消食半夏生薑各三錢上㕮咀水二盞煎七分服統旨香砂寬中湯治氣滯胸痞噎塞或胃寒作痛木香臨服時磨水入藥三四匙白朮炒陳皮香附各一錢五分白豆蔻去殼砂仁去殼青皮檳榔半夏曲白茯苓各一錢厚朴薑製一錢二分甘草三分水二鍾薑三片煎八分入蜜一匙食前服和劑五膈寬中散治七情四氣傷於脾胃以致陰陽不和胸膈痞滿停痰氣逆遂成五膈並治一切冷氣白豆蔻去皮二兩甘草五兩木香三兩厚朴去皮薑汁炒一斤縮砂仁去殼丁香青皮去白陳皮去白各四兩香附子炒去毛十六兩上為細末每服二錢薑三片鹽少許不拘時沸湯點服和劑穀神嘉禾散治脾胃不和胸膈痞悶氣逆生痰不進飲食或五噎五膈白茯苓去皮縮砂仁去皮薏苡仁炒枇杷葉去毛薑汁炙香人參去蘆各一兩白朮炒二兩桑白皮炒檳榔炒白豆蔻炒去皮青皮去白谷糵炒五味子炒各半兩沉香杜仲去皮薑汁酒塗炙丁香藿香隨風子石斛酒和炒半夏薑汁搗和作餅炙黃色大腹子炒木香各七錢半甘草炙二兩陳皮去白神麯炒各二錢半每服三錢水一盞薑三片棗二枚煎七分不拘時溫服五噎入乾柿一枚膈氣吐逆入薤白三寸棗五枚統旨補氣運脾湯治中氣不運噎塞人參二錢白朮三錢橘紅茯苓各一錢五分黃耆蜜炙一錢砂仁去皮八分甘草四分炙有痰加半夏曲一錢水二鍾薑一片棗一枚煎八分食遠服代抵當丸治瘀血噎膈食下疼痛方見第二十自汗自汗者不因勞動不因天暑不因熱飲食時時汗自出故曰自汗也乃衛氣虛而不能固密心液因之漏泄宜當歸補血湯倍黃耆玉屏風散保元湯黃耆建中湯之類若表中風邪者亦能令衛腠空疏而汗時自出此邪去則汗止宜桂枝湯附方當歸補血湯見第十六得效玉屏風散治自汗防風黃耆各一兩白朮炒二兩每服三錢水二盞薑三片煎六分不拘時溫服保元湯治自汗無休止黃耆蜜炙三錢人參二錢甘草炙一錢水二盞煎七分溫服黃耆建中湯見第三十三桂枝湯見第十九盜汗盜汗者睡中偷出多發於夜如盜之乘人不覺而夜出也屬陰虛蓋人之衛氣晝行於陽出外夜行於陰入內入內則內熱內熱則不足之陰受其蒸入內則表虛表虛則蒸泄之液無從固於是陰失其守陽失其衛而汗淋漓於睡夢間者有矣宜當歸六黃湯大建中湯之類附方當歸六黃湯治盜汗久不愈面白黃肌瘦或夜熱骨蒸飲食減少四肢無力足膝痠疼發無虛夜服此神效當歸生地黃熟地黃黃柏黃芩黃連各一錢黃耆二錢上作一服水二鍾煎一鍾臨臥服大建中湯治虛熱盜汗百節痠疼肢體倦怠日漸羸弱口苦舌澀心怔短氣綿黃耆炙遠志燈心煮去心當歸酒洗澤瀉各二錢白芍藥龍骨煅人參各一錢五分炙甘草一錢上作一服水二鍾薑五片煎一鍾食前服氣弱加炮附子二錢腰痛筋急加官桂去皮一錢悸怔忡準繩云悸即怔忡今歷觀病狀則二證少有分別悸則心中微動如恐如驚怔忡則心胸振築莫知其來忽爾寧寂莫知其去甚則頭目眩暈神氣若浮蓋悸之重者也大抵因痰積飲停氣衝火擊所致宜導痰湯溫膽湯茯苓甘草湯薑朮湯之類亦有中氣虛而忡悸者宜補中益氣湯四君子湯六君子湯小建中湯黃耆建中湯之類亦有心經氣血不足火不定神不安而忡悸者宜四物湯朱雀丸當歸補血湯經驗定心丹之類有心液過耗汗多亡陽脈代而忡悸者宜炙甘草湯附方導痰湯見第四十一溫膽湯見第二十茯苓甘草湯治心下停水忪悸白茯苓去皮桂枝各三錢生薑半兩甘草二錢水二鍾煎一鍾不拘時服薑朮湯治停飲怔忡白薑生白朮茯苓半夏曲各一錢辣桂甘草各五分水一鍾薑三片紅棗一枚煎六分不拘時服補中益氣湯見第二十九四君子湯見第十六六君子湯見第十六小建中湯見第六十九黃耆建中湯見第三十三四物湯見第二十一朱雀丸見第五十一當歸補血湯見第十六經驗定心丹楫自制茯神去皮木一兩遠志酒浸軟去心五錢人參去蘆八錢沉香黑重沉水者三錢不見火龍骨煅七錢懷生地洗去土一兩半當歸身酒洗一兩白芍藥酒炒八錢丹參去蘆一兩桂枝去骨三錢甘草炙二錢荷蕊出水而未開者焙乾一個為極細末煉蜜為丸如緑豆大用上好水飛過硃砂為衣每服二錢食遠白湯下午後勿服此方驗過多人矣炙甘草湯見第三十三健忘道過之言行過之事久不記憶曰忘若當下即不能記索之胸臆了不可得者健忘也乃心虛腎憊水火不交精血之府空榮衛之道澀致令機關不利靈巧不開高年衰朽者多得之宜歸脾湯讀書丸朱雀丸二參丸開心散之類亦有痰血癖積礙其機關而成者此又不以年高論也宜壽星丸導痰湯代抵當丸選用附方歸脾湯見第五十八讀書丸石菖蒲菟絲子酒煮遠志酒浸去心各一兩地骨皮去骨洗淨二兩生地黃五味子川芎各一兩上為末薄糊丸桐子大每服七八十丸臨臥白湯下朱雀丸見第五十一二參丸治健忘養神定志和血安神外華腠理天門冬去皮熟地黃酒蒸搗丹參各一兩半白茯苓去皮麥門冬去心甘草各一兩遠志酒浸去心人參去蘆各半兩上為細末煉蜜和丸如桐子大以硃砂研極細水飛過半兩為衣每服五十丸加至百丸空心煎愈風湯送下愈風湯系潔古方其方三十三味皆風藥繁雜之甚故不録今只以白湯送之開心散治好忘石菖蒲一兩白茯苓去皮二兩遠志去皮人參去蘆各二錢半上為細末每服一錢食後米飲調下壽星丸治痰滯經絡多忘方見第五十八導痰湯見第四十一代抵當丸治瘀血喜忘方見第二十不寐難經四十六難曰老人寤而不寐少壯寐而不寤者何也然經言少壯者血氣盛肌肉滑氣道通榮衛之行不失其常故晝日精夜不寤老人血氣衰肌肉不滑榮衛之道澀故晝日不能精夜不寐也故知老人不得寐也宜八珍湯歸脾湯之類虛勞虛煩不得眠者宜仲景酸棗仁湯膽虛驚悸不寐者宜溫膽湯六君子湯之類痰飲停中煩惑不合目者宜內經半夏湯導痰湯之類附方八珍湯見第十六歸脾湯見第五十八仲景酸棗仁湯治虛勞虛煩不得眠酸棗仁二升甘草一兩知母茯苓芎藭各二兩深師有生薑二兩上五味以水八升煮酸棗仁得六升內諸藥煮三升分溫三服溫膽湯見第二十六君子湯見第十六內經半夏湯治陰陽之氣偏勝不相和諧陽不得入陰故不瞑不寐服此陰陽通臥可立至黃帝所謂決瀆壅塞經絡大通陰陽和得者也亦治痰氣阻塞陽不入陰成上證大抵轉動樞機則陰陽自諧矣其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升秫米北人謂之黃米可以釀酒治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已久者三飲而已也導痰湯見第四十四厄厄即噦也有火有痰飲有寒有蟲有食有胃虛有腎虛種種不同但虛寒者十九然必細察得之久暴聲之遠近形之盛衰及病之所由起則施治自多效也蓋潛行默運無聲無臭者中氣之常也若有所激氣即為火易其常性卒暴上衝仍欲其潛行默運無臭無聲安可得乎至若痰飲停中礙其清道陰寒迫里遏其陽升或蛔卒動而氣阻或食暴入而氣壅或胃氣虛於上而氣不舒或腎氣虛於下而氣不續皆能撓挫運機行不順利而厄厄之聲有自來矣故因於火者其聲頻以促兼面赤而脈數宜二陳湯加山梔黃連之類因於痰飲者其聲緩勻兼吞酸面澤而脈滑宜二陳湯溫膽湯導痰湯之類因於陰寒者其聲短而聲扼扼不揚兼面色青白惡寒而脈緊宜二陳湯加乾薑丁桂之類因於蟲者其聲或作或止或緩或促兼面色不一胃中或痛或吐清水冷涎或心中嘈雜脈遲數大小不定宜二陳湯去甘草加吳茱萸制黃連乾薑細辛之類因於食者其聲濁而類嘔兼噯逆酸腐惡食面黃脈緊滑宜和劑枳實半夏湯曲糵枳朮丸法制陳皮法制檳榔之類因胃氣虛寒者其聲促而無力或得食少止面青白畏寒脈緩弱無力宜六君子湯四君子湯橘皮竹茹湯理中湯潔古柿錢散之類因腎氣虛寒者其聲遠而長或作或止半刻一聲臍下或動築面黑腰疼或足冷惡寒脈沉微宜金匱腎氣丸良方參附湯之類附方二陳湯見第十六溫膽湯見第二十導痰湯見第四十一和劑枳實半夏湯枳實麩炒半夏各等分加麥糵炒每服七錢水二盞薑五片煎八分溫服無時曲糵枳朮丸見第二十法制陳皮消食化氣寬利胸膈美進飲食茴香炒甘草炙各二兩青鹽炒一兩乾生薑烏梅肉各半兩白檀香二錢半上六味為末外以陳皮半斤湯浸去白淨四兩切作細條子用水一大盞煎藥末三兩同陳皮條子一處慢火煮候陳皮極軟控干少時用干藥末拌勻焙乾每服不拘多少細嚼溫薑湯下無時法制檳榔治酒食過度胸膈膨滿口吐清水一切積聚雞心檳榔一兩切作小塊縮砂取仁白豆蔻取仁丁香切作細條粉草切作細塊各一兩陳皮去白切作細條生薑切作細條各半斤上用河水二碗浸一宿次日用慢火砂鍋內煮乾焙乾入新瓶收每服一撮細嚼酒下或為細末湯調服亦可六君子湯見第十六四君子湯見第十六橘皮竹茹湯治胃虛寒嘔逆或厄陳皮二升竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩以水一斗煮取三升溫服一升日五服理中湯見第十七潔古柿錢散治胃虛寒厄逆柿錢丁香人參各等分上為細末水煎食後服金匱腎氣丸見第十六良方參附湯治陽氣虛寒自汗惡寒或手足逆冷大便自利或臍腹疼痛厄逆不食或汗多發痓等證人參一兩附子炮五錢上薑棗水煎徐徐服去人參加黃耆名耆附湯面夫手足六陽之脈皆上至頭而面為諸陽之會胃足陽明之脈又起於鼻之交頞中故面獨能耐寒也設反惡寒及面寒者胃寒惡熱及面熱者胃熱面寒者面多青白面熱者面多赤面黃而斑駁者胃中蟲積面黃而已食如飢者胃疸面腫者胃風面瘡者胃火膏粱積熱以胃脈起於面故面病多屬胃亦有面瘡之屬脾肺風熱面塵之屬肝膽燥熱面皯𪒟之屬風濕痰飲又不獨一陽明胃也宜後方選對證者主治之附方升麻胃風湯治胃風面腫或麻木牙緊目瞤升麻二錢白芷當歸葛根蒼朮各一錢甘草一錢柴胡藁本羌活黃柏草豆蔻各三分麻黃不去節五分蔓荊子二分薑一片棗一枚水二盞煎七分食後服升麻順氣湯治憂思飲食失節面色黧黑心懸氣促升麻一錢半乾葛防風白芷黃耆人參各一錢白芍藥六分甘草蒼朮各五分水二盞薑一片大棗一枚煎七分食遠溫服犀角升麻湯治陽明經絡受風熱口唇頰車髮鬢腫痛及鼻額間連頭面痛口不可開雖能言語有妨飲食亦治面熱犀角七錢半川升麻半兩防風黃芩各三錢半香白芷白附子川芎各二錢半羌活三錢一字生甘草一錢半上㕮咀都作一服水五盞煎至三盞半去滓分作三服一日一服訖其證必減如臟腑有些溏不妨足陽明胃經也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市廛無所不有也六經之中血氣俱多腐熟飲食之毒聚於胃故此方以犀角為主升麻佐之入胃經余藥皆滌除風熱用之有效也補胃湯治胃虛脛寒面目浮腫亦治面寒柏子仁防風細辛桂心陳皮各一錢川芎吳茱萸人參各一錢半甘草五分水二鍾煎七分食遠溫服茯苓桂枝五味子甘草湯加大黃治咳逆倚息不得臥面熱如醉此為胃熱上衝熏其面故耳七白散治面皯面垢白蘞白朮白牽牛白附子白芷白芍藥白殭蠶各等分為末每用五錢煎湯洗之洗面藥治面生皯𪒟或生小瘡或生痱痤粉刺皮膚瘙癢面垢皂角三斤升麻八兩楮實子五兩緑豆白芨白芷天花粉各一兩甘松砂仁白丁香各五錢三奈三錢上為末糯米飯搗丸如彈子大量用洗面面上五色瘡方用鹽湯綿浸拓瘡上日五六度面上豆痕或斑皯靨方用密陀僧細末夜以人乳汁調敷面上粉刺方用不語唾塗之或搗菟絲子汁塗或以白礬末少許酒調塗不語唾恐是平旦未言語先者斗門方治黑皯令面色好白殭蠶黑牽牛北細辛各等分為粗末作澡豆又去小兒胎穢指爪破面方用生薑自然汁調輕粉敷破處無瘢瑕又方橄欖汁敷之無痕平胃散面瘡水調平胃散塗之白附子散治面上熱瘡似癬或生赤黑斑點白附子密陀僧白茯苓白芷定粉等分上為末先用蘿蔔煎湯洗面淨後用羊乳調至夜敷患處次早洗去效祛風白芷散治面上風癬瘡白芷三錢黃連黃柏黃丹各二錢茯苓一錢五分輕粉一錢上為細末用油調搽癬瘡上或加孩兒茶二錢麝香二分亦可目靈樞大惑論曰五臟六腑之精氣皆上注於目而為之精精之窠為眼窠者窩也聚精成窩搏結之義骨之精為瞳子筋之精為黑眼血之精為絡大小眥赤絡其窠氣之精為白眼肌肉之精為約束裹擷上下眼胞為目約裹筋骨血氣之精而與脈併為系衆精並脈以繫於目上屬於腦後出於項中又曰瞳子黑眼法於陰白眼赤脈法於陽故陰陽合轉而精明也觀是論則後人診眼疾而分五輪八廓者蓋本乎此其所云氣輪者金精之騰結也即經所謂窠氣之精為白眼白眼屬肺肺主氣故曰氣輪肺在行為金金至堅故白珠獨堅實風輪者木精之騰結也即經所謂筋之精為黑眼黑眼屬肝肝主筋在行為木而應風故曰風輪風性動故黑睛左右不定而色帶青也血輪者火精之騰結也即經所謂血之精為絡絡屬心心主血故曰血輪心在行為火火有君相兩種故岐分於兩角無正輪也肉輪者土精之騰結也即經所謂肌肉之精為約束裹擷屬脾脾主肌肉故曰肉輪脾在行為土土包萬物該四臟四臟皆為裹束故開則動而萬用閉則靜而萬寂矣水輪者水精之騰結也即經所謂骨之精為瞳子瞳子屬腎腎主骨在行為水故曰水輪水為天一之精故獨得居中內有大絡六以通心肺脾肝腎命門中絡六以通膽胃大小腸三焦膀胱外有小細之絡莫知其數其絡嚮明視之了了可數即禽獸異類皆有此也皆血貫於腦下連臟腑通暢血氣往來以滋於目故凡病目則有形色經絡顯見而可驗內之何臟何腑受病外有二竅以通其氣內涵諸液出而為淚更有神膏神水神光真氣真精皆滋目之源液也神膏者目內包涵膏液破則黑稠水出由膽中滲潤精汁積成涵養瞳神衰則有損神水者由三焦發源先天真一之氣所化在目之內不可得見觸物損破則見黑膏形如稠痰在目之外者即目上潤澤之水也水衰則有火勝燥暴之患水竭則有目輪大小之疾耗澀則有昏眇之危虧者多盈者少神光者目自視之精華也心火發源膽火用事夫神之於人也亦大矣不獨一視為然即行走執捉言笑聽聞無神宰率則塊然一形而已真血者職藏在肝升以滋目指五臟六腑經絡之血非肌腠散漫之血故曰真也真氣者以經絡滋養必先氣詬而後血濡即發生真一之元氣也真精者即先後二天真元化汁根於腎施於膽以及瞳仁之精也凡此數者一有所損則目病矣大概目形圓而長外有堅殼數重中含清脆內包神膏膏外神水水外皆血血以滋水水以滋膏膏內一點黑瑩即是腎膽所聚之精華也唯此一點空明淨徹燭照無窮是曰水輪然必三者具而後靈明全三即膽汁腎精心神也五輪足而外應溥五即氣風血肉水也合之渾然分之井然水為體火為用氣為運動神為維持妙合陰陽光同日月午前小午後大隨天地之盈虧男左勝女右勝別陰陽之稟賦至若剛柔壽夭詐直智愚皆能以目驗知神哉寶乎更有八廓其説以八卦八方內配臟腑分別經絡似亦有理前五輪説中已悉其義今不更贅惟録八廓之名以備考證一曰傳送廓應乾卦位居西北絡通大腸而屬肺二曰津液廓應坎卦位居正北絡通膀胱而屬腎三曰會陰廓應艮卦位居東北絡通上焦而配屬命門四曰清淨廓應震卦位居正中絡通膽而屬肝五曰養化廓應巽卦位居東南絡通中焦而配屬肝絡六曰胞陽廓應離卦位居正南絡通小腸而屬心七曰水穀廓應坤卦位居西南絡通胃而屬脾八曰關泉廓應兌卦位居正西絡通下焦而配屬腎絡以六配八餘二無配重肝絡腎絡配之者蓋目根源於腎專竅於肝故較他臟為獨勝焉以上五輪八廓之生成配合也知此則知內傷者內動臟氣災及五輪外感者不從臟變外邪先襲於絡由絡及廓由廓及輪故內傷見證不腫不痛痛亦不甚或視物漸覺不明或遇晚即為矇瞀俗名雞盲亦名雀目或羞明畏日或不能久視遠視或澀不欲開或眼胞收小或倒睫拳毛或青翳白膜或白珠黃色黑睛藍色或瞳仁散大或緊小或欹側或兩眥脂糊或弦爛或淚流或視物以一為二以紅為白以正為斜以曲為直種種由漸而成者屬內傷臟也陰也外感見證則發如風火癢痛不堪或中如砂石或外見瘡瘍或脂淚不時或星障卒起或向天日如針刺或近燈燭如火烘或兼鼻塞齒疼或兼身熱頭痛種種卒暴而來者屬外感腑也陽也是故病腑者易愈病臟者難瘳臟則視其何臟何因腑則視其何邪何絡而後調之散之補之瀉之溫涼升降在圓機者自為斟酌也選方附方簡易補肝散治肝虛目睛疼冷淚不止筋脈痛及羞明怕日夏枯草五錢香附子一兩上為末每服一錢臘茶調下服無時本事菊花散治肝腎風毒氣上衝眼痛甘菊花牛蒡子炒各八兩防風三兩白蒺藜去刺一兩甘草一兩五錢上為細末每服二錢熟水調下食後臨臥瀉青丸治眼暴發赤腫疼痛方見第四十九局方湯泡散治肝經風熱上壅眼目赤澀睛疼多淚赤芍藥當歸黃連各等分上為末每二錢湯頓調熱洗日三五次御藥院方加荊芥湯泡散治肝經風熱攻睛赤腫羞明漸生翳膜杏仁防風黃連去須赤芍藥當歸尾各半兩銅青二錢薄荷葉三錢上銼散每用二錢極沸湯泡乘熱先熏後洗冷則再暖用日兩三次一方入白鹽少許閉目沃洗鹽亦散血分珠散治眼患血灌瞳神惡血不散槐花白芷地黃梔子荊芥甘草黃芩龍膽草赤芍藥當歸各一兩上水煎服春加大黃瀉肝夏加黃連瀉心秋加桑白皮瀉肺清涼散冰瑕深翳蔓荊子荊芥苦竹葉甘草各半兩梔子二錢半上薄荷水煎服二黃散治努肉攀睛黃芩大黃防風薄荷各等分上水煎入蜜少許食後服照水丸治翳神驗海螵蛸蛤粉南康真者各五分片腦半分黃蠟五分上末先熔蠟攪微冷入末和為丸如麻子大帶匾些臨臥納眼中翳膜上次日照水自落千金磁朱丸治神水寬大漸散昏如霧露中行漸睹空中有黑花漸睹物成二體久則光不收及內障神水淡緑色淡白色者磁石吸針者辰砂神麯先以磁石置巨火中煅醋淬七次曬乾另研極細二兩辰砂另研極細一兩生神麯末三兩與前藥和勻更以神麯末一兩水和作餅煮浮為度搜入前藥煉蜜為丸如梧桐子大每服十丸加至三十丸空心飯湯下按此方磁石法水入腎硃砂法火入心而神麯專入脾胃乃道家黃婆媒合嬰䲑之理或加沉香半兩升降水火尤佳煮肝散治內外障翳眼上用豬肝二兩批開以夜明砂末二錢匕摻在肝內麻繩縛定用水一盞煮令肝轉色白取出爛嚼用煮肝湯送下食後服洗眼方治內外障翳膜赤脈昏澀上以桑條於二三月間採嫩者曝乾淨器內燒過令火自滅成白灰細研每用三錢入瓷器或銀石器中以沸湯泡打轉候澄傾清者入於別器內更澄以新綿濾過極清者置重湯內令熱開眼淋洗逐日一次但是諸眼疾皆效菊睛丸治肝腎不足眼昏常見黑花多淚枸杞子三兩蓯蓉酒浸炒巴戟去心各一兩甘菊花四兩上為末煉蜜為丸如梧子大每服五十丸溫酒鹽湯食遠任下余太宰方加熟地黃二兩駐景丸治肝腎虛眼昏翳熟地黃車前子各三兩菟絲子酒煮五兩為末煉蜜丸桐子大每服五十丸食前白茯苓石菖蒲湯任下又方加枸杞子一兩半尤佳枸杞子酒治肝虛當風眼淚上用枸杞子最肥者二升搗破內絹袋置罐中以酒一斗浸訖密封勿泄氣候三七日每日取飲之勿醉地芝丸治能遠視不能近視亦能治脈風成癘生地黃焙天門冬去心各四兩枳殼炒甘菊花去蒂各二兩上為細末煉蜜丸如桐子大每服一百丸茶清送下定志丸治能近視不能遠視遠志去苗心菖蒲各二兩人參白茯苓去皮各一兩為細末煉蜜丸以硃砂為衣每服十丸加至二十丸食後米飲下耳素問陰陽應象大論曰腎主耳在竅為耳靈樞脈度篇曰腎氣通於耳腎和則耳能聞五音矣五閲五使篇曰耳者腎之官也金匱真言又曰南方赤色入通於心開竅於耳是耳一也為兩臟共開之竅豈非心腎交通水火相濟之義乎若二臟不和虛實寒熱皆能上致耳疾即經絡之過於耳者亦皆能作疾如靈樞經脈篇曰小腸手太陽之脈入耳中其病耳聾三焦手少陽之脈從耳後入耳中出走耳前其病耳聾渾渾焞焞大腸手陽明之別脈入耳合宗脈實則齲聾口問篇曰耳中宗脈之所聚也胃中空則宗脈虛虛則下溜而脈竭故上虛而鳴選方四首附方清神散治風氣壅上頭目不清耳常重聽殭蠶菊花各一兩荊芥羌活木通川芎香附防風菖蒲甘草各二錢為末每三錢食後臨臥茶清下磁石湯治腎虛耳聾面黑飢不欲食腰脅背痛磁石五味子杜仲白朮白石英各二錢黃耆白茯苓各一錢水煎服益腎散治腎虛耳聾磁石巴戟沉香菖蒲川椒各一兩為末每二錢用豬腎一枚細切和以蔥鹽並藥用濕紙十重包裹煨熟空心細嚼酒下犀角飲子治風熱上壅耳聾腫痛膿水流出犀角菖蒲木通玄參赤芍藥赤小豆甘菊花各五分甘草二分半薑煎溫服鼻素問金匱真言曰西方色白入通於肺開竅於鼻陰陽應象大論曰肺主鼻在竅為鼻脈度篇曰肺氣通於鼻肺和則鼻能知香臭矣五臟別論曰五氣入鼻藏於心肺心肺有病而鼻為不利也氣厥論曰膽移熱於腦則為辛頞鼻淵經脈篇曰胃足陽明之脈起於鼻之交頞中其病為鼽衄大腸手陽明其病亦為鼽衄膀胱足太陽亦為鼽衄又曰脾熱者鼻先赤選方七首附方通氣湯治鼻塞不聞香臭羌活獨活蒼朮防風升麻葛根各六分白芷甘草川椒各二分冬月加麻黃二分薑棗蔥白煎服防風散治鼻淵腦熱滲下濁流不止防風五分黃芩人參甘草川芎麥門冬各二分為末食後沸湯調服單南星飲治風邪入腦宿冷不消鼻內結物壅塞腦氣遂流濁髓南星為細末每二錢用棗七枚甘草少許同煎食後服三四服其物自出涕自收外貼蓽茇餅蓽茇餅蓽茇香附大蒜等分搗作餅紗襯炙熱貼囟門上用尉斗火尉透其涕自止瓜礬散治鼻痔肉化水自下瓜蒂四錢甘遂一錢白礬枯螺殼四錢草烏尖各五分為末真麻油調丸如鼻孔大每日一次以藥入鼻內令著痔肉上芷夷散治鼻流濁涕白芷一兩辛夷五錢蒼耳仁三錢半薄荷五分為末每二錢蔥茶清調服鼻衄不止方鮮生地搗汁飲之立止蘿蔔汁無灰酒和服陰煉人中白溫湯調服及單飲童便俱妙口唇金匱真言論曰中央黃色入通於脾開竅於口五臟生成論曰脾之合肉也其榮唇也六節藏象論曰脾胃之華在唇四白脈度篇曰脾氣通於口脾和則口能知穀味矣經脈篇曰大腸手陽明之脈挾口交人中其病為口乾胃足陽明之脈挾口交承漿其病口喎唇疹疹即瘡疹字通用足少陽病為口苦足太陰終者唇反衛氣失常篇曰唇青黃赤白黑者病在肌肉選方四首附方瀉白湯治大腸實熱便結臍痛口瘡橘皮竹茹黃芩山梔黃柏各五分芒硝茯苓各一錢生地黃三錢薑棗煎服黃柏散治繭唇黃柏二兩五倍子密陀僧各二錢甘草二分為末水調塗黃柏上炙乾再塗藥盡為度後將黃柏切作薄片貼繭唇上五福化毒丹見第七十八冰柏丸治口舌生瘡黃柏薄荷硼砂各等分冰片減半為末蜜丸彈子大每噙化一丸舌陰陽應象大論曰心主舌在竅為舌脈度篇曰心氣通於舌心和則舌能知五味矣夫言出於心非舌不能發故云舌者心之苗其色赤其形尖而善動火之象也經脈篇曰脾足太陰之脈連舌本散舌下其病舌本強及舌本痛腎脈循喉嚨挾舌本其病口熱舌乾口問篇曰少陰氣至則齧舌以上目耳鼻口舌為臟之開竅固當見五臟之變病所謂五臟不和則七竅不通然而經絡病多臟氣病少若識別不真即有毫釐千里之謬惟諦審而治之則善矣選四方與第七十八小兒門參看附方薄荷煎治口舌生瘡咽喉腫痛痰涎壅塞薄荷二兩半川芎二錢甘草砂仁各二錢半片腦五分各另為末和勻蜜調成膏任意嚼咽黑參丸治口舌生瘡久不愈玄參天門冬麥門冬各等分為末蜜丸彈子大每一丸綿裹噙化津液下薏苡仁湯治風熱在脾唇口瞤動或結核薏苡仁防己赤小豆甘草等分加生薑煎服舌血舌腫舌出方炒槐花細末摻之即止腫脹者蒲黃末摻之患熱病多舌出不能入者冰片搽之愈齒齒者骨之餘骨不外露齒質乃骨而外露故曰余如唇為肉余爪為筋余發為血餘俱內藏者余出而外露也氣則不言余以氣呼出可見耳腎主骨故齒屬腎言其本也胃足陽明之入上齒齦大腸手陽明之入下齒齦言其經也是故本病者多病齒骨經病者多病齒齦然有虛實風火蟲蝕之不同在診之細為分別則無不效選方七首附方清胃湯見第四十九香鹽散治蟲牙及腎虛宣露一切齒疾香附三兩青鹽五錢謝傅笑去散治牙疼乳香沒藥雄黃胡椒烏藥兩頭尖各等分為末擦牙初時甚痛良久涎出便愈白蒺藜散治風虛牙疼齒齦搖動白蒺藜生搗去刺篩末擦牙或煎水入鹽一捻帶熱時漱青白散治一切牙疼及漱水洗目尤妙青鹽二兩白鹽四兩用川椒四兩煎汁拌炒二鹽為末擦之齒縫出血一名牙宣惟以白鹽擦之妙齒肉壅出鮮生地黃汁一碗牙皂角數鋌火上炙熱蘸汁再炙再蘸盡汁焙燥末之敷上立消鬚髮素問五臟生成篇曰腎之合骨也其榮發也上古天真論曰腎氣實齒更髮長是發為屬腎又心主血發者血之餘是發又屬心發生上指象火用心過度者發早白皆心之驗也巢氏云膽之榮在須又靈樞曰沖任二脈不榮於口唇者故須不生焉是須發雖殊總不外榮血之為潤養也選方五首附方天寶單方治丈夫婦人久患頭風眩悶頭髮乾落胸中痰壅每發即頭旋眼昏不覺欲倒者是其候也先灸兩風池各二七壯並服此酒及散永瘥其法春末夏初收白菊軟苗陰乾搗末空腹取一方寸匕和無灰酒服之日再服漸加三方寸匕若不飲酒者但和羹粥汁服亦得秋八月合花收曝乾切取三大斤以生絹袋盛貯三大斗酒中經七日服之日三次常令酒氣相續為佳巨勝丸治風眩能返白髮為黑巨勝子白茯苓甘菊花等分煉蜜丸如桐子大每服三錢清晨白湯下旱蓮膏黑鬚發益腎陰旱蓮草用泉水煮汁熬膏日服外即以膏揩之地黃膏久服烏鬚髮生地黃三斤搗取汁茜草一斤水五大碗煎絞取汁滓再煎二三次取汁合二汁緩火煎如膏以瓶盛之每日空心溫酒服半匙一月髭鬚如漆雞峰雜興方用何首烏雌雄各半斤分作四分一分用當歸汁浸一分生地黃汁浸一分旱蓮汁浸一分人乳浸三日取出各曝乾瓦焙石臼搗末蒸棗肉和丸梧子大每服四十丸空心百沸湯下附擬補內外因第九六淫方陰淫上下厥逆中外寒栗附子理中湯見第十七四逆湯見第二十二陽淫狂譫煩渴血泄浸淫白虎湯見第四十三犀角地黃湯治小腸淋瀝出血疼痛及心血妄行吐血衄血等疾食後臨臥服犀角如無以升麻代之半兩白芍藥二錢牡丹皮半兩生地黃二錢上銼作一服水一盞煎八分空心服風淫肢廢毛落漐習瘛瘲寶鑑醉仙散治癘風遍身麻木胡麻子炒牛蒡子炒枸杞子蔓荊子炒各一兩白蒺藜苦參防風栝蔞根各五錢上為細末每一兩四錢入輕粉二錢拌勻每服一錢茶清調晨午各一服至五七日於牙縫中出臭涎令人如醉或下膿血病根乃去仍量病之輕重人之虛實用病重者須先以再造散下之候元氣將復再用此藥忌一切炙煿厚味只可食淡粥時菜諸蛇以淡酒蒸熟食之可以助藥力通天再造散治大風惡疾鬱金半兩大黃煨一兩皂角刺黑大者炒一兩白牽牛六兩半生半炒為末每服五錢日未出面東無灰酒調下雨淫腹滿腫脹腸鳴濡瀉平胃散見第四十七五苓散見第十七胃苓湯見第十七晦淫百合狐惑熱中臟燥金匱百合病論曰百合病者百脈一宗悉致其病也意欲食復不能食常默默欲臥不能臥欲行不能行飲食或有美時或有不用惡聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月後見者各隨證治之百合知母湯百合病發汗後者主此方百合七枚擘知母三兩切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母取一升去滓後合和煎取一升五合分溫再服滑石代赭湯百合病下後者主此方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後合重煎取一升五合分溫再服百合雞子湯百合病吐後者主此方百合七枚擘雞子黃一枚上先水洗百合漬一宿當沫出去其水更以泉水二升煎取一升去滓內雞子黃攪勻煎五分溫服百合地黃湯百合病不經吐下發汗病形如初者主此方百合七枚擘生地黃汁一升上以水洗百合浸一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便當如漆狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不用飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝一作嗄甘草瀉心湯主之甘草瀉心湯甘草四兩黃芩人參乾薑各三兩黃連一兩大棗十二枚半夏半升蝕於下部則咽乾苦參湯主之蝕於肛者雄黃熏之雄黃上一味為末筒瓦二片合之燒向肛熏之脈經云病人或從呼吸上蝕其咽或從下焦蝕其肛陰蝕上為惑蝕下為狐狐惑病者豬苓散主之病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤小豆當歸散主之赤小豆當歸散當歸十兩赤小豆三升浸令芽出曝乾上二味杵為散漿水服方寸匕日三服金匱甘麥大棗湯治婦人喜悲傷欲哭象如神靈所作數欠伸名曰臟躁甘草三兩小麥一升大棗十枚上三味以水六升煮三升溫分三服亦補脾氣明淫恍惚動悸錯妄失神金匱桂枝去芍藥加蜀漆龍骨牡蠣救逆湯治驚狂不安陽氣散失或因灸尉火邪而陽氣浮越致成上證桂枝三兩去皮甘草二兩炙生薑三兩牡蠣五兩熬龍骨四兩大棗十二枚蜀漆三兩洗去腥上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升東垣硃砂安神丸見第十九
