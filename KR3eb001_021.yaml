body:
  text: 卷二十一附余病則史記曰病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也陰陽並臟氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也秦觀勸善録云今人或為湯火所傷或為針刀誤傷手足痛已難忍必號叫求救至於暫時頭昏腹痛或小可疾病便須呼醫買藥百般救療於我自身愛惜如此至於生物則恣意屠宰不生憐憫未論佛法明有勸戒未論天理明有報應若不仁不恕惟知愛物亦非君子長者之所當為諦觀物情當念衆生不可不戒不可不戒沈蓮池曰世人有疾殺牲祀神以祈福祐不思己之祀神欲免死而求生也殺他命而延我命逆天悖理莫甚於此矣夫正直者為神神其有私乎寇宗奭曰治婦人雖有別科然亦有不能盡聖人之法者今豪足之家居奧室之中處帷幔之內復以帛蒙手臂既不能行望色之神又不能殫切脈之巧四者有二缺焉黃帝有言曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能治其情以為診法若患人脈病不相應既不得見其形醫人只據脈供藥其可得乎如此言之烏能盡其術也此醫家之公患世不能革醫者不免盡理質問病家見所問繁遝為醫業不精往往得藥不肯服似此甚多扁鵲見齊候之色尚不肯信況其不得見者乎嗚呼可謂難也已王海藏云常人求診拱默苟令切脈試其能知病否且脈者人之氣血附於經絡熱勝則脈疾寒勝則脈遲實則有力虛則無力至於得病之由及所傷之物豈能以脈知乎故醫者不可不問其由病者不可不説其故孫真人云未診先問最為有準丹溪云病而服藥須守禁忌孫真人千金方言之詳矣但不詳言所以禁忌之由敢陳其略以為規戒夫胃氣者精純沖和之氣人之所賴以為生者也若謀慮神勞動作形苦嗜欲無節思想不遂飲食失慮藥餌違法皆能致傷況傷之後須用調補恬不知怪而又恣意犯禁舊染之疾與日俱積吾見醫將日不給而傷敗之胃氣無復完全之望去死近矣龔廷賢曰南方人有患病者每延醫至家診視後只索一方令人購藥於市不論藥之真偽新陳有無炮炙制度輒用服之不效不責己之非惟責醫之庸明日遂易一醫如是者數致使病證愈增而醫人亦惑亂莫知其所以誤也籲此由病家之過歟抑醫家之不明歟王海藏曰病人服藥必擇人煎藥能識煎熬製度須令親信恭誠至意者煎藥銚器除油垢腥穢必新淨甜水為上量水大小斟酌以慢火煎熬分數用紗濾去滓取清汁服之無不效也孫真人曰古來醫人皆相嫉害扁鵲為秦太醫令李醯所害即其事也一醫處方不得使別醫和合脫或私加毒藥令人增疾漸以致困如此者非一特須慎之寧可不服其藥以任天真不得使愚醫相嫉賊人性命甚可哀傷陶弘景曰王公貴勝合藥之日悉付群下其中好藥貴石無不竊換乃有紫石英丹砂吞出洗取一片動經十數過賣諸有此例巧偽百端雖復監檢終不能覺以此療病故難即效如斯並是藥家之盈虛不是醫人之淺拙也龔廷賢曰北方有患病者每延醫至家不論病之輕重時刻欲效否則即復他求朝秦暮楚殊不知人稟有虛實病感有淺深且夫感冒腠理之疾一二劑可愈至於內傷勞瘵之證豈可以一二劑而愈哉此習俗之弊誤人者多矣惟智者辨之寇宗奭曰夫病不可治者有六失失於不審失於不信失於過時失於不擇醫失於不識病失於不知藥六失之中有一於此即為難治非只醫家之罪亦病家之罪也矧有醫不慈仁病者猜鄙二理交馳於病何益由是言之醫者不可不慈仁不慈仁則招非病者不可猜鄙猜鄙則招禍惟賢者洞達物情各就安樂亦治病之一説耳蘇東坡曰脈之難明古今之所病也至虛有盛候大實有羸狀疑似之間便有死生之異士大夫多祕所患以求痊驗醫能否使索病於冥漠之中辨虛實冷熱於疑似之間醫者不幸而失終不肯自謂失也巧飾遂非以全其名間有謹願者雖合主人之言亦參以所見兩存而雜治吾平生求醫蓋於平時默驗其工拙有疾求療必盡告以所患使醫瞭然知患之所在然後診之虛實冷熱先定於中脈之疑似不能惑也故雖中醫治吾疾常愈吾求疾愈而已豈以困醫為事哉褚澄曰用藥如用兵用醫如用將善用兵者徒有車之功善用藥者薑有桂之用知其才智以軍付之用將之道也知其方伎以生付之用醫之道也世無難治之疾有不善治之醫藥無難代之品有不善代之人非命而絶從可知矣素問曰拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣王符潛夫論曰疾棄醫藥更往事神故至於死亡不自知為巫所欺誤乃反恨事巫之晚此熒惑細民之甚者也病家須知潘之淇著一養神明凡人一身精血從氣氣從神神者精氣之母也禮曰有疾疾者齋養者皆齋齋也者清明之至也心不苟慮身不苟動志一氣應達乎神明所以理陰陽而迎天庥也肝主仁心主禮肺主義腎主智脾主信性情之宅也是故卻病法有曰靜坐觀空覺四大皆從假合此上之上者也又曰常將不如我者巧自寬解萬事到來以死譬之庶亦心安意定清虛日來又曰時請高明親友講開懷出世之事亦足以蕩滌煩襟開發志意若夫愁思縷結則神鬱於內內而不出為滯為幽暴怒炎攻則氣衝於上上而不下為張為蹶又或棲棲身後盼盼妻孥視眼前一切可欣可喜難割難捨之物繫戀不已營度不休未有不至於傷生殞命者也試想到傷生殞命時那一人能替得我那一物能將得去耶蘇東坡曰因病得間殊不惡安心是藥更無方此真病人一服清涼散也一防邪物房室不遠則耗其精勞動不戒則耗其力言語不省則耗其氣此邪之自內受者也起居不謹則風露侵飲食不節則腸胃損此邪之自外入者也健人有此不免於病況病者而可以益之毒乎然病人性情多恣稍不當意忿悁意生父母妻子懼其拂也而任之偏於數事多所違犯故病者不可自輕其生而侍病者尤不可不慎防密攝事事留心若縱其所欲未有不至於壞者慎之慎之一戒諱疾醫家四要曰望聞問切猶人之有四肢也一肢廢不成其為人一要缺不成其為醫然必先望先聞而後切者所重有甚於切也乃病家不知此理往往祕其所患以俟醫之先言即以驗醫之能否豈知病固有證似脈同而所患大相刺謬若不先言明白猝持氣口其何能中昔丹溪有叔祖年七十患泄瀉脈澀而帶弦詢其喜食鯉魚遂以茱萸陳皮生薑砂糖等藥探吐膠痰而瀉止又有鄰人素患疳瘡夏初泄瀉脈亦澀而弦丹溪曰此下疳之重者與當歸蘆薈丸去麝四劑而瀉止此兩人證似脈同而治之迥別者以其問之詳言之明也又如其人或先貴後賤或先貧後富暴樂暴苦始樂後苦及所思所喜所惡所欲所疑所懼之云何其始病所傷所感所起所在之云何以至病體日逐轉變之情形病後所服藥餌之違合必詳言之則切脈自無疑惑投劑便可奏功若種種諱忌不言而懵然伸臂授醫使其幸邀射覆之一中是直以性命為戲也王海藏曰常人求診拱默惟令切脈殊不知氣血附於經絡熱則脈疾寒則脈遲實則有力虛則無力若得病之因與所傷之物豈能以脈知之乎蘇東坡曰吾疾必盡告醫者使胸中瞭然然後診脈疑似不能惑也吾求疾愈而已豈以困醫為事哉兩翁真高明之見也病家不可不知一謹微疾凡服藥於微則其病易療若過半而治療者什三矣過七八而治療者什不得一矣昔齊中尉潘滿如小腹痛倉公診曰病得之酒且內中尉不復自止於內二十八日當溲血而死居二十五日果溲血三日死王仲宣年二十仲景謂之曰君有病四十歲當眉落半年而死授五石湯令服可免居數日復問之詭云已服湯仲景曰色候固非服湯之診君何輕命也後至期果如其言眉落而死今人染病在身不自珍惜罔遵醫戒忽略初機直至深重乃始張惶卒以喪亡而不救噫晚矣一慎藥石病家有三種陋習一者聽信師巫廣行殺戮禱賽鬼神而醫藥反若可緩煎調漫托匪人二者不明藥理旦暮更醫致使源流不清臧否淆溷亂投雜劑罔知適從三者自命知醫膠持意見妄為加減以掣醫人之肘有此三弊雖倉扁無以見其能矣善養者知之尊生十二鑑楫著遠房室經脈篇云人始生先成精又上古天真論為素問首篇亦單説得一精字蓋精者先天之胚胎生生之種子也故欲修長年必先遠色矧病者乎病既因虛致邪務宜堅城卻寇寡嗜欲嗜欲不滿心無寧時損耗精神莫此為甚人非木石安能絶無簡而寡之斯為得矣斷思想思想無窮神結於內展轉勿置煩由以生時日未覺久則暗損氣血多矣亟宜斬絶消暴怒內經云怒則氣上上而不下病從生矣甚有嘔血者痰塞僕蹶者皆氣上不下故耳能臨事顧身怒將潛滅戒勞動動而生陽勉力動之成火矣故勞字上從火下從力動亦從力從重非重力不能動也勞動則氣火煩沸諸火上騰病變不出而素有火疾者更為甚焉惟靜逸為對治之法省言語言由心發既發於心則恐其錯誤未免煩費吾心細為檢點又人之一言一語必由呼吸而出費心損神呼吸損氣神氣兩虧於人何益慎起居起居者何一切行住坐臥早起晚息也慎起居者何言一切行住坐臥早起晚息間謹而慎之勿使風寒暑濕之邪乘虛侵襲而病中尤當防備要令我城堅固莫教圍寇益兵勿迎送迎送勞形周全於迎送之間則勞神矣諒我病夫雖禮可廢節飲食飲食賴以養生而養生中有戕生者故生氣通天論云陰之所生本在五味陰之五宮傷在五味傷者言其偏勝也五味且不可偏而乃有偏於涼冷偏於炙煿偏於膏粱偏於曲糵者漸令濕熱垢膩久積腸胃一旦發為瘡瘍疔毒痰火癰疽種種惡疾必不能免人又何苦取一時之快而博他日之大不快也愚哉檢藥石藥石聽醫吾何以檢之哉擇其善者從之其不善者棄之善與不善評之於理而已更有效醫自試君佐妄施致令輕者困重者篤忽於入口遺而噬臍愚之甚矣修德行古語云人有善念天必從之故國有災異君惟修德可以弭之是君一身修德即能蔭庇一國而人一心修德豈不能獲免己身所謂修德者何即懺悔改過也要在掃除舊習頓悟昨非束步繩趨兢時惕日如此不輟如此終身是之謂真懺悔真改過也天意自然向注凶眚自然潛消若急來抱佛腳上岸討行李試問頭上翁已早知之矣明用度諺言黃白為世間活寶寶固不可浪費活豈教人死守乎有等家富矣而貧狀浮面窮語挂唇惟利是圖卑汙不顧詎知此生之光景有限饒君粟貫陳紅究竟來一樣耳較彼處貧安隨分樂者果孰得孰失乎噫良可悲也閩李廉泉者商吾淅戊辰正月忽中風昏憒延醫治療至四月不愈召余診余與藥復諄諄戒忌逾月復不減詢知其以余所囑戒忌者竟忘矣因命筆書調攝事宜十二則令置座右不月而李疾頓愈是知調攝力勝吾籠中物百倍敢梓傳為病家一助云寇宗奭曰夫未聞道者放逸其心逆於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之病矣極力勞形躁暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷溫涼失度久坐久臥大飽大飢脾為之病矣呼叫過常辨爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士謹此五者終身無苦經曰不治已病治未病正此謂矣寇宗奭曰夫安樂之道在能保養者得之況招來和氣之藥少攻決之藥多不可不察也是知人之生須假保養無犯和氣以資生命才失將護便至病生苟或處治乖方旋見顛越防患須在間日故曰安不忘危存不忘亡此聖人之預戒也朱丹溪曰與其救療於有疾之後不若攝養於無疾之先是故已病而求治所以為醫家之法未病而先治所以明攝生之理夫如是則思慮而預防者何患之有哉此聖人不治已病治未病之意也食治通説云燕居暇日何所用心善養形神周防疾患常存謹畏無失調將食飲之間最為急務安危所繫智力可分與其畏病而求醫孰若明理以自求與其有病而治以藥孰若抑情而預治情斯可抑理亦自明能任理而不任情則所養可謂善養者矣防患卻病之要其在茲乎寇宗奭曰夫用藥如用刑刑不可誤誤即幹人命用藥亦然一誤即便隔生死然刑有鞫司鞫成然後議定議定然後書罪蓋人命一死不可復生故須如此詳謹今醫人才到病家便以所見用藥若高醫識病知脈藥又相當如此即應手作效或庸下之流孟浪亂投湯劑逡巡便至困危如此殺人何太容易世間此事甚多良由病家不擇醫平日未嘗留心於醫術也可不懼哉物理論曰夫醫者非仁愛不可托也非聰明達理不可任也非廉潔淳良不可信也是以古之用醫必選名姓之後其德能仁恕博愛其智能宣暢曲解能知天地神祗之次能明性命吉凶之數處虛實之分定逆順之節原疾診之輕重而量藥劑之多少貫微達幽不失細小如此乃謂良醫豈區區俗學者能之哉陶弘景曰醫貴有恆不可權飾妄造所以醫不三世不服其藥九折臂者乃成良醫蓋謂藥功積深故也今之承藉者多恃炫名價不能精心研習虛傳聲美京邑諸人皆尚聲譽不取實學聞風兢往自有新學該明而名稱未播貴勝以為始習多不信用委命虛名良可惜也吳球曰西鄉一人患病久慕城間名醫輿迎治病因事絆不得親行遂令伊兄前去患者不樂服藥無效遂送歸仍請本醫至途遇兄詢其病源兄曰某病某脈用某藥今在此囊中遂將藥帶至病家病者聞至遂有喜色診脈後竟將前藥煎與服之病者曰此藥氣味與前者大不相同須臾問曰何如答曰稍可次日又進其病瘳矣籲藥一也其氣味異焉蓋其人疑心故耳宋景濂贈鄭院判序云有其術而無所於用值可用之機而人不能任之欲望其以有成者百家之所難也惟醫為甚扁鵲華他天下固不常有也使有之而值淺易之疾遇難語之人上之不足展吾術次之不能從吾所欲為法宜針而責我以砭法宜實而命我以虛乖忤拘執卒之與恆醫無異是豈醫之罪哉勢使然也誠有善任人者惟吾所用而不較期以成效而不泥於私謀人人皆可得而勉矣故疾有死於過愛而生於達理過愛者恐其危而不肯任人達理者知非己之所能為則信人而求其成效其達者乃所以生之而愛乃所以殺之也若福建承宣布政使陳君彥銘其達理者歟陳君之妻偶得寒疾羸弱已甚徵太醫院判官鄭某治之鄭請曰愈否在我幸無撓我陳君許諾鄭君乃視脈而療之或謂藥性與疾戾以語懾陳君君不聽任之不變已而果愈陳君出金帛謝之鄭君辭曰子善任吾故爾使子不我任而自用雖欲愈可得耶孫真人曰世間凡有病人親朋故舊交遊來問疾其人曾不經事未讀一方自誇了了詐作明能談説異端或言是虛或言是實或云是風或云是蟲或云是水或云是痰紛紛謬説種種不同破壞病人心意不知孰是遷延未就時不待人歘然致禍各自散走是病先須好人及好名醫識病深淺探賾方書博覽古今事事明解者看病不爾大誤人事見聞搜玉云飲食男女人之大欲存焉制之若無斯為聖人節而不縱可謂賢人縱而不節是為下愚蓋殺生以資口腹淫欲以喪天真二者更相助法因美飲食則血氣盛血氣盛則淫欲多淫欲多則反損血氣血氣損則又賴飲食以資補是二者更相造罪也若欲省口腹先節淫欲若能節淫欲即可省口腹此乃安身延年之道若縱之則人生受用之數有限限盡則早終矣徐真甫云愚見患者小愈胃氣才回咸謂以為能食者不死率意恣欲妄投厚味惟其不嗜勝人為憂噫弗思甚也殊不悟厚味遂邪古人攝養每以寡嗜欲薄滋味為先況病人傷敗之際而又重傷其不危殆者寡矣又見久病之人少愈而目尚昏腰尚重痛謂病久鬱抑精閉不通率爾入房以疏鬱結往三行而病遽起反至不救者多矣飲食不節反輕為重反安為危者歷歷有之此天下之通弊惟賢者知之本草衍義云身以安樂為本安樂以保養為本本既固疾病何由而生夭橫何由而至攝生之道無逮於此夫草木無知猶假灌溉矧人為萬物之靈豈不資保養然保養之義其理萬計約而言之其術有三一養神二惜氣三堤疾忘情去智恬憺虛無雜事全真內外無寄如是則神不內耗境不外惑真一不雜神自寧矣此養神也抱元一之本根固歸真之精氣三焦定位六賊忘形識界既空大同斯契則氣自定矣此惜氣也飲食得宜溫涼合度出處無犯於八邪寤寐不可以勉強則身自安矣此堤疾也和氣湯專治一切客風怒氣怨氣抑鬱不平之氣先用一忍字後用一忘字上二味和勻不語唾送下服後更飲醇酒五七杯使熏然半酣尤佳快活無憂散除煩惱斷妄想上二味等研為極細末用清淨湯調服凡合此藥先要灑掃一淨室窗櫺虛朗前列小檻栽花種竹貯水養魚室中設一幾一榻一蒲團每跏趺靜坐瞑目調息將前藥服之至三炷香久任意所適或散步空庭吟弄風月或展玩法帖名畫或歌古詩二三首倦則啜苦茗一甌就枕偃息久之覺神清氣爽天君泰然不知人間有煩惱不見我心有妄想斯則效可睹矣我命在我不在於天愚人所自致百病風邪者皆由恣意極情不知自惜故虛損生也譬如枯朽之木遇風即折將崩之岸值水先頽今若不能服藥但知愛精節情亦得一二百年壽也吳山裡人日記云太上曰真人在己莫問鄰老子曰事天治人莫如嗇是為深根固蒂長生久視之道則彼家採戰之説決非真道可知矣其原始於富貴人既欲長生又耽情欲方術之士因進其説以逢其欲而要重糈據余所見士大夫誤信而誤用之弱者必夭強者必衰大都不得終其天年況長生乎夫參耆草木也可以補虛酒肉長食也可以助羸秋石河車人所棄也制而服之可以起廢如所云二絃真氣童少津液豈得無補但採取之法既無真傳臨境之時又多危險所得者少所失者多不如一切屏絶可也奉親養老書云老人之食宜其溫熱熟軟忌黏硬生冷每日晨朝宜以醇酒先進平補下元藥一服女人則平補血海藥一服無燥熱者良尋豬羊腎煮一杯壓之五味蔥薤鶉膐等粥皆可至辰時服人參平氣散一服然後次第以順四時溫軟飲食進之食後引行一二百步令運動消散臨臥時進化痰利膈人參半夏丸一服尊年之人不可頓飽但頻頻與食使脾胃易化穀氣長存若頓令飽食腸胃虛薄不能消納故成疾患為人子者深宜體悉此養老之大要也日只可進前藥三服不可多餌如無疾患亦不須服藥但只調停飲食自然無恙矣奉親養老書云老人藥餌只是扶持之法只可用溫平順氣進食補虛中和之藥治之不可用市肆贖買他人惠送不知方味及狼虎之藥與之服餌切宜詳審奉親養老書云天癸數窮則精血耗竭神氣浮弱返同小兒全假將護以助衰晚若遇水火兵寇非橫驚怖之事必先扶持老人於安穩處避之不可喧忙驚動尊年之人一遭大驚便至冒昧因生余疚凡喪葬凶禍不可令吊疾病危困不可令問寢寐飲食不可令驚悲哀憂愁不可令人預報穢惡臭敗不可令聞生冷黏硬毒物不可令食蔽漏卑濕不可令居卒風暴寒不可令冒煩惱大熱不可令中動作行步不可令勞暮夜之食不可令飽陰霧晦暝不可令飢假借鞍馬不可令乘偏僻藥餌不可令服廢宅欹宇不可令入墳園冢墓不可令遊危險之地不可令登淵急之水不可令渡暗昧之室不可令孤凶禍遠報不可令知輕薄婢使不可令親家園冗事不可令管皆宜忌之以保長年奉親養老書云老人骨肉疏冷風易中若窄衣貼身暖氣著體自然氣血流利四肢和暢雖遇盛夏亦不可袒露其頸後連項常用紫軟夾帛自頸後巾幘中垂下著肉入衣領中至背脾間以護腠理中年人肌肉瘦怯腠理開疏若風傷腠中便成大患深宜慎之瑣碎録云老不醫風非不醫風也只當調氣爾少不醫勞非不醫勞也只當調脾爾瑣碎録云世人奉養往往倒置早漱口不若將困而漱去齒間所積牙亦堅固千金要方云大喜大悲男女熱病未瘥女子月血新産者不可合陰陽熱疾新瘥交者死千金要方云老子曰凡人生多疾病者是風日之子生而早死者是晦日之子在胎而傷者是朔日之子生而母子俱死者是雷霆霹靂日之子能行步有知而死者是下旬之子兵血死者是月水盡之子又是月蝕之子能胎不成者是弦望之子命不長者是大醉之子不癡必狂者是大勞之子生而不成者是平曉之子意多恐悸者是日出之子好為盜賊貪欲者是禺中之子性行不良者是日中之子命能不全者是日映之子好詐及妄者是晡時之子不音耳聾者是人定之子天地閉氣不通其子死夜半合陰陽生子上壽賢明夜半後合會生子中壽聰明智慧雞鳴合會生子下壽克父母此乃天地之常理也千金要方云患赤目須忌房事不然令人患內障千金要方云善攝生者凡覺陽事轉盛必謹而抑之不可縱心竭意以自賊也若一度製得則一度火滅一度增油若不能制縱情施瀉即是膏火將滅更去其油可不深自防千金要方云夜夢惡不須説旦以水面東噀之咒曰惡夢著草木好夢成寶玉即無咎也巢氏病源論云人臥不寤皆是魂魄外遊為他邪所枕録欲還未得致成魘也忌火照則神魂不復入乃至於死而人有於燈光前魘者是本由明出故不忌火葛洪肘後方云人忽不寤勿以燈照之殺人但痛齧其踵及足拇指甲際而唾其面則活取韭搗汁吹鼻中薤汁亦得冬月用韭根汁灌於口中瑣碎録云浴出不可和衫裙寢熟恐成外腎疼腰背拳曲方勻泊宅篇云眼疾不可浴浴則病甚至有失明者能斷沐頭則一生無眼疾沐浴身心經云沐浴用五種香湯一者白芷能去三尸二者桃皮能辟邪氣三者柏葉能降真仙四者零陵香能集靈聖五者青木香能消穢召真本草云甑氣水浴發令髮長密黑潤本草云干粳米飯常食令人熱中唇口乾不可和蒼耳食令人卒心痛急燒倉米炭和蜜漿服之不爾即死不可與馬肉食發痼疾陳倉米亦然張文潛云張安道每晨起食粥一大碗空腹胃虛穀氣便作所補不細又極柔膩與臟腑相得妙齊和尚説山中僧每將旦一粥甚系利害如不食則終日覺臟腑燥渴蓋能暢胃氣生津液也東坡云夜坐飢甚吳子野勸食白粥云能推陳致新利膈養胃食治通説云食飲以時飢飽得中水穀變化沖氣和融精血以生榮衛以行腑臟調平神志安寧正氣充實於內元真通會於外內外邪沴莫能幹一切疾患無從作瑣碎録云啖糍餌之類過多覺不快者惟飲酒至醉則既醒之後所苦皆瘥其效過於服藥陳橘皮湯亦能解食治通説云當盛暑時食飲加意調節緣伏陰在內腐化稍遲又果蓏園蔬多將生啖蘇水桂漿唯冷飲生冷相值克化尤難微傷即飧泄重傷即霍亂吐利是以暑月食物尤要節減使脾胃易於磨化戒忌生冷免有腹藏之患食治通説云好食生冷者將為腹痛心疼嘔吐泄痢之疾好食炙煿者將為口瘡咽痛壅熱癰瘍之疾翰府名談云今人食冷物必飲湯將溫其脾已冰其脾何溫之有不若未食冷物先飲湯溫之繼食冷無患千金要方云善養性者先飢而食先渴而飲食欲數而少不欲頓而多則難消也常欲令如飽中飢飢中飽耳蓋飽則傷脾飢則傷氣故每學淡食食當熟嚼使米脂入腹食治通説云食飲之宜當候已飢而進食食不厭熟嚼仍候焦渴而引飲飲不厭細呷無待飢甚而後食食不可太飽或覺微渴而省飲飲不欲太頻食不厭精細食不厭溫熱王叔和洞識攝生之道常謂人曰食不欲雜雜則或有所犯當時或無災患積久為人作疾尋常飲食每令得所多餐令人膨脹短氣或致暴疾夏至秋分少食肥膩餅臛之屬此物與酒食瓜果相妨當時不覺病入秋陽消陰盛寒氣總至多諸暴卒良由涉夏取冷太過飲食不節故也而不達者皆至病至之日謂是受病之始不知其所由來者漸矣豈不惑哉瑣碎録云食後以小紙捻打噴嚏數次氣通則目自明痰自化食療本草云野鴨九月以後即中食全勝家者雖寒不動氣人身上小熱瘡多年不好者但多食之即瘥本草云飲食須逐日熬熟用經宿即動氣有牙齒並脾疾人切不可吃瑣碎録云伏熱者不可飲水沖寒者不可飲湯本草拾遺云溫病起食蓴菜多死博物志云秋蟹毒者無藥可療目相向足斑者尤甚食療本草云女人倒生吞麻子二三粒即順生瑣碎録云欲醒酒食橄欖瑣碎録云食韭後楊枝皮擦牙用冷水漱之不作氣瑣碎録云大雪中跣足不可便以熱湯洗或飲熱酒足指隨墮雲笈七籤云飲食伏床凶不可向北吃食本草服藥食忌凡藥中有甘草忌食豬肉菘菜海菜黃連胡黃連忌豬肉冷水蒼耳忌豬肉馬肉米泔桔梗烏梅忌豬內仙茅忌牛肉牛乳半夏菖蒲忌羊肉羊血飴糖牛膝忌牛肉陽起石雲母鍾乳硇砂礬石並忌羊血商陸忌犬肉丹砂空青輕粉並忌一切血吳茱萸忌豬心豬肉地黃何首烏忌一切血蔥蒜蘿蔔補骨脂忌豬血蕓薹細辛藜蘆忌貍肉生菜荊芥忌驢肉黃顙魚河豚一切無鱗魚蟹紫蘇天門冬丹砂龍骨忌鯉魚巴豆忌野豬肉菰筍蘆筍醬冷水蒼朮白朮忌雀肉青魚菘菜桃李薄荷忌鱉肉麥門冬忌鯽魚常山忌生蔥生菜附子烏頭天雄忌豉汁稷米牡丹忌蔥胡荽厚朴萆麻忌炒豆鱉甲忌莧菜威靈仙土茯苓忌醋及一切酸味蜜忌鮓及生蔥凡服藥不可雜食肥豬犬肉油膩羹膾腥臊陳臭諸物凡服藥不可多食生蒜胡荽生蔥諸果諸滑滯之物瑣碎録云凡服藥藥氣與食氣不得相逢食氣消則服藥藥氣散則進食其藥有食前食後者皆宜審此醫家難事有三情張介賓著一曰病人之情所謂病人之情者有素稟之情如五臟各有所偏七情各有所勝陽臟者偏宜於涼陰臟者偏宜於熱耐毒者緩之無功不耐毒者峻之為害此臟氣之有不同也有好惡之情者不惟飲食有憎愛抑且舉動皆關心性好吉者危言見非意多憂者慰安云偽未信者忠告難行善疑者深言則忌此情性之有不同也有富貴之情者富多任性貴多自尊任性者自是其是真是者反成非是自尊者遇士或慢自重者安肯自輕此交際之有不同也有貧賤之情者貧者衣食不能周況乎藥餌賤者焦勞不能釋懷抱可知此調攝之有不同也又若有良言甫信謬説更新多岐亡羊終成畫餅此中無主而易亂者之為害也有最畏出奇惟求穩當車薪杯水寧甘敗亡此內多懼而過慎者之為害也有以富貴而貧賤或深情而挂牽戚戚於心心病焉能心藥此得失之情為害也有以急性而遭遲病以更醫而致雜投惶惶求速速變所以速亡此緩急之情為害也有偏執者曰吾鄉不宜補則虛者受其禍曰吾鄉不宜瀉則實者被其傷夫十室且有忠信一鄉焉能皆符此習俗之情為害也有參術入唇懼補心先痞塞硝黃沾口畏攻神即飄揚夫杯影亦能為祟多疑豈法之良此成心之情為害也有諱疾而不肯言者終當自誤有隱情而不敢露者安得其詳然尚有故隱病情試醫以脈者使其言而偶中則信為明良言有弗合則目為庸劣抑孰知脈之常體僅二十四病之變象何啻百千是以一脈所主非一病一病所見非一脈脈病相應者如某病得某脈則吉脈病相逆者某脈值某病則凶然則理之吉凶雖融會在心而病之變態又安能以脈盡言哉故知一知二知三神聖諄諄於參伍曰工曰神曰明精詳豈獨於指端彼俗人之淺見固無足怪而士夫之明慧亦每有蹈此弊者故忌望聞者診無聲色之可辨惡詳問者醫避多言之自慚是於望聞問切已舍三而取一且多有並一未明而欲得夫病情者吾知其必不能也所以志意未通醫不免為病困而朦朧猜疑病不多為醫困乎凡此皆病人之情不可不察也二曰旁人之情所謂旁人之情者如浮言為利害所關而人多不知檢故或為自負之狂言則醫中有神理豈其能測或執有據之鑿論而病情多亥豕最所難知或操是非之柄則同於我者是之異於我者非之而真是真非不是真人不識或執見在之見則頭疼者云救頭腳疼者云救腳而本標綱目反為迂遠庸談或議論於貴賤之間而尊貴執言孰堪違抗故明哲保身之士寧為好好先生或辨析於親疏之際而親者主持牢不可拔雖真才實學之師亦當唯唯而退又若薦醫為死生之攸系而人多不知慎有或見輕淺之偶中而為之薦者有意氣之私厚而為之薦者有信其便便之談而為之薦者有見其外飾之貌而為之薦者皆非知之真者也又或有貪得而薦者陰利其酬關情而薦者別圖冀望甚有斗筲之輩者妄自驕矜好人趨奉薰蕕不辨擅肆品評譽之則盜跖即堯舜毀之則鸞鳳亦鴟梟洗垢索瘢無所不至而懷真抱德之士必其不侔若此流者雖其發言容易欣戚無關其於淆亂人情莫此為甚多致明醫有掣肘之去病家起刻骨之疑此所以千古是非之不明總為庸人擾之耳故竭力為人任事者豈不岌岌其危哉凡此皆旁人之情不可不察也三曰同道人之情所謂同道人之情者尤為閃灼更多隱微如管窺蠡測醯雞笑天者固不足道而見偏性拗必不可移者又安足論有專恃口給者牽合支吾無稽信口或為套語以誑人或為甘言以悅人或為強辨以欺人或為危詞以嚇人儼然格物君子此便佞之流也有專務人事者典籍經書不知何物道聽途説拾人唾餘然而終日營營綽風求售不邀自赴儇媚取容偏投好者之心此阿諂之流也有專務奇異者腹無藏墨眼不識丁乃詭言神授偽託祕傳或假脈以言禍福或弄巧以亂經常最覺新奇動人甚易此欺詐之流也有務飾外觀者誇張侈口羊質虎皮不望色不聞聲不詳問一診而藥若謂人淺我深我明人昧此粗疏孟浪之流也有專務排擠者陽若同心陰為浸潤夫是曰是非曰非猶避隱惡之嫌第以死生之際有不得不辨者固未失為真誠之君子若以非為是以是為非顛倒陰陽掀翻禍福不知而然庸庸不免知而故言此其良心已喪讒妒之小人也有貪得無知藐人性命者如事已疑難死生反掌斯時也雖在神良未必其活故一藥不敢苟一著不敢亂而僅僅冀於挽回忽遭若輩求速貪功謬妄一投中流失楫以致必不可救因而嫁謗自文極口反噬雖朱紫或被混淆而蒼赤何辜受害此貪幸無知之流也有道不同不相為謀者意見各持異同不決夫輕者不妨少謬重者難以略瘥故凡非常之病非非常之醫不能察用非常之治又豈常人之所知故獨聞者不侔於衆獨見者不合於人大都行高者謗多曲高者和寡所以一齊之傅何當衆楚之咻直至於敗而後群然退散什之一人則事已無及矣此庸庸不揣之流也又有久習成風苟且應命者病不關心些須惟利蓋病家既不識醫則倏趙倏錢醫家莫肯任怨則惟苓惟梗或延醫務多則互為觀望或利害攸系則彼此避嫌故爬之不癢撾之不痛醫稱穩當誠然得矣其於坐失機宜奚堪耽誤乎此無他亦惟知醫者不真而任醫者不專耳詩云發言盈庭誰執其咎築室於道不潰於成此病家醫家近日之通弊也尚多難盡必期不失未免遷就但遷就則礙於病情不遷就則礙於人情有必不可遷就之病情而復有不得不遷就之人情其將奈之何哉當局者能詳察斯言而各為警省非惟病人之情旁人之情同道人之情不難於不失而相與共保天年同登壽域之地端從此始惟明者鑑之陶弘景曰凡煮湯欲微火令小沸其水依方大略二十四藥用水一斗煮取四升以此為推然利湯欲生少水而多取汁補湯欲熟多水而少取汁不得令水多少用新布兩人一尺木絞之澄去垽濁紙覆令密溫湯勿用鐵器服湯寧小沸熱則易下冷則嘔湧李時珍曰陶氏所説乃古法也今之小小湯劑每一兩用水二甌為準多則加少則減之如劑多水少則藥味不出劑少水多又煎耗藥力也凡煎藥並忌銅鐵器宜用銀器瓦罐洗淨封固令小心者看守須識火候不可太過不及火用木炭蘆葦為佳其水須新汲味甘者流水井水沸湯等各依方法若發汗藥必用緊火熱服攻下藥亦用緊火煎熟下硝黃再煎溫服補中藥宜慢火溫服陰寒急病亦宜緊火急煎服之又有陰寒煩躁及暑月伏陰在內者宜水中沉冷服孫真人曰夫百病之本有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腸澼下利大小便不通賁豚上氣咳逆嘔吐黃疸消渴留飲癖食堅積癥瘕驚邪癲癇鬼疰喉痹齒痛耳聾目盲金瘡踒折癰腫惡瘡痔瘻瘤癭男子五勞七傷虛乏羸瘦女子帶下崩中血閉陰蝕蠱蛇蠱毒此皆大略宗兆其間變動枝葉各依端緒以取之又有冷熱勞損傷飽房勞驚悸恐懼憂恚怵惕又有産乳落胎墮下瘀血又有貪餌五石以求房中之樂此皆病之根源為患生諸枝葉也不可不知其本末但向醫説男女長幼之病有半與病源相附會者便可服藥也男子者衆陽所歸常居於燥陽氣遊動強力施泄便成勞損損傷之病亦以衆矣若比之女人則十倍易治凡女子十四以上則有月事月事來日得風冷濕熱四時之病相協者皆自説之不爾與治誤相觸動更增困也處方者亦應問之孫真人曰比來田野下里家因市得藥隨便市上雇人搗合非止諸不如法至於石斛菟絲子等難搗之藥費人功力賃作搗者隱主悉盜棄之又為塵埃穢氣入藥中羅篩粗惡隨風飄揚衆口嘗之衆鼻嗅之藥之精氣一切都盡與朽木不殊又復服餌不能盡如法服盡之後反加虛損遂謗醫者處方不效夫如此者非醫之咎自緣發意甚誤宜熟思之玉華子云知邪思者覺也斷邪思者不續也人之有疾必有所因及知其因則謹於未因及去其因勿復其因此愈疾之功也斷念之覺由於不續每覺每去勿續則已故曰瞥求是病不續是藥張大復曰殺物以療病不若全物以療之之善也昔豫舅氏之病疹也外大父將求鸛卵而療焉既得之矣鸛且逐卵而僕於地大父傷之曰有死子而求生之有生卵而必傷之何見之舛也遂舍之夜半疹愈夫使食卵而愈未有不以為卵驗矣鸛有其卵而子得生亦非鸛之能生之也然而生非卵驗也因是可以解世人之惑余常病悸有醫者教之食鱉曰食鱉則血滋血滋則悸去從之期月而悸自如也一夕夢群鱉來嘬余自頸以及於臂膚無完者覺而心怦怦焉悸乃益甚嗟乎固有以殺而病甚者也
