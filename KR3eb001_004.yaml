body:
  text: 卷四促結主病第三十二陽盛則促肺癰陽毒陰盛則結疝瘕積鬱數脈時見一止名曰促數則為熱為陽盛主上焦熱聚成毒或熱聚肺成癰陽毒宜清散如黃芩花粉連翹枳殼荊防之類肺癰宜清解如仲景桔梗湯之類脈氣流行為其阻礙故一止也不數而緩時見一止名曰結為陰盛主陰分或腹中聚疝痼瘕宜元戎萬病紫菀丸寶鑑沉香桂附丸之類久積成郁氣堅結不散脈氣至此亦為所礙故一止也難經十八難曰結甚則積甚結微則積微是又當審止歇之多寡而斷病之輕重耳附方仲景桔梗湯金匱要略云咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰又治心臟發咳咳而喉中如梗狀甚則咽腫喉痹亦治血痹桔梗一兩甘草二兩上二味以水三升煮取一升分溫再服則吐膿血也元戎萬病紫菀丸治臍腹久患痃癖如碗大及諸黃病每地氣起時上氣衝心繞臍絞痛一切蟲咬十種水病十種蠱病及反胃吐食嘔逆噁心飲食不消天行時病女人多年月露不通或腹如懷孕多血天陰即發又治十二種風頑痹不知年歲晝夜不安夢與鬼交頭多白屑或哭或笑如鬼魅所著腹中生瘡腹痛服之皆效紫菀去苗菖蒲九節者去毛吳茱萸湯洗七次焙乾柴胡去須厚朴薑製一兩桔梗去蘆茯苓去皮皂莢去皮弦子炙桂枝乾薑炮黃連去須八錢巴豆去皮膜出油研人參去蘆羌活獨活防風各半兩蜀椒去目及閉口者微炒出汗川烏炮去皮臍半兩加三錢上為細末入巴豆研勻煉蜜丸如桐子大每服三丸漸加至五丸七丸生薑湯送下食後臨臥服孕者不宜服此方分兩一依元版善本校定厚朴黃連下有分兩而無各字川烏乃云半兩加三錢不知何謂考溫白丸方惟川烏二兩半余藥各半兩亦恐有訛重於變古姑仍之痔漏腸風酒下赤白痢訶子湯下膿血痢米飲湯下墮傷血悶四肢不收酒下蛔蟲咬心檳榔湯下氣噎憂噎荷葉湯下打撲損傷酒下中毒菷灰甘草湯下一切風升麻湯下寸白蟲檳榔湯下霍亂乾薑湯下咳嗽杏仁湯下腰腎痛豆淋酒下陰毒傷寒溫酒下吐逆生薑湯下飲食氣塊麵湯下時氣井花水下脾風陳皮湯下頭痛水下心痛溫酒下大小便不通燈草湯下因物所傷以本物湯下吐水梨湯下氣病乾薑湯下小兒天吊風搐防風湯下防己亦可小兒疳痢蔥白湯下小兒乳食傷白湯下月信不通紅花酒下婦人腹痛川芎酒下懷孕半年後胎漏艾湯下有子氣衝心酒下產暈痛溫酒下血氣痛當歸酒下產後心腹脹滿豆淋酒下難產益智湯下產後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死腹中葵子湯下又治小兒驚癇大人癲狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟走痛等疾楊駙馬患風氣衝心飲食吐逆遍身枯瘦日服五丸至七丸至二十日瀉出肉塊如蝦蟆五六枚白膿二升愈趙侍郎先食後吐目無所見耳無所聞服至五十日瀉青蛇五七條長四寸許惡膿三升愈王氏患大風病眉發墮落手掌生瘡服之半月瀉出癩蟲二升如馬尾長寸許後愈李靈患肥氣日服五丸經一月瀉出肉鱉三枚愈茹黃門卒中風病發時服藥瀉出惡膿四升赤黃水一升一肉蟲如亂髮愈李知府妻楊氏帶下病七年月崩不止骨痿著床日服五丸至十丸十五丸取下膿血五升黃水一升肉塊如雞子狀愈此藥治一切萬病如神唯初有孕者不宜服寶鑑沉香桂附丸治中氣虛弱甚脾胃虛寒臟腑積冷心腹疼痛手足厥逆冷便利無度七疝引痛不可忍喜熱熨少緩者沉香附子炮川烏炮乾薑炮良薑官桂吳茱萸湯泡去苦水茴香炒各一兩上末好醋煮糊丸梧子大每服五十丸至七八十丸空心米飲下代脈主病第三十三代則氣衰或泄膿血傷寒心悸女胎三月代亦歇止之脈但促結之止內有所礙雖止而不全斷中有還意代則大止不還下復至如更代者非元氣衰微之甚不至此也泄膿血者則營血耗竭隧道空虛故見此欲脫不續之狀素問脈要精微論云數動一代者病在陽之脈也泄及便膿血傷寒心悸有中氣虛者有停飲者有汗下後者中氣虛則陽陷陽受氣於胸中陽氣陷則不能上充於胸中故悸宜黃耆建中湯之類停飲者飲水多而停於心下也水停心下水氣上凌心不自安故悸宜小青龍湯之類汗後則裡虛矣況汗乃心液心液耗則心虛心虛故悸宜炙甘草湯黃耆建中湯之類諸悸者未必皆脈代今脈代者正指汗後之悸以汗為心液脈為心之合耳女胎十月而產腑臟各輸真氣資次培養一月之時足厥陰脈養之足厥陰者肝也二月足少陽脈養之足少陽者膽也三月手厥陰脈養之手厥陰者心胞絡也四月手少陽脈養之手少陽者三焦也五月足太陰脈養之足太陰者脾也六月足陽明脈養之足陽明者胃也七月手太陰脈養之手太陰者肺也八月手陽明脈養之手陽明者大腸也九月足少陰脈養之足少陰者腎也十月足太陽脈養之足太陽者膀胱也是以諸經脈各養三十日也若至期當養之經虛實不調則胎孕為之不安甚則下血而墮矣十二經中獨心與小腸不養胎者何歟夫心為牡臟小腸為之腑主生血而合脈素問平人氣象論曰藏真通於心心藏血脈之氣也有孕則經血不通許學士所謂妊娠閉經隧以養胎者是也平人氣象論又曰婦人手少陰脈動甚者妊子也歷觀經論是知胎以血為體而始終十月皆賴乎心自不當在輪養中又分次第矣三月之時心包絡養胎靈樞經脈篇云心包主脈若分氣及胎脈必虛代在五臟生成篇又云心合脈蓋心與心包雖分二經原屬一臟故耳附方黃耆建中湯見第二十一仲景小青龍湯見第十六仲景炙甘草湯傷寒論云傷寒脈結代心動悸炙甘草湯主之甘草炙四兩生薑切三兩桂枝去皮三兩人參二兩生地黃一斤阿膠二兩麥門冬去心半升麻子仁半升大棗擘十二枚上九味以清酒七升水八升先煮八味取三升去滓內膠烊消盡溫服一升日三服一名復脈湯聖濟經曰津耗散為枯五臟痿弱營衛涸流濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心也脈病順逆第三十四脈之主病有宜不宜陰陽順逆吉凶可推有是病則有是脈如影之隨形也與病相宜則順不相宜則逆逆之與順何從區別是又在陰陽耳如表病見表脈里病見里脈實病見實脈虛病見虛脈陽病見陽脈陰病見陰脈之類皆順而相宜者也反此則逆逆順一分而病之吉凶從可推矣中風脈證第三十五中風浮緩急實則忌浮滑中痰沉遲中氣屍厥沉滑卒不知人入臟身冷入腑身溫風性空疏中之於表浮緩是其宜也宜千金小續命湯輕則仲景桂枝湯加減用之急強而實略無柔和邪氣太甚正氣何堪故忌若浮而滑帶有物象非浮緩比此則中痰之如中風者宜二陳湯防風竹瀝生薑之類甚則探吐若沉而遲則不在表而在裡亦非中風名曰中風七情之所為也宜和劑四七湯易簡星香湯蘇合香丸之類屍厥亦類中風卒然僵仆昏不知人其脈沉滑者沉為里滑為邪邪入於裡與血氣相併邪入正虛搏入臟腑入臟則邪干神舍氣陷從陰故身冷臟不受邪僅入於腑氣出從陽故身溫即金匱要略所謂唇口青身冷為入臟即死如身和汗自出為入腑即愈者是也宜蘇合香丸仲景備急丸本事勝金丸千金返魂湯之類並萬氏灸百會法附方金匱千金小續命湯通治八風五痹痿厥等疾以一歲為總六經為別春夏加石膏知母黃芩秋冬加官桂附子芍藥又於六經別藥內隨證細分加減自古名醫不能越此麻黃去節人參去蘆黃芩去腐芍藥甘草川芎杏仁去皮尖炒防風兩半防己官桂各一兩附子炮去皮臍半兩上除附子杏仁外為粗末後入二味和勻每服五錢水一盞半生薑五片煎至一盞去滓稍熱食前服附云岐子加減法如精神恍惚加茯苓遠志心煩多熱者加犀角屑半兩骨節間煩痛有熱者去附子倍芍藥骨節冷痛倍用桂枝附子燥悶小便澀者去附子倍芍藥入竹瀝一合煎臟寒下痢者去防己黃芩倍附子加白朮一兩熱痢不可用附子腳弱加牛膝石斛各一兩身疼痛加秦艽一兩腰痛加桃仁杜仲各半兩失音加杏仁一兩如或歌或笑無所不至者用麻黃三兩人參桂枝白朮各二兩去附子防風生薑加當歸一兩自汗者去麻黃杏仁加白朮一兩春加麻黃一兩夏加黃芩七錢秋加當歸四兩冬加附子半兩仲景桂枝湯見第十九二陳湯見第十六和劑四七湯見第十七易簡星香湯治中風痰盛服熱藥不得者南星八錢木香一錢每服四錢水一盞姜十片煎七分不拘時溫服蘇合香丸見第十八仲景三物備急丸大黃一兩乾薑一兩巴豆一兩去皮心熬外研如脂上藥各須精新先搗大黃乾薑為末研巴豆內末中合搗一千杵用為散蜜和丸亦佳密器中貯之莫令泄主心腹諸卒暴百病苦中惡客忤心腹脹滿卒痛如錐刺氣急口噤停屍卒死以暖水若酒服大豆許三四丸或不下捧頭起灌令下咽須臾當瘥如未瘥更與三丸當腹中鳴即吐下便瘥若口噤亦須折齒灌之本事勝金丸治中風忽然昏倒若醉形體昏悶四肢不收風涎潮於上膈氣閉不通生薄荷半兩豬牙皂角二兩槌碎水一升二味一處浸取汁研成膏瓜蒂末一兩藜蘆二兩硃砂半兩研上將硃砂末二分與二味末研勻用膏子搜和丸如龍眼大以硃砂為衣溫酒化下一丸甚者二丸以吐為度得吐即醒不醒不可治必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾者執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢爾羅謙甫方有粉霜鉛粉無藜蘆千金返魂湯治卒感忤鬼擊飛屍諸奄忽氣絕無復覺或已死絞口口噤不開去齒下湯湯入口不下者分病人發左右捉踏肩引之藥下復增取盡一升須臾立醒麻黃三兩桂心二兩甘草一兩杏仁七十枚上㕮咀水八升煮取三升分三服肘後方云張仲景方無桂心只三味灸法灸風池百會曲池合谷風市絕骨環跳肩髃三里等穴皆灸之以鑿竅疏風風寒脈證第三十六風傷於衛浮緩有汗寒傷於營浮緊無汗風為陽邪衛為陽氣風陽空疏衛陽浮越寒為陰邪營為陰血寒陰斂束血陰凝泣故風必傷衛寒必傷營者皆類同而象似也空疏浮越自當有汗而脈緩矣仲景桂枝湯證斂束凝泣自當無汗而脈緊矣仲景麻黃湯證附方仲景桂枝湯見第十九仲景麻黃湯見第十六暑濕脈證第三十七暑傷於氣脈虛身熱濕傷於血脈緩細澀暑亦陽邪性熱而散傷於氣分從其類耳陽邪傷氣氣必煩蒸故身熱氣散不斂故脈虛宜清暑益氣湯加味香薷飲之類濕為水濕血液相近傷血亦從其類脈緩細澀流衍滲著之象也宜敗毒散和劑五積散之類附方清暑益氣湯見第十六十味香薷飲見第十六敗毒散活人羌活獨活前胡柴胡芎藭枳殼白茯苓桔梗人參以上各一兩甘草半兩上為細末每服二錢水一盞入生薑二片煎七分溫服或沸湯點亦得治傷寒溫疫風濕風眩拘蜷風痰頭疼目眩四肢痛憎寒壯熱項強睛疼及老人小兒皆可服或瘴煙之地或瘟疫時行或胸多風痰或處卑濕腳弱此藥不可缺也日二三服以知為度煩熱口乾加黃芩和劑五積散治感冒寒邪頭疼身痛項背拘急惡寒嘔吐或腹痛又治傷寒發熱頭疼惡風無問內傷生冷外感風寒及寒濕客於經絡腰腳痠疼及婦人經血不調或難產並治白芷茯苓半夏湯洗七次當歸芎藭甘草炙肉桂芍藥各三兩枳殼去瓤麩炒麻黃去節根陳皮去白各六兩桔梗去蘆十二兩厚朴去粗皮薑製乾薑各四兩蒼朮泔浸去皮二十四兩上㕮咀每服四錢水一盞姜三片蔥白三根煎七分熱服冒寒用煨姜挾氣加茱萸婦人調經催產加艾醋傷寒脈證第三十八傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽病見陰病必危殆陰病見陽雖困無害上不至關陰氣已絕下不至關陽氣已竭代脈止歇臟絕傾危散脈無根形損難醫素問熱論曰今夫熱病者皆傷寒之類也又曰人之傷於寒也則為病熱熱雖甚不死觀此則知傷寒雖是陰寒之邪襲人生氣中正氣與之抗拒鬱蒸成熱亦理勢之必然者抗拒在表故脈浮鬱蒸成熱故脈洪熱病得此陽脈知正氣不陷縮而能鼓發勝邪必矣故喜焉若沉微澀小是皆陰類證陽脈陰表病見里證與脈反邪盛正衰凶之兆也至若汗後邪解正復此時脈躁盛者亦應寧靜身體自然涼和設脈仍躁而熱加甚是正氣已衰邪氣更進必難乎其為生矣即素問評熱論所謂有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交者是也一派陽邪陰不能復若與陽交併為一而不分是陰已絕亡故死陽病見陰者見陰脈也即上文所云熱病而得沉微澀小之類言證與脈反故亦危殆陰病見陽者見陽脈也亦似與證相反惟傷寒則不然傷寒自表入里從陽之陰刻刻侵傳層層漸入今陰病得陽脈是轉寒凜而變溫和起深沉而出浮淺死陰忽作生陽病雖困篤自當無害故仲景云陰病見陽脈者生陽病見陰脈者死尺為陰尺脈上不至關是陰已絕於下寸為陽寸脈下不至關是陽已竭於上脈經曰陽生於寸動於尺陰生於尺動於寸言陰陽互相生動今兩不至關是陰陽離異矣素問生氣通天論曰陰陽離決精氣乃絕非此之謂歟代脈止歇者乃藏真不能接續其傾危可立見也散脈無根者謂脈外散而不斂內無根蒂之候若形見損傷必難醫治仲景平脈篇云傷寒咳逆上氣其脈散者死謂其形損故也其義謂咳逆屬肺散脈屬心肺金心火火刑其金故主死形刑二義俱通姑兩存之飲食勞倦第三十九飲食內傷氣口急滑勞倦內傷脾脈大弱飲食有節五內受益何言傷乎傷則過於飲食甚至停蓄不消而氣口急滑之脈見矣急則不運不輸滑則有水有物胃中停滯而急滑應於氣口者以氣口正在右關脾胃之前故也宜推之運之如東垣枳朮導滯丸丹溪保和丸潔古枳朮丸曲糵枳朮丸東垣葛花解醒湯之類動而生陽身固不宜久逸東垣先生論升陽益胃湯方後云小役形體使胃氣與藥得以轉運升發此即動而生陽之義又上古天真論云不妄作勞皆不言不勞但令小役不令過役並不妄勞耳若煩擾而過於勞外則體倦內則脾傷蓋脾土合肌肉而主四肢配陽明胃腑受納水穀醞釀精微以灌溉四臟為人身陽氣生化之源過勞則肢體轉旋四肢舉動陽氣張亂無往非脾氣之應則無往非脾氣之傷矣脾脈反大弱者氣張則大氣耗則弱也宜補中益氣湯之類附方枳朮導滯丸東垣治傷濕熱之物不得旋化而作痞滿悶不安黃芩茯苓白朮黃連各三錢澤瀉一錢枳實麩炒去瓤神麯炒各五錢大黃煨一兩上為末湯浸蒸餅為丸食遠白湯下五十丸丹溪保和丸見第十七潔古枳朮丸見第十七曲糵枳朮丸見第二十東垣葛花解醒湯治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足顫搖飲食減少小便不利青皮去瓤三錢木香五分橘紅人參豬苓去皮白茯苓各一錢半神麯炒澤瀉乾薑白朮各二錢白豆蔻葛花砂仁各五錢上為極細末每服三錢白湯調服但得微汗則酒病去矣此蓋不得已而用之豈可恃此酗飲成病自損元氣惟病酒者思之東垣補中益氣湯治勞役過度飲食失節四肢倦怠口乾身熱手心蒸熱手背不熱時或頭痛微惡風寒自常汗出或氣高而喘身熱而煩其脈洪大無力或脈微細軟弱或惟右脈虛大凡中氣虛弱而不能攝血或中氣不足而誤用克伐或飲食勞倦而患瘧痢脾胃氣虛而久不能愈或腠理不密易傷風寒微邪湊肺而咳嗽不已或病久元氣下陷或傷恐元氣不升或元氣虛弱感冒風寒不勝發表或入房之後勞役感冒或勞役感冒而後入房或陽氣不升而頭暈作眩額上喜溫而漸愈等證不論內外病候審是因於勞役者以之為主治之法能生長身中胃氣而行春夏之令亦能使脾土以生肺金為肝心脾肺滋化源之劑黃耆病甚熱甚者一錢人參三分有嗽去之甘草炙五分當歸酒製橘皮升麻柴胡各三分白朮五分薛新甫常用方耆參術各一錢半歸一錢橘七分柴升各五分水二盞棗一枚姜一片煎至一盞量氣弱氣盛臨病斟酌水盞大小去滓食遠稍熱服如傷重者不過二服而愈氣病脈證第四十欲知是氣下手脈沉沉極則伏澀弱久深氣者七氣也七氣為內因故脈沉沉之極雖按之至骨猶不顯露是為伏脈再或見澀之往來不利弱之無力衰微非七氣內傷之久不如是也六郁脈證第四十一六郁多沉滑痰緊食氣澀血芤數火細濕郁有六種亦為內因鬱則不復浮暢故脈多沉多沉者不盡沉也沉而滑則有水有物痰停之郁也沉而緊則寒實有物食積之郁也沉而澀則往來滯澀氣虛不呴之郁也沉而芤則沉下中空血虛不濡之郁也沉而數則不能炎上火伏之郁也沉而細則附骨流衍濕著之郁也大抵以越鞠丸為主最妙如欲分治痰宜濟生導痰湯重則滾痰丸食宜丹溪保和丸氣宜準繩氣鬱湯血宜血鬱湯火宜熱鬱湯濕宜濕鬱湯之類附方越鞠丸丹溪治六郁胸膈痞滿或吞酸嘔吐飲食不化此治郁之聖藥也蒼朮米泔浸一宿炒神麯炒撫芎山梔炒香附炒山楂淨肉麥芽炒各等分上末水調神麯麥芽作糊丸如梧子大每七八十丸白湯下濟生導痰湯治痰涎壅盛胸膈留飲痞塞不通半夏湯洗七次四兩南星炮去皮枳實去瓤麩炒赤茯苓去皮橘紅各一兩甘草炙半兩上㕮咀每服四錢水一盞姜十片煎八分食遠溫服滾痰丸見第十七丹溪保和丸見第十七準繩氣鬱湯治因求謀不遂或橫逆之來或貧窘所迫或暴怒所傷或悲哀所致或思念太過皆為氣鬱其狀胸滿脅痛脈沉而澀者是也香附童便浸一宿焙乾杵去毛為粗末三錢蒼朮炒橘紅製半夏各一錢半貝母去心白茯苓去皮撫芎紫蘇葉自汗則用子山梔仁炒共一錢甘草木香檳榔各五分生薑五片煎服如胸脅作痛此有血滯也宜參血鬱湯治之血鬱湯凡七情鬱結盛怒叫呼或起居失宜或挫閃致瘀一應飢飽勞役皆能致血鬱其脈沉澀而芤其體胸脅常有痛如針刺者是也香附童便制二錢牡丹皮赤曲炒川通草穿山甲炒降真香蘇木山楂肉大麥芽炒研各一錢紅花七分水酒各一半煎去滓入桃仁去皮泥七分韭汁半盞和勻通口服熱鬱湯有陰虛而得之者有胃虛食冷物抑遏陽氣於脾土中而得之者其治法皆見發熱條中此則治夫非陰虛非陽陷亦不發熱而常自蒸蒸不解者也連翹四錢薄荷葉黃芩各一錢五分山梔仁炒二錢麥門冬去心三錢甘草五分鬱金一錢栝蔞皮穰二錢竹葉七片煎服問何不用蒼朮香附撫芎曰火就燥燥藥皆能助火故不用也濕鬱湯治因雨露所襲或嵐氣所侵或坐臥濕地或汗出衣衫皆為濕鬱其狀身重而痛倦怠嗜臥遇陰寒則發脈沉而細緩者是也蒼朮三錢白朮炒香附炒橘紅厚朴薑汁炒半夏制白茯苓去皮撫芎羌活獨活各一錢甘草五分生薑五片水煎虞摶云一男子年二十九三月間房事後騎馬渡溪遇深淵沉沒幸得馬健無事連濕衣行十五里抵家次日憎寒壯熱肢節煩疼似瘧非瘧之狀一醫作虛證治而用補氣血藥服之月餘不效又易一醫作勞瘵治用四物湯加知柏地骨皮之類及丹溪大補陰丸倍加紫河車服至九月反加滿悶不食乃顧請有乳婦人在家只吃人乳汁四五杯不吃米粒召余診視六脈皆洪緩重按若牢右手為甚余作濕鬱處治用平胃散倍蒼朮加半夏茯苓白朮川芎香附木通砂仁防風羌活加姜煎服黃昏服一帖一更時又進一帖至半夜遍身發紅丹如癮疹片時隨沒而大汗索粥與稀粥二碗由是前病除減能食仍與前方服三帖後以茯苓滲濕湯倍加白朮服二十帖平安
