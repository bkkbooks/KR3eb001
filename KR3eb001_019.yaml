body:
  text: 卷十九補遺古有四診謂望聞問切也經以神聖工巧配之正文八十一第其言非以脈求證則問證合脈僅從事於工巧而望聞之法十無一二豈以後學庸劣皆不足與語神聖之道乎今彙輯補入至若觸類引申又不止此數條已也惟同志者屬意焉望診臟腑部分靈樞五色篇曰五臟六腑各有部分能別部分萬舉萬當自額而下闕庭上屬咽喉之部分也自闕中循鼻而下鼻端屬五臟之部分也自內眥挾鼻而下至承漿屬六腑之部分也自顴而下頰屬肩背手之部分也自牙車以下頤屬股膝脛足之部分也又曰五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極者是也五官靈樞五閱五使篇曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑診病新久素問脈要精微論曰徵其脈小色不奪者新病也徵其脈不奪其色奪者此久病也徵其脈與五色俱奪者此久病也徵其脈與五色俱不奪者新病也五色篇曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲明堂骨高以起平以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五官惡得無辨乎庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也男子色在於面王為小腹痛下為卵痛其圜直為莖痛在女子為膀胱子處之病散為痛摶為聚顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以上者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也統論色素問脈要精微論曰能合色脈可以萬全五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼素問五臟生成篇曰青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也青如草滋者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也又云生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也夫氣由髒髮色隨氣華如青黃赤白黑者色也如帛裹朱如鵝羽如蒼璧之澤如羅裹雄黃如重漆色又云如翠羽如雞冠如蟹腹如豕膏如烏羽或有鮮明外露或有光潤內含者氣也氣至而後色彰故曰欲曰生若赤如赭白如鹽青如藍黃如土色黑如地蒼甚則青如草滋黃如枳實黑如炲赤如衃血白如枯骨或晦黯不澤或悴槁不榮敗色雖呈氣於何有故曰不欲且曰死由此觀之則色與氣固不可須臾離也然而外露者不如內含內含則氣藏外露則氣泄亦猶脈之弦鉤毛石欲其微不欲其甚下文所云如以縞裹者正取五色之微見方是五臟之外榮否則過於彰露與弦鉤毛石之獨見而無胃氣名曰真藏者何以異乎面難經十三難曰五臟有五色皆見於面亦當與寸口尺內相應假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮澀而短色黑其脈沉濡而滑脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈澀尺之皮膚亦澀脈滑尺之皮膚亦滑假令色青其脈浮澀而短若大而緩為相勝色青為肝脈得浮澀而短為肺脈為金剋木大而緩為脾脈為木剋土是謂相勝浮大而散若小而滑為相生也浮大而散為心脈為木生火小而滑為腎脈為水生木是謂相生玉機真藏論曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難治脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之五臟生成篇曰色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨靈樞五色篇曰五臟六腑之肢節各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當和陰陽之盛衰衰多益寡和而平之萬舉萬當矣能別左右是謂大道男女易位故曰陰陽審察澤夭謂之良工左右乃陰陽之道路而男女從逆不同故位亦異位定然後能察其潤澤枯夭也沉濁為內浮澤為外內為臟外為腑以沉浮別之然在色上看非心會不能得黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近視色上下以知病處浮則病淺沉則病深澤則成全夭則敗亡散解者新近摶聚者久遠上則在上下則在下皆以色形知病也積神於心以知往今故相氣不微不知是非屬意勿去乃知新故視色之道必積神屬意乃知已往來今及新病故疾色明不粗沉夭為甚不明不澤其病不甚明澤不粗顯而但見沉夭病必甚也若無沉夭雖不明澤病亦不甚其色散駒駒然未有聚其病散而氣痛聚未成也駒小馬也奔逸不定言其色散無定所氣雖聚痛未成形也腎乘心心先病腎為應色皆如是臟必自虛而後賊邪乘之所見之色自是勝我者五臟皆然男子色見於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也卵莖狐㿉乃膀胱小腸子處之病也其部位在於面王上下故色見於彼圜直象莖故以色見之高下分莖病之本末俗以鼻之大小驗前陰之鉅細有以哉女子在於面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔女子部分亦同而病亦在下但所見皆沖任帶脈如淫帶淋濁瘕聚之類或有因暴食濕熱下流而成前證者若色摶則聚而結色散者但痛而已左為左右為右其色有邪聚散而不端面色所指者也病見於色左右不爽故隨其色之所指察聚散而知邪之摶與痛也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色赤大如榆莢在面王為不日五色之正端滿合時日者是為無邪有別鄉者猶言正色之外別部又見一色也如赤見於面王則非其部不當見而見又非其時矣其色上銳首空上向下銳下向在左右如法色之侵乘必視其尖銳處為乘之首上銳上乘下銳下乘左右皆如其法以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也別五色而知五臟因五臟而知五合再察在何部而分生克吉凶病固無遁情矣面上白點腹中蟲積面青白黃色不常及面上如蟹爪路一黃一白者食積兩顴時赤虛火上炎病人面無血色無寒熱脈沉弦者衄也病人見黃色光澤者為有胃氣不死干黃者凶赤色出兩顴大如拇指病雖小愈必卒死黑色出於庭大如拇指必不病而卒死冬月面慘傷寒紫濁時病色白而肥氣虛多痰黑而瘦陰虛火旺目靈樞論疾診尺篇曰目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中白睛黃淡脾傷泄痢黃而濁兼面如熏濕盛黃疸黃如橘子明者熱多黃中兼青紫脈芤是瘀血胸中兩脅必有塊眼黑而頰赤者熱痰也眼胞上下如煙煤者痰也眼黑而行走艱難呻吟者入骨痰也其證遍體骨節痠痛眼黑面帶土色四肢痿痹屈伸不便者風痰也目黃大煩脈大為病進目黃心煩脈和者為病將愈目精暈黃衄未止平人見黑氣起口鼻耳目者凶目睛黃酒疸黃白及眼胞上下腫者谷疸其人心下必痞脹明堂眼下青色多欲精神勞傷不爾即未睡面黃目青為傷酒面無精光齒黑者凶瘰癧赤脈貫瞳者凶一脈一歲死一脈半歲半死二脈二歲死三脈三歲死目間青脈起者掣痛乃少陽膽經之滯也瞳子高大者太陽不足病人面目俱等者吉面黃目青面黃目赤面黃目白面黃目黑皆不死面赤目白面青目黑面黑目白面赤目青皆死面目有黃色是有胃氣為吉前二節一有胃氣一無胃氣傷寒眼下青色屬挾陰挾陰者俗指房事也金匱要略曰其目正圓者痓不治瞪直屬太陽經絕太陽主筋故痓痓一作死又色青為痛色黑為勞色赤為風色黃者小便難色鮮明者有留飲鮮明者俗言水汪汪也俱指白珠目睛不了了鼻中呼不出吸不入氣短促而冷者陰病目睛了了鼻中呼吸出入能往能來口鼻息長而皆熱者陽病也鼻金匱要略曰病人有氣色見於面部願聞其說師曰鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死鼻頭色黃小便必難上云胸上有寒寒則水穀不運故小便難也余處無恙獨鼻尖青黃者其人必為淋也鼻頭青腹中痛舌冷者死鼻孔忽仰起者死鼻枯槁不澤者死鼻冷如冰連兩頤者多死病人鼻頭明山根亮目眥黃光起色鼻頭微白者亡血血脈論疾診尺篇曰診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱血脈即絡脈肌皮嫩薄者視之可見素問平人氣象論曰臂多青脈曰脫血絡中血脫故不紅而多青毛髮發枯生穗血少火盛毛髮不堅多墮落者衛氣疏或有風眉墮者風也病人頭毛上逆者凶血枯不榮如枯草不柔順而勁直小兒疳病多此亦主有蟲形體人之大體為形形之所充者氣形勝氣者夭肥白氣不充氣勝形者壽修長黑色有神氣實形實氣虛形虛形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死形氣相得者生參伍不調者死肥人多中風以形厚氣虛難以周流而多鬱滯生痰痰壅氣塞成火而多暴厥也瘦人陰虛血液衰少相火易亢故多勞嗽病人形脫而氣盛者死正虛則形脫邪實則氣盛形體充大而皮膚寬緩者壽形體充大而皮膚緊急者夭形氣相失謂之難治形盛氣虛氣盛形虛形澀而脈滑形大脈小形小脈大形長脈短形短脈長形滑脈澀肥人脈細小輕虛如絲羸人脈躁俱凶血實氣虛則肥氣實血虛則瘦肥者能寒不能熱能讀耐瘦者能熱不能寒美髯而長至胸陽明血氣盈髯少血氣弱不足則無髯美髯者太陽多血坐而下一腳者腰痛也行遲者痹也或表強或腰腳痛或麻木風疾裡實護腹如懷卵物者心痛也持脈病人欠者無病也經云陽引而上陰引而下則欠陰陽相引故云無病病亦即愈息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿吐沫形肉已脫九候雖調者死掌中寒者腹中寒掌中熱者陰不足虛火盛診時病人叉手捫心閉目不言必心虛怔忡倉廩不藏者門戶不要也水泉不止者膀胱不藏也頭者精明之府頭傾視深精神將奪背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣眼胞腫十指頭微腫者必久咳死證屍臭舌卷囊縮肝絕口不合脾絕肌肉不滑唇反胃絕髮直齒枯及遺尿腎絕毛焦面黑直視目瞑不見陰氣絕目眶陷目系傾汗出如珠陽系絕病後喘瀉脾脈將絕目正圓手撒戴眼太陽絕吐沫聲如鼾睡面赤面青黑唇青人中滿唇反發與眉衝起爪甲下肉黑手掌無紋臍凸足跗腫面青但欲伏眠目視不見汗出如油肝絕八日死眉傾者膽死手足爪甲青或脫落呼罵不休筋絕八日死肩息直視心絕立死髮直如麻不得屈伸自汗不止小腸絕六日死口冷足腫腹熱臚脹泄利無時不覺脾絕五日死脊痛腫身重不可反覆胃絕五日死耳干舌背腫溺血大便赤泄肉絕九日死口張氣出不返肺絕三日死泄利無度大腸絕齒枯面黑目黃腰欲折自汗腎絕四日死齒黃枯落骨絕五臟絕證五臟已奪神明不守聲嘶循衣摸床譫語陽明絕妄語錯亂及不語失音熱病猶可生脈浮而洪身汗如油喘而不休肺絕汗膩不流脈洪而喘不休真氣外散陽反獨留形體如煙燻直視搖頭心絕心為火臟故陽熱獨存煙燻火極焦灼之象唇吻反青四肢漐漐汗出肝絕唇吻屬脾而青色屬木木乘土故曰反環口黧黑柔汗發黃脾絕水色凌土冷汗身黃脾真散越溲便遺失狂言目反直視腎絕溲便二陰腎臟所司遺失則門戶不閉水精敗絕目背瞳人陽氣先絕陰氣後竭者死時身面必青陽先脫陰絕於後故青色存也陰氣先絕陽氣後竭者死時身面手足必赤腋下溫心下熱陰先脫陽絕於後故赤色見余陽未即盡故腋溫心熱水漿不下形體不仁乍靜乍亂胃絕胃納水穀合肌肉故六腑氣絕足冷腳縮五臟氣絕便利不禁手足不仁手太陰氣絕則皮毛焦太陰者肺也行氣溫於皮毛者也故氣不榮則皮毛焦而津液去津液去則皮節傷皮上之紋皮節傷則皮枯毛折津液去而皮節平毛無潤養而折毛折者則毛先死丙日篤丁日死火剋金余仿此手少陰氣絕則脈不通脈不通則血不流血不流則色澤去故面色黑如黧此血先死壬日篤癸日死足太陰氣絕則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死足少陰氣絕則骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫則肉不著骨骨肉不相親則肉濡而卻肉濡而卻故齒長而垢齒齦肉退卻而齒則長垢也發無潤澤無潤澤者則骨先死戊日篤己日死足厥陰氣絕則筋縮引卵與舌厥陰者肝也肝者筋之合也筋者聚於陰器而絡於舌本故脈不榮則筋縮急筋縮急則引卵與舌故舌卷囊縮此筋先死庚日篤辛日死三陰氣俱絕則目眩轉目矇目矇者為失志失志則志先死死即目矇也目不見也脫陰者目矇六陽氣俱絕則陰與陽相離陰陽相離則腠理泄絕汗乃出大如貫珠轉出不流旦占夕死夕占旦死詐病向壁臥聞師到不驚起而目盼視若二言三止脈之嚥唾者此詐病也若脈和平當言此病太甚須針灸數十處服吐下藥乃愈嚇其詐也聞診聲難經六十一難曰聞其五音以別其病以五臟有五聲以合於五音謂肝呼應角心言應徵脾歌應宮肺哭應商腎呻應羽是也然此義深奧非尋常所可彷彿者今惟以名賢簡易之法匯著於下脈之呻者痛也為彼診時有呻吟之聲言遲者風也風滯於氣機關不利出言遲吃而蹇澀聲如從室中言此中氣之濕也濕濁淆氣言不清亮言而微終乃復言者此奪氣也謂氣短弱不相接言未已停止半晌復言衣被不斂言語罵詈不避親疏者此神明之亂也即風狂之類熱病不論出言懶怯先輕後重者內傷不足出言壯厲先重後輕者外感有邪攢眉呻吟者苦頭痛叫喊或呻吟以手捫心下者中脘痛呻吟不能轉身或轉而作楚態者腰痛呻吟搖頭或攢眉以手捫腮唇者齒痛呻吟不能行起者腰腳痛為彼診時數吁氣者屬鬱結籲則氣鬱少伸搖頭言者里痛形羸聲啞勞瘵不治此必咽中有瘡肺金火克肺主聲故耳暴啞者風痰伏火或忿怒叫喊所致聲嘶色敗久病不治坐而氣促喉聲者痰火哮喘言語蹇澀者風痰中年人聲濁痰火診時獨言獨語言談無緒者思慮傷神心神他寄故耳傷寒壞證聲啞為狐惑上唇有瘡蟲食其臟下唇有瘡蟲食其肛雖病而聲音響如故者吉金匱要略曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病欲言復寂忽又驚呼非深入骨節之病不如此也況骨節中屬大筋筋為肝合骨乃膽主驚呼亦出於肝膽故耳喑喑低渺之聲聽不明徹必心膈間有所阻礙啾啾細長之聲所謂如室中甕中出者頭中有濕混其清陽故鼻窒發聲如此也息氣短促不足以息虛甚氣不能應呼吸平人無寒熱短氣不足以息者實也中焦有礙或痰火吸而微數其病在中焦實也當下之即愈中實吸不得入還出復入故微數也虛者不治實則可下中虛吸不盡入而微數者肝腎欲絕在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治病在上焦氣宜通下病在下焦氣宜達上上下交通病斯愈矣今上焦者吸促而不能通下下焦者吸遠而不能達上上下不交通病豈易治乎動搖振振氣不載形也問診人品起居凡診病必先問所看何人或男或女或老或幼或童僕或婢妾次問得病之日受病之原及飲食胃氣如何便利如何曾服何藥日間何如夜間何如或寐或寤有無脹悶痛處病證問病不答必耳聾即當詢之是素聾否不則病久或汗下過傷虛聾問而懶言答惟點頭者是中氣虛昏憒不知人問是暴厥抑是久病婦女僵厥多是中氣亦須問其曾大怒否婦女當問其月水如何寡婦氣血凝滯兩尺多滑不可誤斷為胎室女同心腹脹痛問其舊病新病嗜欲苦樂問其所欲何味所嗜何物或縱酒或齋素喜酸者則知肝虛喜甘脾虛他味准此頭身臂膊作痛必問曾病惡瘡否臨病必審形志或形勞志苦或抑鬱傷中故貴脫勢眷戀於心雖不中邪病從內生名曰脫營謂脫散營氣嘗富後貧悲憂內結名曰失精謂精神喪失二者皮焦筋屈痿痹為攣以其外耗於衛內奪於榮良工診之必知病情再問飲食起居暴樂暴苦始樂後苦暴怒傷陰暴喜傷陽形體毀沮精華日脫邪氣內並邪乘虛而襲附辨舌張三錫曰金鏡錄載三十六舌辨傷寒之深淺吉凶可稱詳備然細討究不過陰陽表裡寒熱虛實而已陶節菴曰傷寒邪在表則舌無苔熱邪在表則苔漸生自白而黃黃而黑甚則黑裂矣黑苔多凶若根黑或中黑或尖黑皆屬裡熱全黑則熱極而難治常見外感挾內傷宿食重而結於心下者五六日舌漸黃或中干而邊潤名中焙舌此則裡熱尚淺若全乾無論黃黑皆屬裡證分輕重下之若曾經下或屢下不減乃宿滯結於中宮也詢其脈之虛實及中氣何如實者潤而下之虛人神氣不足當生津固中氣有用生脈散對解毒湯而愈者有用附子理中湯冷服而愈者一則陰極似陽一則陽極似陰不可不辨白苔屬寒外證煩躁欲坐臥於泥水中乃陰寒逼其無根失守之火而然脈大不鼓當從陰證治若不大躁嘔吐者從食陰治之白苔燥虛而微熱或不得汗或胃中少有飲而不行宜溫解白滑苔虛寒胃寒陽氣不振宜溫白苔起芒刺津液不足胃中有物宜運動黃苔微熱熱漸入里或燥渴之象宜清解灰色苔胃中有物中氣虛熱渴而不能消飲者宜溫解黑色苔熱入裡實燥厚者宜下滑潤者水困火宜溫雖黑而潤所謂水極似火也不燥為異凡傷寒辨舌者以舌屬心而主火寒為水也水寒凌火舌受其困產後辨舌者以心主血也經云少陰氣絕則血不流故舌紫黑者為血先死凡見黑舌要問曾食酸甜咸物否能染成黑色凡視舌色雖有成見亦必細審兼證及脈之虛實不爾恐有毫釐千里之謬
