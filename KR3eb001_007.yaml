body:
  text: 卷七大便燥結脈證第五十七大便燥結須分氣血陽數而實陰遲而澀燥結一證稍有分別大抵血液少者多燥澀氣火盛者多結滯然而燥則必結結則必燥又似難為分別但以脈合證而屬氣屬血自井然矣氣火盛者為陽脈必有餘故數實也宜局方麻仁丸之類血液少者為陰脈必不足故遲澀也宜四物湯東垣導滯通幽湯之類氣血一判而再審其因有風燥宜五仁丸得效皂莢丸搜風順氣丸之類火燥宜大小承氣湯麻仁丸之類亡血燥宜四物湯之類産後脫血燥宜四物湯加人參黃耆之類嘔吐傷液燥宜四君子加麥冬五味之類汗後亡液燥宜八珍湯十全大補湯之類腎虛液少燥宜六味丸八味丸之類老年血衰燥宜四物湯麻仁丸濟生蓯蓉潤腸丸之類氣實壅盛結宜六磨湯得效橘杏丸蘇麻粥之類氣虛不能傳送亦結宜黃耆湯之類氣熱乾涸結宜大承氣湯麻仁丸六一散之類氣寒凝滯不行亦結宜局方半硫丸枳實理中湯之類但宜以脈辨證以證求因而用藥擬方無餘蘊矣附方和劑麻仁丸治腸胃熱燥大便祕結厚朴去皮薑製炒白芍藥枳實麩炒各半斤大黃蒸焙一斤麻仁別研五兩杏仁去皮尖炒五兩半上為末煉蜜丸如桐子大每服二十丸臨臥溫水下大便通利則止四物湯見第二十一東垣導滯通幽湯治幽門不通上衝吸門不開噎塞氣不得上下大便難脾胃初受熱中多有此證治在幽門以辛潤之當歸身升麻梢桃仁泥甘草各一錢紅花少許熟地黃生地黃各五分水二盞煎一盞調檳榔末五分稍熱服得效五仁丸治津液枯竭大腸祕澀傳道艱難桃仁杏仁炒去皮尖各一兩柏子仁半兩松子仁一錢二分半郁李仁炒一錢陳皮四兩另為末上將五仁另研如膏入陳皮末研勻煉蜜丸如桐子大每服五十丸空心米飲下得效皂角丸專治有風人臟腑祕塞大效豬牙皂角枳殼去瓤羌活桑白皮檳榔杏仁去皮尖另研麻仁另研防風川白芷陳皮去白各等分上為末蜜丸如桐子大每服三五十丸白湯下蜜湯亦可聖惠搜風順氣丸治三十六種風七十二種氣去上熱下冷腰腳疼痛四肢無力多睡少食羸瘦顏色不完黃赤惡瘡下疰口苦無味憎寒毛聳積年癥瘕氣塊丈夫陽事斷絶女子久無子嗣久患寒瘧吐逆瀉痢變成勞疾百節痠疼小兒老人皆可服補精駐顏疏風順氣車前子二兩半白檳榔火麻子微炒去殼另研郁李仁湯泡去皮研菟絲子酒浸焙炮曬乾牛膝酒浸一宿乾山藥各三兩枳殼去瓤麩炒防風去叉獨活各一兩錦紋大黃五錢半生半熟上為末煉蜜丸如桐子大每服二十丸酒茶米飲任下百無所忌早晨臨臥各一服服一月消食二月去腸內宿滯三月無倦少睡四月精神強勝五月耳目聰明六月腰腳輕健一年百病皆除老者返少如服藥覺臟腑微動以羊肚肺羹補之久患腸風便血服之除根如顫語蹇澀及癱瘓服之隨即平復酒後一服宿酲消盡百病不生孕婦勿服濟生蓯蓉潤腸丸治發汗利小便亡津液大腸祕老人虛人皆可服肉蓯蓉酒浸焙二兩沉香另研一兩上為末麻子仁汁打糊丸如桐子大每服七十丸空心米飲下大承氣湯見第十七小承氣湯見第十七四君子湯見第十六八珍湯見第十六十全大補湯見第十六六味丸見第十六八味丸見第十六六磨湯治氣滯腹急大便祕澀沉香木香檳榔烏藥枳殼大黃各等分上各件熱湯磨服得效橘杏丸氣祕老人虛弱人皆可服橘紅取末杏仁去皮尖另研各等分上和勻煉蜜丸如桐子大每服七十丸空心米飲下蘇麻粥順氣滑大便紫蘇子麻子仁不拘多少二味研爛水濾取汁煮粥食之黃耆湯年高便祕宜服綿黃耆陳皮去白各半兩為末每服三錢用大麻仁一合爛研以水投取漿水一盞濾去滓於銀石器內煎候有乳起即入白蜜一大匙再煎令沸調藥末空心服此藥不冷不燥其效如神六一散見第四十四局方半硫丸年高泠祕虛祕及痃癖冷氣半夏湯洗七次焙乾為細末硫黃明淨者研極細用柳木槌殺過上以生薑自然汁同熬入干蒸餅末攪和勻入臼內杵數百下丸如桐子大每服十五丸至二十丸無灰溫酒或生薑湯任下婦人醋湯下俱空心服枳實理中湯見第十七癲狂脈證第五十八癲乃重陰狂乃重陽浮洪吉兆沉急凶殃癲者顛也謂發時顛倒異於平日語言錯亂喜怒無因或笑或歌或悲或泣神迷意惑穢潔妄知平日能言發反沉默平日沉默發反多言甚或行步不休或復僵仆不起俗呼為失心風狂者剛暴猖狂叫號罵詈甚則逾垣上屋蹈火赴湯不避死生不知飢飽倍常勇力若邪所憑俗呼為發狂二者證既不同因當各異古人多以癲狂混稱亦疏略矣蓋人身氣為陽血為陰腑為陽臟為陰腑之手足六經為陽臟之手足六經為陰形質可見者為陽神志不可見者為陰身半以上為陽身半以下為陰表為陽里為陰凡此陰陽俱各兩相依倚互為交通而後氣血和平腑臟安靜經脈調勻形神合一上下無厥逆之虞表裡無盛虛之變如是則微疴小疾亦無自而生況癲狂乎今癲云重陰者謂偏重於陰也邪入於陰而陰實也五臟為陰神志舍於五臟亦為陰設或抑鬱不伸謀思不遂悲哀不置侘傺無聊久久藏神凝結情識昏述靈明何有此癲之成於神志者也宜靈苑辰砂散歸脾湯人參琥珀丸之類一種因陽虛不能衛外反下陷而附並於陰附並於陰則陰氣實下而不上則升降紊而癲疾作矣即脈經所謂陽附陰則癲者是也宜升陽益氣加補中益氣湯四逆散之類加減用之一種因三陽經從頭下行三陰經不得從足上行而逆下下則陰經實亦似陽附陰之義但此直指經脈之逆經所謂癲疾厥狂久逆之所生者是也宜調其升降正其逆順如交感丹加升麻巴戟木香桂枝之類一種因內有蓄血令人如狂或善忘或如見鬼如狂者如狂而非狂即癲狀也血者神明之府血蓄不行神機大礙故見上證血為陰是亦重陰陰實之義謂之邪入於陰亦可宜桃仁承氣湯代抵當丸之類狂則反是乃重陽陽實之證也素問宣明五氣篇云邪入於陽則狂邪入陽則陽實陽實則熱盛陽性主動以盛熱而加以動性猖狂剛暴不言可知又生氣通天論云陰不勝其陽則脈流薄疾並乃狂並則陽重陽實之義故素問病能論云狂生於陽也又云陽明者常動巨陽少陽不動不動而動大疾此其候也蓋言陽明之經脈常動以陽明為水穀之海其氣充盛故常動巨陽少陽之脈不動言二經之氣不如陽明之盛故不動不動者非不動也不如陽明之常動也今無論常動者即不動者亦常動而動且大疾是為狂病之候觀此則狂病之為重陽陽實明矣與上文脈流薄疾並乃狂若出一義又靈樞通天篇亦云陽重脫易狂脫非陽脫言重並於陽分而若與陰脫離也又靈樞本神篇云肝悲哀動中則傷魂魂傷則狂忘不精肺喜樂無極則傷魄魄傷則狂狂者意不存人夫肝屬木性上達而藏魂故魂主升陽也悲哀而至於動中則神情消沮恍成秋金而剋木木受克則肝氣傷肝氣傷則魂無所歸而欲其精明不忘不可得矣宜升達如逍遙散加鬱金香附遠志茯神木香之類肺屬金性收降而藏魄故魄主降陰也喜樂而至於無極則神情渙散恍成夏火而剋金金受克則肺氣傷肺氣傷則魄無所歸一派浮陽動成狂妄又安能內照而意存人事哉宜收斂如天王補心丹朱雀丸加龍骨牡蠣棗仁茯神之類又靈樞經脈篇云陽明病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走夫邪客陽明則陽盛熱甚人則增煩火則助熱故惡也聞木聲而驚者驚其相剋故惕然心動也閉戶塞牖即惡人火之義甚則欲上高而歌棄衣而走者以四肢為諸陽之本熱實四肢健於登躍故能上高而歌身表為諸陽之署熱盛於身意求涼爽故欲棄衣而走宜白虎湯承氣湯涼膈散紫雪之類又靈樞大惑論云衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑又曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也其中言及二蹺者以二蹺之脈皆上會於目內眥陽脈交於陰則陰蹺盛故目閉陰脈交於陽則陽蹺盛故目開靈樞癲狂篇首敘目之內外及上下眥者亦以癲則目閉狂則目開而明陰陽之所以不同也是皆不易之理然而兼痰兼火兼風者常十之五以三種兼證而較審之則癲必多痰而狂必多火多風也痰則多滯九竅九竅從陰從臟九竅不利故多癲風火多淫四肢四肢從腑從陽四肢盛實故多狂陰陽分屬二説覺更瞭然痰宜滾痰丸壽星丸火宜瀉青丸之類其脈浮洪者是為陽脈陽狂得之與證相宜即陰癲得之亦從陰轉陽自里達表之象故均為吉兆若沉而急沉則入陰迫里急則強急不柔是無胃氣之脈也不論狂癲凶殃立至又不獨脈為然而證亦不可忽者故癲狂篇言嘔多沃沫氣下泄者不治又言癲發如狂者不治蓋嘔多沃沫脾敗氣下泄腎敗脾腎二臟為人之先後二天二臟已敗自無生理發如狂者陰竭於內陽散於外脫根外越燈滅忽明之象亦主死如是則脈與證又不可不參看也附方靈苑辰砂散治風痰諸癇狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫戴目魂魄不守辰砂一兩須光明有牆壁者酸棗仁半兩微炒乳香半兩光瑩者上量所患人飲酒幾何先令恣飲沉醉但勿令吐至靜室中以前藥都作一服溫酒調之令頓飲如飲酒素少人但以隨量取醉服藥訖便安置床枕令臥病淺者半日至一日病深者至三兩日令家人潛伺之鼻息勻調但勿喚覺亦不可驚觸使覺待其自醒即神魂定矣萬一驚寤不可復治吳正肅公少時心病服此一劑五日方寤遂瘥歸脾湯治因思氣結因憂抑鬱以致脾傷而心下痞悶寤不得寐右關脈結而大或思慮傷脾不能統血而血衄妄行或健忘怔忡驚悸盜汗或心脾作痛嗜臥少食大便不調或肢體重痛月經不調赤白帶下或思傷脾而患瘧痢等證人參白朮白茯苓黃耆龍眼肉酸棗仁各二錢遠志當歸各一錢木香甘草各五分上加薑棗煎服人參琥珀丸治失神狂亂哀樂無由驚悸不時夜不能寐一切恍惚不寧等證人參去蘆琥珀另研茯神去木白茯苓去皮石菖蒲節密小者遠志各半兩酒浸半日去心乳香另研硃砂另研水飛酸棗仁溫酒浸半日去殼紙上炒令香熟各二錢半上為細末煉蜜丸桐子大每服二十丸食後溫酒下日再服如不能飲棗湯下補中益氣湯見第三十九仲景四逆散傷寒論云少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服申先生交感丹補虛損固精氣烏鬚髮此鐵甕城申先生方也久服令人有子蒼朮刮淨一斤分作四分用酒醋米泔鹽湯各浸七日曬研川椒紅炒研小茴香各四兩炒研交感丹又凡人中年精耗神衰蓋由心血少火不下降腎氣憊水不上升致心腎隔絶榮衛不和上則多驚中則塞痞飲食不下下則虛冷遺精愚醫徒知峻補下田非惟不能生水滋陰而反見衰悴但服此方半年屏去一切暖藥絶嗜欲然後習祕固洴流之術其效不可殫述俞通奉年五十一遇鐵甕城申先生授此服之老猶如少年至八十五乃終也因普示群生同登壽域茯神去皮木四兩香附子一斤新水浸一宿石上擦去毛炒黃為末煉蜜丸彈子大每服一丸侵晨細嚼以降氣湯下降氣湯香附子如上法半兩茯神二兩炙甘草一兩半為末點沸湯服前藥仲景桃核承氣湯見第二十代抵當丸見第二十逍遙散見第五十一天王補心丸見第五十一朱雀丸見第五十一仲景白虎湯見第四十三仲景大承氣湯見第十七小承氣湯見第十七涼膈散見第十九紫雪治發斑咽痛及暑中三陽腳氣煩躁升麻六錢黃金十兩寒水石石膏各四兩八錢犀角羚羊角各一兩玄參一兩六錢沉香木香丁香各五錢甘草八錢用水五盞先煮黃金至三盞入諸藥再煎至一盞去滓入芒硝三兩二錢慢火煎以柳木攪不停手候欲凝入瓷盆中更下硃砂麝香末各三分急攪令勻候冷凝結成雪每一錢細細咽之滾痰丸見第十七琥珀壽星丸局方用南星一斤硃砂二兩琥珀一兩無豬心血天南星一斤掘坑深二尺用炭火五斤於坑內燒熱紅取出炭掃淨用好酒一升澆之將南星趁熱下坑內用盆急蓋訖泥壅合經一宿取出再焙乾為末琥珀四兩另研硃砂一兩研飛以一半為衣上和勻豬心血三個生薑汁打麵糊攪令稠黏將心血和入藥末丸如桐子大每服五十丸用人參湯空心送下日三服瀉青丸見第四十九癇病脈證第五十九癇病宜虛實急者惡浮陽沉陰滑痰數熱癇之始發卒然跌僕手足牽掣口噤作聲或吐沃沫痰涎一飯頃氣平蘇醒與癲痓二證似是而非癲證則如上文所云痓證則多身強直如弓反張亦無癇證之作聲也然有陰陽二種正如小兒之急驚慢驚陽癇先身熱瘛瘲驚啼而後發其脈浮洪病屬六腑外在肌膚輕淺易治宜集驗龍腦安神丸河間犀角丸之類陰癇身冷不驚掣不啼叫卒然而發略無先兆其脈沉搏病屬五臟內在骨髓深重難治宜清心牛黃丸神應丹之類昔賢皆謂有痰有熱客於心胃之間因聞大驚而作若熱盛雖不聞驚亦作是謂先有痰熱而後發癇也恐未必然總不如三因之論為的其論以驚動臟氣不平鬱而生涎閉塞諸經厥而乃成或在母腹受驚或感六氣或飲食不節逆於臟氣而成蓋忤氣得之外驚恐得之內飲食得之屬不內外所因不同治法亦異如驚者安神丸以平之挾痰者三聖散以吐之挾火者清神湯以涼之可下者即以承氣湯下之其脈總宜虛而不宜實實則邪盛若實而急是無胃氣唯強急而不柔和凶惡之徵也浮則癇發於陽沉則癇發於陰滑則癇發多痰數則癇發多熱因病見脈因脈知病亦理之自然耳附方龍腦安神丸見第十九河間犀角丸見第二十五清心牛黃丸見第四十二神應丹治諸癇好辰砂不拘多少上細研豬心血和勻以蒸餅裹劑蒸熟就熱取出丸如桐子大每服一丸人參湯下食後臨臥俱可三聖散瓜蒂揀淨炒微黃防風去蘆各三兩藜蘆聖惠方減用之或一兩或半兩或三錢上為粗末每服約半兩以齏汁三茶盞先用二盞煎三五沸去齏汁次入水一盞煎至三沸卻將先二盞同一處熬二沸去滓澄清放溫徐徐服之以吐為度不必盡劑大承氣湯見第十七喉痹脈證第六十喉痹之脈數熱遲寒纏喉走馬微伏則難痹者閉也閉塞不通之謂乃火盛氣結以致喉嚨腫脹呼吸難通壅塞痰涎水漿不下一二日即能殺人十二經脈與經別多過於此即不然亦在其前後左右也有經脈過者有經別過者有經脈經別俱過者如肺手太陰經脈無過於此者而經別篇則云手太陰之正上出缺盆循喉嚨大腸手陽明之脈循缺盆上頸貫頰經別篇又云上循喉嚨胃足陽明之脈循喉嚨入缺盆經別篇又云上循咽出於口脾足太陰之脈上膈夾咽連舌本經別篇又云上結於咽貫舌中心手少陰之脈上夾咽經別篇又云上走喉嚨出於面小腸手太陽之脈循咽下膈其支者循頸上頰而經別則無膀胱足太陽之脈自腦還出別下項經別篇又云直者從膂上出於項腎足少陰之脈循喉嚨夾舌本經別篇又云直者系舌本復出於項心包絡手厥陰之脈亦無過此者而經別則云手厥陰之正別屬三焦出循喉嚨三焦手少陽之脈上項系耳後而經別則無經別雖無其手厥陰之正有別屬三焦出循喉嚨者以三焦與心包為配故曰屬屬則經脈相屬而合一也膽足少陽之脈下加頰車下頸經別篇又云足少陽上夾咽出頤頷中肝足厥陰之脈循喉嚨之後上入頏顙而經別亦無故靈樞第十篇諸經是動所生之病有云頸腫者手陽明是動有云鼽蛗喉痹者手陽明所生有云頸腫喉痹者足陽明所生有云舌本強者足太陰是動有云舌本痛者足太陰所生有云嗌乾者手少陰足厥陰二經是動有云嗌痛頷腫者手太陽是動有云頸頷腫者手太陽所生有云項痛者足太陽所生有云咽腫者足少陰所生有云嗌乾及痛者足少陰所生有云嗌腫喉痹者手少陽是動有云頷痛者足少陽所生種種不同總無外氣火二字與本篇所云氣有餘則當脈所過者熱腫同一義也宜黃芩枳殼連翹丹皮薄荷荊芥山梔防風牛蒡玄參黃柏黃連山豆根射干升麻生地甘草桔梗石膏等藥在臨證定在何經相宜者用又不可純用寒涼須配輕散者斯善矣然諸證之中惟喉痹為急而喉痹中又惟以發於手少陰少陽二經者為最急蓋喉主天氣通呼吸為生氣之門火熱搏聚則腫脹腫脹則竅閉竅閉則氣塞氣塞則痰涎壅愈壅愈塞愈塞愈壅呼吸亦將從此而斷況少陰君火少陽相火火性速而炎上較之他經不更烈乎故一二日即成不治惟針刺出血以瀉其實探吐痰涎以決其壅皆倉卒治標之妙法也刺腫處出血用鵝翎蘸酸澀之味以探吐其脈多數數則為熱故也間有脈遲者乃是外寒襲經經氣不利鬱滯於所過之處故亦為痹外則兼表證內亦不如數熱之腫痛此不但忌用寒涼而且當溫散也更有一種纏喉風或麻或癢又腫又痛纏綿於內腫達於外一種走馬喉痹須臾之間痛而腫腫而閉閉而氣絶暴發暴死如走馬然二者俱火中挾風火性烈風性疾風火交煽故發病凶暴如此此等證惟刺最妙其脈應浮大洪數而反見微伏是正衰邪盛補瀉罔從欲其生也不亦難乎附方和劑甘桔湯治風痰上壅咽喉腫痛吞吐有礙苦桔梗一兩炙甘草二兩每服三錢水一盞煎七分食後溫服三因荊芥湯治咽喉腫痛語聲不出咽之痛甚荊芥半兩桔梗二兩甘草一兩上銼散每服四錢水一盞薑三片煎六分去滓溫服和劑解毒雄黃丸治纏喉風及急喉痹卒然倒僕牙關緊急不省人事雄黃研飛鬱金各一兩巴豆去皮出油十四枚上為細末醋煮麵糊為丸如緑豆大熱茶清下七丸吐出頑痰立蘇如未再服如至死者心頭猶熱灌藥不下即以刀尺鐵匙斡開口灌之下咽無有不活如小兒驚熱痰涎壅塞或二丸三丸量大小加減一法用雄黃丸三粒醋磨化灌之尤妙其痰即瘥寶鑑碧玉散治心肺積熱上攻咽喉腫痛閉塞水漿不下或喉痹重舌木舌腫脹皆可服青黛盆硝蒲黃甘草各等分上為細末研勻每用少許吹入咽喉內細細咽下若作丸用砂糖為丸每兩作五十丸每服一丸噙化咽下寶鑑開關散治喉風氣息不通白殭蠶炒去絲嘴枯白礬各等分上為細末每服三錢生薑蜜水調下細細服之瓜蒂散見第四十八寶鑑備急如聖散治時氣纏喉風漸入咽喉閉塞水穀不下牙關緊急不省人事雄黃細研藜蘆白礬飛豬牙皂角去皮弦上等分為細末每用一豆大鼻內嗅之立效咽喉急備丹青黛芒硝白殭蠶各一兩甘草四兩上為細末用臘月內牛膽有黃者盛藥其中蔭四十九日多時為妙寶鑑增損如聖散治風熱攻衝會厭語聲不出咽喉妨悶腫痛桔梗二兩甘草一兩半枳殼湯浸去瓤二錢半防風半兩上為細末每服三錢水一大盞煎至七分去滓入酥如棗許攪勻食後溫服瑞竹羅青散治單雙乳蛾蒲黃五錢羅青盆硝研各三錢甘草二錢上為細末每服一錢冷蜜水調細細咽之吞不下雞翎蘸藥喉內掃之立效燒鹽散治懸雍垂長咽中妨悶燒鹽枯礬研細各等分和勻以箸頭點之即消四七湯見第十七四味湯治咽喉中如有物咽吐不利半夏以生薑汁浸一宿湯浸切洗厚朴刮去粗皮以生薑汁浸炙黃陳橘皮以湯浸去白焙各一兩赤茯苓刮去黑皮二兩上銼碎每服三錢匕水一盞入生薑一棗大擘碎煎六分去滓食遠溫服白礬散治急喉閉白礬三錢巴豆二個去殼作六瓣上將礬於銚內慢火熬化為水置巴豆於內候乾去巴豆取礬研為末每用少許吹入喉中立愈
