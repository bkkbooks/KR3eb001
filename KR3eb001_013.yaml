body:
  text: 卷十三癰疽脈證第七十四癰疽浮數惡寒發熱若有痛處癰疽所發脈數發熱而痛者陽不數不熱不疼陰瘡未潰癰疽不怕洪大已潰癰疽洪大可怕癰者壅也疽者阻也榮衛氣血壅塞阻滯鬱熱成膿之所致有陰陽臟腑之分癰大而淺疽小而深大則氣鼓發鼓發則向表而淺小則氣收斂收斂則近里而深淺則從腑從陽故易消易潰深則從臟從陰故難消難潰易潰者則毒從外泄難潰者則毒常內陷此吉凶輕重之所由分也方書謂其源有五一曰天行時氣二曰七情內郁三曰體虛外感四曰身熱搏於風冷五曰食炙煿飲法酒服丹石等熱毒雖分為五然總不外三因也三因者一外因如素問運氣等篇之太陽少陰陽明太陰少陽厥陰之客氣以及所至所復寒燥濕邪並熱淫所勝歲火太過之發為痱疹瘡瘍癰疽瘡腫又據脈要精微論帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也又生氣通天論曰勞汗當風寒薄為皶郁乃痤薄之淺則為皶郁之久則為痤又曰陽氣者開闔不得寒氣從之乃生大瘻榮氣不從逆於肉理乃生癰腫腠理之開闔皆衛氣主之衛氣失常則開闔亦不得如常矣邪因乘隙而入結於筋絡故成傴僂邪若入陷於脈則營亦不順逆於肉理之中久則結聚為癰腫也又素問氣穴論曰邪溢氣壅脈熱肉敗榮衛不行即將為膿內消骨髓外破大膕留於節腠必將為敗邪留於節腠溪谷之間節腠溪谷神氣所注必大為敗壞豈僅消髓破膕而已又靈樞刺節真邪篇曰虛邪之中人也搏於脈中則為血閉不通則為癰亦榮氣不從義又云熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕熱氣勝久則良肉腐化為膿不外瀉而內入入則爛及於骨骨傷不易生新附骨如蟲之蝕也又曰邪氣中之凝結日以易甚連以聚居為昔瘤凝結之久日漸增聚則日漸長大矣不腐而大贅於形體其名曰瘤昔者夙昔之謂言其久也又曰骨與氣並日以益大則為骨疽邪附於骨久為骨疽又曰有熱則化為膿無熱則為肉疽此邪結於肉者有熱久則肉腐為膿無熱久則肉化為漿渣今疽瘤內常有此類一內因如素問陰陽別論曰三陽為病發寒熱下為癰腫三陽者太陽也太陽主表故發寒熱太陽走足故下為癰腫又素問氣厥論曰腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣腎水寒氣反移凌於脾土是為逆逆則氣壅肌肉而為腫以脾主肌肉故脾以寒氣反移凌於肝木亦為逆逆則氣不獨壅肌肉而筋亦攣腫以肝主筋故又素問厥論曰少陽厥逆發腸癰不可治驚者死此言少陽遊行之火若厥逆結聚為毒最甚故不可治若發驚是為入臟主死以驚屬心臟則指厥陰心包絡也又靈樞脈度篇曰六腑不和則留結為癰腑為陽陽主衛衛氣不和則留結於肌腠而癰腫矣又玉版論黃帝曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿喜怒傷氣飲食傷臟不測者暴發之謂暴則氣壅逆而陽有餘不節者縱食偏嗜之謂不節則五宮傷而陰不足陽有餘則氣聚而熱勝陰不足則榮不行而熱亦勝兩熱相搏營衛不行故化膿而成癰疽也又陳無擇亦云癰疽瘰癧不問虛實寒熱皆由氣鬱而成蓋言喜怒憂思久郁所致治以遠志酒獨勝散兼以五志相勝之理乃善如恐勝思思勝恐之類不內外因如素問生氣通天論曰膏粱之變足生大丁受如持虛足生者必生也又異法方宜論曰東方之域天地之所生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石魚生於水外陰而內陽水之體也動而不息火之象也火顯於外陽蓄於內美食久久使人熱中癰瘍之病乃其常耳又有久服丹石法酒熱毒蓄中發為癰疽疔腫亦同膏粱之類其脈浮數者以血泣而氣復從之邪與正郁鬱則化熱故數也在表在陽故浮也正為邪搏則宣暢外衛之力薄故復惡寒據脈證似與傷寒表證無異但傷寒雖有痛或在頭或在身體或在骨節未有痛止於一處者今痛止一處而脈數此處必化熱為膿正癰疽所發之處也即傷寒論辨脈法所謂諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿是也如此者乃為陽毒若脈不數身不熱所患之處不疼是邪客陰分不能鼓發多致內陷然必兼有煩懊嘔逆胸膈不安等證否則不熱不疼脈又不數是一不病人也何得謂之陰瘡而反重於陽證耶方癰疽之未潰也無論成膿與否熱邪郁蓄外不疏通脈之鼓湧洪大是其宜也至於已潰則熱泄邪解而洪大之脈宜衰矣潰而不衰一派熱邪正從何復誠為大可懼者與素問評熱病論所謂病溫者汗出輒復熱而脈躁疾不為汗衰病名陰陽交者同一義也凡此癰疽瘍腫自有專書注固不能畢述然靈樞癰疽一篇窮源別流包括殆盡恐業外醫者不能出其範圍也故備録於下黃帝曰余聞腸胃受谷上焦出氣以溫分肉而養骨節通腠理衛氣源流中焦出氣如露上注溪谷而滲孫脈津液和調變化而赤為血血和則孫絡先滿溢乃注於絡脈皆盈乃注於經脈陰陽以張因息乃行榮氣源流行有經紀周有道理與天合同不得休止切而調之從虛去實瀉則不足疾則氣減留則先後從虛去虛補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有遠近何以度之可得聞乎岐伯曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萱不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫言衛氣因以留聚而不得復返於平常流行之故道也寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空骨空骨中之細孔如鬃眼者所以通血液之滲灌不得泄瀉血枯空虛則筋骨肌肉不相營經脈敗漏熏於五臟臟傷故死矣黃帝曰願盡聞癰疽之形與忌曰名岐伯曰癰發於嗌中名曰猛疽猛者猛烈急速之謂猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日已發於頸名曰夭疽外在頸而內則入腋熏肺以其最上故曰夭其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺十餘日而死矣陽氣大發消腦留項名曰腦爍爍消爍也烈火熔金之謂腦被其熱爍亦如之煩心者腎毒傳心也其色不樂項痛而如刺以針煩心者死不可治發於肩及臑名曰疵疽其狀赤黑急治之令人汗出至足不害五臟癰發四五日逞速也焫之發於腋下赤堅者名曰米疽言其小如粟米也治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀俠纓急治之馬刀蛤蠣之屬癰形似之俠纓者發於結纓之處人迎之下頸側也二癰一在腋一在頸常相連絡故俗名歷串發於胸名曰井疽言其深也其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如谷實栝蔞常苦寒熱急治之去其寒熱十歲死死後出膿甘屬土此疽發於陽明胃經隱名也即乳癰之類內纍纍如穀食之蓓藟如栝蔞之包子雖不即死亦不即愈發於脅名曰敗疵亦乳串之類敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣發於尻名曰鋭疽尾骨盡處而尖鋭故名其狀赤堅大急治之不治三十日死矣發於股陰名曰赤施股陰足太陰厥陰二經所過之處火毒傷陰之甚則發此曰赤施者謂赤火之施發耳不急治六十日死在兩股之內不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死節為神氣之所遊行出入若上下左右相應而發者必死發於脛名曰兔齧如兔之齧傷故在脛其狀赤至骨急治之不治害人也發於內踝名曰走緩毒害於足則走緩而不能疾其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫毒淫其末諸陽之本敗矣亦上下相應者其狀大癰急治之百日死發於足旁名曰厲癰厲惡也其狀不大初如小指發急治之去其黑者不消輒益不治百日死急挑去其黑者不爾則增多發於足指名脫癰其狀赤黑死不治不赤黑不死不衰急斬之否則死矣不赤黑者雖不死亦欲其即衰去不衰則急斬其指不然則毒入指脫而死黃帝曰夫子言癰疽何以別之岐伯曰榮衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐腐則為膿然不能陷骨髓不能焦枯五臟不為傷故命曰癰黃帝曰何謂疽岐伯曰熱氣淳盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮皮夭白如牛脊皮之堅厚也癰者其皮上薄以澤此其候也癰疽雜述鬼遺方云癰之痛只在皮膚之上其發如火焚茅初如黍米三兩日如掌大五七日如碗大即易治如腫冷熱不外發發渴邪熱在內發逆邪攻裡而嘔治之難愈又云疽發如小癤觸則徹心痛四邊微起如橘皮孔色紅赤不全變膿水不甚出至七八日疼悶喘急若始腫高五七日忽平陷此內攻之候也又云癰疽有三等毒氣浮淺屬腑毒氣沉深屬臟毒氣猛烈而行經絡或淺或深無定五臟六腑皆受五毒難為調理惟宜於癰疽諸處不問虛實高腫起盛光澤疼痛只在皮膚之上熱急脹滿或有癢疼別無惡候初用溫藥平氣次用排膿發穴治癰所謂平氣者乃犀角飲之類其方用犀角連翹漏蘆甘草當歸肉桂皆發表之藥也所謂發穴者乃棘針之類用皂角刺為君甘草川芎乳香為佐使亦托裡之藥也然不若潔古東垣諸方發表托裡為穩當疽發諸處不拘大小唯起在背廣一尺二尺三尺皮厚紫黑高腫不常內疼如錐刺攻擊滿悶應四肢重疼前心亦痛余處發猶可惟虛處及近筋骨處若膿毒未潰即傷爛筋骨肉損為疽者屬五臟毒氣深沉氣伏堅實不宜緩治之須內實五臟外透皮膚令軟勻和即膿透宜用內托實臟氣之藥排膿勻氣乃可不比癰之毒氣淺也毋一類治之凡一切瘡腫見有內攻之候急以內托散及內補湯藥補填臟腑令實最怕透膜膜穿十無一生矣婁全善云癰之邪淺其稽留壅遏獨在經脈之中而專攻於外故初發時自表便發熱患處便如碗如盆高腫而痛甚者縱欲下陷緣正氣內固不肯受故或便祕或發渴發逆以拒之是以骨髓終不焦枯五臟終不傷也疽之邪深其稽留壅遏內連五臟而不專攻於外故身體或無熱患處或不腫毒甚者聲嘶氣脫眼黑眼小十指腫黑如墨多死也治之之法癰之初發當以潔古法為主表者散之里者下之火以灸之藥以敷之膿未成者必消膿已成者速潰又當以鬼遺方為主補填臟腑令實勿令下陷之邪蔓延外以火灸引邪透出使有穴歸著而不亂則可轉死為生今外科不分癰疽一例宣熱拔毒外以五香耗其氣內以大黃竭其血終不能自悟其藥之非惜哉集驗云癰疽之名雖多而其要則二陰陽而已發於陽者為癰為熱為實發於陰者為疽為冷為虛故陽發則皮薄色赤腫高多有椒眼數十而痛陰發則皮厚色淡腫硬狀如牛頸之皮而不痛又有陽中之陰似熱而非熱雖腫而實虛若赤而不燥欲痛而無膿既浮而復消外盛而肉腐陰中之陽似冷而非冷不腫而實赤微而燥有膿而痛外雖不盛而內實煩悶陽中之陰其人多肥肉緊而內虛陰中之陽其人多瘦肉緩而內實而又有陽變而為陰者草醫涼劑之過也陰變而為陽者大方熱藥之驟也然陽變陰者其證多猶可返於陽故多生陰變為陽者其證少不能復為陰矣故多死然間有生者此醫偶合於法百中得一耳觀此則癰與疽但有陰陽深淺內外虛實之分而無大小之別精要乃謂二寸至五寸為癰五寸至一尺為疽者謬矣凡癰疽之脈沉實發熱煩躁外無焮赤痛其邪深在裡宜先疏通以絶其源浮大數焮腫在外當先托裡恐邪入內不沉不浮內外證無知其在經當和榮衛身無熱而脈數者內有癰膿數脈不時見當生惡瘡諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿人身之有經絡猶地理之有界分治病不知經絡猶捕賊不知界分其能無誅伐無過之咎乎況手足十二經絡有血氣多少之分如手少陽三焦足少陰腎太陰脾多氣少血手厥陰心包絡手太陽小腸足太陽膀胱多血少氣手陽明大腸足陽明胃多氣多血此其大較也多血少氣者易愈多氣少血者難療氣多之經可行其氣血多之經可破其血不可執一也瘡瘍有五善七惡動息自寧飲食知味一善也便利調勻二善也膿清腫消不臭三善也神采精明語聲清爽四善也體氣和平五善也煩躁時嗽腹痛渴甚或泄利無度小便如淋一惡也膿血大泄腫焮尤甚膿色臭敗痛不可近二惡也喘粗短氣恍惚嗜臥三惡也目視不正黑睛緊小白睛青赤瞳子上看四惡也肩背不便四肢沉重五惡也飲食不下服藥而嘔食不知味六惡也聲嘶色敗鼻青赤面目四肢浮腫七惡也五善見三則瘥七惡見四則危元戎云瘡瘍自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之灸而不痛痛而後止其灸灸而不痛者先及其潰所以不痛而後及良肉所以痛也灸而痛不痛而後止其灸灸而痛者先及其未潰所以痛而次及將潰所以不痛也凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先干處即是結癰頭也取大蒜切成片如當三錢厚薄安於頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛不痛者灸至痛時方住最要早覺早灸為上一日二日十灸十活三日四日六七活五六日三四活過七日則不可救矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨蒜切去兩頭取中間半寸厚薄正安於瘡上著艾灸十四壯多至四十九壯又頭為諸陽所聚艾炷宜少而小若少陽分野尤不可灸灸之多致不救亦有因灸而死者蓋虛甚孤陽將絶其脈必浮數而大且鼓精神必短而昏無以抵當火氣宜其危也方書治癰疽用針烙者乃用圓針如箸如緯鋌大頭圓平長六七寸一樣二枚蘸香油於炭火中燒紅於瘡頭近下烙之宜斜入向軟處一烙不透再烙必得膿也總要用得其宜若毒深針淺膿不得出毒淺烙深損傷良肉不當其所他處作頭此皆不能愈疾反增痛苦又有用砭鐮者此血實者宜決之砭鐮者瓷鋒之類未熟而決以泄其毒不可太深所謂刺皮無傷肉不可輕用又有敷貼之法初生之瘡腫似有頭而未起即當貼溫熱藥引出熱毒火就燥之義若瘡腫初生即高起四畔焮赤宜搗生寒藥貼之折伏其熱勢驅逐其邪惡撲火之義大抵敷貼之法欲消散腫毒疏通血脈寒熱錯綜皆期於不成膿也又有用淋洗法瘡腫初生一二日不退須用湯水淋射之其在四肢者瀉漬之其在腰腹及背者淋射之其在下部委曲者淹漬之無非疏導腠理通調血脈使無凝滯耳將護法大凡瘡疽初生皆如黍粒其狀至微人多忽視因成大患能防於未形理於未成朝覺夕治則必無危困矣否則膿血結聚毒入深沉束手待斃悔之何及夫以不資之軀緩慢自忽更託命庸醫任其措置危殆可立而至故醫不可不擇然當知其飽讀經書久諳疾候洞明色脈湯藥熟閒更平素仁善孝義臨事不惑者方為良醫而濟我事也又要在病人自克不可恚怒悲憂叫呼忿恨及驕性情縱口腹任勞役惟宜恬淡耐煩至如患人左石尤宜止息煩雜一切打觸器物諸惡音聲爭辨是非咒罵鬥毆産婦淫男體氣不潔腥膻穢濁雞犬畜獸並須遠離設親友問疾者可以預囑徐行低聲款曲禮畢躬退勿令咨嗟驚訝話舊談新妄言虛實亂舉藥方久坐多言重疊省問勞煩病體惑亂性情為害非淺小也其侍患者宜壽近中年性情仁厚調治藥物無失其時畜中勿食野獸自死有病之肉水族勿食異狀雜魚及父母自身本命生屬蔬中勿食不時無名大熱大寒滑泄之菜果中勿食不時酸澀難化及蟲蛀之物只宜黃白粱米稀粥軟飯瓜薺蘿蔔姜醬及酥爛潔淨豬羊等肉勿令過飢勿令太飽此時猶忌一應面果炙煿煎炒肥甘厚味若肌膚將平惡肉去盡瘡口收斂尚忌起立行步揖待賓客房室宴會嗔怒沐浴登陟遨遊沖寒冒暑直待瘡瘢平復精神如故氣力完全方無所忌百日內慎勿觸犯之此篇不但將護瘡疽即一切虛損久疾信能奉行自然大有裨益故録出與世共寶之附方遠志酒治一切癰疽發背癤毒惡候有死血陰毒在中則不痛傅之即痛有憂怒等氣內攻則痛傅之即不痛或蘊熱在內手不可近傅之清涼或氣血虛而不斂傅之自斂遠志不以多少泔浸捶去心干為末酒一盞調末三錢澄清飲之以滓傅於患處獨勝散治癰疽皆緣血滯氣凝而致者香附子去毛令淨以生薑汁淹一宿烙乾研極細上無時以白湯調二錢服又云疽多由怒而得但服香附進食寬氣自有神效人參敗毒散見第三十七飛龍奪命丹專治疔瘡發背胸疽吹乳癰疽一切無名腫毒惡瘡無頭者服之有頭不痛者服之知痛已成形者服之立愈危急者服之無失蟾酥乾者酒化雄黃各二錢膽礬寒水石各一錢乳香沒藥銅緑各二錢輕粉麝香各五分海洋即蝸牛連殼二十一個硃砂一錢作衣為末先將海洋研為泥和末丸緑豆大丸不就加好酒多杵每服三丸用蔥白三寸令病者嚼爛吐於男左女右手心將爛蔥裹藥無灰酒三四盞溫熱送下避風蓋暖臥約人行五里許飲熱酒助藥力發熱大汗為度重不過三服蟾酥丸治疔黃一切惡瘡川烏蓮花蕊硃砂各一錢半乳香沒藥各二錢輕粉蟾酥各一錢麝香五分為末糊丸豌豆大每服一丸病重者二丸依前奪命丹服法取汗真人活命飲治一切癰疽腫毒穿山甲三片切碎蛤粉炒天花粉甘草節乳香白芷赤芍貝母各一錢防風七分沒藥皂角刺各五分當歸尾酒洗陳皮各一錢半金銀花三錢在背皂刺為君在腹白芷為君在胸加蔞仁二錢在四肢金銀花為君疔瘡加紫河車草三錢作一帖老酒鍾半煎一鍾溫服煎須用大瓦器紙封口勿泄氣服看證上下飢飽服之能飲者再飲數杯忌酸物鐵器宜服於未潰之先護心散治發背癰疽發腦發髭腦虛頭暈風濕等證甘草炙一錢緑豆粉炒二錢硃砂研水飛過一錢上為細末作一服白湯調下防風通聖散見第六十一神效托裡散治癰疽發背腸癰奶癰無名腫毒焮赤疼痛憎寒發熱不問老幼並治之黃耆去蘆五兩當歸一兩八錢粉草炙八錢忍冬藤葉五兩上為細末每服五錢酒一盞半煎至一盞病在上食後服在下食前服少頃再進留滓外傅正鐵箍散貝母去心白芷蒼耳草灰醋拌曬乾各二兩或加龍骨二錢尤妙上為細末水調或香油調貼瘡上鐵井欄治無名腫毒或背疽芙蓉葉重陽前收研末蒼耳端午前收燒灰存性上同研細以蜜水調傅患處四圍露頭補中益氣湯見第三十九玉樞丹見第六十三十全大補湯見第十六當歸補血湯見第十六神仙太乙膏治一切癰疽瘡毒已潰未潰者如發背以溫水洗淨軟絹拭乾用緋帛攤貼更為丸冷水送下血氣不通溫酒下赤白帶當歸酒下咳嗽及喉閉纏喉風並用新綿裹置口中噙化一切風赤眼捏作小餅貼太陽穴更以山梔子湯下打撲傷損外貼內服橘皮湯下腰膝痛貼患處鹽湯下唾血桑皮湯下以蛤粉為衣其膏可收十餘年不壞又治瘰癧用鹽湯洗貼酒下一丸楊梅瘡毒潰爛者尤效婦人經脈不通腹痛甘草湯下並攤貼之疥瘡用麻油煎滾和膏塗之虎犬蛇蠍傷刀斧傷皆可內服外貼玄參白芷當歸赤芍肉桂大黃生地各一兩麻油二斤入銅鍋內煎至黑濾去滓入黃丹十二兩再煎滴水掄軟硬得中即成膏矣腫毒跌撲疼痛加乳香沒藥制丹法黃丹先炒紫色傾缸內用滾水一桶泡之再汲涼水滿缸用棒常攪浸一宿去水再炒如前二次方研令極細用替針丸雄雀糞二十粒硇砂陳倉米沒藥各一字上研勻以米飯丸如粟大每用一粒貼瘡口眼中即潰膿出六君子湯見第十六圍藥南星草烏頭黃柏白芨各二兩五倍子炒一兩上為細末調如糊隨血圍匝如牆壁可移險處於不險處如神金絲萬應膏治攧撲損傷手足肩背並寒濕腳氣疼痛不可忍小兒脾疳瀉痢咳嗽不肯服藥者瀝青二斤半威靈仙黃蠟各二兩萆麻子一百個去殼研沒藥乳香各一兩別研麻油夏二兩春秋三兩冬四兩木鱉子二十八個去殼切片子研上先將瀝青同威靈仙下鍋熬化以槐柳枝攪候焦黑色重綿濾過以瀝青入水盆候冷成塊取出稱二斤淨再下鍋熔開下麻油黃蠟萆麻木鱉子泥不住手槐柳枝攪勻須慢火滴入水中不黏手扯拔如金絲狀方可如硬再旋加油少許如軟加瀝青試得如法卻下乳沒末起鍋在炭火上再用槐柳枝攪數百次又以粗布濾膏在水盆內扯拔如金絲頻換水浸一日卻用小銚盛如跌撲傷於疼痛處火上炙熱貼透骨肉為驗連換熱水數浴之則血瘀自消小兒脾疳貼患處瀉痢貼肚上咳嗽貼背心八珍湯見第十六疥瘡大風膏治一切乾溼疥瘡並膿窠爛瘡大風子二兩去殼枯礬四兩蛇蛻燒存性樟腦蜂窠燒存性各三分水銀五分用錫死之桕油燭四兩風子諸藥為末入燭油次入水銀搗勻塗擦桃花隔紙膏貼久患臁瘡如神驗過千百矣上好透明松香水煮隨換水煮數十次以色白味不澀苦為度研細入上上飛丹十分之四再研勻用豬板油去膜切碎同藥搗勻攤油紙上作隔紙膏上針刺多孔先將苦茶洗患處淨拭乾貼上以絹帛緊包扎一日一換雖二十年臁瘡不消十紙千捶膏治瘰癧瀝青一兩杏仁去皮十三粒半萆麻仁四十九粒同搗爛初搗甚燥如不能成膏者搗千下則漸柔黏矣用布攤貼未潰消已潰出核烏龍膏治一切癰疽發背無名腫毒初發焮熱未破者用陳年小粉不拘多少入鍋炒令成黃黑色取出待冷碾極細以陳米酷調稀稠得所如過稀微火熬之其色如漆用瓷瓶收貯遇有腫毒量腫大小用榜紙攤成膏藥中剪一孔露出毒頭貼上疼痛即止少頃覺癢久則腫毒自消甚效白麥飯石膏治膿潰後圍瘡口白麥飯石二兩有小於鵝卵石者有大於鵝卵石者其色有青黑白紅點相間惟鬆脆為佳以炭火煅至紅以好米醋淬之如此煅淬十數次研為末重羅去粗者取細末入乳鉢數人更遞研五七日如面極細為妙白蘞二兩研為細末鹿角灰不用自脫者須用帶腦頂骨全者卻是生取之截角作二三寸長灰火燒令煙盡研羅為末再入乳鉢更遞研極細二兩上三味最要研得極細方有效粗則反致甚痛細則大能止痛收口排膿精粗之異如此和合量藥末多寡用陳好米醋入銀石器內熬令魚眼沸卻旋旋入藥末用竹篾子不住手攪熬一二時久令稀稠得所提出以瓷器盛之候冷以紙蓋覆勿令著塵用時先以豬蹄湯洗去膿血以軟絹挹干鵝翎蘸膏塗敷四圍凡有赤處盡塗之但留中心一口如錢大未潰能令內消已潰則排膿如湍水逐日令口收斂瘡久肌肉腐爛筋骨出露用舊布片塗藥貼瘡但內膜不穿亦能取安洗瘡勿可手觸嫩肉亦不可口氣吹著合藥亦忌腋氣之人及月經有孕婦人見之仍可熬好米醋一大碗收瓷器內候逐日用藥如瘡上久則藥干以鵝翎點醋拂拭藥上勿令燥也初則一日一洗一換藥十日後兩日一換古方云麥飯石顏色黃白類麥飯曾作磨者尤佳按麥飯石不可作磨狀如麥飯糰生粒點如無此石當以舊面家磨近齒處石代之取其有麥性故也或溪中尋白石如豆如米大者即是也其石大小不等或如拳如鵝卵略如握聚一團麥飯精要神異膏治諸般惡毒瘡癤發背癰疽其妙如神露蜂房要用蜂兒多者為妙細剪淨一兩全蛇蛻鹽水洗淨焙乾玄參去蘆各半兩綿黃耆七錢半黃丹五兩研細後入杏仁去皮尖切小片一兩男子亂髮洗淨焙乾如雞子大真麻油一斤上件藥先將麻油入銀銚中同亂髮於風爐上慢慢文武火熬候發焦熔盡以杏仁投入候杏仁色變黑好綿濾去滓再將所熬清油入銀銚內然後入黃耆玄參二味慢火熬一二時取出銚子安一冷風爐上候半時久火力稍息旋入露蜂房蛇蛻二味將柳枝急攪移銚於火上不住手攪慢火熬至黃紫色用綿濾過後復入清油在銚內乘冷投黃丹急攪片時又移銚於火上文武火慢慢熬不住手用柳枝攪千餘轉候藥油變黑色滴於水中凝結成珠子則是膏成就矣若珠子稀再熬少時必候得所然後用瓷器內封收待用或恐偶然熬火太過稍硬難用卻入少蠟熬添麻油在內瓷器盛封蓋於甑上蒸乘熱攪勻收而用之膏藥熬成了須用所盛瓷器置淨水盆中出火毒一晝夜歇三日方可用熬此膏藥極難於火候須耐煩看火緊慢火猛即藥中火發千萬謹戒膏藥方甚多效無過於此內托復煎散焮腫於外根盤不深形證在外而其脈浮者病在皮肉非氣盛則必侵於內急宜服之托裡健胃地骨皮黃芩茯苓芍藥人參黃耆白朮桂甘草防己當歸各一兩防風二兩先以蒼朮一斤水五升煎三升去朮入前藥再煎至三四盞取清汁分三四次終日飲之如未已再煎半料飲之如大便祕煩熱少服黃連湯如微利及煩熱已退仍與此散使榮衛俱行邪氣不能內傷也神仙蠟礬丸治癰疽及腸癰托裡消毒固臟腑止疼痛黃蠟二兩明礬三兩先將黃蠟熔開離火待少溫入礬末和勻衆手急丸如桐子大每服二三十丸食前酒下每日二服此藥不惟定痛生肌且護膜止瀉消毒化膿內癰排膿托裡之功甚大金石藥毒發疽非此莫治更用白礬為末每日酒服一錢尤效有遍身生瘡狀如蛇頭者尤宜服之每日百丸若蛇蠍並一切毒蟲所傷溶化熱塗患處內更服之毒即解服至三四兩以上愈見其功此宜於癰毒潰後服之腸癰尤效癰疽收口藥白龍骨白蘞乳香沒藥各半分為末摻之比天膏此淮安王寡婦家祕傳麻黃川芎白芷薄荷草烏全蠍各二兩防風連翹黃芩黃連大黃知母貝母當歸蒼朮羌活桔梗柴胡荊芥五倍子海螵蛸白芨穿山甲木鱉子大風子蛇蛻梔子血餘各三兩椿皮桑枝槐枝柳枝二寸許者各二十段片腦一錢麝香二錢乳香沒藥各五錢龍骨血竭各三錢輕粉二兩赤石脂三錢上麻黃等粗藥入麻油內浸一宿文武火熬至藥枯黑色去滓再熬滴水成珠每油二斤入密陀僧一斤收成膏下片腦細藥柳枝不住手攪入水中出火毒收用治癰疽發背無名腫毒疔瘡瘰癧鼠瘡臁瘡棒瘡刀傷便毒魚口風癬頑瘡多日不滿口常流膿水婦人吹乳奶疽瘡癤等項先將花椒湯洗淨貼肩背風吹兩膊痠疼貼肩井穴左右肘疼貼曲池穴風寒濕氣腰眼大腿痠麻貼患處兩曲膝冷痛貼膝眼上腳氣舉發貼疼處跌打損傷貼患處以上諸證俱用食鹽炒熱布包尉患處令透毛孔方貼之仙傳萬靈膏忌用鐵鍋煎羌活獨活山梔兩頭尖官桂玄參大黃五倍子當歸白芷皂角天花粉赤芍生地熟地山茨菰防風黃連川芎紅芽大戟連翹桔梗白芨各六錢木鱉子二十粒去殼白蘞苦參各六錢穿山甲十片萆麻子八十粒去殼杏仁四十粒血餘四兩槐枝柳枝桑枝寸許長者各三十段巴豆三十粒去殼用麻油二斤四兩春秋浸三日夏浸二日冬浸五日熬枯黑色去滓再熬滴水成珠每油二斤下飛丹一斤松香三兩黃蠟二兩桐油二兩熬不老不嫩稍冷入乳香沒藥各六錢血竭阿魏孩兒茶百草霜輕粉馬莧膏各三錢桑枝攪勻攤貼治癰疽發背癧瘡用火烘手熱摩百餘下貼已出膿者不必摩疥癬瘡搔癢貼風癩用木鱉子火煨研爛置膿上貼無名腫毒貼患處跌撲刀斧傷貼患處風痰壅塞貼心上熱手摩百下痞塊木鱉子研爛置膏藥上貼之以皮硝一兩鴿糞五錢蒜二個搗勻用面作一圈圍定在膏藥外尉斗火運藥上令氣透蠱脹加煨木鱉貼心下臍上熱手摩百次癱瘓濕氣痛加煨木鱉貼患處手摩百下月經不調貼血海穴手摩百下解輕粉毒用佛前照過陳年琉璃燒存性為末每服二錢酒調下日服一二次一月全愈花蕊石散治一切打撲金刃傷損身體出血者急於傷處摻藥其血化為黃水如有內損血入臟腑熱煎童便入酒少許調一錢服之若牛抵腸出不損者急送入用桑白皮為線縫合摻藥血止立活如無桑白皮用生麻縷亦可不得封裹瘡口恐作膿血以竹夾兩邊皮起亦好如瘡干以津液潤之然後摻藥婦人産後敗血衝心胎衣不下並用童便調服硫黃明淨者四兩搗粗末花蕊石一兩搗粗末二味拌勻先用紙筋和鹽泥固濟罐子一個候泥干入藥於內再用泥封口候乾置四方磚上書八卦五行字用炭一稱籠疊周匝自巳午時後下火令漸漸上徹直至經宿火冷炭消又放經宿罐冷取出研貯瓷瓶內收用
