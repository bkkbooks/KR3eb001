body:
  text: 跋嘗謂天地無脈則轆轤不轉山川無脈則靈秀不鍾草木無脈則蒼翠不舒凡所以能生生者惟有脈之紆回運行而已乃知人一小天地耳胎形於先生成於後形具而氣周氣周而脈見是人之生於脈也益信今欲治生者孰不洞悉脈之原委以察陰陽之虛實辨臟腑之寒熱定吉凶於呼吸乎第紫虛以四言舉要闡奧於前意括未該我師推廣於今鉤深致遠因脈及證因證及方辨析無剩義而且多別解即郭象之注莊張湛之注老不是過焉書成題曰醫燈續焰夫以五都九市之奇羅於暗室非太乙之藜無以別其珍奇異寶是集也洵紫虛之薪傳後學之指南也歟所謂一燈才煜而千百世之暗皆除豫追隨歷有年所周旋於風雨晦明得藉離明之照茲殺青告成分校及門因附言於殿以是知壽天下壽萬世者端此矣寧小補哉壬辰浴佛日甬東門人蔣式金頓首謹跋並書
