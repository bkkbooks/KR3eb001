body:
  text: 卷三遲脈主病第十八遲脈主臟陽氣伏潛有力為痛無力虛寒遲為陰脈五臟為陰故主臟難經九難曰遲者藏也又曰遲則為寒傷寒論亦曰遲為在臟以陽氣伏潛不能健行故至數遲耳遲而有力有壅實不通利之意痛可想見宜溫而行和劑蘇合香丸四七湯之類遲雲陽伏而又無力焉虛寒必矣宜溫而補四君子湯薑桂附子之類附方和劑蘇合香丸療傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖疔腫驚癇鬼忤中人小兒吐乳大人狐貍等病又治中風卒僕九竅閉塞並百邪暴乘腹痛下利開關避邪之藥也白朮炒青木香烏犀角屑香附子炒去毛硃砂研水飛訶黎勒煨取皮白檀香安息香另末無灰酒一升熬膏沉香麝香研丁香蓽茇各二兩龍腦研薰陸香另研蘇合香油入安息香膏內各一兩上為細末入研藥勻用安息香膏並煉白蜜和劑每服旋丸如梧子大早朝取井華水溫冷任意化服四丸老人小兒化服一丸溫酒化服亦得並空心服之用蠟紙裹一丸如彈子大緋絹袋當心帶之一切邪神不敢近今則俱用蠟殼可久藏備用四七湯見第十七四君子湯見第十六數脈主病第十九數脈主腑主吐主狂有力為熱無力為瘡數脈為陽六腑亦為陽故主腑難經九難曰數者府也又曰數則為熱傷寒論亦曰數為在府此以遲數分陰陽故即以配臟腑亦不可言其大概耳至若錯綜互見在腑有遲在臟有數在表有遲在裡有數又安可以臟腑二字拘定也數脈主吐者脈始於中焦吐則胃氣逆中焦擾亂氣逆而動故脈數宜六君子湯生薑竹茹茱連之類主狂者狂則神志昏亂氣無所御氣無所御則奔逸於四肢而四肢實四肢實是以能登高行遠跳躍異常夫四肢為諸陽之本陽邪實之故力倍也難經二十難曰重陽者狂又病能論曰狂生於陽也又曰陽明者常動巨陽少陽不動不動而動大疾此其候也蓋言陽明之脈常動巨陽少陽之脈不動今無論常動者即不動者亦動動且大疾是為狂病之候觀此則狂病之見數脈明矣宜東垣硃砂安神丸集驗龍腦安神丸之類數而有力聚熱所鼓有外感證者宜汗散仲景有汗者桂枝湯無汗者麻黃湯之類無外感者和劑涼膈散芩連梔柏之類數而無力雖有熱而虛散熱散於外發瘡之候也宜黃連解毒湯消腫湯當歸飲子之類附方六君子湯見第十六東垣硃砂安神丸治心亂煩熱怔忡心神顛倒兀兀欲吐胸中氣亂而熱有似懊憹之狀皆膈上血中伏熱蒸蒸不安宜用權法以鎮陰火之浮行以養上焦之元氣用甘草之甘溫補之當歸生地又為長生陰血之聖藥黃連去心煩除濕熱硃砂納浮遊之火而安神明硃砂一錢研水飛黃連淨酒炒一錢半甘草炙五分生地黃當歸頭各一錢上為極細末蒸餅為丸如黃米大每服十丸津唾咽下集驗龍腦安神丸治男婦小兒五積癲癇無問遠年近日發作無時但服此藥無不痊愈龍腦研麝香研牛黃研各三錢犀角屑茯苓去木人參去蘆麥門冬去心硃砂水飛各二兩金箔三十五片馬牙硝二錢甘草炙地骨皮桑白皮各一兩上為細末煉蜜和丸如彈子大金箔為衣如有風癇病歲久冬月用溫水化下夏月用涼水化下不拘時候如病二三年日進三服小兒一丸分作二服又治男婦虛勞發熱喘嗽新汲水一盞化開服喘滿痰嗽立止又治男子婦人語澀舌強食後溫涼水化下日進三服仲景桂枝湯傷寒論云太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之此仲景治中風第一方也雖云取微汗實則和榮衛而助中氣其藥即建中湯小變近醫以中風自汗竟認桂芍為斂汗之藥冤哉桂枝芍藥炒生薑各三兩甘草炙二兩大棗劈二十枚煎服法同前第十七桂枝附子湯仲景麻黃湯見第十六和劑涼膈散治大人小兒積熱煩躁多渴面熱唇焦咽燥舌腫喉閉目赤鼻衄頷頰結硬口舌生瘡譫語狂妄腸胃燥澀便溺閉結睡臥不安一切風壅梔子仁連翹薄荷黃芩甘草各一兩半大黃芒硝各半兩上為粗末每一兩水二盞竹葉七片煎至一盞去滓入蜜少許食後服加薑煎亦得去六經熱減大黃芒硝加桔梗甘草人參防風治肺經邪熱咳嗽有痰加半夏涼膈與四物各半服能益血泄熱名雙和散錢氏去連翹加藿香石膏為瀉黃散寶鑑連翹四兩硝黃各二兩余各一兩黃連解毒湯見第十七消腫湯治馬刀瘡柴胡二錢連翹三錢當歸尾甘草各一錢生黃芩紅花少許黃連鼠黏子炒各一錢栝蔞根黃耆各一錢半上件每服五錢或一兩水煎熱服食後當歸飲子治瘡疥風癬濕毒燥癢瘡當歸白芍藥川芎生地黃白蒺藜防風荊芥各一兩何首烏黃耆甘草各五錢上㕮咀每服一兩水煎或為末每服一二錢亦得滑脈主病第二十滑脈主痰或傷於食下為蓄血上為吐逆痰乃水飲所結薄則稠黏老則磈礧滑脈滑澤近於水象如數疾而替替然形相似也不腐不化之食象亦如之皆有物之脈也痰宜二陳湯食宜丹溪保和丸潔古枳朮丸曲糵枳朮丸之類在下則見於尺主蓄血者血亦類液瘀凝類痰以其在尺故以血斷宜仲景桃核承氣湯準繩代抵當丸之類若見於寸必主吐逆蓋因滑脈之流利滑動勢不安定切近上焦自當為吐宜六君子湯仲景大半夏湯溫膽湯東垣藿香安胃散之類然而所吐之物非痰即食設無痰食是為嘔逆則脈不應見滑而又當見澀矣附方二陳湯見第十六丹溪保和丸見第十七潔古枳朮丸見第十七曲糵枳朮丸治強食所致心胸滿悶不快神麯炒麥糵炒枳實去瓤麩炒各一兩白朮炒二兩上制服如枳朮丸法仲景桃核承氣湯傷寒論云太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯此下熱與血結成瘀之劑也今用下瘀血於腸腹脅下者皆效桃仁五十個去皮尖味甘平桂枝二兩去皮味辛熱大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利準繩代抵當丸行瘀血自制大黃川産如錦紋者去皮及黑心四兩芒硝一兩如欲穩以玄明粉代桃仁麩炒黃去皮尖另研如泥六十枚當歸尾生地黃穿山甲蛤粉炒各一兩桂三錢或五錢上為極細末煉蜜丸如桐子大若蓄血在上焦丸如芥子大臨臥去枕仰臥以津咽之令停留喉下搜逐膈上中焦食遠下焦空心俱桐子大以百潦水煎湯下之用歸地者欲下血而不損血耳且引諸藥至血分也諸藥皆獷悍而欲以和濟之也如血老成積此藥攻之不動宜去歸地加廣朮醋浸透焙乾一兩肉桂七錢六君子湯見第十六仲景大半夏湯治反胃嘔吐半夏二升洗人參三兩白蜜一升以水一斗三升和蜜揚之二百四十遍煮藥取三升溫服一升余分再服溫膽湯三因治心膽虛怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗半夏湯洗枳實竹茹各一兩橘皮一兩半去白甘草炙四錢白茯苓七錢每服四錢水一盞半生薑七片棗一枚煎七分食前熱服東垣藿香安胃散治脾胃虛弱不進飲食嘔吐不待腐熟藿香一錢半丁香人參各二錢橘紅五錢上為細末每服二錢水二盞生薑三片同煎至一盞去滓涼服食前和滓服亦可澀脈主病第二十一澀脈少血或中寒濕反胃結腸自汗厥逆靈樞決氣篇曰中焦取汁變化而赤是謂血壅遏營氣令無所避是謂脈脈之與血同質異名是二而一況體為陰液多則滑利少則枯澀理勢之必然者枯澀虛澀血少宜四物湯之類寒濕襲人肌腠痹著氣道不利脈安得不澀滯澀之澀宜和劑滲濕湯百一除濕湯三因腎著湯之類反胃則朝食暮吐暮食朝吐或隨食隨吐胃無餘液以致腸中枯燥而大便祕結脈安得不澀枯澀之澀宜六君子湯寶鑑人參利膈丸統旨滋血潤腸湯滋陰清膈飲之類自汗者汗時時自出也出則液耗是謂脫液漏而不止衛氣散失四肢厥寒是謂亡陽陽亡液脫脈又安得不澀虛澀之澀宜十全大補湯濟生耆附湯黃耆建中湯之類一澀脈也而有虛澀滯澀枯澀之分是又在診之者自為靈通耳附方四物湯治肝脾腎血虛發熱或寒熱往來或日晡熱甚頭目不清或煩躁不寐胸膈作脹脅肋疼痛等症凡血虛諸病以此為主治若脾氣虛而不能生血宜四君子若脾氣鬱而血虛宜歸脾湯若腎水涸而不生肝血宜六味丸當歸二錢白芍藥一錢熟地黃三錢川芎錢半上水煎服和劑滲濕湯見第十七百一除濕湯治寒濕所傷身體重著腰腳痠疼大便溏泄小便或澀或利半夏曲炒厚朴薑製蒼朮米泔制各二兩藿香葉陳皮去白白茯苓去皮各一兩甘草炙七錢白朮生用一兩上㕮咀每服四錢水一盞薑七片棗一枚煎七分食前溫服三因腎著湯治腎虛傷濕身重腰冷如坐水中不渴小便自利乾薑炮茯苓各四兩甘草炙白朮各二兩每服四錢水一盞煎七分空心溫服六君子湯見第十六寶鑑人參利膈丸治胸中不利大便結燥痰嗽喘滿脾胃壅滯推陳致新治膈氣之聖藥也木香檳榔各七錢半人參當歸酒洗藿香甘草枳實麩炒黃各一兩大黃酒濕蒸熟厚朴薑製各二兩上為細末滴水為丸如桐子大每服三五十丸食後諸飲下統旨滋血潤腸湯治血枯及死血在膈飲食不下大便燥結當歸酒洗三錢芍藥炒生地黃各一錢半紅花酒洗桃仁去皮尖炒大黃酒煨枳殼麩炒各一錢水一鍾半煎七分入韭菜汁半酒盞食前服滋陰清膈飲統旨治陰火上衝或胃火太盛食不入脈洪數者當歸芍藥煨黃柏鹽水炒黃連各一錢半黃芩山梔生地黃各一錢甘草三分水二鍾煎七分入童便竹瀝各半酒盞食前服十全大補湯見第十六濟生耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆去蘆蜜炙附子炮去皮臍各等分上㕮咀每服四錢水一盞生薑十片煎八分食前溫服未應更加之黃耆建中湯治血氣不足體常自汗黃耆桂各一錢半白芍藥三錢甘草一錢每服五錢水一鍾半薑五片棗二枚煎八分去滓入稠餳一大匙再煎服舊有微溏或嘔者不用餳弦脈主病第二十二弦脈主飲病屬膽肝弦數多熱弦遲多寒浮弦支飲沉弦懸痛陽弦頭痛陰弦腹痛夫飲入於胃必陽氣為之遊溢輸布臟腑受其灌溉形體賴其濡滋若陽運之力薄則不能遊溢輸布停留於中而飲之諸證起矣其脈弦者弦為陰脈斂束急直無抑揚鼓動之勢正陽運之不足也若非有飲而見弦脈病又當在膽與肝耳蓋膽為甲木肝為乙木自北而東在肝為厥陰而陰盡在膽為少陽而陽微初春之象逗氣尚少升如一縷有弦義焉數則為熱弦而兼數者病亦兼熱遲則為寒弦而兼遲者病亦兼寒弦則為飲弦而浮則飲停在上名曰支飲支者支分之義不在胃而支留於心胸間也宜仲景苓桂朮甘湯小青龍湯和劑倍術丸破飲丸六君子湯仲景澤瀉湯海藏五飲湯之類弦而沉則飲停在下當為懸痛懸者懸閣之義不在胃而懸留於腹脅間也以寒飲而留於陰分故在內痛宜濟生八神來復丹三因控涎丹之類弦脈不但主飲而又主痛者以弦寒斂束氣不舒之故耳陽弦者寸弦也邪在三陽三陽走頭故頭痛宜玄珠茶調散半夏白朮天麻湯仲景吳茱萸湯之類陰弦者尺弦也邪在三陰三陰走腹故腹痛宜仲景小建中湯香砂理中湯東垣厚朴湯仲景四逆湯之類附方仲景苓桂朮甘湯見第十六仲景小青龍湯見第十六和劑倍術丸治五飲一曰留飲停水在心下二曰澼飲水在兩脅三曰痰飲水在胃中四曰溢飲水溢在膈五曰流飲水在脅間瀝瀝有聲皆由飲水過多或飲冷酒所致白朮二兩桂心乾薑各一兩上為末蜜丸每二十丸溫米飲下加至三十丸食前服破飲丸治五飲停蓄胸膈呼吸之間痛引兩脅脹滿氣促胸腹結為癥癖支滿胸膈旁及兩脅搶心疼痛飲食不下反胃吐逆九種心疼積年宿食不消久瘧久痢遁尸疰忤癲癇厥運心氣不足憂愁思慮婦人腹中諸病並皆治之蓽茇丁香不見火縮砂仁蠍梢胡椒木香不見火烏梅肉青皮巴豆去皮膜各等分上將青皮巴豆以漿水同浸一宿次日濾出同炒青皮焦去巴豆水淹烏梅肉蒸一炊久細研為膏入藥末和勻丸如緑豆大每服五七丸臨睡生薑湯下六君子湯見第十六仲景澤瀉湯治飲停心下常苦眩冒或胸中痞結堅大如盤下則小便不利澤瀉五兩白朮二兩水二升煮一升分溫再服海藏五飲湯治五飲最效旋覆花人參陳皮去白枳實白朮茯苓厚朴制半夏制澤瀉豬苓前胡桂心白芍藥炙甘草各等分上每一兩分四服薑十片水二盞煎至七分去滓溫服無時因酒成飲加葛根葛花砂仁濟生八神來復丹治寒痰冷飲久積心胸或嘔逆喘促或心腹攪疼或飲食不安狀如反胃等證硝石一兩同硫黃為末瓷器內以微火炒用柳篦攪不可火太過恐傷藥力再研極細名二氣末太陰玄精石飛研一兩五靈脂水澄清濾去砂石曬乾青皮去白陳皮去白各二兩舶上硫黃透明沉香木香堅實者天南星粉白者各一兩上為末飛麵糊為丸如桐子大每服三十丸空心米飲送下三因控涎丹凡人忽患胸背手足頸項腰胯等隱痛難忍筋骨牽引釣痛時時走易不定乃是痰涎在心膈上下變為此疾或手足冷痹氣脈不通誤認癱瘓也甘遂去心紫大戟去皮真白芥子各等分上為末糊為丸桐子大曬乾食後臥淡薑湯或熱水下五七丸至十丸痰猛加數丸玄珠茶調散治風熱上攻頭目及頭風熱痛不可忍片芩二兩酒拌炒三次不可令焦小川芎一兩細茶葉三錢白芷五錢薄荷三錢荊芥穗四錢頭巔及腦痛加細辛藁本蔓荊子各三錢上為細末每服二三錢用茶清調下祕藏半夏白朮天麻湯治素有脾胃之證時顯煩躁大便不利又出入為寒氣所郁悶亂大作火鬱不伸故也醫疑有熱服疏風丸下之原證不減復添嘔逆食不能停痰唾稠黏湧出不止眼澀頭旋噁心煩悶氣短促上喘無氣力目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷是胃氣已損復下兩次重虛脾胃病名曰痰厥頭痛厥者痰之濁氣逆上淆溷清陽故眩暈非有痰厥逆而上也半夏一錢五分白朮炒曲各一錢天麻黃耆人參蒼朮陳皮澤瀉茯苓各五分大麥面一錢半乾薑三發黃柏二分仲景吳茱萸湯傷寒論云食谷欲嘔者屬陽明也吳茱萸湯主之金匱云嘔而胸滿者茱萸湯主之又云乾嘔吐涎沫頭痛茱萸湯主之觀此則凡胃虛寒不能納食或吐冷飲酸水者皆效吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服仲景小建中湯加黃耆一兩半人參二兩名黃耆建中湯金匱要略云虛勞裡急悸衄腹中痛失精四肢痠疼手足煩熱咽乾口燥小建中湯主之又千金療男女因積冷氣滯或大病後不復常苦四肢沉重骨肉痠疼吸吸少氣行動喘乏胸滿氣急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味脅肋腹脹頭重不舉多臥少起甚者積年輕者百日漸致瘦弱五臟氣竭則難可復常六脈俱不足虛寒乏氣少腹拘急羸瘦百病黃耆建中湯主之桂枝三兩甘草炙二兩大棗十二枚芍藥六兩生薑三兩膠飴一升上六味以水七升煮取三升去滓內飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也香砂理中湯即理中丸加木香砂仁服法亦同見第十七治脾虛氣滯或受外寒泄瀉腹痛喜溫或嘔吐胸膈滿悶腸腹雷鳴等證東垣厚朴湯治胸腹脹痛或腸鳴後重或受寒及寒飲食作痛脈沉遲而弦者宜之厚朴薑製陳皮去白各二兩甘草炙乾薑各五錢茯苓去皮一兩上㕮咀每服一兩水煎服仲景四逆湯治中外皆寒四肢逆冷腹痛腸鳴或汗多亡陽或中寒瀉利清穀舌滑氣冷一切陰寒勝而陽虛脈沉遲弦弱者此方主之甘草炙一兩乾薑一兩半附子一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服強人大附子一枚乾薑三兩緊脈主病第二十三緊脈主寒又主諸痛浮緊表寒沉緊里痛緊與弦相似但多裊動夭矯之勢所謂如轉索者是也陽為寒束崛強不平故作是狀為諸病者亦此義耳浮以候表浮而緊寒在表也宜溫散沉以候里沉而緊寒在裡也宜溫中里為陰分以陰寒而襲陰分陽困陰凝故痛也長短細大主病第二十四長脈氣平短脈氣病細則氣少大則病進長脈氣暢故曰平短脈氣促故曰病細為正不足故氣少也大為邪有餘故病進也浮沉主病第二十五浮長風癇沉短宿食血虛脈虛氣實脈實長類乎弦亦肝木之象也素問玉機真藏論曰肝脈端直以長是也浮則為風風木偏勝癇證作矣宜疏風豁痰養榮如河間犀角丸集驗龍腦安神丸之類沉主裡沉而短為中氣局促宿食停留之礙也宜溫而推之如和劑感應丸紅丸子之類脈為血府脈虛者血虛脈由氣行氣實者脈實附方河間犀角丸治風癲癇發作有時揚手擲足口吐痰涎不省人事暗倒屈伸犀角末半兩赤石脂三兩朴硝二兩白殭蠶一兩薄荷葉一兩上為末麵糊丸如梧子大每服二三十丸溫水下二三服不拘時如覺痰多即減數忌油膩炙炒集驗龍腦安神丸見第十九和劑感應丸治中虛積冷氣弱有傷停積胃脘不能傳化或因氣傷冷或因飢飽食飲酒過多心下堅滿兩脅脹痛心腹大痛霍亂吐瀉大便頻數後重遲澀久痢赤白膿血相雜米穀不化愈而復發又治中酒嘔吐痰逆噁心喜睡頭眩胸膈痞滿四肢倦怠不思飲食不拘新舊冷積並皆治之南木香肉豆蔻丁香各一兩半乾薑炮一兩巴豆七十粒去皮心膜研出油杏仁一百四十粒湯泡去皮尖研百草霜二兩上前四味為末外入百草霜研與巴豆杏仁七味同和勻用好黃蠟六兩溶化成汁以重絹濾去滓更以好酒一升於銀石器內煮蠟數沸傾出候酒冷其蠟自浮於上取蠟稱用丸春夏修合用清油一兩銚內熬令香熟次下酒煮蠟四兩同化成汁就銚內乘熱拌和前項藥末秋冬修合用清油一兩半同煎煮熟成汁和前藥末成劑分作小錠油紙裹放旋丸服之每三十丸空心薑湯下和劑紅丸子壯脾胃消宿食去膨脹京三稜浸軟切片蓬莪朮煨青皮去白陳皮去白各五斤乾薑炮胡椒各三斤上為末用醋麵糊丸如梧桐子大礬紅為衣每服三十丸食後薑湯送下小兒臨時加減與服洪細主病第二十六洪脈為熱其陰則虛細脈為濕其血則虛洪脈滿指浮大兼備陽有餘之象故當為熱有餘於陽則不足於陰故為陰虛細為陰脈細藐不振陰濕之候細又為血虛者蓋脈以血為體細藐之甚體於何有故血虛緩類主病第二十七緩大者風緩細者濕緩澀血少緩滑內熱空疏緩大風所致也緩漫濡細濕所侵也緩而澀滯血必少也緩而滑疾內有熱也濡弱小主病第二十八濡小陰虛弱小陽竭陽竭惡寒陰虛發熱濡小之脈即所謂如帛浮水面有上無下陰虛之候也弱小之脈體不充勢不鼓陽竭之候也陽竭則陰乘陽故惡寒陰虛則陽乘陰故發熱陽竭者補陽宜四君耆附之類陰竭者補陰宜六味丸四物湯之類附方四君子湯見第十六六味丸見第十六四物湯見第二十一微脈主病第二十九陽微惡寒陰微發熱男微虛損女微瀉血脈經云微脈不勝尋按若有若無言其虛極也寸微為陽微陽微即陽虛而陰氣上入陽中故惡寒也尺微為陰微陰微即陰虛而陽氣下陷入陰中故發熱也男人得此不惟惡寒發熱而且為虛損女人得此不惟惡寒發熱而且為瀉血虛損者未必不失血瀉血者未必不成虛損男子補其陽女子補其陰動脈主病第三十陽動汗出陰動發熱為痛與驚崩中失血傷寒論曰陰陽相搏名曰動又曰數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動既云在關是居尺寸之中若不能分陰分陽者然云陰陽相搏又云陽動陰動又似乎有勝有負故陽虛者為陽動陽負負則外衛不密而汗自出矣陰虛者為陰動陰負負則內守不寧而熱自發矣為痛為驚者陰陽不和氣搏擊則痛氣攛迸則驚味厥厥動搖四字情形宛然陰陽相搏不和則衛守兩失其職而崩中失血之證有自來矣陽衛陰守革脈主病第三十一虛寒相搏其名為革男子失精女子失血傷寒論辨脈法云脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下宜補血男子則亡血失精宜填精此節正革脈之注腳也蓋革如皮革急滿指下今云脈弦而大非革而何只此四字可以盡革脈之形狀矣弦則為減以下又發明所以為革並革之所以為病也弦則脈體弦急細斂是陽氣之減少也弦而大是改細斂為闊大其弦急之體仍在弦急為陽減改大則中芤陽減為寒中芤為虛既虛且寒徒革於外而中則空在女則為半産漏下在男則為亡血失精是皆中空之驗
