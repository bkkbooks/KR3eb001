body:
  text: 卷十五胎產脈證第七十七婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜欲產之脈其至離經水下乃產未下勿驚新產之脈緩滑為吉實大弦牢有證則逆男為陽女為陰陽主氣陰主血一定之常理也故女子以血為本血旺是為本足本足而施之以陽則生化自全而成胎亦易易矣氣旺則血反衰是為本不足且失常理未有理失常而能孕者也又人之身陰靜陽動陰體陽用則血固陰靜也亦體也凝胎結孕必動由靜始體成用先是知女人以血勝氣者為貴少陰動甚者心手少陰之脈動甚也心主血動甚則血旺血旺易胎故云有子即素問平人氣象論所謂婦人手少陰脈動甚者妊子也有子者有妊之謂男女之通稱非獨指男子如下文所辨則有男女之分矣尺脈者左右腎脈也腎為天一之水主子宮以系胞孕胎之根蒂也滑利則不枯澀而且有替替含物之象故喜其妊娠即素問陰陽別論所謂陰搏陽別謂之有子叔和脈經所謂尺中之脈按之不絕法妊娠上文所謂動甚妊子者同義也即此滑利之脈應指疾而不散滑為血液疾而不散乃血液斂結之象是為有胎三月矣若但疾而不散是從虛漸實從柔漸剛血液堅凝轉為形體故不滑耳此妊娠五月之脈狀也其疾左勝於右是為男孕以男屬陽居左胎氣鍾於陽故左勝右勝於左是為女孕以女屬陰居右胎氣鍾於陰故右勝勝者甚不甚之謂非左疾右不疾也更視其腹如箕者為女胎如釜者為男胎蓋男女之孕於胞中女則面母腹男則面母背雖各肖父母之形亦陰陽相抱之理女面腹則足膝抵腹下大上小故如箕箕簸箕也前淺而後深覆之則高下異男面背則背脊抵腹其形正圓故如釜釜食鍋也覆之正圓一說女動於腹動不一處而動甚男動於腹舉腹動而動微動不一者四肢也舉腹動者背也歷觀數說則男女在胞之仰覆信不誣矣及其欲產也其脈與十月懷妊平常見者忽異假如平日之脈厚浮臨產則脈忽沉平日之脈遲臨產則脈忽數至如大小滑澀臨產皆忽然而異蓋十月胎氣安定一旦欲落氣血動盪胞胎迸裂自與經常離異而脈亦非平昔之狀貌矣雖然亦必有水先下俗謂之胞漿養胎之液也水下則胞裂而產不爾猶未即下勿認為產難而驚訝也及其已產也氣血兩虛其脈宜緩滑緩則舒徐不因氣奪而急促滑則流利不因血去而澀枯均吉兆也若脈實大弦牢非產後氣血俱虛者所宜實為邪實大為邪進弦為陰斂而宣布不能牢為堅著而瘀凝不解是皆相逆之脈設外有證又豈能順乎胎產雜述胎屬十二經所養虞氏曰脈經云診其脈手少陰之脈動甚者妊子也蓋手少陰心脈也心主血脈故也又腎為胞門子戶尺中腎脈按之不絕當妊子也又婦人妊娠一月之時足厥陰脈養之二月足少陽脈養之三月手厥陰脈養之四月手少陽脈養之五月足太陰脈養之六月足陽明脈養之七月手太陰脈養之八月手陽明脈養之九月足少陰脈養之十月足太陽脈養之是以諸經脈各養三十日也若夫至期當養之經虛實不調則胎孕為之不安甚則下血而墮矣夫手足十二經氣血盈虧不同如手足厥陰太陽少氣多血手足太陰少陰少血多氣手足少陽氣多血少手足陽明氣盛血多安胎之法宜各按月依經視其氣血虛實而調之庶無胎墮之患其或感冒風寒別生異證又宜各按法而調治之治難產三禁潔古云治胎產之病從厥陰經論之是主氣生化之源也厥陰與少陽為表裡故治法無犯胃氣及上二焦有三禁不可汗不可下不可利小便發汗則傷上焦之陽利大便則脈數而動脾利小便則內亡津液胃中枯燥製藥之法能不犯此三禁則榮衛自和而寒熱止矣如氣弱則黃耆血刺痛而和以當歸腹中疼而加之芍藥大抵產病天行從小柴胡增損雜證從四物增損宜詳察脈證而用之胎前調理法集略云母之腎臟繫於胎是母之真氣子之所賴也受妊之後宜令鎮靜則血氣安和須內遠七情外薄五味大冷大熱之物皆在所禁使霧露風邪不得投間而入亦不得交合陰陽觸動欲火謹節飲食若食兔缺唇食犬無聲食雜魚而致瘡癬心氣大驚而癲疾腎氣不足而解顱脾氣不和而羸瘦心氣虛乏而神不足兒從母氣不可不慎也苟無胎動胎痛瀉痢及風寒外邪不可輕易服藥不得已在審度疾勢輕重藥性高下不必多品然父少母老產女必羸母壯父衰生男必弱氣受偏萃與之補之補羸女則養血壯脾補弱男則壯脾節色羸女宜及時而嫁弱男宜待壯而婚昔人論年老有子者男不過八八女不過七七則知血氣在人固自有量夫豈逃陰陽之至數哉丹溪曰胎前當清熱養血產婦因火逼動胎逆上作喘急者急用條芩香附之類為末調下條芩水中取沉者為佳黃芩安胎乃上中二焦藥能降火下行天行不息所以生生而無窮茺蔚子治血行氣有補陰之妙命名益母以其行中有補也故曰胎前無滯產後無虛難產可煎作膏條芩白朮乃安胎聖藥俗以黃芩為寒而不用反謂溫熱藥能養胎殊不知胎孕宜清熱涼血使血循經而不妄行乃能養胎懷妊嗜物乃一臟之虛如愛酸乃肝臟不能養胎而虛也孕婦食忌雞肉合糯米食令子生寸白蟲食犬肉令子無聲鯉魚同雞子食令子生疳多瘡食兔肉令子缺唇食羊肝令子多厄食鱉肉令子項短縮頭雞子與桑椹同食令子倒生心寒鮮魚同田雞食令子喑啞雀肉同豆醬食令子面生䵟黯黑子食螃蟹令子橫生食生薑令子多指食水漿令絕產食雀肉飲酒令子多淫無恥食茨菰消胎氣食驢馬肉過月難產豆醬合藿香食墮胎食山羊肉令子多病食鰍鱔無鱗魚難產食諸般菌生子驚風而夭食雀腦令子患雀目孕婦藥忌歌曰蚖斑水蛭及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣三稜代赭芫花麝大戟蛇蛻黃雌雄牙硝芒硝丹皮桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通硇砂乾漆蟹腳爪地膽茅根莫用好孕婦起居忌便產須知云勿亂服藥過飲酒勿針灸舉重登高涉險心有大驚犯之產難子必癲癇勿多臥時時行步勿勞力過傷使腎氣不足生子解顱腦破不合衣毋太溫食毋太飽若脾胃不和榮衛虛怯子必羸瘦多病若自家及鄰家修造動土犯其胎氣令子破形殞命刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縛者相拘攣此皆驗如影響候胎法脈經曰婦人懷軀七月而不可知時時衄血而轉筋者此為軀也脈經曰妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也尺脈左偏大為男右偏大為女左右俱大產二子大者如實狀婦人妊娠四月欲知男女法左疾為男右疾為女俱疾為生二子胎經曰若胎病不動欲知生死令人摸之如覆杯者則男如肘頸參差起者女也觀此說則前如箕如釜之義瞭然逐月養胎法徐之才云妊娠一月名胎胚宜飲食精熟酸羹大麥毋食腥辛是謂才正足厥陰肝養不可針灸其經如大敦行間太衝中封五里中郄等穴是也肝主筋及血血行痞澀不為力事寢必安無令恐畏妊娠二月名始膏毋食辛臊居必靜處男子勿勞百節皆痛是為胎始結足少陽膽養不可針灸其經如膽竅丘墟趺陽絕骨外丘陽陵泉等穴是也膽主精兒精成常慎護勿驚動妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虛是謂外象而內感者也手心主包絡養不可針灸其經如中衝勞宮大陵內關間使郄門曲澤等穴是也包絡主脈毋悲哀思慮驚動妊娠四月始受水精以成血脈食宜稻粳羹宜魚雁是謂盛血氣以通耳目而行經絡手少陽三焦養不可針灸其經如關衝陽池內關三陽天井曲垣等穴是也是時兒六腑成宜靜形體和心志節飲食妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣服朝吸天光以避寒殃其食稻麥其羹牛羊和以茱萸調以氣味是謂養氣以定五臟足太陰脾養不可針灸其經如隱白大都公孫商丘三陰交漏谷陰陵泉等穴是也脾主四肢兒四肢成毋大飢甚飽毋食乾燥炙熱毋大勞倦妊娠六月始受金精以成其筋身欲微勞毋得靜處出遊於野數觀走犬行馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂足陽明胃養不可針灸其經如厲兌豐隆陰市上下廉三里等穴是也兒口目成調五味食甘美毋太飽妊娠七月始受木精以成其骨勞身搖肢毋使定止動作屈伸以運血氣居處必燥飲食避寒常食稻粳以密腠理是謂養骨而堅齒手太陰肺養不可針灸其經如少商魚際列缺尺澤天府等穴是也肺主皮毛兒皮毛已成勿大言勿號哭勿薄衣勿洗浴勿寒飲妊娠八月始生精以成膚革和心靜息毋使氣極是謂密腠理而澤顏色手陽明大腸養不可針灸其經如商陽二間合谷上下廉三里曲池肩井肩髃等穴是也陽明主九竅兒九竅成勿食燥物及失食勿忍大便妊娠九月始受石精以成皮毛六腑百節無不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力足少陰腎養不可針灸其經如湧泉然谷太谿交信築賓復溜等穴是也腎主續縷兒脈絡續縷皆成勿處溫冷勿著炙衣妊娠十月五臟俱備六腑齊通納天地氣于丹田關節人神皆備但俟時而生妊娠一月始胚二月始膏三月始胞四月形體成五月能動六月筋骨力七月毛髮生八月臟腑具九月穀氣入胃十月諸神備即產矣宜服滑胎束胎等藥入月即服臨產調理妊娠臨月最要安神定慮常步履勿多睡飽食過飲酒及雜藥宜先貼產圖依位鋪床帳預請老練穩婆備辦湯藥器物欲產時不可多人喧鬨但用老婦二人扶行及憑物站立若見漿水腰腹痛甚是胎離經令產母仰臥令兒轉身若兒頭向產門方可用藥催生坐草若心煩用水調服白蜜一匙覺飢吃糜粥少許勿令飢渴恐乏其力不可強服早服催生滑胎等藥及早於坐草使穩婆亂動手薛氏曰欲產之時覺腹內轉動即當正身仰臥待兒轉身向下時作痛試捏產婦手中指中節或本節跳動方與臨盆即產矣若初覺不仰臥以待轉胞或未產而水頻下此胞衣已破血水先干必有逆生難產之患若胎衣破而不得分娩者保生無憂散以固其血自然生息如血已耗用八珍湯料一斤益母草半斤水數十碗煎熟不時飲之亦有得生者凡孕婦只腹痛未產也若連腰痛甚者將產也蓋腎候於腰胞系於腎故也凡孕家宜預請有仁心知事穩婆先與說知倘有生息不順只說未產或遇雙胎只說胞衣未下恐驚則氣散愈難生息產值盛暑或血暈血溢當飲清水解之冬末春初產室用火和暖下部衣服當溫厚方免胎寒血結若臨月洗頭足亦致難產胞漿先破惡水來多胎幹不得下須先與四物湯補養血氣次濃煎蔥湯放溫令坐婆洗產戶須是款曲洗令氣上下通暢更用酥油滑石末塗產口裡次服神妙乳朱丹或葵子如聖散楊子建十產論一曰正產十月滿足忽腰腹作陣疼痛相似胎氣頓陷至於臍腹痛極乃至腰間重痛穀道挺迸繼之漿破血出兒乃遂生二曰傷產蓋人之生各有時日不可改易今有未產一月前忽然臍腹疼痛有如欲產仍無事是名試月非正產也但產母未有正產之候不可令人抱腰產母亦不可妄亂用力蓋欲產之時臍腹疼痛兒身未順收生者卻教產母早用力兒身才轉動即便用力一逼使兒錯路忽橫忽倒不能正生皆緣產母用力未當所致必須待兒順身逼戶方始用力一送令兒下生此方是母之用力當也若未有正產之候而用力早妄服藥譬如揠苗助長無益有害三曰催產欲產時漿破血下臍腹作陣疼痛腰重穀道挺迸已見正產之候但未生下可服藥以催之或有經及數日產母困苦明是正產之候但兒難生亦可服藥以助母正氣兒乃得下四曰凍產冬月天冷經血得冷則凝以致兒不能下此害最深若冬月產者下部不可去綿衣並不可坐臥冷處當滿房著火常有暖氣令母背身向火令臍下腿膝間常暖血暖則流利易生五曰熱產盛夏之月要溫涼得所勿恣意取涼致傷胎氣亦不可人多熱氣逼母使母血沸致有發熱頭疼面赤如醉不知人事者六曰橫產兒先露手或先露臂此由母未當用力而用之太過也兒身未順用力一逼遂至身橫不能生下當令母安然仰臥後令看生人先推其手令人直上漸漸逼身以中指摩其肩推上正之或以手攀其耳而正之須是母仰臥然後推兒直上徐徐正之候其身正服催生藥一盞方用力令兒下生七曰倒產產母胎氣不足關鍵不牢用力太早致兒不能迴轉便直下先露其足當令母仰臥令看生人推其足入不可令母用力亦不得驚恐使兒自順八曰偏產兒身未正母用力過早致兒頭偏在左或偏在右故頭雖露偏在一畔不能生下當令母仰臥次令看生人輕輕推兒近上以手正其頭令兒頭端正然後令母用力一送即便生下若是小兒頭後骨偏在穀道只露其額當令看生人以綿衣炙溫裹手於穀道外輕輕推兒頭正便令母送兒生也九曰礙產兒身已順而露正頂不能生下蓋因兒身迴轉肚帶扳其肩以此露正頂而不能生當令母仰臥令看生人輕推兒近上徐徐引手以中指按兒肩下撥其肚帶仍須候兒身正順方令母用力送令兒生下十曰坐產兒將生其母疲倦久坐椅褥抵其生路急於高處系一手巾令母以手攀之輕輕屈足坐身令兒生下非坐在物上也更有盤腸產者臨產母腸先出然後兒生若產後腸不收甚楚即以醋半盞新汲水七分調勻噀母面每噀一縮三噀縮盡此良法也交骨不開交骨不開產門不閉皆元氣素弱胎前失調以致血氣不能運達而然交骨不開陰氣虛宜加味芎歸湯補中益氣湯龜殼散之類產門不閉氣血虛宜十全大補湯胎死腹中子死腹中者多因驚動太早或犯禁忌致令產難胞漿已破無血養胎枯涸而死須驗產母舌青黑其胎死矣當下之宜平胃散加朴硝千金神造湯半夏湯之類大法寒者熱以行之熱者涼以行之燥者滑以潤之危急者毒藥下之下宜朴硝之類臨產束胎臨產束胎瘦斂則易生宜束胎丸達生散張氏方保生無憂散神寢丸之類臨產催生催生大法滑以流通澀滯苦以驅逐閉塞香以開竅逐血氣滯者行氣胞漿先破疾困者固血宜佛手散三合濟生湯黑神散阿膠赤小豆湯兔腦丸如神散黃金散之類產後調理凡產畢飲熱童便一盞不得便臥宜閉目坐須臾上床宜仰臥不宜側宜豎膝未可伸足高倚床頭厚鋪裀褥遮圍四壁使無孔隙免致賊風及以醋塗鼻或用醋炭及燒漆器更以手從心掩按至臍下使惡露不滯如此三日以防血暈血逆不問腹痛不痛有病無病以童便和酒半盞溫服五七服酒雖行血亦不可多能發昏暈宜頻食白粥少許一月後宜食羊肉豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計日月否則患手足腰腿痠痛等證名曰蓐勞最難治療初產時不可問是男是女恐因言語而泄氣或以愛憎而動氣皆能致病不可獨宿恐致虛驚不可括舌恐傷心氣不可漱齒恐致血逆須氣血平復方可治事犯時微若秋毫成病重如山嶽可不戒哉產婦將息如法臟腑調和庶無疾苦須先服黑神散四物湯若壯熱頭痛此乳脈將行頭目不清是血暈用清魂散粥食不美是胃氣虛宜六君子湯當歸建中湯陳藏器云漬苧汁與產婦服之將苧麻與婦人枕之止血暈產婦腹痛置苧於腹上則止產後宜補丹溪曰產後當大補氣血雖有雜證以末治之產後補虛用參朮黃耆陳皮當歸川芎炙甘草如發熱輕則加茯苓淡滲之其熱自除重則加乾薑凡產後有病先固氣血產後一切病多是血虛皆不可表新產三病仲景云問新產婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新產血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難鬱冒即今所謂血暈也千金云凡產後滿百日乃可會合不爾至使虛羸百疾滋長慎之凡婦人患風氣臍下虛冷莫不由此早行房故也產後脈法脈經曰診婦人生產之後寸口脈洪疾不調者死沉微附骨不絕者生婦人新產乳子脈沉小滑者生實大堅弦急者死丹溪曰產前脈細小產後脈洪大者多死又曰產前脈當洪數既產而脈洪數如故者多主死胞衣不下胞衣不下者謂之息胞由產初用力比兒出而體已疲憊不復能用力產胞停留間而或外冷乘之則血道澀故不下須急以方藥救治不妨害於兒所奈者胞系連兒臍胞不出即不得以時斷臍浴洗冷氣傷兒則成病也舊法胞衣不出恐損兒者依法截臍而已產處須順四時方向並避五行禁忌若有觸犯多令產婦難產郭稽中曰胞衣不下亦有流血入衣中衣為血所脹故不得下治之稍緩脹滿腹中以次上衝心胸疼痛喘急者難治但服奪命丹以逐去衣中之血血散脹消衣自下也牛膝湯亦效薛氏曰有因惡露入衣脹而不能出有因元氣虧損而不能送出其惡露流衣中者腹中脹痛用奪命丹或失笑散並胡氏法之類以消瘀血緩則不救其元氣不能送者腹中不脹痛用保生無憂散以固補元氣或用蓖麻子肉一兩細研成膏塗母右足心衣下即洗去緩則腸亦出如腸不收仍用此膏塗腦頂則腸自入或加桂芎歸丸紅花酒之類血暈附厥逆大全云產後血暈者由敗血流入肝經以致眼黑頭旋不能起坐甚至昏悶不省人事謂之血暈以細酒調黑神散服若作暗風中風治之誤矣有血熱乘風逆上湊心以致昏迷不省氣閉欲絕者服童便最好然其由有三有用心使力過多而暈者有下血過多而暈者有下血少而暈者其暈雖同治之則異當審詳之下血多而暈者昏而煩亂當以補血清心下血少而暈者乃惡露不下而上搶心下滿急神昏口噤絕不知人當以破血行血藥古法云產婦分娩訖預將秤錘或黃石硬炭燒令通赤置器中急於床前以醋沃之得醋氣可除血暈產後一月內時作為妙崔氏云凡暈者皆是虛熱血氣奔迸腹中空虛所致欲分娩者第一須先取釅醋以塗口鼻仍置醋於旁使聞其氣兼細細飲之此為上法如覺暈即以醋噀面蘇來即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏產婦面即醒如無干漆取舊漆器火燒煙燻亦妙血暈用藥宜清魂散失笑散芎歸湯荊芥散白薇湯之類惡露不下惡露不下由產後臟腑勞傷氣血虛損或胞絡挾宿冷或產後當風取涼風冷乘虛而搏血則壅滯不宣積蓄在內故令惡露不下也宜失笑散花蕊石散起枕散血露不絕大全云產後血露不絕者由產後損傷經血虛損不足或分解之時惡血不盡留停腹中致氣血不攝故令淋瀝不絕也薛氏曰若前證肝氣熱而不能主血宜六味地黃丸若肝氣虛而不能藏血宜逍遙散若脾氣虛而不能攝血宜六君子湯若胃氣下陷而不能統血宜補中益氣湯若脾經鬱熱而血不歸源宜加味歸脾湯若肝經怒火而妄行宜加味四物湯若氣血俱虛宜十全大補湯若肝經風邪而血沸騰宜四物加防風他如烏金散蒲醋飲子俱宜審證用之附方保生無憂散治妊娠身居安逸口厭甘肥憂樂不常食物不節致胞胎肥厚根蒂堅牢或瘦人血少胎弱臨蓐難產入月服之則易生也當歸川芎白芍藥枳殼麩炒木香甘草炙各一錢半乳香另研血餘燒存性另研各五分上作一服水煎入乳香血餘和勻不拘時服八珍湯見第十六四物湯見第二十一神妙乳砂丹治難產明乳香為末以豬心血為丸如桐子硃砂為衣日乾每服一丸嚼碎冷酒下良久未生再服或以蓮葉蒂七個水煎化服二丸良久未生再服葵子如聖散催生黃蜀葵子不拘多少烙干為末熱酒調下二錢神效如無子花亦可若胎漏血乾難產痛極者並進三服良久腹中氣寬胎滑即產須見正產候方可服之如打撲死胎紅花酒下加味芎歸湯產後血氣虛感風寒頭疼寒熱當歸川芎各二錢紫蘇乾葛各一錢上銼加生薑三片水煎服補中益氣湯見第三十九龜殼散治交骨不開不能生產當歸川芎敗板一個酥炙婦人頭髮生長過者一握燒存性上為散每服五錢水煎服約人行五里即生始胎死不下灼過龜版亦可十全大補湯見第十六平胃散見第四十四千金神造湯治動胎及產難子死腹中或妊娠兩兒一死一生服之令死者出生者安神驗莫測蟹爪一升甘草二尺阿膠三兩上三味以東流水一斗先煮蟹爪甘草得三升去滓次內膠令烊頓服之不能下再服若人昏牙緊拗口內藥藥入即活煎藥作東向灶用葦薪煮之半夏湯治胎衣不下或子死腹中或血衝上昏悶或血暴下及胞干而不能產者半夏曲一兩半桂去皮七錢半大黃五錢桃仁三十粒去皮尖炒上為粗末先服四物湯一二服次用此藥一錢生薑三片水煎服如未效次服下胎丸束胎丸胎瘦易生服至產則已白朮枳殼去瓤麩炒各等分為末燒飯丸如桐子大八月一日食前服三五十丸溫水下達生散八九個月內服十數帖易產大腹皮三錢人參陳皮紫蘇莖葉各五分歸身尾白朮白芍藥各一錢甘草炙二錢上作一服入青蔥五葉黃楊腦七個即黃楊樹葉梢兒食少胎瘦者不須用水煎服或加枳殼砂仁春加川芎夏加黃芩秋加澤瀉冬加砂仁氣虛倍參術氣實加香附陳皮血虛加當歸地黃形實倍紫蘇性急多怒加黃連柴胡熱甚加黃芩濕熱加滑石半夏食積加山楂食後易飢倍黃楊腦腹痛加木香官桂張氏方治妊娠胎肥壅隘動止艱辛臨月服之縮胎易產兼治腸中諸疾下氣寬膈枳殼五兩甘草一兩半香附子三兩炒去毛上為末薑湯點服如丈夫婦人冷氣攻刺脅肋疼痛者用蔥白三寸同煎服婦人脾寒血氣成塊作痛熱酒調服大小便不通白牽牛湯調服神寢丸瘦胎滑利易產臨月服之神效通明乳香半兩另研枳殼麩炒一兩為末煉蜜丸如桐子大每三十丸空心溫酒下佛手散治妊娠因事僕跌子死腹中惡露妄行疼痛不已口噤欲絕用此藥探之若子死腹中立便逐下若腹痛隨止子母俱安又治臨產艱難胞衣不下及產後血暈不省人事狀如中風血崩惡露不止腹中血刺㽲痛血滯浮腫血入心經語言顛倒如見鬼神血風相搏身熱頭痛或似瘧非瘧一切胎前產後危害狼狽垂死等證並皆治之丹溪云催生只用佛手散最穩當又效捷當歸酒洗去蘆一兩川芎七錢一方各等分上細銼分作四分每服先用水一盞煎將干投酒一盞半煎五七沸溫服如口噤擀開灌之如人行五里許再灌一服盡此四服便產神驗如產難倒橫子死腹中先用黑豆炒熟入白水童便各一盞用藥四錢煎服如胞產五七日不下垂死及矮石女子交骨不開者加龜版並生育過婦人頭髮燒灰為末每三錢酒調服三合濟生湯以枳殼芎歸達生三方抽其精粹而成合此湯治臨產艱難雖一二日不下者服此自然轉動下生當歸三錢川芎枳殼麩炒各二錢香附子炒一錢蘇葉八分粉草七分大腹皮薑汁洗一錢半上用水煎待腰腹痛甚服之即產一方加白芷一錢黑神散一名催生如神散治橫生逆產其功甚大並治胎前產後虛損月水不止崩漏等證百草霜白芷不見火各等分上為末每服二錢以童便米醋和如膏加沸湯調下或童便酒煎進二服然血得黑則止此藥大能固血又免血涸甚妙一方加白滑石煎芎歸湯調下阿膠赤小豆湯治難產累日氣力乏盡不得生此是宿有病者宜此方阿膠二兩赤小豆二升上以水九升煮豆令熟去滓內膠令烊每服五合不覺更服不過三服即出兔腦丸一名催生丹治難產及橫生逆產兔腦臘月者去皮膜研如膏明乳香二錢半細研母丁香為末一錢麝香一字另研細上研勻用兔腦髓和為丸如雞頭大陰乾油紙封裡每一丸破水後溫水下即產隨男左女右手握藥出如神散催生累效理則難通用路上草鞋一雙取鼻梁上繩洗淨燒灰童便和酒調下三錢一名千里馬黃金散治生產一二日難分娩者服之如神真金箔大者五片小者七片以小磁鍾將水少許去紙入箔在內用指研勻後再添水至半鍾一面先令一人扶產婦虛坐又令一婦人用兩手大指按定產母兩肩上肩井穴前藥溫服其胎即下此催生聖藥如產月未足又能安之清魂散產後血暈者氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絕不知人口噤神昏氣冷宜先取乾漆或漆器燒鼻中熏之頻置醋炭房內次進此藥即醒澤蘭葉人參各二錢半川芎半兩荊芥穗一兩上為細末每服二錢用溫酒熱湯各半盞或入童便調急灌之下咽眼即開氣定即醒六君子湯見第十六當歸建中湯治產後勞傷虛羸不足腹中疼痛呼吸少氣小腹拘急痛連腰背時自汗出不思飲食產訖直至月滿一日三服令人身壯強健當歸四兩白芍六兩桂心三兩黃耆一兩半上銼每服四錢加薑棗水煎入飴糖一塊再煎稍熱服如崩中衄血加阿膠地黃奪命丹治胎衣不下蓋兒之初生惡血流入衣中為血所脹塞故不得下須臾衝上逼心即死急服此藥黑附子炮五錢牡丹皮一兩乾漆炒煙盡二錢五分上為細末用米醋一升大黃末一兩同煮成膏和前藥為丸如桐子大每服五七丸溫酒下牛膝湯治胞衣不出臍腹堅脹急痛即殺人服此藥胞即爛下死胎亦下牛膝瞿麥各四兩當歸尾通草各六兩滑石八兩葵子五兩一方有桂心二兩上細切以水九升煮取三升分三服失笑散產後惡血上攻心腹㽲痛欲死及兒枕痛或牙關緊急一服可愈蒲黃炒五靈脂各一錢上為細末作一服用釅醋調膏入水一盞煎服胡氏法治產後胞衣不下惟有花蕊石散一件最為要緊若鄉居藥局遠者倉卒無之今有一妙法產訖胞衣不下稍久則血流胞中為血所脹上衝心胸喘急疼痛必致危篤若有此症宜急斷臍帶以少物繫帶必用力牢固系之然後絕斷使其子血脈不潮入胞中胞衣自當痿縮而下縱淹延數日亦不害人累驗加桂芎歸湯有胞衣不下因產母元氣虛薄者以此溫之自下川芎當歸各二錢官桂四錢上銼一服水煎服紅花酒紅花一兩酒煮濃汁服如口噤斡開灌之速效芎歸湯即佛手散荊芥散治產後風虛血暈精神昏昧荊芥一兩三錢桃仁炒五錢上為細末溫水調下三錢微喘加杏仁炒甘草各三錢白薇湯治產後胃弱不食脈微多汗亡血發厥鬱冒等證白薇當歸各六錢人參三錢甘草一錢半上切分作二帖水煎服花蕊石散見第七十四起枕散治產後惡血不行心腹及兒枕作痛甚危當歸白芍藥酒炒各三錢川芎二錢官桂玄胡索牡丹皮蒲黃炒五靈脂炒沒藥各一錢白芷一錢上銼水煎入童便空心服六味地黃丸見第十六逍遙散見第五十一加味歸脾湯即歸脾湯加柴胡牡丹皮見第五十八加味四物湯治產後血崩如豆汁紫黑過多者當歸川芎芍藥生地黃蒲黃阿膠薊根白芷上水煎服烏金散治產後血迷血暈敗血不止淋漓不斷臍腹㽲痛昏眩多汗無力及崩中下血不止麒麟竭男子亂髮灰松墨煅醋淬百草霜當歸肉桂赤芍延胡索鯉魚鱗燒存性各等分上為末每服二錢空心溫酒調下蒲醋飲子治新產瘀血逐敗滋新此藥治血神效又非黑神散之可比也月內每日一二服尤良及療一切惡露與血積真蒲黃不拘多少熬米醋令稠和藥成膏每服一彈子大食前醋湯化開服陰陽和而後孕孕固有天成自然之妙也不諳者乃一意珍護時進湯丸久久氣血偏勝反致胎氣不安及半產艱生者多矣故胎前諸方不備錄然有不得已者於下外附驗過方中求之外附胎產驗過方益母丸又名千金保胎丸凡女人受孕經三月而胎墮者雖氣血不足乃中衝脈有傷中衝脈即陽明胃經供應胎孕至此時必須節飲食絕欲戒怒庶免小產之患服此可以保全白朮土炒熟地黃薑汁炒杜仲薑汁炒各四兩當歸酒洗續斷酒洗阿膠蛤粉炒香附米四制益母草條芩炒各二兩陳皮川芎艾葉醋炙各一兩砂仁炒五錢上為細末煮棗肉為丸如桐子大每服百丸空心米飲下金匱當歸散此方養血清熱孕婦宜常服之如瘦人血少有熱胎動不安素曾半產者皆宜服之以清其源而無後患也當歸川芎白芍藥黃芩各一兩白朮二兩上為末每服二錢酒飲調服日再服或用酒糊為丸如桐子大每服五十丸茶湯任下日三服白朮湯治胃虛惡阻吐水甚至十餘日水漿不入者白朮炒一兩人參五錢丁香二錢半甘草一錢上為細末每服二錢加生薑五片水煎食前溫服縮砂散治妊娠胃虛氣逆嘔吐不食縮砂仁為末每服二錢生薑湯或米飲調服三物解毒湯治誤服毒藥甘草黑豆淡竹葉各等分上用水煎濃服白扁豆散治妊娠誤服諸般毒藥動胎欲墮白扁豆生去皮為細末米飲調服方寸匕神效或濃煎亦可豆淋酒治產後猶有餘血水氣者黑豆五升熬令煙盡投瓷器內以酒一斗淬之飲蓋豆淋酒治汙血又能發表也枳實芍藥散金匱云產後腹痛煩滿不得臥此方主之枳實炒令黑勿太過芍藥各等分上杵為散服方寸匕日三服並主癰膿以麥粥下之羊肉湯治產婦脾虛為寒邪所乘以致腹痛及寒月生產寒氣入於產門臍下脹滿手不可犯精羯羊肉四兩當歸川芎各半兩生薑一兩上以水十盞酒三盞煎至四盞分四次空心服加蔥鹽亦可衍義云一婦人產當寒月寒氣入產門臍滿手不得犯此寒疝也醫將治之以抵當湯謂其有瘀血耳予教之曰非其治也可服張仲景羊肉湯少減作二服愈回生丹治產後瘀積等證大黃一斤為細末蘇木三兩銼用河水五碗煎汁三碗黑豆三升煮熟取汁三碗紅花三兩酒四碗煎汁三碗上將大黃末以好醋二斤攪勻以文武火熬成膏次下三項汁攪開大黃膏再熬成膏如有鍋𤆵焙乾入在後藥當歸川芎熟地黃白茯苓蒼朮香附玄胡索桃仁蒲黃牛膝各一兩白芍藥甘草陳皮木香三稜五靈脂羌活地榆山茱肉各五錢人參白朮木瓜青皮各三錢良薑四錢乳香沒藥各二錢同末大黃膏為丸如彈子大每服一丸好酒化下艾附暖宮丸治婦人經水不調小腹時痛赤白帶下子宮寒冷香附四制一斤艾葉醋浸炒當歸川芎白芍藥酒炒熟地黃薑汁炒各一兩玄胡索炒二兩甘草生用八錢上為細末醋糊丸如桐子大每服七八十丸米湯酒任下神方驗胎散兩三個月月經不行疑而未決此藥探之真雀腦芎一兩當歸全用重一兩者只用七錢為細末分作二服濃煎好艾湯一盞調下或好酒調服亦得可待三兩個時辰覺臍腹微動而頻即有胎也動罷即愈安穩無虞如不是胎即不動所滯惡物自行如服藥不覺效再煎紅花湯調下
