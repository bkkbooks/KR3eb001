body:
  text: 卷一血脈隧道第一脈乃血泒氣血之先血之隧道氣息應焉水自源而分流曰泒合分起伏道各井然人身之血猶夫水也血中之脈猶夫泒也泒通則水源活脈通則氣血行氣也血也其在於人身渾淪條析非一非二設經脈不先為流轉則潛行默運之機礙矣詬濡守使又安望其各盡乃職耶難經二十二難曰氣主詬之血主濡之素問陰陽應象論曰陰在內陽之守陽在外陰之使隧道即經脈也言其在血中精密隱隧自成一道靈樞營氣篇云營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧營出中焦之義瞭然靈樞決氣篇云中焦取汁變化而赤是謂血壅遏營氣令無所避是謂脈壅遏猶言擁迫使入隧道而無別道可避也靈樞衛氣篇云其精氣之行於經者為營氣靈樞營衛生會篇云中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧合諸篇論觀之乃知血為總名而脈則指營氣流行不息之道耳若與血二實無有二然非呼吸不能流行故曰氣息應焉仲景平脈篇云呼吸者脈之頭也又靈樞動輸篇云其行也以息往來法地合心第二其象法地血之府也心之合也皮之部也天陽地陰氣陽血陰人之脈以血為體固當配地然觀其上下周匝出入臟腑聯絡貫通起伏交會一如大氣之行於地中故地有脈而山川秀麗人有脈而形體安全象之吻合莫有肖於此者故曰其象法地能再因其象而取法焉則吾醫之識脈與堪輿之尋龍無二義也府者藏也聚也隧道乃精專所注故為血之府充遍人身應夏火之氣中焦變赤得正南之色故為心之合肺主皮毛而朝百脈如部落然故為皮之部素問五臟生成篇云心之合脈也其榮色也又六節臟象篇云心者生之本其充在血肺者氣之本其充在皮又五臟生成篇云諸血者皆屬於心諸氣者皆屬於肺又平人氣象論云藏真高於肺以行營衛陰陽又經脈別論云脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府始生營衛第三資始於腎資生於胃陽中之陰本乎營衛營者陰血衛者陽氣營行脈中衛行脈外腎為十二經脈之根故曰資始胃乃生化之源故曰資生腎之與胃蓋有先後天之分焉靈樞經脈篇云人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為強皮膚堅而毛髮長谷入於胃脈道以通血氣乃行此即資始資生之注腳也所謂陽中之陰者蓋本乎營衛耳營者營運於中衛者護衛於外營為陰血行脈之中入隧道也衛為陽氣行脈之外不入隧道也氣動脈應第四脈不自行隨氣而至氣動脈應陰陽之誼氣如橐籥血如波瀾血脈氣息上下循環氣陽也血陰也陽主動陰主靜脈之行也必氣為之先氣行則血行氣動則脈動陰陽相應而不相失如交誼然橐圈橐也無底之器籥管籥也有孔之物夫陽氣之自頂至踵也雖固護於外無間隔於中其遊行出入溪谷募腠又各有竅穴故如橐如籥波微浪也湧疊而前瀾回瀾也旋渦而返血之在氣中也隴湧流行亦復回環灌溉故如波如瀾若合若分互為體用周流上下無始無終此則循環之義矣寸口大會男女定位第五十二經中皆有動脈惟手太陰寸口取決此經屬肺上系吭嗌脈之大會息之出入一呼一吸四至為息日夜一萬三千五百一呼一吸脈行六寸日夜八百十丈為準初持脈時令仰其掌掌後高骨是謂關上關前為陽關後為陰陽寸陰尺先後推尋心肝居左肺脾居右腎與命門居兩尺部魂魄穀神皆見寸口左主司官右主司府左大順男右大順女本命扶命男左女右關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈男女脈同惟尺則異陽弱陰盛反此病至十二經者即手足三陰三陽之經脈也其始從中焦注手太陰肺手太陰肺注手陽明大腸手陽明大腸注足陽明胃足陽明胃注足太陰脾足太陰脾注手少陰心手少陰心注手太陽小腸手太陽小腸注足太陽膀胱足太陽膀胱注足少陰腎足少陰腎注手厥陰心包手厥陰心包注手少陽三焦手少陽三焦注足少陽膽足少陽膽注足厥陰肝足厥陰肝還復注手太陰是謂一周其脈數十二經共長十六丈二尺各有長短亦逐經各有動脈如手太陰脈動中府雲門天府俠白手陽明脈動合谷陽溪足陽明脈動衝陽大迎人迎氣衝足太陰脈動箕門衝門手少陰脈動極泉手太陽脈動天窗足太陽脈動委中足少陰脈動太溪陰谷手厥陰脈動勞宮手少陽脈動禾髎足少陽脈動下關聽會足厥陰脈動太衝五里陰廉之類既皆有動脈是皆可即其脈以診病今惟取手太陰寸口動脈決諸病之死生吉凶者何耶蓋手太陰一經內屬肺臟其經起於中府終於少商其肺繫上連喉嚨吭嗌以通呼吸肺主一身之氣氣非呼吸不行脈非肺氣不布故仲景云呼吸者脈之頭也又寅初方升之氣出於中焦中焦指胃也蓋胃為水穀之海屬土居中灌溉四臟以及百骸所謂灌溉者無非一水穀之氣四臟中固有土而土中亦具四臟即胃氣中要有弦鉤毛石弦鉤毛石中要有胃氣義脈之晝夜五十環周始於此亦終於此始終循環原無少間但以一日夜分四時論之必以寅初為更始也故素問脈要精微論云診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈蓋以此時諸脈更始於胃其大小虛實躁靜疾徐種種畢露出於胃即注於肺最為切近又必由肺之呼吸以行此所謂肺朝百脈也呼出於陽吸入於陰一呼脈二至一吸脈二至總四至為一息一日一夜約一萬三千五百息即此一呼一吸脈氣行去六寸以一萬三千五百息算來共得八百一十丈以脈數之十六丈二尺折算應得周行於身五十度此晝夜脈行度數之準則也據越人二十三難云脈數總長十六丈二尺任督二蹺在內以一呼一吸行六寸算之晝夜一萬三千五百息共行八百一十丈周於身者得五十度後又云其始從中焦注手太陰終於足厥陰厥陰復還注手太陰所謂如環無端者不知二蹺任督從何處接入豈附行於足少陰太陽耶附則不能在循環注接之內當俟知者凡初持人之脈先令仰手以腕之高骨對平處謂之關上關前為陽後為陰陽曰寸陰曰尺尺至寸長一寸九分即此一寸九分三部分之為寸關尺也關居中若為陰陽界限而陰陽實互交於此能先後細為推究未有不得其病情者三部中又各有定位木火居左金土居右水居其下若以相生論之則左關肝木生左寸心火左寸心火生右關脾土右關脾土生右寸肺金右寸肺金生兩尺腎水魂為肝神魄為肺神谷不可言脾神然其變化資生生死以之更神乎神矣穀神一魂魄也魂魄一穀神也而又總攝於心君遊行出入雖無處不到而盛衰逆順未有不從寸口驗焉左肝心為木火為陽主升主生長職多發施故曰司官右肺脾為金土為陰主降主收受職多聚納故曰司府男子生於寅以陽為體左陽也左大則氣鍾於陽故在男為順女子生於申以陰為體右陰也右大則氣鍾於陰故在女為順由是男女之本命分系於左右順則雖病而本命猶可扶持關前一分人命之主者指魂魄穀神也左為人迎右為氣口者指司官司府也決斷神門關後有兩者指兩腎也即應腎間動氣也即難經八難所謂三焦之原守邪之神故曰神門關前穀神關後神門二脈即生人之先後二天也無二者言無此二脈也無則根本絶矣故死即無一亦死仲景云寸脈下不至關為陽絶尺脈上不至關為陰絶殆亦關前關後之謂乎男女脈同同於定位惟尺則異異於盛衰男子鍾於陽故陰弱女子鍾於陰故陰盛獨驗於尺者天一資生之始陰陽即判於此耳尺乃生人之根本如草木之色香華實皆判定於根荄反此則男得女盛女得男弱男女皆失其常故當病至七診九候第六脈有七診曰浮中沉上下左右消息求尋又有九候舉按輕重三部浮沉各候五動寸候胸上關候膈下尺候於臍下至跟踝左脈候左右脈候右病隨所在不病者否浮為心肺沉為腎肝脾胃中州浮沉之間心脈之浮浮大而散肺脈之浮浮澀而短肝脈之沉沉而弦長腎脈之沉沉實而濡脾胃屬土脈宜和緩命為相火左寸同斷與皮毛相得曰浮按之至骨曰沉中則在浮沉之間上下即寸與尺此概兩手六部而言也左右左手右手也是謂七診言能消息細求錯綜審別則上下表里之病無遁情矣一説上下左右即脈要精微論所云尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也竟盡也上竟於魚際下竟於尺末又素問三部九候論云獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病亦謂之七診但與本文七診之義不同當參看九候者言脈分三部三部中各有浮中沉是謂九候九候之情形非舉按輕重不能得其候以五動為準寸則候胸上至頭之疾關候膈下至臍之疾尺候臍下至足之疾左脈候身之左右脈候身之右病隨脈之所在而見不病則脈不應與前七診大同小異七診九候當參看總不外仲景所謂效象形容四字而已心肺居上脈應浮腎肝居下脈應沉脾胃居心肺腎肝之間謂之中州脈亦應在浮沉之間心肺同一浮也但浮大而散者象夏火故屬心浮澀而短者象秋金故屬肺肝腎同一沉也但沉而弦長者象春木故屬肝沉實而濡者象冬水故屬腎脈和而緩不虛微不實強不疾不遲自有一種舒徐沖融氣象土之性也脾胃宜之命門右腎固舍相火然終不能離水位故與左同斷四時胃氣第七春弦夏洪洪當作鉤秋毛冬石四季和緩是謂平脈太過實強病生於外不及虛微病生於內春得秋脈死在金日五臟準此推之不失四時百病胃氣為本脈貴有神不可不審天地之氣東升屬木位當寅卯於時為春萬物始生其氣從伏藏中透出如一縷之煙一線之泉在人則肝應之而見弦脈即素問玉機真藏論所謂其氣來軟弱輕虛而滑端直以長素問平人氣象論所謂軟弱招招如揭長竿末梢者是也氣轉而南屬火位當巳午於時為夏萬物盛長其氣從升後散大於外如騰湧之波燎原之火在人則心應之而見鉤脈即玉機真藏論所謂其氣來盛去衰平人氣象論所謂脈來纍纍如連珠如循琅玕者是也氣轉而西屬金位當申酉於時為秋萬物收成其氣從散大之極自表初收如浪靜波恬煙清焰熄在人則肺應之而見毛脈即玉機真藏論所謂其氣來輕虛以浮來急去散平人氣象論所謂脈來厭厭聶聶如落榆莢者是也氣轉而北屬水位當亥子於時為冬萬物合藏其氣從收降而斂實如埋爐之火匯潭之泉在人則腎應之而見石脈即玉機真藏論所謂其氣來沉以搏平人氣象論所謂脈來喘喘纍纍如鉤按之而堅者是也玉機真藏作冬脈營營者營聚於中中必實亦石之義鉤而按之堅乃有石義不爾是夏脈矣以上經論所云四時諸脈形狀雖因時變易其中總不可少和柔平緩景象蓋和緩為土即是胃氣有胃氣而合時便是平脈玉機真藏論云脾脈者土也孤臟以灌四旁者也今弦鉤毛石中有此一種和緩即是灌溉四旁即是土矣亦即是脾脈矣以其寓於四脈中故又曰善者不可得見平人氣象論云長夏屬脾其脈和柔相離如雞踐地察此脈象亦不過形容其和緩耳辰戌丑未四季之月各月土旺一十八日即是灌溉四旁之義故分而為四有土而不見土也若論五行則析而為五土居其中是屬長夏況長夏居金火之間為相生之過脈較他季月不同故獨得見主時之脈二説雖殊其義不悖當參看所謂太過不及者言弦鉤毛石之脈與時相應俱宜和緩而適中欲其微似不欲其太顯欲其微見不欲其不見今即以一弦脈論之若過於微弦而太弦是謂太過太過則氣實強氣實強則氣鼓於外而病生於外若不及於微弦而不弦是謂不及不及則氣虛微氣虛微則氣餒於內而病生於內其鉤毛石之太過不及病亦猶是今不但不見春弦之太過不及而反見毛浮之秋脈當升而反降當生而反殺氣機大逆神轉不回是謂克賊未有不病而死者春木既為金克金日邪旺正何以堪故死於此五臟皆以此理推之自無差失四時有四時之脈四時有四時之病但土灌四旁雖病變百出必以之為本況胃氣乃水穀之精諸脈有神水穀之力也不聞得谷者昌乎誠不可不審平和遲數第八調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數即熱證轉遲轉冷轉數轉熱遲數既明浮沉當別醫至病家宜默坐片時先調停自氣令呼吸均勻方診其脈平人氣象論云常以不病人調病人醫不病故為病人平息以調之大約以我呼吸一息得彼脈四至五至為準則呼吸閏以太息故在四至五至之間此為平和之脈斷為無病雖病亦極微淺以脈不為病變故也病邪微不能變易其脈若一息三至不及四五是名遲脈遲則氣寒而行慢故病主冷若一息六至過於四五是名數脈數則氣熱而行快故病主熱轉遲則更遲在三至以下而冷者愈冷矣轉數則更數在六至以上而熱者愈熱矣此遲數脈病之相應也遲數既明寒熱乃定欲知寒熱之所屬又當別乎浮沉耳內外因第九浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦明人喜怒憂思悲恐驚外因之浮則為表證沉里遲陰數則陽盛內因之浮虛風所為沉氣遲冷數熱何疑浮數表熱沉數里熱浮遲表虛沉遲冷結表裡陰陽風氣冷熱辨內外因脈證參別脈理浩繁總括於四既為提綱引申觸類在表則浮在裡則沉遲則為寒數則為熱固一定不易之理而因則有二焉此內外之不可不辨也外感六淫因之於天內傷七情因之於人六淫者天之陰陽風雨晦明也即左傳醫和所云陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾也淫者淫佚偏勝久而不復之謂故陰淫則過於清冷而陽氣不治寒疾從起如上下厥逆中外寒栗之類陽淫則過於炎燠而陰氣不治熱疾從起如狂譫煩渴血泄浸淫之類風淫則過於動搖而疾生鱔末如肢廢毛落漐習瘛瘲之類雨淫則過於水濕而疾生腸腹如腹滿腫脹腸鳴濡瀉之類晦淫則過於昏暗陽光內郁而成惑疾如百合狐惑熱中臟燥之類明淫則過於彰露陽光外散而成心疾如恍惚動悸錯妄失神之類七情者人之喜怒憂思悲恐驚也即所謂七氣而巢氏病源論以勞氣易驚氣又增寒熱二氣廣為九氣若配四時五臟則又只言五氣如素問陰陽應象大論云天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐是已據巢氏言九氣之狀謂怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收聚熱則腠理開而氣泄憂則氣亂勞則氣耗思則氣結怒氣上者怒則氣逆甚則嘔血及食故氣上矣喜氣緩者喜則氣和營衛通利故氣緩矣悲氣消者悲則心系急肺布葉舉使上焦不通營衛不散熱氣在內故氣消矣恐氣下者恐則精卻精卻則上焦閉閉則氣還還則下焦脹故氣下矣寒氣收聚者寒則經絡澀滯故氣收聚矣熱氣泄者熱則腠理開竅營衛通故汗出而氣泄矣憂氣亂者憂則心無所寄神無所歸慮無所定故氣亂矣勞氣耗者勞則喘且汗內動外泄故氣耗矣思氣結者思則身心有所止氣留不行故氣結矣是謂九氣而七氣即在其中雖皆內因而為病則有二種一種因感觸情境氣久不散著而為病者病生於情也一種因五行之盛衰五臟之虛實互相勝復病中見情者情生於病也病生於情者如素問陰陽應象大論云喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固又曰東方生風在聲為呼在變動為握在志為怒怒傷肝悲勝怒南方生熱在聲為笑在變動為憂在志為喜喜傷心恐勝喜中央生濕在聲為歌在變動為噦在志為思思傷脾怒勝思西方生燥在聲為哭在變動為咳在志為憂憂傷肺喜勝憂北方生寒在聲為呻在變動為栗在志為恐恐傷腎思勝恐又靈樞口問篇云夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經脈厥絶脈道不通陰陽相逆衛氣稽留經脈虛空血氣不次乃失其常又素問玉機真藏論云憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣又靈樞本神篇云怵惕思慮者則傷神神傷則恐懼流淫而不止悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉脾憂愁而不解則傷意意傷則悗亂四肢不舉肝悲哀動中則傷魂魂傷則狂忘不精當人陰縮而筋攣兩脅骨不舉肺喜樂無極則傷魄魄傷則狂皮革焦腎盛怒而不止則傷志志傷則善忘其前言腰脊不可以俯仰屈伸恐懼而不解則傷精精傷則骨痠痿厥精時自下又素問調經論云喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣又素問痿論岐伯曰悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也又曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫又素問遺篇云人憂愁思慮即傷心恚怒氣逆上而不下即傷肝又靈樞邪氣臟腑病形篇云愁憂恐懼則傷心又靈樞口問篇云口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故涕泣出焉又壽夭剛柔篇云憂恐忿怒傷氣氣傷臟乃病臟又素問血氣形志篇云形樂志苦病生於脈形樂志樂病生於肉形苦志苦病生於咽嗌形數驚恐經絡不通病生於不仁又素問疏五過論云嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣流連病有所並又云暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮暴怒傷陰暴喜傷陽厥逆上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並又曰故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣又素問生氣通天論云陽氣者大怒則形氣絶而血菀於上使人薄厥又通評虛實論云隔則閉絶上下不通則暴怒之病也又靈樞刺節真邪篇曰飲食不節喜怒不時津液內溢乃下留於睪又素問經脈別論曰有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心驚而奪精汗出於心疾走恐懼汗出於肝此皆病生於情也情生於病者如素問金匱真言論曰東方色青入通於肝開竅於目藏精於肝其病發驚駭又素問調經論曰血並於陰氣並於陽故為驚狂又曰血並於上氣並於下心煩惋善怒血並於下氣並於上亂而喜忘又宣明五氣篇曰胃為氣逆為噦為恐又云膽為怒又云精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐又云陽入之陰則靜陰出之陽則怒又素問調經論曰神有餘則笑不休神不足則悲又曰血有餘則怒不足則恐又靈樞行針篇曰多陽者多喜多陰者多怒又素問解精微論曰水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺言曰心悲名曰志悲又靈樞本神篇曰肝藏血血舍魂肝氣虛則恐實則怒又云心藏脈脈舍神心氣虛則悲實則笑不休又玉機真藏論曰春脈太過則令人善怒又素問脈解篇云陽明所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也又曰少陰所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相薄故恐也又曰肝氣當治而未得故善怒善怒者名曰煎厥又靈樞根結篇曰厥陰為闔闔折即氣絶而喜悲又素問繆刺篇曰邪客於足少陰之絡令人無故善怒氣上走賁上又素問生氣通天論曰俞氣化薄傳為善畏及為驚駭又靈樞五變篇曰此人薄皮膚而目堅固以深者長沖直揚其心剛剛則多怒怒則氣上逆胸中蓄積血氣逆留髖皮充肌血脈不行轉而為熱熱則消肌膚故為消疸此言其人暴剛而肌肉弱者也又素問痹論曰心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐又曰肝痹夜臥則驚此皆情生於病也故病生於情者治其情如喜勝悲悲勝怒之類情生於病者治其病如平肝怒解溫膽悸寧之類外因之邪自表而入當其在表正氣應之其脈必浮若見沉脈邪已去表而入里矣若脈不及四至名曰遲遲則邪在陰分主冷過於四至名曰數數則邪在陽分主熱內因之邪自內而生如暴喜卒驚暴怒陽氣浮越脈應之而浮其中必虛如今之暴怒蹶僕卒驚暈倒大喜傴痛如中風狀而非外來之風此即所謂虛風也若憂思悲恐久積沉鬱脈應之而沉以無虛浮風象故直指曰氣耳遲則為冷若脈遲不論因於何氣皆主冷也數則為熱若脈數不論因於何氣皆主熱也數皆主熱若浮而得之不論何因其熱在表沉而得之其熱在裡遲既主冷若浮而得之不論何因其冷在表而虛沉而得之其冷在裡而結外因之表裡陰陽內因之風氣冷熱非參以脈則不能分別然而脈理浩繁能提括其綱自可條析其目但以浮沉遲數四者而觸類焉則引彼可以證此申此可以例彼而診家之精義思過半矣浮脈第十浮脈法天輕手可得泛泛在上如水漂木有力洪大來盛去悠無力虛大遲而且柔虛甚則散渙漫不收有邊無中其名曰芤浮小為濡綿浮水面綿一作帛濡甚則微不任尋按天覆於上陽也浮脈似之故曰法天其脈應手皮毛輕手可得按之且有泛泛欲上之勢如水中漂木雖按之使沉亦必隨手而起脈經所謂舉之有餘按之不足者是也若浮脈中加以洪大來盛去悠是為有力之浮脈謂之浮大之脈亦可若浮脈中加以虛大遲而且柔是為無力之浮脈謂之虛大之脈亦可若浮而虛大之甚則渙散瀰漫不斂不實名曰散脈脈經所謂氣實血虛有表無里者是也若四邊有而中則無名曰芤脈芤者中空之草其狀如蔥脈經所謂浮大而軟按之中央空兩邊實者是也若浮而小名曰濡脈如帛浮於水按之軟薄全無力也若浮濡之甚則極虛極小名曰微脈不勝重為尋按脈經所謂若有若無或欲絶者是也沉脈第十一沉脈法地近於筋骨深深在下沉極為伏有力為牢實大弦長牢甚則實愊愊而強無力為弱柔小如綿弱甚則細如蛛絲然地載於下陰也沉脈似之故曰法地其脈近在筋骨非重按不可得更有深深下沉之勢脈經所謂舉之不足按之有餘者是也若沉之極似附著於筋骨名曰伏脈脈經所謂極重按之乃得者是也若沉而有力實大弦長弦則強急且大且實堅牢之義自可想見脈經有革脈而無牢脈要知牢即革也革脈形如按鼓亦即強急堅牢之義皆有餘於外者若牢之甚則內外皆實愊愊而強如有根蒂也沉而無力既小且柔是名為弱脈經所謂極軟而沉細按之欲絶指下者是也弱之甚則更柔更小若有若無縈縈如蜘蛛之絲名曰細與微脈固不相遠也遲脈第十二遲脈屬陰一息三至小駃於遲緩不及四二損一敗病不可治兩息奪精脈已無氣浮大虛散或見芤革浮小濡微沉小細弱遲細為澀往來極難易散一止止而復還結則來緩止而復來代則來緩止不能回一呼一吸為一息脈應四至是其常也遲則一息三至氣不振發行不如度故曰屬陰緩則小駃於遲猶未能及於四至若一息二至元氣已損一息一至元氣已敗病則必不可治兩息一至真精奪去雖一見脈正氣已無不過燼燈之餘焰耳遲而浮大或為虛散或為芤革遲而浮小不為濡則為微遲而沉小不為細則為弱遲而細則力不足於往來名曰澀往來艱澀則易於散而或有一止不足之止然非絶藏之脈故止而復還也結則緩中時或一止止而復來蓋氣有結滯脈為阻礙暫一止而復來阻塞之止與澀之易散一止者不相懸也代則緩中一止止不能回脫根之止脈經所云不能自還因而復動正如替代之代有出無入有去無來之象數脈第十三數脈屬陽六至一息七疾八極九至為脫浮大者洪沉大牢實往來流利是謂之滑有力為緊彈如轉索數見寸口有止為促數見關中動脈可候厥厥動搖狀如小豆脈以四至為平閏以太息大約不出五至若一息六至是為數脈氣行速疾逾於常度故曰屬陽一息七至氣更速快故曰疾一息八至陽熱已極一息九至則元神散脫而與遲之奪精者固無異也數而浮大其名曰洪數而沉大不為牢即為實數而往來流利是名曰滑即脈經所云輾轉替替然與數相似者數而有力是名曰緊緊原以形狀言不以至數言但緊脈斂實似弦弦則直急如弦緊則脈經所云如轉索如切繩內有攪動彈搏之狀似乎數也若數中時見一止失倫之止名曰促脈脈流數疾勢如奔逸偶不相繼故一止耳仲景云陽盛則促故當於寸口見焉若數脈見於關上名曰動脈蓋關為陰陽交互之處陰陽不和兩相抗激勢不相下故迸於上而厥厥動搖也然上下無頭尾只在一分之關上非圓實之小豆不足以形容其狀也長脈第十四長則氣治過於本位長而端直弦脈應指脈位有三寸關尺也長則透出本位惟其透出乃見長象非氣之充暢不能有此故曰治若長而端直應於指下是為弦脈即素問玉機真藏論曰其氣來軟弱輕虛而滑端直以長者是也短脈第十五短則氣病不能滿部不見於關惟尺寸候一脈一形各有主病數脈相兼則見諸證脈短則氣不充暢無論在寸在尺俱不能滿足本部惟其不能滿部乃見短象氣不足非病而何然此惟尺寸見之設若在關而不滿本部則與尺寸不相接矣理無此脈蓋脈類多矣有一脈自有一脈之形形有不同故病亦各異若脈數形兼見而病亦數種兼成仲景所謂此自經常不失銖分者也如下文云云
